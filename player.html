<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Watching | StreamVerse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Sora:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root {
            --primary: #e50914;
            --primary-glow: rgba(229, 9, 20, 0.4);
            --bg: #000;
            --glass: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --muted: #a6a6a6;
            --transition: all .25s cubic-bezier(.4, 0, .2, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Sora', sans-serif;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity .5s ease;
            background-size: cover;
            background-position: center;
        }

        #loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .6), rgba(0, 0, 0, 0.95));
        }

        .loader-inner {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 1rem;
        }

        .loader-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
        }

        .loader-logo span {
            color: var(--primary);
            text-shadow: 0 0 25px var(--primary-glow);
        }

        #loader-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: .4rem;
        }

        #loader-sub {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            letter-spacing: 0.3px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto;
            border: 3px solid rgba(255, 255, 255, .05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite, pulse-glow 2s infinite ease-in-out;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 10px var(--primary-glow);
            }

            50% {
                box-shadow: 0 0 25px var(--primary-glow);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* PROVIDER PROGRESS */
        #provider-progress {
            margin-top: 1.8rem;
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .prov-chip {
            padding: .3rem .9rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            color: var(--muted);
            transition: var(--transition);
        }

        .prov-chip.trying {
            border-color: rgba(255, 180, 0, .5);
            color: #ffb400;
        }

        .prov-chip.success {
            border-color: rgba(50, 200, 100, .5);
            color: #32c864;
        }

        .prov-chip.failed {
            border-color: rgba(229, 9, 20, .3);
            color: #e50914;
            opacity: .6;
        }

        /* HEADER */
        .player-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: calc(1.4rem + var(--safe-top)) calc(1.8rem + var(--safe-right)) 1.4rem calc(1.8rem + var(--safe-left));
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            z-index: 270;
            pointer-events: none;
            transition: var(--transition);
        }

        .player-header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.08);
        }

        .header-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header-info p {
            font-size: .85rem;
            color: var(--muted);
            margin-top: .1rem;
        }

        /* PLAYER */
        .player-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1;
        }

        #video-brightness-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.1s linear;
        }

        #player-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: var(--video-fit, contain);
            object-position: center;
        }

        .plyr {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            --plyr-color-main: var(--primary);
        }

        .plyr__video-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .plyr video {
            object-fit: contain;
        }

        /* Custom control surface (from requested player UI) */
        .plyr__controls,
        .plyr__control--overlaid {
            display: none !important;
        }

        :root {
            --video-fit: contain;
        }

        #player-video,
        .plyr video {
            object-fit: var(--video-fit, contain);
            object-position: center;
        }

        .control-surface {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 4vw 2vh;
            pointer-events: auto;
            z-index: 260;
            opacity: 0;
            transition: opacity .22s ease;
            background: rgba(0, 0, 0, 0.001);
            /* Transparent but makes it a reliable touch target on mobile */
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        .control-surface.visible {
            opacity: 1;
        }

        .control-center {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: min(80vw, 560px);
            margin: 0 auto;
            flex: 1;
            transform: translateY(4vh);
        }

        .ctrl-btn {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(20, 22, 30, .6);
            color: #fff;
            border-radius: 999px;
            width: 64px;
            height: 64px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .ctrl-btn span {
            font-size: 14px;
            font-weight: 600;
        }

        .ctrl-btn svg {
            width: 44px;
            height: 44px;
        }

        .ctrl-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .play-btn {
            width: 84px;
            height: 84px;
            font-size: 26px;
        }

        .control-bottom {
            display: flex;
            align-items: center;
            gap: 1rem;
            pointer-events: auto;
            padding: 0 .5rem;
            position: relative;
        }

        .time-readout {
            display: flex;
            align-items: baseline;
            gap: .35rem;
            font-size: .9rem;
            color: rgba(255, 255, 255, .8);
            min-width: 90px;
        }

        .time-divider {
            color: rgba(255, 255, 255, .55);
        }

        .seek-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .seek-track-base {
            position: absolute;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(255, 255, 255, .15);
            border-radius: 999px;
            pointer-events: none;
        }

        #skipMarkerContainer {
            position: absolute;
            left: 0;
            right: 0;
            height: 5px;
            pointer-events: none;
            z-index: 1;
            border-radius: 999px;
            overflow: hidden;
        }

        .skip-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            background: #0ea5e9;
            /* Light blue per screenshot */
            z-index: 1;
        }

        .seek-bar {
            width: 100%;
            appearance: none;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--seek-percent, 0%), transparent var(--seek-percent, 0%), transparent 100%);
            outline: none;
            cursor: pointer;
            z-index: 2;
            margin: 0;
        }

        .seek-bar::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
        }

        .seek-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
        }

        .seek-preview {
            position: absolute;
            bottom: 45px;
            left: 0;
            display: flex;
            visibility: hidden;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.15s ease-out, transform 0.15s ease-out, visibility 0.15s;
            transform: translateX(-50%) translateY(5px);
            opacity: 0;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        .seek-preview.visible {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .seek-preview-thumb {
            width: 200px;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .seek-preview-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .seek-preview-time {
            width: auto;
            min-width: 60px;
            background: rgba(20, 22, 30, .6);
            border: 1px solid rgba(255, 255, 255, .18);
            backdrop-filter: blur(10px);
            color: #fff;
            text-align: center;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            position: relative;
            margin-top: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .seek-preview-time::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(255, 255, 255, 0.18);
        }

        .control-actions {
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .ctrl-icon {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(20, 22, 30, .6);
            color: #fff;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .ctrl-icon:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .control-menu {
            position: fixed;
            background: var(--glass);
            border-radius: 16px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 6px;
            width: 220px;
            /* Default width */
            z-index: 1200;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            max-height: 340px;
            overflow-y: auto;
            /* JS will handle left and bottom */
        }

        #qualityMenu {
            width: 175px;
        }

        #source-panel,
        #ep-panel,
        #audio-panel {
            position: fixed;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px;
            display: none;
            flex-direction: column;
            z-index: 1200;
            backdrop-filter: blur(25px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, .8);
            animation: slideUp .25s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 420px;
            overflow-y: auto;
        }

        #source-panel {
            width: 220px;
        }

        #ep-panel {
            width: 300px;
        }

        #audio-panel {
            width: 200px;
        }

        #source-panel.open,
        #ep-panel.open,
        #audio-panel.open {
            display: flex;
        }

        /* GESTURE OVERLAYS */
        .gesture-overlay {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 180px;
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            z-index: 1500;
            backdrop-filter: blur(12px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .gesture-overlay.visible {
            display: flex;
            opacity: 1;
        }

        #brightness-overlay {
            left: 30px;
        }

        #volume-overlay {
            right: 30px;
        }

        .gesture-icon {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .gesture-bar-wrap {
            flex: 1;
            width: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .gesture-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transition: height 0.05s linear;
        }

        .control-menu.active {
            display: flex;
        }

        #volumeMenu {
            width: 250px;
        }

        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 8px;
        }

        .volume-slider {
            flex: 1;
            appearance: none;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--vol-percent, 100%), rgba(255, 255, 255, .15) var(--vol-percent, 100%), rgba(255, 255, 255, .15) 100%);
            outline: none;
            cursor: pointer;
            touch-action: none;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
        }

        .volume-toggle {
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(20, 22, 30, .6);
            color: #fff;
            border-radius: 10px;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .volume-toggle:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .volume-boost-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 10px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 6px;
        }

        .boost-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .boost-label {
            font-size: 0.75rem;
            color: #ccc;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .boost-value {
            font-size: 0.72rem;
            color: var(--primary);
            font-weight: 700;
        }

        .boost-slider-container {
            position: relative;
            padding: 12px 6px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .boost-slider {
            flex: 1;
            appearance: none;
            height: 2px;
            background: linear-gradient(to right, var(--primary) var(--boost-percent, 0%), rgba(255, 255, 255, 0.15) var(--boost-percent, 0%));
            outline: none;
            cursor: pointer;
            z-index: 2;
            position: relative;
        }

        .boost-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            /* Square/Rect thumb like the drawing indicator */
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            cursor: pointer;
            border: none;
        }

        .boost-ticks {
            position: absolute;
            left: 6px;
            right: 6px;
            height: 12px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 1;
            padding: 0;
        }

        .tick {
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
        }

        .tick.active {
            background: var(--primary);
            box-shadow: 0 0 4px var(--primary);
        }

        .menu-item {
            padding: 11px 14px;
            color: #ddd;
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.88rem;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, .08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .menu-item.selected {
            background: rgba(168, 85, 247, 0.18) !important;
            border: 1px solid var(--primary) !important;
            color: #fff !important;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            padding: 16px 14px;
        }

        .menu-item.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 4px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--primary);
        }

        .ui-lock-btn {
            position: fixed;
            top: 26px;
            right: 52px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .22);
            background: rgba(20, 22, 30, .72);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 350;
            transition: var(--transition);
        }

        .ui-lock-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .ui-lock-btn.locked {
            border-color: rgba(229, 9, 20, .65);
            box-shadow: 0 0 14px rgba(229, 9, 20, .25);
        }

        .skip-segment-btn {
            position: fixed;
            right: 40px;
            bottom: 120px;
            z-index: 340;
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 12px;
            background: rgba(25, 25, 25, 0.85);
            color: #fff;
            padding: 14px 24px;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .skip-segment-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            transform: translateY(-2px);
        }

        .next-episode-btn {
            position: fixed;
            right: 40px;
            bottom: 180px;
            /* Positioned above skip button when both active */
            z-index: 340;
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 12px;
            background: rgba(25, 25, 25, 0.85);
            color: #fff;
            padding: 14px 24px;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .next-episode-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            transform: translateY(-2px);
        }

        /* Hide legacy floating buttons (replaced by custom control surface actions) */
        #source-btn,
        #ep-btn,
        #audio-btn {

        async function fetchJsonWithApiFallback(url, options = {}) {
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const shouldRetryStatus = (status) => status === 404 || status === 429 || status >= 500;
            const hasCallerSignal = !!options?.signal;
            const isRetriableError = (err) => {
                const msg = String(err?.message || err || '').toLowerCase();
                return (
                    msg.includes('failed to fetch') ||
                    msg.includes('networkerror') ||
                    msg.includes('load failed') ||
                    msg.includes('timed out') ||
                    msg.includes('timeout') ||
                    msg.includes('aborted')
                );
            };
            const attemptFetch = async (base, attempts = 2) => {
                let lastErr = null;
                const maxAttempts = hasCallerSignal ? 1 : attempts;
                for (let i = 0; i < maxAttempts; i += 1) {
                    const reqUrl = withApiBase(url, base);
                    try {
                        const res = await fetch(reqUrl, options);
                        if (shouldRetryStatus(res.status) && i < maxAttempts - 1) {
                            await sleep(1000 + i * 1200);
                            continue;
                        }
                        if (res.ok) {
                            activeApiBase = base; // Persist successful base
                        }
                        return { res, usedBase: base };
                    } catch (err) {
                        lastErr = err;
                        if (isRetriableError(err) && i < maxAttempts - 1) {
                            await sleep(1000 + i * 1200);
                            continue;
                        }
                        throw err;
                    }
                }
                throw lastErr || new Error('Request failed');
            };

            let lastErr = null;
            for (const candidate of API_BASE_CANDIDATES) {
                try {
                    const result = await attemptFetch(candidate, 2);
                    // If result is 500/404/etc, and it's NOT the last candidate, keep trying others
                    if (!result.res.ok && candidate !== API_BASE_CANDIDATES[API_BASE_CANDIDATES.length - 1]) {
                        console.warn(`API ${candidate} returned ${result.res.status}, trying next fallback...`);
                        continue;
                    }
                    return result;
                } catch (e) {
                    lastErr = e;
                    console.warn(`API ${candidate} failed completely, trying next fallback...`, e);
                }
            }
            throw lastErr || new Error('All API candidates failed');
        }

        function svApplyPreferredAudioToHls(hls) {
            if (!hls || !Array.isArray(hls.audioTracks) || hls.audioTracks.length === 0) return;
            const tracks = hls.audioTracks;

            // Normalize our current preference
            let searchToken = (preferredAudioToken || '').toLowerCase();
            // Strip common suffixes that might pollute the token
            searchToken = searchToken.replace(/\s*\(.*?\)\s*/g, '').trim();
            const normPref = normalizeAudioToken(searchToken);

            let targetIdx = -1;

            if (normPref) {
                // 1. Try exact normalized match
                targetIdx = tracks.findIndex(t => {
                    return getTrackAudioTokens(t).some(tok => normalizeAudioToken(tok) === normPref);
                });

                // 2. Try substring match (e.g. "hindi" in "Hindi - Multi")
                if (targetIdx === -1) {
                    targetIdx = tracks.findIndex(t => {
                        return getTrackAudioTokens(t).some(tok => {
                            const nt = normalizeAudioToken(tok);
                            return nt.includes(normPref) || normPref.includes(nt);
                        });
                    });
                }
            }

            // 3. Fallback: Japanese (common for anime)
            if (targetIdx === -1) {
                targetIdx = tracks.findIndex(t => {
                    const l = String(t?.lang || '').toLowerCase();
                    const n = String(t?.name || '').toLowerCase();
                    return l === 'ja' || l === 'jpn' || n.includes('japanese') || n.includes('nihongo') || n.includes('jp');
                });
            }

            // 4. Fallback: Default or first track
            if (targetIdx === -1) {
                const def = tracks.findIndex(t => t.default);
                targetIdx = def !== -1 ? def : 0;
            }

            if (targetIdx !== -1 && hls.audioTrack !== targetIdx) {
                try {
                    hls.audioTrack = targetIdx;
                    const sel = tracks[targetIdx];
                    console.log(`[hls-audio] Successfully auto-switched to index ${targetIdx} (${sel.name || sel.lang})`);
                } catch (e) {
                    console.warn('[hls-audio] Failed to switch track:', e);
                }
            }
        }

        function svAttachHlsListeners(hls, startTime, onParsedAction, onErrorFallback) {
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                console.log('MANIFEST_PARSED - audio tracks:', hls.audioTracks?.length || 0);
                if (startTime > 0 && video) video.currentTime = startTime;
                svApplyPreferredAudioToHls(hls);
                if (onParsedAction) onParsedAction();
                updateAudioTracks();
            });

            hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, () => {
                console.log('AUDIO_TRACKS_UPDATED');
                svApplyPreferredAudioToHls(hls);
                updateAudioTracks();
            });

            hls.on(Hls.Events.AUDIO_TRACK_SWITCHED, () => {
                const tracks = hls.audioTracks || [];
                const sel = tracks[hls.audioTrack];
                if (sel) rememberAudioPreference(sel);
                updateAudioTracks();
            });

            hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, () => {
                try {
                    const tracks = hls.subtitleTracks || [];
                    if (tracks.length && hls.subtitleTrack === -1) {
                        const preferred = tracks.find((t) => /en|eng|english/i.test(String(t?.lang || '') + ' ' + String(t?.name || '')));
                        hls.subtitleTrack = (preferred || tracks[0]).id;
                    }
                    setTimeout(() => {
                        updateCaptionsButtonVisibility();
                        buildCaptionsMenu();
                    }, 100);
                } catch (_) { }
            });

            // Track media error state for double-recovery pattern
            let mediaErrorCount = 0;

            hls.on(Hls.Events.ERROR, (_, d) => {
                console.log('HLS Error:', d.type, d.details, 'fatal:', d.fatal);

                // Non-fatal stall: nudge playback manually
                if (!d.fatal) {
                    if (
                        d.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR ||
                        d.details === Hls.ErrorDetails.BUFFER_NUDGE_ON_STALL
                    ) {
                        if (video && !video.paused && video.readyState >= 2) {
                            try { video.currentTime += 0.3; } catch (_) { }
                        }
                    }
                    return;
                }

                // Fatal errors
                if (d.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    const code = d.response ? d.response.code : 0;
                    if (code === 404 || code === 403 || code >= 500) {
                        if (typeof onErrorFallback === 'function') onErrorFallback();
                        return;
                    }
                    // Retry network load
                    console.warn('[hls] Fatal network error, retrying startLoad...');
                    hls.startLoad();
                } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    mediaErrorCount++;
                    if (mediaErrorCount === 1) {
                        console.warn('[hls] Fatal media error, attempting recoverMediaError...');
                        hls.recoverMediaError();
                    } else if (mediaErrorCount === 2) {
                        // Second attempt: swap source and re-attach
                        console.warn('[hls] Second media error, swapping codec...');
                        hls.swapAudioCodec();
                        hls.recoverMediaError();
                    } else {
                        // Give up and try next source
                        console.warn('[hls] Unrecoverable media error, trying next source...');
                        if (typeof onErrorFallback === 'function') onErrorFallback();
                    }
                } else {
                    if (typeof onErrorFallback === 'function') onErrorFallback();
                }
            });

            // Stall watchdog: if playback is supposed to be running but time hasn't
            // moved in 6 seconds, attempt an hls.startLoad() nudge before giving up.
            let lastWatchdogTime = -1;
            let watchdogStallCount = 0;
            const watchdogInterval = setInterval(() => {
                if (!video || video.paused || video.ended || video.readyState === 0) {
                    watchdogStallCount = 0;
                    lastWatchdogTime = video ? video.currentTime : -1;
                    return;
                }
                const now = video.currentTime;
                if (Math.abs(now - lastWatchdogTime) < 0.05) {
                    watchdogStallCount++;
                    if (watchdogStallCount === 2) {
                        console.warn('[hls-watchdog] Stall detected, nudging startLoad...');
                        try { hls.startLoad(); } catch (_) { }
                    } else if (watchdogStallCount >= 4) {
                        console.warn('[hls-watchdog] Persistent stall, attempting source fallback...');
                        watchdogStallCount = 0;
                        if (typeof onErrorFallback === 'function') onErrorFallback();
                    }
                } else {
                    watchdogStallCount = 0;
                }
                lastWatchdogTime = now;
            }, 3000);

            // Clean up watchdog when hls is destroyed
            hls.on(Hls.Events.DESTROYING, () => clearInterval(watchdogInterval));
        }

        function getInitialTvPositionFromUrl(seasons) {

        function buildTvSeasonsFromInfo(info) {
            const rawSeasons = Array.isArray(info?.seasons) ? info.seasons : [];
            let rawEpisodes = Array.isArray(info?.episodes) ? info.episodes : [];

            const mapSNo = (v, fallback = 1) => {
                const n = Number(v);
                return (Number.isFinite(n) && n >= 0) ? n : fallback;
            };

            // 1. Try to use TMDB's season structure as the skeleton
            if (rawSeasons.length > 0) {
                const buckets = rawSeasons.map((s, idx) => ({
                    seasonNo: mapSNo(s?.season || s?.seasonNumber || s?.season_number || s?.number, idx + 1),
                    name: String(s?.name || `Season ${idx + 1}`),
                    episodes: Array.isArray(s?.episodes) ? [...s.episodes] : []
                }));

                // If buckets exist but are empty (common in flat-list proxies), try to distribute rawEpisodes
                const epsAlreadyInBuckets = buckets.reduce((sum, b) => sum + b.episodes.length, 0);
                if (epsAlreadyInBuckets === 0 && rawEpisodes.length > 0) {
                    // Pre-calculate season boundaries if metadata has episode counts
                    let runningTotal = 0;
                    const boundaries = rawSeasons.map((s, i) => {
                        const count = Number(s?.episode_count || s?.episodeCount || 0);
                        const start = runningTotal + 1;
                        if (count > 0) runningTotal += count;
                        return { index: i, start, end: runningTotal, count };
                    });

                    rawEpisodes.forEach((ep) => {
                        const epAbsNum = Number(ep?.number || ep?.episode || ep?.episodeNum || 0);
                        const epSNo = mapSNo(ep?.season || ep?.seasonNumber || ep?.season_number || ep?.seasonNum, -1);

                        let bucket = null;

                        // Priority 1: If it's an anime with boundaries, trust boundaries OVER explicit season (often wrong in flat lists)
                        if (currentIsLikelyAnime && epAbsNum > 0 && boundaries.some(b => b.count > 0)) {
                            const b = boundaries.find(bound => epAbsNum >= bound.start && (bound.end === 0 || epAbsNum <= bound.end));
                            if (b) bucket = buckets[b.index];
                        }

                        // Priority 2: Explicit season number
                        if (!bucket && epSNo > 0) {
                            bucket = buckets.find(b => b.seasonNo === epSNo);
                        }

                        // 3. Fallback to indexing or first bucket
                        if (!bucket && epSNo > 1) bucket = buckets[epSNo - 1];
                        if (!bucket) bucket = buckets[0];

                        bucket.episodes.push(ep);
                    });
                }

                const final = buckets.filter(s => s.episodes.length > 0);
                // ANIME FIX: If we only got 1 season with MANY episodes, force chunking it into 24-ep blocks
                // This matches how providers (Satoru/JustAnime) expect multi-season content.
                if (final.length === 1 && currentIsLikelyAnime && final[0].episodes.length > 35) {
                    rawEpisodes = final[0].episodes;
                    console.log(`Anime detected with single large season (${rawEpisodes.length} eps). Forcing seasonal split.`);
                } else if (final.length > 0) {
                    console.log(`Loaded ${final.length} seasons from API metadata.`);
                    return final;
                }
            }

            // Fallback for anime: If we have a long flat list and no season metadata, split every 24 episodes
            if (currentIsLikelyAnime && rawEpisodes.length > 26) {
                const chunks = [];
                for (let i = 0; i < rawEpisodes.length; i += 24) {
                    const sNo = Math.floor(i / 24) + 1;
                    chunks.push({
                        seasonNo: sNo,
                        name: `Season ${sNo}`,
                        episodes: rawEpisodes.slice(i, i + 24)
                    });
                }
                return chunks;
            }

            // 2. Fallback: Group by season property in flat list
            if (rawEpisodes.length > 0) {
                const grouped = new Map();
                rawEpisodes.forEach((ep) => {
                    const sNo = mapSNo(ep?.season || ep?.seasonNumber || ep?.season_number || ep?.seasonNum, 1);
                    if (!grouped.has(sNo)) grouped.set(sNo, []);
                    grouped.get(sNo).push(ep);
                });

                return [...grouped.entries()]
                    .sort((a, b) => a[0] - b[0])
                    .map(([seasonNo, episodes]) => ({
                        seasonNo,
                        name: `Season ${seasonNo}`,
                        episodes
                    }));
            }

            return [];
        }

        function buildAnimeFillerSlugCandidates(title) {
            const raw = normalizeTitleForMatch(title);
            if (!raw) return [];

            const cleaned = raw
                .replace(/\b(tv|season|part|cour|movie|ona|ova)\b/g, ' ')
                .replace(/[^\w\s-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            const tokens = cleaned.split(' ').filter(Boolean);
            if (!tokens.length) return [];

            const full = tokens.join('-');
            const first3 = tokens.slice(0, 3).join('-');
            const first2 = tokens.slice(0, 2).join('-');
            const candidates = [full, first3, first2].filter(Boolean);
            if (cleaned.includes('violet evergarden')) candidates.unshift('violet-evergarden');
            return [...new Set(candidates)];
        }

        function parseEpisodeRangeToken(token) {
            const t = String(token || '')
                .replace(/[├втВмтАЬ├втВмтАЭ├в╦ЖтАЩ]/g, '-')
                .replace(/\bto\b/gi, '-')
                .replace(/[^\d,\-\s]/g, '')
                .trim();
            if (!t) return [];
            const m = t.match(/^(\d+)\s*-\s*(\d+)$/);
            if (m) {
                const start = Number(m[1]);
                const end = Number(m[2]);
                if (!Number.isFinite(start) || !Number.isFinite(end) || end < start) return [];
                const out = [];
                for (let i = start; i <= end; i += 1) out.push(i);
                return out;
            }
            const n = Number(t);
            return Number.isFinite(n) && n > 0 ? [n] : [];
        }

        function parseEpisodeListFromLine(line) {
            if (!line) return [];
            return line
                .replace(/\.\s*$/, '')
                .replace(/[├втВмтАЬ├втВмтАЭ├в╦ЖтАЩ]/g, '-')
                .split(/[,;|]/)
                .flatMap(parseEpisodeRangeToken);
        }

        function parseAnimeFillerMapFromText(text) {
            const out = new Map();
            const body = String(text || '').replace(/[├втВмтАЬ├втВмтАЭ├в╦ЖтАЩ]/g, '-');
            const capture = (re) => {
                const m = body.match(re);
                return m?.[1] ? String(m[1]).trim() : '';
            };
            const mangaRaw = capture(/manga\s*canon\s*episodes?\s*:?\s*([0-9,\-\s]+)/i);
            const mixedRaw = capture(/mixed\s*canon\s*\/\s*filler\s*episodes?\s*:?\s*([0-9,\-\s]+)/i);
            const fillerRaw = capture(/filler\s*episodes?\s*:?\s*([0-9,\-\s]+)/i);

            const mark = (eps, status) => {
                eps.forEach((epNo) => {
                    if (!Number.isFinite(epNo)) return;
                    if (status === 'filler') {
                        out.set(epNo, status);
                        return;
                    }
                    if (status === 'mixed') {
                        if (out.get(epNo) !== 'filler') out.set(epNo, status);
                        return;
                    }
                    if (!out.has(epNo)) out.set(epNo, status);
                });
            };

            if (mangaRaw) mark(parseEpisodeListFromLine(mangaRaw), 'manga');
            if (mixedRaw) mark(parseEpisodeListFromLine(mixedRaw), 'mixed');
            if (fillerRaw) mark(parseEpisodeListFromLine(fillerRaw), 'filler');

            // Fallback parser for markdown/html table rows containing per-episode labels.
            if (out.size === 0) {
                const rowRe = /(?:episode|ep)\s*#?\s*(\d+)[^\n\r]{0,120}?(manga canon|mixed canon\/filler|mixed canon filler|filler)/ig;
                let m;
                while ((m = rowRe.exec(body)) !== null) {
                    const epNo = Number(m[1]);
                    const rawType = String(m[2] || '').toLowerCase();
                    if (!Number.isFinite(epNo)) continue;
                    if (rawType.includes('mixed')) {
                        if (out.get(epNo) !== 'filler') out.set(epNo, 'mixed');
                    } else if (rawType.includes('manga canon')) {
                        if (!out.has(epNo)) out.set(epNo, 'manga');
                    } else if (rawType.includes('filler')) {
                        out.set(epNo, 'filler');
                    }
                }
            }

            return out;
        }

        function parseEpisodeValueToList(value) {
            if (Array.isArray(value)) {
                return value.flatMap((v) => parseEpisodeValueToList(v));
            }
            if (typeof value === 'number') {
                return Number.isFinite(value) ? [value] : [];
            }
            if (typeof value === 'string') {
                return parseEpisodeListFromLine(value);
            }
            return [];
        }

        function parseFillerMapFromJsonPayload(payload) {
            const out = new Map();
            const mark = (episodes, status) => {
                episodes.forEach((epNo) => {
                    if (!Number.isFinite(epNo)) return;
                    if (status === 'filler') {
                        out.set(epNo, status);
                    } else if (status === 'mixed') {
                        if (out.get(epNo) !== 'filler') out.set(epNo, status);
                    } else if (!out.has(epNo)) {
                        out.set(epNo, status);
                    }
                });
            };

            const visit = (node) => {
                if (!node || typeof node !== 'object') return;
                if (Array.isArray(node)) {
                    node.forEach(visit);
                    return;
                }
                Object.entries(node).forEach(([k, v]) => {
                    const key = String(k || '').toLowerCase();
                    if (key.includes('mixed')) {
                        mark(parseEpisodeValueToList(v), 'mixed');
                    } else if (key.includes('manga') || key.includes('canon')) {
                        mark(parseEpisodeValueToList(v), 'manga');
                    } else if (key.includes('filler')) {
                        mark(parseEpisodeValueToList(v), 'filler');
                    } else if (typeof v === 'object') {
                        visit(v);
                    }
                });
            };

            visit(payload);
            return out;
        }

        async function fetchGithubFillerMap(title, slugCandidates) {
            try {
                const meta = await fetchJsonWithFallbacks('https://data.jsdelivr.com/v1/package/gh/xsunzukz/anime-filler-episodes-api', 22000);
                const root = meta?.data;
                if (!root || typeof root !== 'object') return new Map();

                const files = [];
                const walk = (nodes, prefix = '') => {
                    if (!Array.isArray(nodes)) return;
                    nodes.forEach((n) => {
                        const name = String(n?.name || '');
                        const type = String(n?.type || '');
                        const path = prefix ? `${prefix}/${name}` : name;
                        if (type === 'file' && name.toLowerCase().endsWith('.json')) files.push(path);
                        if (type === 'directory') walk(n.files || [], path);
                    });
                };
                walk(root.files || []);
                if (!files.length) return new Map();

                const normTitle = normalizeTitleForMatch(title);
                const titleTokens = new Set(normTitle.split(' ').filter(Boolean));
                const wanted = new Set((slugCandidates || []).map((s) => String(s || '').toLowerCase()));
                let ranked = files.map((f) => {
                    const lf = f.toLowerCase();
                    const base = lf.split('/').pop() || lf;
                    const stem = base.replace(/\.json$/i, '');
                    const normStem = normalizeTitleForMatch(stem);
                    const stemTokens = normStem.split(' ').filter(Boolean);
                    let score = 0;
                    if (wanted.has(stem) || wanted.has(lf.replace(/\.json$/i, ''))) score += 60;
                    if (normStem === normTitle) score += 120;
                    if (normStem.includes(normTitle) || normTitle.includes(normStem)) score += 25;
                    let overlap = 0;
                    stemTokens.forEach((t) => { if (titleTokens.has(t)) overlap += 1; });
                    score += overlap * 8;
                    if (lf.includes('filler')) score += 5;
                    return { file: f, score };
                });
                ranked = ranked.filter((r) => r.score > 0).sort((a, b) => b.score - a.score).slice(0, 6);
                if (!ranked.length) return new Map();

                for (const candidate of ranked) {
                    const rawUrl = `https://cdn.jsdelivr.net/gh/xsunzukz/anime-filler-episodes-api@main/${candidate.file}`;
                    const payload = await fetchJsonWithFallbacks(rawUrl, 22000);
                    const data = payload?.data;
                    if (!data) continue;
                    const parsed = parseFillerMapFromJsonPayload(data);
                    if (parsed.size > 0) {
                        console.log('[filler] github matched file=', candidate.file, 'episodes=', parsed.size);
                        return parsed;
                    }
                }
            } catch (_) { }
            return new Map();
        }

        function normalizeTitleForMatch(v) {
            return String(v || '')
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/\(([^)]*)\)/g, ' ')
                .replace(/\[[^\]]*\]/g, ' ')
                .replace(/[^\w\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        async function fetchTextWithFallbacks(targetUrl, timeoutMs = 20000) {
            const candidates = [
                targetUrl
            ];

            let hadNetworkFailure = false;
            for (const url of candidates) {
                try {
                    const res = await fetch(url, { signal: AbortSignal.timeout(timeoutMs) });
                    if (!res.ok) continue;
                    const text = await res.text();
                    if (String(text || '').trim().length < 20) continue;
                    return { text, networkFailed: false };
                } catch (_) {
                    hadNetworkFailure = true;
                }
            }
            return { text: '', networkFailed: hadNetworkFailure };
        }

            } catch (_) {
                return { data: null, networkFailed };

        async function fetchAnimeFillerIndexEntries() {
            if (Array.isArray(animeFillerIndexCache)) return animeFillerIndexCache;
            try {
                const target = 'https://www.animefillerlist.com/shows';
                const { text } = await fetchTextWithFallbacks(getProxiedUrl(target), 22000);
                if (!text) return [];
                const entries = [];
                const re = /\[([^\]]+)\]\((?:https?:\/\/www\.animefillerlist\.com)?\/shows\/([a-z0-9-]+)\/?\)/ig;
                let m;
                while ((m = re.exec(text)) !== null) {
                    const name = String(m[1] || '').trim();
                    const slug = String(m[2] || '').trim();
                    if (!name || !slug) continue;
                    entries.push({ name, slug, norm: normalizeTitleForMatch(name) });
                }
                if (entries.length === 0) {
                    const htmlRe = /<a[^>]+href="\/shows\/([a-z0-9-]+)\/?"[^>]*>([^<]+)<\/a>/ig;
                    while ((m = htmlRe.exec(text)) !== null) {
                        const slug = String(m[1] || '').trim();
                        const name = String(m[2] || '').trim();
                        if (!name || !slug) continue;
                        entries.push({ name, slug, norm: normalizeTitleForMatch(name) });

                }
                animeFillerIndexCache = entries;
                return entries;
            } catch (_) {
                return [];
            }

        function pickBestFillerIndexSlug(title, entries) {
            const norm = normalizeTitleForMatch(title);
            if (!norm || !Array.isArray(entries) || !entries.length) return '';
            const titleTokens = new Set(norm.split(' ').filter(Boolean));
            let best = { score: 0, slug: '' };

            entries.forEach((entry) => {
                const entryNorm = entry.norm || '';
                if (!entryNorm) return;
                let score = 0;
                if (entryNorm === norm) score += 100;
                if (entryNorm.includes(norm) || norm.includes(entryNorm)) score += 35;
                const entryTokens = entryNorm.split(' ').filter(Boolean);
                let overlap = 0;
                entryTokens.forEach((t) => { if (titleTokens.has(t)) overlap += 1; });
                score += overlap * 8;
                if (score > best.score) best = { score, slug: entry.slug };
            });

            return best.score >= 16 ? best.slug : '';
        }

        function toArrayPayload(payload) {
            if (Array.isArray(payload)) return payload;
            if (Array.isArray(payload?.results)) return payload.results;
            if (Array.isArray(payload?.data)) return payload.data;

        }

        function pickBestMalSearchResult(title, results) {
            const norm = normalizeTitleForMatch(title);
            if (!norm) return null;
            const titleTokens = new Set(norm.split(' ').filter(Boolean));
            let best = { score: 0, item: null };
            for (const item of results || []) {
                const name = String(item?.title || item?.name || item?.title_english || item?.titleEnglish || '').trim();
                const itemNorm = normalizeTitleForMatch(name);
                if (!itemNorm) continue;
                let score = 0;
                if (itemNorm === norm) score += 120;
                if (itemNorm.includes(norm) || norm.includes(itemNorm)) score += 30;
                const tokens = itemNorm.split(' ').filter(Boolean);
                let overlap = 0;
                tokens.forEach((t) => { if (titleTokens.has(t)) overlap += 1; });
                score += overlap * 8;
                if (score > best.score) best = { score, item };
            }
            return best.score > 0 ? best.item : null;
        }

        function parseFillerMapFromMetaMalInfo(infoPayload) {
            const out = new Map();
            const episodes = toArrayPayload(infoPayload?.episodes ? infoPayload.episodes : infoPayload);
            episodes.forEach((ep, idx) => {
                const epNo = Number(ep?.number || ep?.episodeNumber || ep?.episode || idx + 1);
                if (!Number.isFinite(epNo) || epNo <= 0) return;

                const boolFiller = ep?.isFiller === true || ep?.filler === true;
                const boolMixed = ep?.isMixed === true || ep?.mixed === true;
                const boolCanon =
                    ep?.isMangaCanon === true ||
                    ep?.isCanon === true ||
                    ep?.mangaCanon === true ||
                    ep?.canon === true;

                const text = normalizeTitleForMatch(
                    `${ep?.title || ''} ${ep?.description || ''} ${ep?.type || ''} ${ep?.category || ''}`
                );
                const textFiller = text.includes('filler');
                const textMixed = text.includes('mixed canon filler') || text.includes('mixed canon');
                const textCanon = text.includes('manga canon') || text.includes('canon');

                if (boolFiller || textFiller) out.set(epNo, 'filler');
                else if (boolMixed || textMixed) out.set(epNo, 'mixed');
                else if (boolCanon || textCanon) out.set(epNo, 'manga');
            });
            return out;
        }

        async function fetchAnimeFillerStatusMap(title) {
            const key = String(title || '').toLowerCase().trim();
            if (!key) return new Map();
            if (animeFillerCache.has(key)) return animeFillerCache.get(key);

            // Source -1: single backend endpoint (/utils/filler)
            try {
                const utilsBase = API_BASE.replace('/meta/tmdb', '/utils');
                const payload = await fetchJsonWithRetry(`${utilsBase}/filler?title=${encodeURIComponent(title)}`, 9000, 15000);
                const episodesObj = payload?.episodes && typeof payload.episodes === 'object' ? payload.episodes : null;
                if (episodesObj) {
                    const map = new Map();
                    Object.entries(episodesObj).forEach(([k, v]) => {
                        const epNo = Number(k);
                        const status = String(v || '').toLowerCase();
                        if (!Number.isFinite(epNo)) return;
                        if (status === 'filler' || status === 'mixed' || status === 'manga') {
                            map.set(epNo, status);
                        }
                    });
                    if (map.size > 0) {
                        console.log('[filler] utils matched source=', payload?.source || 'unknown', 'episodes=', map.size);
                        animeFillerCache.set(key, map);
                        return map;
                    }
                }
            } catch (_) { }

            // Source 0: Consumet backend meta providers with fetchFiller=true.
            // Disabled to avoid noisy /meta/mal crashes on some consumet builds.
            if (ENABLE_CONSUMET_META_FILLER) {
                const malMap = await fetchFillerViaConsumetMeta('mal', title);
                if (malMap.size > 0) {
                    animeFillerCache.set(key, malMap);
                    return malMap;
                }
                const anilistMap = await fetchFillerViaConsumetMeta('anilist', title);
                if (anilistMap.size > 0) {
                    animeFillerCache.set(key, anilistMap);
                    return anilistMap;
                }
            }

            const slugCandidates = buildAnimeFillerSlugCandidates(title);
            const indexEntries = await fetchAnimeFillerIndexEntries();
            const indexSlug = pickBestFillerIndexSlug(title, indexEntries);
            if (indexSlug) slugCandidates.push(indexSlug);
            const uniqueCandidates = [...new Set(slugCandidates.filter(Boolean))];
            console.log('[filler] title=', title, 'candidates=', uniqueCandidates);
            if (!uniqueCandidates.length) return new Map();

            // Source 1: JSON API fallback (filler-list.chaiwala-anime.workers.dev)
            const apiQueries = [...new Set([title, ...uniqueCandidates].map((v) => String(v || '').trim()).filter(Boolean))];
            for (const query of apiQueries) {
                try {
                    const apiUrl = `https://filler-list.chaiwala-anime.workers.dev/${encodeURIComponent(query)}`;
                    const { data, networkFailed } = await fetchJsonWithFallbacks(apiUrl, 20000);
                    if (!data) {
                        if (networkFailed) fillerLookupState = 'fetch_failed';
                        continue;
                    }
                    const parsed = parseFillerMapFromJsonPayload(data);
                    if (parsed.size > 0) {
                        console.log('[filler] api matched query=', query, 'episodes=', parsed.size);
                        animeFillerCache.set(key, parsed);
                        return parsed;
                    }
                } catch (_) { }
            }

            // Source 2: GitHub repo fallback (xsunzukz/anime-filler-episodes-api)
            const githubMap = await fetchGithubFillerMap(title, uniqueCandidates);
            if (githubMap.size > 0) {
                animeFillerCache.set(key, githubMap);
                return githubMap;
            }

            const failedSlugs = (animeFillerCache.get('__failedSlugs__') || new Set());

            for (const slug of uniqueCandidates) {
                if (failedSlugs.has(slug)) continue;
                try {
                    const pageUrl = `https://www.animefillerlist.com/shows/${encodeURIComponent(slug)}`;
                    const { text, networkFailed } = await fetchTextWithFallbacks(getProxiedUrl(pageUrl), 15000);
                    if (!text) {
                        if (networkFailed) fillerLookupState = 'fetch_failed';
                        failedSlugs.add(slug);
                        animeFillerCache.set('__failedSlugs__', failedSlugs);
                        continue;
                    }
                    const parsed = parseAnimeFillerMapFromText(text);
                    if (parsed.size > 0) {
                        console.log('[filler] matched slug=', slug, 'episodes=', parsed.size);
                        animeFillerCache.set(key, parsed);
                        return parsed;
                    } else {
                        failedSlugs.add(slug);
                        animeFillerCache.set('__failedSlugs__', failedSlugs);
                    }
                } catch (_) {
                    failedSlugs.add(slug);
                    animeFillerCache.set('__failedSlugs__', failedSlugs);
                }
            }

            const empty = new Map();
            animeFillerCache.set(key, empty);
            return empty;
        }

        async function fetchJsonWithRetry(url, timeoutMs = 12000, retryTimeoutMs = 25000) {
            const tryFetch = async (ms) => {
                const { res } = await fetchJsonWithApiFallback(url, { signal: AbortSignal.timeout(ms) });
                if (!res.ok) throw new Error(`Info fetch failed (${res.status})`);
                return res.json();
            };
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const isRetriable = (err) => {
                const msg = String(err?.message || '').toLowerCase();
                if (err?.name === 'TimeoutError' || msg.includes('timed out') || msg.includes('abort')) return true;
                if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('load failed')) return true;
                const statusMatch = msg.match(/\((\d{3})\)/);
                const status = statusMatch ? Number(statusMatch[1]) : 0;
                if (status === 404 || status === 429 || status >= 500) return true;
                return false;
            };

            try {
                return await tryFetch(timeoutMs);
            } catch (err) {
                if (!isRetriable(err)) throw err;
                await sleep(1200);
                try {
                    return await tryFetch(retryTimeoutMs);
                } catch (err2) {
                    if (!isRetriable(err2)) throw err2;
                    await sleep(2200);
                    return await tryFetch(Math.max(retryTimeoutMs, 30000));
                }
            }
        }

        function getAnimeSearchTerms(title, preferredYear = null, seasonNo = 1) {
            const base = normalizeAnimeSearchQuery(title);
            if (!base) return [];
            const terms = [];

            // Priority: Search with preferred language first if specifically set (e.g. "Naruto Hindi")
            if (preferredAudioToken && !['sub', 'subbed', 'dub', 'dubbed', 'original', 'jp', 'japanese', 'en', 'english'].includes(preferredAudioToken)) {
                terms.push(`${base} ${preferredAudioToken}`);
            }

            // If season 2+, priority is finding the specific entry
            if (seasonNo > 1) {
                // Specific Arc Support for major series (e.g., JJK)
                if (base.toLowerCase().includes('jujutsu kaisen')) {
                    if (seasonNo === 2) terms.push(`${base} shibuya incident`);
                    if (seasonNo === 3) terms.push(`${base} culling game`);
                }

                terms.push(`${base} season ${seasonNo}`);
                terms.push(`${base} ${seasonNo}`);
                terms.push(`${base} S${seasonNo}`);
            }

            if (preferredYear) terms.push(`${base} ${preferredYear}`);
            terms.push(base);

        function extractSeasonNumberFromTitle(title) {
            if (!title) return null;
            const t = String(title).toLowerCase();
            const m = t.match(/\bseason\s*(\d+)\b/i)
                || t.match(/\b(\d+)(st|nd|rd|th)\s*season\b/i)
                || t.match(/\bseason\b\s*([ivx]+)\b/i);
            if (m) {
                if (m[1].match(/^[ivx]+$/)) {
                    const romanMap = { i: 1, ii: 2, iii: 3, iv: 4, v: 5, vi: 6, vii: 7, viii: 8, ix: 9, x: 10 };
                    return romanMap[m[1]] || null;
                }
                return Number(m[1]);
            }
            // Title-based inference for popular anime
            if (t.includes('culling game')) return 3;
            if (t.includes('shibuya incident')) return 2;
            if (t.includes('cour 2')) return 2;
            if (t.includes('part 2')) return 2;
            if (t.includes('part 3')) return 3;

            // Standalone number at end or with hyphen? e.g. "Jujutsu Kaisen 2" or "Jujutsu Kaisen - 2"
            const m2 = t.match(/[\-\s](\d+)$/);
            if (m2) return Number(m2[1]);
            return null;
        }

        function pickAnimeResultByTitle(results, title, preferredYear = null, targetSeason = 1) {
            if (!Array.isArray(results) || results.length === 0) return null;
            if (!title) return results[0];

            const normTitle = normalizeAnimeSearchQuery(title).toLowerCase();
            const qWords = normTitle.split(' ').filter(Boolean);
            let best = null;
            let bestScore = -Infinity;

            const parseYear = (item) => {
                const raw = String(
                    item?.releaseDate ||
                    item?.release_date ||
                    item?.year ||
                    item?.startDate ||
                    '',
                );
                const y = Number(raw.slice(0, 4));
                return Number.isFinite(y) ? y : null;
            };

            for (const r of results) {
                let rawTitle = r?.title || r?.name || '';
                if (typeof rawTitle === 'object') {
                    rawTitle = rawTitle.english || rawTitle.romaji || rawTitle.native || String(rawTitle);
                }
                const itemTitle = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                if (!itemTitle) continue;

                let score = 0;

                // Audio Language matching (high priority for Satoru/Dubs)
                const prefAudio = String(preferredAudioToken || '').toLowerCase();
                const itemRawTitle = String(rawTitle).toLowerCase();
                if (prefAudio && itemRawTitle.includes(prefAudio)) {
                    score += 100;
                    if (itemRawTitle === `${normTitle} ${prefAudio}`) score += 50; // exact "Show Hindi" match 
                }

                if (itemTitle === normTitle) score += 120;
                else if (itemTitle.startsWith(normTitle)) score += 95;
                else if (itemTitle.includes(normTitle)) score += 80;

                const tWords = itemTitle.split(' ').filter(Boolean);
                const common = qWords.filter((w) => tWords.includes(w)).length;
                score += common * 10;
                score -= Math.abs(itemTitle.length - normTitle.length) * 0.2;

                // Specific Arc / Part Support for anime
                if (normTitle.includes('culling game') && itemTitle.includes('culling game')) score += 180;
                if (normTitle.includes('shibuya incident') && itemTitle.includes('shibuya incident')) score += 180;
                if (normTitle.includes('part 2') && itemTitle.includes('part 2')) score += 140;
                if (normTitle.includes('part 3') && itemTitle.includes('part 3')) score += 140;
                if (normTitle.includes('cour 2') && itemTitle.includes('cour 2')) score += 140;

                const itemYear = parseYear(r);
                if (preferredYear && itemYear) {
                    if (itemYear === preferredYear) score += 30;
                    else if (Math.abs(itemYear - preferredYear) === 1) score += 12;
                }

                // Season Matching
                const itemSeason = extractSeasonNumberFromTitle(rawTitle);
                if (targetSeason > 1) {
                    if (itemSeason === targetSeason) score += 180; // Very strong preferred entry
                    else if (itemSeason && itemSeason !== targetSeason) score -= 120; // Penalize wrong season
                } else {
                    // Watching S1: penalize if it says S2, S3, etc.
                    if (itemSeason && itemSeason > 1) score -= 100;
                }

                if (score > bestScore) {
                    bestScore = score;
                    best = r;
                }
            }

            // Reject weak matches instead of forcing a wrong ID.
            if (!best || bestScore < 35) return null;
            return best;
        }
