                    } else {
                        video.volume = newVal;
                        if (vBar) vBar.style.height = `${newVal * 100}%`;
                    }
                }
            }, { passive: false });

            controlSurface.addEventListener('touchend', () => {
                bOverlay.classList.remove('visible');
                vOverlay.classList.remove('visible');
            }, { passive: true });


            // Global blocker: Show controls on any screen interaction when hidden
            let lastInteractionAt = 0;
            const blockInteractionsWhenHidden = (e) => {
                const now = Date.now();

                // 0. TOP PRIORITY: Lock-mode bypasses (always work)
                const isLockedAction = e.target.closest('#uiLockBtn, .ui-lock-btn, #skipSegmentBtn, .skip-segment-btn, #nextEpisodeBtn, .next-episode-btn');
                if (isLockedAction) return;

                const isControlsVisible = controlSurface.classList.contains('visible');

                // 1. Identify other interactive elements
                const isOnInteractive = e.target.closest('button, input[type="range"], .control-menu, .panel, .ep-item, .src-item, .audio-item, .menu-item, .ctrl-btn, .ctrl-icon, .back-btn, .a2hs-close');

                // 2. Hide logic: Let buttons and specific bubble-phase handlers handle hiding.
                // We ONLY intercept here if we need to reveal the UI.
                if (isControlsVisible) {
                    if (now - lastInteractionAt < 100) return;
                    if (isOnInteractive) return; 

                    // On empty space when showing: We prevent default to stop clicks from leaking,
                    // but we do NOT stop propagation so handleSurfaceInteraction can detect double-taps.
                    if (e.type === 'touchstart' || e.type === 'mousedown' || e.type === 'pointerdown') {
                        e.preventDefault(); 
                        return;
                    }
                    
                    // Final click safety: stop any click at capture level when showing on empty space
                    if (e.type === 'click') {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                } else {
                    // HIDDEN: Reveal controls
                    if (e.type === 'touchstart' || e.type === 'mousedown' || e.type === 'pointerdown') {
                        if (now - lastInteractionAt < 100) return;
                        lastInteractionAt = now;
                        e.preventDefault();
                        e.stopPropagation();
                        holdControlsVisible(3000);
                        return false;
                    }
                    
                    if (e.type === 'click' && now - lastInteractionAt < 500) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                }
            };

            // Capture reveal-taps at document level
            document.addEventListener('touchstart', blockInteractionsWhenHidden, { capture: true, passive: false });
            document.addEventListener('mousedown', blockInteractionsWhenHidden, { capture: true });
            document.addEventListener('click', blockInteractionsWhenHidden, { capture: true });

            // Bubble phase: Handles hiding when tapping empty space of the control-surface
            controlSurface.addEventListener('click', (e) => {
                if (!controlSurface.classList.contains('visible') || isUiLocked) return;
                
                const now = Date.now();
                if (now - lastInteractionAt < 100) return; // Prevent double-toggle from reveal-tap

                // Identify if clicked on an actual button/control
                const isOnInteractive = e.target.closest('button, input[type="range"], .control-menu, .panel, .ep-item, .src-item, .audio-item, .menu-item, .ctrl-btn, .ctrl-icon, .back-btn');

                if (!isOnInteractive) {
                    e.preventDefault();
                    e.stopPropagation();
                    hideControlSurfaceNow();
                }
            });

            // ─── ADVANCED INTERACTION HANDLER ───
            // Handles: Double-tap Skip, Double-tap Play/Pause, and Single-tap Hide.
            function handleSurfaceInteraction(e) {
                // UI Lock bypass
                const isLockedAction = e.target.closest('#uiLockBtn, .ui-lock-btn, #skipSegmentBtn, .skip-segment-btn, #nextEpisodeBtn, .next-episode-btn');
                if (isLockedAction) return; 
                if (isUiLocked) return;
                const isOnInteractive = e.target.closest('button, input[type="range"], .control-menu, .panel, .ep-item, .src-item, .audio-item, .menu-item, .ctrl-btn, .ctrl-icon, .back-btn, .a2hs-close');
                if (isOnInteractive) return;

                const now = Date.now();
                const isVisible = controlSurface.classList.contains('visible');

                // Standard double-tap detection
                const diff = now - lastTap;
                if (diff < tapThreshold && lastTap !== 0) {
                    clearTimeout(window.singleTapTimeout);
                    lastTap = 0; // Reset chain
                    
                    // If we were hidden, we showed on first tap - stop here
                    if (!isVisible) return;

                    const rect = controlSurface.getBoundingClientRect();
                    const clientX = (e.type.startsWith('touch') ? e.touches?.[0]?.clientX : e.clientX) || startX;
                    const x = clientX - rect.left;
                    const third = rect.width / 3;

                    if (x < third) {
                        registerSkipPulse('left', 10);
                        requestSeekToTime(Math.max(0, (video.currentTime || 0) - 10), true);
                    } else if (x > 2 * third) {
                        registerSkipPulse('right', 10);
                        if (isFinite(video.duration)) requestSeekToTime(Math.min(video.duration, (video.currentTime || 0) + 10), true);
                        else requestSeekToTime((video.currentTime || 0) + 10, true);
                    } else {
                        if (video.paused) video.play(); else video.pause();
                    }
                    return;
                }

                lastTap = now;
                window.singleTapTimeout = setTimeout(() => {
                    // SINGLE TAP LOGIC (fires only if no second tap arrived within 280ms)
                    if (isGesturing) return;

                    if (controlSurface.classList.contains('visible')) {
                        // If controls are showing, a single tap on empty space hides them
                        hideControlSurfaceNow();
                    } else {
                        // If controls are hidden, they should have been revealed by the capture blocker.
                        // We do nothing else here.
                    }
                }, tapThreshold);
            }
            
            // Re-attach handleSurfaceInteraction to catch double-taps
            controlSurface.addEventListener('touchstart', handleSurfaceInteraction, { passive: true });
            controlSurface.addEventListener('mousedown', handleSurfaceInteraction);

            // Using capture:true for the surface to handle these before other logic if needed,
            // but standard phase is fine here since we filter by target closest.

            controlSurface.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) return;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                startTime = Date.now();
                isGesturing = false;
                gestureType = null;
            }, { passive: true });

            controlSurface.addEventListener('touchmove', (e) => {
                if (isUiLocked || e.touches.length > 1) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = startY - touch.clientY; 

                if (!isGesturing && Math.abs(dy) > 20 && Math.abs(dy) > Math.abs(dx)) {
                    isGesturing = true;
                    holdControlsVisible(3000);
                    const third = window.innerWidth / 3;
                    if (startX < third) {
                        gestureType = 'brightness';
                        startVal = bLevel;
                        bOverlay.classList.add('visible');
                    } else if (startX > 2 * third) {
                        gestureType = 'volume';
                        startVal = video.volume;
                        vOverlay.classList.add('visible');
                    }
                }

                if (isGesturing && gestureType) {
                    if (e.cancelable) e.preventDefault();
                    holdControlsVisible(3000);
                    const sensitivity = 200;
                    const change = dy / sensitivity;
                    let newVal = Math.max(0, Math.min(1, startVal + change));

                    if (gestureType === 'brightness') {
                        bLevel = newVal;
                        const vBO = document.getElementById('video-brightness-overlay');
                        if (vBO) vBO.style.opacity = (1 - bLevel) * 0.8;
                        if (bBar) bBar.style.height = `${bLevel * 100}%`;
                        updateOverlayIcon('brightness', bLevel);
                    } else if (gestureType === 'volume') {
                        if (IS_IOS) {
                            // On iOS, video.volume is read-only (always 1). 
                            // Use WebAudio GainNode — the only way to control volume on iOS.
                            setVolumeBoost(Math.round(newVal * 100));
                        } else {
                            // Non-iOS: set video element volume directly
                            video.volume = newVal;
                            if (newVal > 0 && video.muted) video.muted = false;
                            // Sync Plyr's range input to match
                            const plyrVolInput = document.querySelector('.plyr__volume input[type="range"]');
                            if (plyrVolInput) {
                                plyrVolInput.value = newVal;
                                plyrVolInput.dispatchEvent(new Event('input', { bubbles: false }));
                            }
                        }
                        if (vBar) vBar.style.height = `${newVal * 100}%`;
                        updateOverlayIcon('volume', newVal);
                        updateMuteIcon();
                    }

                }
            }, { passive: false });

            controlSurface.addEventListener('touchend', (e) => {
                const duration = Date.now() - startTime;
                if (e.changedTouches && e.changedTouches[0]) {
                    const endX = e.changedTouches[0].clientX;
                    const endY = e.changedTouches[0].clientY;
                    const dist = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));

                    if (!isGesturing && !isUiLocked && duration < 300 && dist < 15) {
                        // toggleControls() removed — visibility is handled by capture-phase blocker and bubble click handler
                    }
                }
                bOverlay.classList.remove('visible');
                vOverlay.classList.remove('visible');
                isGesturing = false;
                gestureType = null;
            }, { passive: true });

            // PC / Desktop Support
            controlSurface.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                startX = e.clientX;
                startY = e.clientY;
                startTime = Date.now();
                isGesturing = false;
                gestureType = null;

                const onMouseMove = (moveEvent) => {
                    const dx = moveEvent.clientX - startX;
                    const dy = startY - moveEvent.clientY;

                    if (!isGesturing && Math.abs(dy) > 20 && Math.abs(dy) > Math.abs(dx)) {
                        isGesturing = true;
                        holdControlsVisible(3000);
                        const third = window.innerWidth / 3;
                        if (startX < third) {
                            gestureType = 'brightness';
                            startVal = bLevel;
                            bOverlay.classList.add('visible');
                        } else if (startX > 2 * third) {
                            gestureType = 'volume';
                            startVal = video.volume;
                            vOverlay.classList.add('visible');
                        }
                    }

                    if (isGesturing && gestureType) {
                        moveEvent.preventDefault();
                        holdControlsVisible(3000);
                        const sensitivity = 200;
                        const change = dy / sensitivity;
                        let newVal = Math.max(0, Math.min(1, startVal + change));

                        if (gestureType === 'brightness') {
                            bLevel = newVal;
                            const vBO = document.getElementById('video-brightness-overlay');
                            if (vBO) vBO.style.opacity = (1 - bLevel) * 0.8;
                            if (bBar) bBar.style.height = `${bLevel * 100}%`;
                        } else if (gestureType === 'volume') {
                            video.volume = newVal;
                            if (vBar) vBar.style.height = `${newVal * 100}%`;
                        }
                    }
                };

                const onMouseUp = (upEvent) => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);

                    const duration = Date.now() - startTime;
                    const dist = Math.sqrt(Math.pow(upEvent.clientX - startX, 2) + Math.pow(upEvent.clientY - startY, 2));

                    if (!isGesturing && !isUiLocked && duration < 300 && dist < 15) {
                        // toggleControls() removed — visibility is handled by capture-phase blocker and bubble click handler
                    }

                    bOverlay.classList.remove('visible');
                    vOverlay.classList.remove('visible');
                    isGesturing = false;
                    gestureType = null;
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            // All control interactions are now handled by blockInteractionsWhenHidden

            function playRipple(side, amount = 10) {
                const el = document.getElementById(`ripple-${side}`);
                if (!el) return;

                const label = el.querySelector('span');
                if (label) {
                    label.textContent = side === 'left' ? `-${amount}s` : `+${amount}s`;
                }

                el.classList.remove('animate');
                void el.offsetWidth; // trigger reflow
                el.classList.add('animate');

                if (el.rippleTimeout) clearTimeout(el.rippleTimeout);
                el.rippleTimeout = setTimeout(() => el.classList.remove('animate'), 700);
            }
        }

        // -----------------------------------------------------------------------
        //  MAIN INIT
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function init() {
            if (!TMDB_ID) { showError('Missing ID', 'No media ID was provided.'); return; }

            setLoader('Fetching media info...', 'Connecting to TMDB');
            buildChips();

            // Safety timeout
            const safetyTimer = setTimeout(() => {
                if (loader.style.display !== 'none') {
                    showError('Timeout', 'Loading took too long. Please try again.');
                }
            }, 60000);

            try {
                const isAnimeOnlyProvider = ['satoru', 'justanime', 'hianime', 'animesalt'].includes(FORCED_PROVIDER);
                const infoUrls = (FORCED_PROVIDER && !isAnimeOnlyProvider)
                    ? [
                        `${API_BASE.replace('/meta/tmdb', '/movies/' + FORCED_PROVIDER)}/info?id=${encodeURIComponent(TMDB_ID)}&type=${encodeURIComponent(MEDIA_TYPE)}`,
                    ]
                    : [
                        `${API_BASE}/info/${TMDB_ID}?type=${MEDIA_TYPE}`,
                        `${API_BASE}/info?id=${encodeURIComponent(TMDB_ID)}&type=${encodeURIComponent(MEDIA_TYPE)}`,
                    ];

                let info = readCachedMediaInfo();
                if (info) {
                    setLoader('Fetching media info...', 'Loaded from local cache');
                    for (const infoUrl of infoUrls) {
                        fetchJsonWithRetry(infoUrl, 10000, 18000)
                            .then((fresh) => {
                                const payload = fresh?.data || fresh;
                                if (payload && typeof payload === 'object') writeCachedMediaInfo(payload);
                            })
                            .catch(() => { });
                    }
                } else {
                    let parsed = null;
                    let lastErr = null;
                    for (const infoUrl of infoUrls) {
                        try {
                            parsed = await fetchJsonWithRetry(infoUrl, 12000, 30000);
                            if (parsed) break;
                        } catch (e) {
                            lastErr = e;
                        }
                    }
                    info = parsed?.data || parsed;
                    if (!info) {
                        // Final rescue: allow stale cache when API is down with 500s/timeouts.
                        const stale = readCachedMediaInfo(true);
                        if (stale) {
                            info = stale;
                            setLoader('Fetching media info...', 'Loaded stale cache (API unavailable)');
                        } else {
                            throw lastErr || new Error('Failed to load media info');
                        }
                    } else {
                        writeCachedMediaInfo(info);
                    }
                }
                currentMediaInfo = info;
                clearTimeout(safetyTimer);

                const title = info.title || info.name || 'Unknown Title';
                document.title = `Watching: ${title} | StreamVerse`;
                document.getElementById('media-title').textContent = title;
                if (info.cover || info.image) {
                    currentCoverUrl = info.cover || info.image;
                    loader.style.backgroundImage = `url('${currentCoverUrl}')`;
                }

                const isTv = MEDIA_TYPE === 'tv' ||
                    (info.type || '').toLowerCase().includes('tv') ||
                    (info.type || '').toLowerCase().includes('series');

                const genreNames = (Array.isArray(info.genres) ? info.genres : [])
                    .map(g => (typeof g === 'string' ? g : (g?.name || '')))
                    .map(g => String(g).toLowerCase());
                const originalLang = String(info.original_language || info.originalLanguage || '').toLowerCase();
                const animeHint = String(info.title || info.name || '').toLowerCase();
                const isLikelyAnime = (
                    genreNames.includes('animation') ||
                    originalLang === 'ja' ||
                    animeHint.includes('anime')
                );
                currentIsLikelyAnime = isLikelyAnime;
                aniSkipFetchStatus = 'none';
                resetAnimeSkipState();

                // Reset active providers pool based on content type, regardless of FORCED_PROVIDER
                // This allows fallbacks to work even when a specific provider is requested via URL
                if (isLikelyAnime) {
                    activeProviders = [...new Set([...ANIME_PROVIDERS, ...MOVIE_PROVIDERS])];
                } else if (MEDIA_TYPE === 'movie') {
                    activeProviders = [...new Set([...MOVIE_PROVIDERS, ...ANIME_PROVIDERS])];
                } else {
                    activeProviders = [...MOVIE_PROVIDERS];
                }
                // If a forced provider is set but not in the standard list, add it to the pool
                if (FORCED_PROVIDER && !activeProviders.includes(FORCED_PROVIDER)) {
                    activeProviders.unshift(FORCED_PROVIDER);
                }
                buildChips();

                if (isTv) {
                    await initTv(info);
                } else {
                    document.getElementById('media-meta').textContent = 'Movie';
                    if (customEpisodeBtn) customEpisodeBtn.style.display = 'none';
                    if (nextEpisodeBtn) nextEpisodeBtn.style.display = 'none';
                    const epId = info.episodeId || info.id;
                    if (!epId) throw new Error('No ID found in API response');
                    await fetchSources(epId);
                }
            } catch (err) {
                clearTimeout(safetyTimer);
                console.error('Init error:', err);
                showError('Failed to Load', err.message);
            }
        }

        // ----------------------------------------------------------------------------------------------------
        //  TV SERIES
        // ----------------------------------------------------------------------------------------------------
        async function initTv(info) {
            setLoader('Loading series...', 'Building episode list');
            tvSeasons = buildTvSeasonsFromInfo(info);
            const preferredYear = getPreferredMediaYear();
            const animeSeriesTitle = normalizeAnimeSearchQuery(
                info?.title || info?.name || currentMediaInfo?.title || currentMediaInfo?.name || '',
            );
            if (currentIsLikelyAnime && animeSeriesTitle) {
                try {
                    const { res: seriesRes } = await fetchJsonWithApiFallback(
                        buildSatoruSeriesUrl(animeSeriesTitle, preferredYear),
                        { signal: AbortSignal.timeout(12000) },
                    );
                    if (seriesRes.ok) {
                        const seriesData = await seriesRes.json();
                        const entries = Array.isArray(seriesData?.entries) ? seriesData.entries : [];
                        const mapped = Array.from(
                            entries
                                .map((entry, index) => {
                                    let entryTitle = String(entry?.title || `Part ${index + 1}`);
                                    if (/^season\s+\d+$/i.test(entryTitle)) {
                                        entryTitle = entryTitle.replace(/season/i, 'Part');
                                    }
                                    const entryId = String(entry?.id || '').trim();
                                    const inferredSeasonNo = Number(
                                        extractSeasonNumberFromTitle(entryTitle)
                                        || extractSeasonNumberFromTitle(entryId)
                                        || 0,
                                    );
                                    const rawSeasonNo = Number(entry?.season || 0);
                                    const seasonNo = Number.isFinite(inferredSeasonNo) && inferredSeasonNo > 0
                                        ? inferredSeasonNo
                                        : (Number.isFinite(rawSeasonNo) && rawSeasonNo > 0 ? rawSeasonNo : index + 1);
                                    const seasonPartNo = Number(
                                        extractPartNumberFromTitle(entryTitle)
                                        || extractPartNumberFromTitle(entryId)
                                        || 0,
                                    ) || 0;
                                    const normalizedNameKey = String(entryTitle)
                                        .toLowerCase()
                                        .replace(/[^a-z0-9]+/g, ' ')
                                        .replace(/\bseason\s+\d+\b/g, ' ')
                                        .replace(/\bpart\s+\d+\b/g, ' ')
                                        .replace(/\s+/g, ' ')
                                        .trim();
                                    return {
                                        seasonNo,
                                        seasonPartNo,
                                        sourceOrder: index,
                                        dedupeKey: `${seasonNo}::${seasonPartNo || 0}`,
                                        name: entryTitle,
                                        providerAnimeId: entryId || null,
                                        episodes: (Array.isArray(entry?.episodes) ? entry.episodes : []).map((ep, epIndex) => ({
                                            id: ep?.id || null,
                                            episode: ep?.number || epIndex + 1,
                                            number: ep?.number || epIndex + 1,
                                            episodeNum: ep?.number || epIndex + 1,
                                            title: String(ep?.title || `Episode ${epIndex + 1}`),
                                        })),
                                    };
                                })
                                .filter((season) => season.episodes.length > 0)
                                .sort((a, b) => {
                                    const seasonDiff = Number(a?.seasonNo || 0) - Number(b?.seasonNo || 0);
                                    if (seasonDiff !== 0) return seasonDiff;
                                    const partDiff = Number(a?.seasonPartNo || 0) - Number(b?.seasonPartNo || 0);
                                    if (partDiff !== 0) return partDiff;
                                    return Number(a?.sourceOrder || 0) - Number(b?.sourceOrder || 0);
                                })
                                .reduce((acc, season) => {
                                    const existing = acc.find((row) => row.dedupeKey === season.dedupeKey);
                                    if (!existing) {
                                        acc.push(season);
                                        return acc;
                                    }
                                    if ((season?.episodes?.length || 0) > (existing?.episodes?.length || 0)) {
                                        existing.episodes = season.episodes;
                                    }
                                    if (!existing.providerAnimeId && season.providerAnimeId) {
                                        existing.providerAnimeId = season.providerAnimeId;
                                    }
                                    return acc;
                                }, [])
                        );
                        if (mapped.length) {
                            tvSeasons = mapped;
                        }
                    }
                } catch (_) {
                    // Keep TMDB-derived season buckets if Satoru season metadata is unavailable.
                }
            }
            episodeFillerStatus = new Map();
            fillerLookupState = 'loading';
            if (!tvSeasons.length) {
                // API can return partial TV info during transient backend failures.
                // Build a minimal placeholder so playback can continue via provider search.
                const safeSeasonNo = (Number.isFinite(URL_SEASON) && URL_SEASON > 0) ? URL_SEASON : 1;
                const safeEpisodeNo = (Number.isFinite(URL_EPISODE) && URL_EPISODE > 0) ? URL_EPISODE : 1;
                const fallbackTitle = String(
                    info?.title ||
                    info?.name ||
                    currentMediaInfo?.title ||
                    currentMediaInfo?.name ||
                    `Episode ${safeEpisodeNo}`
                ).trim();
                tvSeasons = [{
                    seasonNo: safeSeasonNo,
                    name: `Season ${safeSeasonNo}`,
                    episodes: [{
                        episode: safeEpisodeNo,
                        number: safeEpisodeNo,
                        episodeNum: safeEpisodeNo,
                        title: fallbackTitle,
                        id: null,
                    }],
                }];
                console.warn('[initTv] No episodes in info payload. Using URL-based fallback season/episode map.');
            }

            buildEpPanel();
            epBtn.style.display = 'flex';
            if (customEpisodeBtn) customEpisodeBtn.style.display = 'inline-flex';
            // Mark episode button for showing in Plyr control bar
            showPlyrEpBtn = true;
            const fillerTitle = info?.title || info?.name || currentMediaInfo?.title || currentMediaInfo?.name || '';
            fetchAnimeFillerStatusMap(fillerTitle)
                .then((map) => {
                    episodeFillerStatus = map;
                    fillerLookupState = map.size > 0
                        ? 'ready'
                        : (fillerLookupState === 'fetch_failed' ? 'fetch_failed' : 'not_found');
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                })
                .catch(() => {
                    fillerLookupState = 'fetch_failed';
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                });
            const initialPos = getInitialTvPositionFromUrl(tvSeasons);
            await playTvEp(initialPos.seasonIndex, initialPos.episodeIndex);
        }

        function buildEpPanel() {
            epPanel.innerHTML = '';
            const legend = document.createElement('div');
            legend.className = 'ep-legend';
            legend.innerHTML = `
                <span class="ep-legend-badge manga">Manga Canon</span>

                <span class="ep-legend-badge filler">Filler</span>
                <span class="ep-legend-note">${fillerLookupState === 'loading' ? 'checking...' : (fillerLookupState === 'ready' ? 'from animefillerlist' : (fillerLookupState === 'fetch_failed' ? 'fetch blocked' : 'not found'))}</span>
            `;
            epPanel.appendChild(legend);

            tvSeasons.forEach((s, si) => {
                const lbl = document.createElement('div');
                lbl.className = 'ep-season';
                const seasonNo = Number(s?.seasonNo || si + 1);
                const rawSeasonName = String(s?.name || '').trim();
                const genericSeasonName = /^season\s+\d+$/i.test(rawSeasonName);
                
                let textContent = '';
                if (rawSeasonName && !genericSeasonName) {
                    textContent = rawSeasonName;
                } else {
                    textContent = Number.isFinite(seasonNo) && seasonNo > 0
                        ? `Season ${seasonNo}`
                        : String(rawSeasonName || `Season ${si + 1}`);
                }
                
                if (currentIsLikelyAnime) {
                    textContent = textContent.replace(/^Season /i, 'Part ');
                }
                
                lbl.textContent = textContent;
                epPanel.appendChild(lbl);

                (s.episodes || []).forEach((ep, ei) => {

                    const epTitle = ep.title || `Episode ${epNo}`;

                    const displayEpNo = currentIsLikelyAnime ? (ei + 1) : epNo;

                    const fillerStatus = episodeFillerStatus.get(epNo);
                    let fillerBadge = '';
                    if (fillerStatus === 'manga') {
                        item.classList.add('manga-canon');

                    } else if (fillerStatus === 'mixed') {

                    item.dataset.si = si;

        function updateEpUI(si, ei) {
            epPanel.querySelectorAll('.ep-item').forEach(el => {
                el.classList.toggle('active', +el.dataset.si === si && +el.dataset.ei === ei);
            });
            const sel = epPanel.querySelector('.ep-item.active');
            if (sel) sel.scrollIntoView({ block: 'center' });
        }

        function getNextEpisodeRef() {
            if (MEDIA_TYPE !== 'tv' || !Array.isArray(tvSeasons) || tvSeasons.length === 0) return null;
            const season = tvSeasons[curSeason];
            const episodes = season?.episodes || [];
            if (curEpisode + 1 < episodes.length) {
                return { seasonIndex: curSeason, episodeIndex: curEpisode + 1 };
            }
            for (let si = curSeason + 1; si < tvSeasons.length; si += 1) {
                const eps = tvSeasons[si]?.episodes || [];
                if (eps.length > 0) return { seasonIndex: si, episodeIndex: 0 };
            }
            return null;
        }

        let _nextEpCountdownTimer = null;
        const NEXT_EP_DURATION_MS = 8000;
        let _nextEpElapsed = 0; // total non-paused ms elapsed
        let _nextEpLastTick = 0; // Date.now() at last tick

        function _clearNextEpCountdown() {
            if (_nextEpCountdownTimer) {
                clearTimeout(_nextEpCountdownTimer);
                _nextEpCountdownTimer = null;
            }
            _nextEpElapsed = 0;
            _nextEpLastTick = 0;
            if (nextEpisodeBtn) {
                nextEpisodeBtn.classList.remove('counting', 'countdown-paused');
                void nextEpisodeBtn.offsetWidth; // reset CSS animation
            }
        }

        function _tickNextEpCountdown() {
            // Stop if button hidden or countdown was cancelled
            if (!nextEpisodeBtn || nextEpisodeBtn.style.display === 'none') return;
            if (!nextEpisodeBtn.classList.contains('counting')) return;

            const now = Date.now();
            const paused = !video || (video.paused && !video.ended);

            // Accumulate time only while playing
            if (!paused) {
                _nextEpElapsed += now - _nextEpLastTick;
            }
            _nextEpLastTick = now;

            // Keep CSS animation in sync with playback state
            if (paused) {
                nextEpisodeBtn.classList.add('countdown-paused');
            } else {
                nextEpisodeBtn.classList.remove('countdown-paused');
            }

            if (_nextEpElapsed >= NEXT_EP_DURATION_MS) {
                _clearNextEpCountdown();
                // FINAL GATE: Never switch automatically if the user preference is disabled.
                if (autoEpisodeEnabled === true) {
                    console.log('[AutoEp] Preferred: ON. Advancing to next episode.');
                    goToNextEpisode();
                } else {
                    console.log('[AutoEp] Preferred: OFF. Staying on current page.');
                }
                return;
            }

            _nextEpCountdownTimer = setTimeout(_tickNextEpCountdown, 100);
        }

        function _startNextEpCountdown() {
            // Respect user preference globally: if disabled, don't even start the countdown sweep.
            if (!autoEpisodeEnabled) return;

            _clearNextEpCountdown();
            void nextEpisodeBtn.offsetWidth; // restart CSS animation
            nextEpisodeBtn.classList.add('counting');
            _nextEpElapsed = 0;
            _nextEpLastTick = Date.now();
            _tickNextEpCountdown();
        }

        // --- Skip Countdown logic ---
        let _skipCountdownTimer = null; // now using requestAnimationFrame
        const SKIP_COUNTDOWN_DURATION_MS = 5000;
        let _skipElapsed = 0;
        let _skipLastTick = 0;
        let _skipBtnWasVisible = false;
        let _skipActiveType = null; // intro or outro
        let _skipActiveSegment = null;
        let _lastSkipUiTime = 0;

        function _clearSkipCountdown() {
            if (_skipCountdownTimer) {
                clearTimeout(_skipCountdownTimer);
                _skipCountdownTimer = null;
            }
            _skipElapsed = 0;
            _skipLastTick = 0;
            _skipActiveType = null;
            _skipActiveSegment = null;
            if (skipSegmentBtn) {
                skipSegmentBtn.classList.remove('counting', 'countdown-paused');
            }
        }

        function rearmSkippedSegmentsForTime(nowSec) {
            if (!Number.isFinite(nowSec)) return;

            const segments = {
                intro: animeSkipSegments.intro,
                outro: animeSkipSegments.outro
            };

            for (const [type, seg] of Object.entries(segments)) {
                if (!seg || !skippedSegments[type]) continue;
                if (nowSec < seg.start + 0.25) {
                    skippedSegments[type] = false;
                }
            }

            if (!skippedSegments.intro && !skippedSegments.outro) {
                _skipBtnWasVisible = false;
            }
        }

        function forceVideoSeek(target, attempt = 0) {
            if (!video || !Number.isFinite(target)) return;

            const clampedTarget = Math.max(0, target);
            video.currentTime = clampedTarget;

            const pct = video.duration > 0 ? (clampedTarget / video.duration) * 100 : 0;
            if (seekBar) {
                seekBar.value = pct;
                seekBar.style.setProperty('--seek-percent', pct + '%');
            }

            const reachedTarget = Math.abs((video.currentTime || 0) - clampedTarget) <= 0.75;
            if (reachedTarget || attempt >= 4) return;

            setTimeout(() => {
                if (!video) return;
                const stillOffTarget = Math.abs((video.currentTime || 0) - clampedTarget) > 0.75;
                if (stillOffTarget) {
                    forceVideoSeek(clampedTarget, attempt + 1);
                }
            }, 120 + (attempt * 80));
        }

        function performSkipJump(type, manual = false) {
            if (!video || !type || !isFinite(video.duration)) return;

            const preservedSegment = _skipActiveSegment && _skipActiveType === type ? { ..._skipActiveSegment } : null;
            _clearSkipCountdown();
            const active = getActiveSkipSegment(video.currentTime);
            const segment = preservedSegment || active || (type === 'intro' ? animeSkipSegments.intro : animeSkipSegments.outro);

            if (!segment) {
                console.log(`[Skip] Cannot skip ${type}: segment metadata missing.`);
                return;
            }

            console.log(`[Skip] Executing ${type} skip to ${segment.end} (Manual: ${manual})`);

            if (type === 'intro') skippedSegments.intro = true;
            if (type === 'outro') skippedSegments.outro = true;

            const target = Math.max(0, segment.end + 0.3);

            // ENHANCED: Pre-buffer strategy for smooth skips
            // Pause preview operations during skip to avoid interfering with main stream
            const previewVideo = document.getElementById('previewVideo');
            if (previewVideo) {
                try {
                    previewVideo.pause();
                } catch (_) { }
            }

            // Pre-buffer the target area before executing the skip
            const jumpDistance = Math.abs(target - (video.currentTime || 0));
            const prebufferTime = Math.max(0, target - (jumpDistance > 30 ? 5 : 1.5));

            // Use gentler quality tuning for the skip operation
            tuneHlsForJump(target, jumpDistance, 'skip');

            if (hlsInst && hlsSessionIsFragile) {
                console.log(`[Skip] HLS session is fragile, hot-reloading stream for ${type} skip.`);
                performHotReloadJump(target, 'skip');
                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                syncTimeUI();
                window.isAutoSkipping = false;
                return;
            }

            // Wait briefly for pre-buffering before seeking (gives HLS time to prepare chunks)
            setTimeout(() => {
                // Force the media element to settle on the skip target even if the stream briefly resists seeks.
                applyGuardedJump(target, 'skip');

                if (!video.paused) {
                    video.play().catch(() => { });
                }

                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';

                // Ensure UI updates to reflect the new position
                syncTimeUI();
                window.isAutoSkipping = false;

                // Resume preview after skip completes
                setTimeout(() => {
                    if (previewVideo && !manual) {
                        try {
                            const warmupOnReady = () => {
                                try {
                                    if (isFinite(previewVideo.duration) && previewVideo.duration > 2) {
                                        previewVideo.currentTime = 1.0;
                                    }
                                    previewVideo.pause();
                                } catch (_) { }
                            };
                            previewVideo.addEventListener('canplay', warmupOnReady, { once: true });
                        } catch (_) { }
                    }
                }, 300);
            }, 500); // Short pre-buffer delay before actual skip (avoids jarring transitions)
        }

        function _tickSkipCountdown() {
            if (!_skipActiveType || !_skipActiveSegment || !skipSegmentBtn) return;
            if (!skipSegmentBtn.classList.contains('counting')) return;

            const now = Date.now();
            const videoPaused = !video || (video.paused && !video.ended);

            // Accumulate time only while playing
            if (!videoPaused) {
                _skipElapsed += now - _skipLastTick;
            }
            _skipLastTick = now;

            // Handle visual pause state
            if (videoPaused) {
                skipSegmentBtn.classList.add('countdown-paused');
            } else {
                skipSegmentBtn.classList.remove('countdown-paused');
            }

            if (_skipElapsed >= SKIP_COUNTDOWN_DURATION_MS) {
                const finalType = _skipActiveType;
                const finalSegment = _skipActiveSegment ? { ..._skipActiveSegment } : null;
                console.log(`[AutoSkip] COMPLETED countdown for: ${finalType}`);

                _clearSkipCountdown();

                if (finalType && finalSegment) {
                    const shouldAuto = (finalType === 'intro' && autoSkipIntroEnabled) || (finalType === 'outro' && autoSkipOutroEnabled);
                    if (shouldAuto) {
                        _skipActiveType = finalType;
                        _skipActiveSegment = finalSegment;
                        performSkipJump(finalType, false);
                    }
                }
                return;
            }
            _skipCountdownTimer = setTimeout(_tickSkipCountdown, 100);
        }

        function _startSkipCountdown() {
            const active = getActiveSkipSegment(video.currentTime);
            if (!active) return;
            const shouldAuto = (active.type === 'intro' && autoSkipIntroEnabled) ||
                (active.type === 'outro' && autoSkipOutroEnabled);

            if (!shouldAuto) return;

            _clearSkipCountdown();
            window.isAutoSkipping = true;
            _skipActiveType = active.type;
            _skipActiveSegment = { ...active };
            void skipSegmentBtn.offsetWidth;
            skipSegmentBtn.classList.add('counting');
            _skipElapsed = 0;
            _skipLastTick = Date.now();
            _tickSkipCountdown();
        }

        let _nextEpBtnWasVisible = false; // tracks previous visibility state

        function updateNextEpisodeButton(forceShow = false) {
            if (!nextEpisodeBtn) return;
            const next = getNextEpisodeRef();
            if (!next || !video) {
                nextEpisodeBtn.style.display = 'none';
                _clearNextEpCountdown();
                _nextEpBtnWasVisible = false;
                return;
            }
            if (forceShow) {
                nextEpisodeBtn.style.display = 'inline-flex';
                if (!_nextEpBtnWasVisible) {
                    _nextEpBtnWasVisible = true;
                    _startNextEpCountdown();
                }
                return;
            }
            if (!isFinite(video.duration) || video.duration <= 0) {
                nextEpisodeBtn.style.display = 'none';
                _clearNextEpCountdown();
                _nextEpBtnWasVisible = false;
                return;
            }
            const remaining = video.duration - (video.currentTime || 0);
            const shouldShow = remaining <= 30;

            nextEpisodeBtn.style.display = shouldShow ? 'inline-flex' : 'none';

            if (shouldShow && !_nextEpBtnWasVisible) {
                // Just entered the last-30s window — start the countdown
                _nextEpBtnWasVisible = true;
                _startNextEpCountdown();
            } else if (!shouldShow && _nextEpBtnWasVisible) {
                // Seeked back out — cancel the countdown
                _nextEpBtnWasVisible = false;
                _clearNextEpCountdown();
            }
        }



        async function goToNextEpisode() {
            const next = getNextEpisodeRef();
            if (!next) return;
            await playTvEp(next.seasonIndex, next.episodeIndex);
        }

        async function playTvEp(si, ei) {
            curSeason = si; curEpisode = ei;
            updateEpisodeUrlState(si, ei);
            const season = tvSeasons[si];
            const ep = (season?.episodes || [])[ei];
            if (!ep) return;
            resetAnimeSkipState();
            updateNextEpisodeButton(false);

            updateEpUI(si, ei);
            const epNo = currentIsLikelyAnime
                ? (ei + 1)
                : Number(ep.episode || ep.number || ep.episodeNum || (ei + 1));
            const epTitle = String(ep.title || '').trim();
            let seasonTitle = String(season?.name || `Season ${si + 1}`).trim();
            if (currentIsLikelyAnime) {
                seasonTitle = seasonTitle.replace(/^Season /i, 'Part ');
            }
            const metaText = epTitle
                ? `${seasonTitle} - Episode ${epNo}: ${epTitle}`
                : `${seasonTitle} - Episode ${epNo}`;
            document.getElementById('media-meta').textContent = metaText;

            // Store current season/episode indices for the per-provider fetch
            await fetchSources(null);
        }

        // -----------------------------------------------------------------------
        //  FETCH SOURCES - per-provider: get that provider's own episodeId, then watch
        // -----------------------------------------------------------------------
        async function fetchSources(_unused) {
            allSources.length = 0;
            satoruAudioSources = [];
            currentAudioSource = 'justanime';
            activeSatoruTrackIndex = -1;
            externalSubtitleTracks = [];
            currentIdx = 0;
            hideError();
            setLoader('Searching providers...', 'Trying available sources');
            resetPlayerSurface();
            const selectedSeason = tvSeasons?.[curSeason];
            const selectedEpisode = selectedSeason?.episodes?.[curEpisode];
            const selectedSeasonNoRaw = Number(selectedSeason?.seasonNo);
            const selectedSeasonNo = Number.isFinite(selectedSeasonNoRaw) && selectedSeasonNoRaw > 0
                ? selectedSeasonNoRaw
                : (curSeason + 1);
            const selectedEpisodeNoRaw = Number(
                selectedEpisode?.episode || selectedEpisode?.number || selectedEpisode?.episodeNum,
            );
            let selectedEpisodeNo = Number.isFinite(selectedEpisodeNoRaw) && selectedEpisodeNoRaw > 0
                ? selectedEpisodeNoRaw
                : (curEpisode + 1);

            // ANIME FIX: If we are in a later season, providers like Satoru/JustAnime expect 
            // relative episode numbers (starting from 1 for each season entry).
            // Absolute numbers (e.g. 50) fail to match. We force relative numbering for seasons > 1.
            if (currentIsLikelyAnime && curSeason > 0 && selectedEpisodeNo > 15) {
                selectedEpisodeNo = curEpisode + 1;
            }
            const selectedAbsoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);

            // Always prefetch subtitles from JustAnime fallback for anime content,
            // even if a forced provider (e.g. satoru) is active — since satoru has no subtitles.
            const forcedProviderHasOwnSubs = FORCED_PROVIDER === 'justanime';
            const subtitlePrefetchPromise = currentIsLikelyAnime && !forcedProviderHasOwnSubs
                ? fetchAnimeSubtitleFallback()
                    .then((subs) => {
                        if (!Array.isArray(subs) || !subs.length) return [];
                        externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);
                        if (video) applyExternalSubtitlesToVideo(video);
                        return subs;
                    })
                    .catch(() => [])
                : Promise.resolve([]);

            activeProviders.forEach(p => chipState(p, ''));

            let found = false;
            const failReasons = [];

            let providers = Array.from(activeProviders);
            if (MEDIA_TYPE === 'tv' && !currentIsLikelyAnime && providers.includes('dramacool')) {
                providers = ['dramacool', ...providers.filter((p) => p !== 'dramacool')];
            }
            if (MEDIA_TYPE === 'tv' && currentIsLikelyAnime) {
                const animeTvPriority = ['animesalt', 'justanime', 'satoru'];
                providers = [
                    ...animeTvPriority.filter((p) => providers.includes(p)),
                    ...providers.filter((p) => !animeTvPriority.includes(p)),
                ];
            }

            // FORCED_PROVIDER strict mode or lastSuccessfulProvider prioritization
            let orderedProviders = providers;
            if (FORCED_PROVIDER && providers.includes(FORCED_PROVIDER)) {
                orderedProviders = [FORCED_PROVIDER];
            } else if (!FORCED_PROVIDER && !(MEDIA_TYPE === 'tv' && currentIsLikelyAnime) && lastSuccessfulProvider && providers.includes(lastSuccessfulProvider)) {
                orderedProviders = [lastSuccessfulProvider, ...providers.filter((p) => p !== lastSuccessfulProvider)];
            }

            for (const provider of orderedProviders) {
                chipState(provider, 'trying');
                document.getElementById('loader-sub').textContent = `Fetching info from ${providerLabel(provider)}...`;

                try {
                    // For anime providers, we need to get the episode list from the anime provider directly
                    // because TMDB episode IDs don't match anime provider episode IDs
                    let info, provEpisodeId;
                    let satoruResolvedExactly = false;
                    const isAnimeProvider = ['satoru', 'justanime', 'animesalt'].includes(provider);
                    const isNetMirrorProvider = ['flixhq', 'goku', 'viewvault', 'netmirror'].some(v => String(provider || '').toLowerCase().includes(v));

                    if (isAnimeProvider) {
                        // For JustAnime, always resolve via search/info to avoid bad ID mappings.

                        if (!provEpisodeId) {
                            if (
                                provider === 'satoru' &&
                                MEDIA_TYPE === 'tv' &&
                                selectedSeason?.providerAnimeId &&
                                selectedEpisode?.id
                            ) {
                                provEpisodeId = String(selectedEpisode.id).trim();
                                satoruResolvedExactly = !!provEpisodeId;
                                console.log('[satoru] using panel mapping', {
                                    animeId: String(selectedSeason.providerAnimeId),
                                    episodeId: provEpisodeId,
                                    season: selectedSeasonNo,
                                    episode: selectedEpisodeNo,
                                    seasonLabel: String(selectedSeason?.name || ''),
                                });
                                const animeInfoTimeoutMs = getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS);
                                const { res: infoRes } = await fetchJsonWithApiFallback(
                                    buildAnimeInfoUrl(provider, String(selectedSeason.providerAnimeId)),
                                    { signal: AbortSignal.timeout(animeInfoTimeoutMs) },
                                );
                                if (infoRes.ok) {
                                    info = await infoRes.json();
                                    if (info?.data) info = info.data;
                                }
                            }

                            // For anime: get anime info directly from the anime provider
                            // First, search for the anime to get the anime's ID using the title
                            const mediaTitle = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || TMDB_ID);
                            const selectedSeasonMeta =
                                tvSeasons?.[Math.max(0, Number(curSeason || 0))] ||
                                currentMediaInfo?.seasons?.find?.((s) => Number(s?.season || s?.seasonNumber || s?.number || 0) === selectedSeasonNo) ||
                                null;
                            const seasonLabel =
                                normalizeSeasonSearchLabel(
                                    selectedSeasonMeta?.name ||
                                    selectedSeasonMeta?.title ||
                                    selectedSeasonMeta?.seasonName ||
                                    '',
                                );

                            const providerResolution = getProviderAnimeResolutionContext(
                                provider,
                                mediaTitle,
                                selectedSeasonNo,
                                selectedEpisodeNo,
                                seasonLabel,
                            );
                            const providerMediaTitle = providerResolution.mediaTitle || mediaTitle;
                            const providerSeasonLabel = providerResolution.seasonLabel || seasonLabel;
                            const providerSeasonNo = providerResolution.seasonNo || selectedSeasonNo;
                            const providerEpisodeNo = Math.max(1, Number(providerResolution.episodeNo || selectedEpisodeNo || 1));
                            const providerAnimeIdOverride = String(providerResolution.animeIdOverride || '').trim();

                            // ── AnimeSalt Fast-Path ──────────────────────────────────────────
                            if (provider === 'animesalt' && !provEpisodeId) {
                                const asPreferredYear = getPreferredMediaYear();
                                const asTimeoutMs = getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS);
                                // Use the standardized resolution context for AnimeSalt too!
                                const asEpisodeId = await resolveAnimesaltEpisodeId(
                                    { ...providerResolution, preferredYear: asPreferredYear },
                                    asTimeoutMs,
                                );
                                if (asEpisodeId) {
                                    provEpisodeId = asEpisodeId;
                                    // Skip the generic episode-list resolution entirely for AnimeSalt
                                    // (it's not needed and the episode number field semantics differ)
                                } else {
                                    failReasons.push(`${providerLabel(provider)} series not found`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                            }

                            // AnimeSalt: fast-path already set provEpisodeId above — skip generic resolution.
                            if (provider !== 'animesalt') {
                                const providerResolution = getProviderAnimeResolutionContext(
                                    provider,
                                    mediaTitle,
                                    selectedSeasonNo,
                                    selectedEpisodeNo,
                                    seasonLabel,
                                );
                                const providerMediaTitle = providerResolution.mediaTitle || mediaTitle;
                                const providerSeasonLabel = providerResolution.seasonLabel || seasonLabel;
                                const providerSeasonNo = providerResolution.seasonNo || selectedSeasonNo;
                                const providerEpisodeNo = Math.max(1, Number(providerResolution.episodeNo || selectedEpisodeNo || 1));
                                const providerAnimeIdOverride = String(providerResolution.animeIdOverride || '').trim();
                            if (provider === 'justanime' && providerAnimeIdOverride) {
                                provEpisodeId = await resolveJustAnimeOverrideEpisodeId(
                                    providerAnimeIdOverride,
                                    MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1,
                                    getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS),
                                );
                            }
                            const seasonAwareTitle = MEDIA_TYPE === 'tv' && providerSeasonNo > 1

                                ? `${providerMediaTitle} season ${providerSeasonNo}`
                                : providerMediaTitle;
                            const preferredYear = getPreferredMediaYear();
                            const cacheKey = `${provider}::v3::${providerMediaTitle.toLowerCase()}::${preferredYear || ''}::s${providerSeasonNo}::${providerSeasonLabel.toLowerCase()}`;
                            const cached =
                                (provider === 'satoru' && MEDIA_TYPE === 'tv')
                                    ? null
                                    : animeProviderInfoCache.get(cacheKey);
                            let aggregatedSearchResults = [];
                            const hasReusableSearchResults =
                                Array.isArray(cached?.searchResults) && cached.searchResults.length > 0;
                            const shouldBypassCacheForSatoruTv = (provider === 'satoru') && MEDIA_TYPE === 'tv';
                            if (
                                cached &&
                                (Date.now() - cached.ts) < ANIME_PROVIDER_INFO_CACHE_TTL_MS &&
                                !shouldBypassCacheForSatoruTv &&
                                !provEpisodeId
                            ) {
                                info = cached.info;
                                aggregatedSearchResults = hasReusableSearchResults ? cached.searchResults : [];
                            } else if (providerAnimeIdOverride && provider === 'justanime' && !provEpisodeId) {
                                const animeInfoTimeoutMs = getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS);
                                const { res: infoRes } = await fetchJsonWithApiFallback(
                                    buildAnimeInfoUrl(provider, providerAnimeIdOverride),
                                    { signal: AbortSignal.timeout(animeInfoTimeoutMs) },
                                );
                                if (infoRes.ok) {
                                    info = await infoRes.json();
                                    if (info?.data) info = info.data;
                                    animeProviderInfoCache.set(cacheKey, {
                                        ts: Date.now(),
                                        info,
                                        searchResults: [],
                                    });
                                }
                            } else if (provider === 'satoru' && MEDIA_TYPE === 'tv' && !provEpisodeId) {
                                const resolveUrl = buildSatoruResolveUrl(
                                    providerMediaTitle,
                                    selectedSeasonNo,
                                    selectedEpisodeNo,
                                    providerSeasonLabel,
                                    preferredYear,
                                );
                                const animeInfoTimeoutMs = getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS);
                                const { res: resolveRes } = await fetchJsonWithApiFallback(
                                    resolveUrl,
                                    { signal: AbortSignal.timeout(animeInfoTimeoutMs) },
                                );
                                if (resolveRes.ok) {
                                    const resolved = await resolveRes.json();
                                    provEpisodeId = String(resolved?.episode?.id || '').trim() || null;
                                    satoruResolvedExactly = !!provEpisodeId;
                                    console.log('[satoru] exact resolve', {
                                        animeId: resolved?.anime?.id || null,
                                        animeTitle: resolved?.anime?.title || null,
                                        episodeId: provEpisodeId,
                                        season: selectedSeasonNo,
                                        episode: providerEpisodeNo,
                                        seasonLabel: providerSeasonLabel,
                                    });
                                    if (resolved?.anime?.id) {
                                        const { res: infoRes } = await fetchJsonWithApiFallback(
                                            buildAnimeInfoUrl(provider, String(resolved.anime.id)),
                                            { signal: AbortSignal.timeout(animeInfoTimeoutMs) },
                                        );
                                        if (infoRes.ok) {
                                            info = await infoRes.json();
                                            if (info?.data) info = info.data;
                                            animeProviderInfoCache.set(cacheKey, {
                                                ts: Date.now(),
                                                info,
                                                searchResults: [],
                                            });
                                        }
                                    }
                                }
                                if (!satoruResolvedExactly) {
                                    console.warn('[satoru] exact resolve failed', {
                                        season: selectedSeasonNo,
                                        episode: providerEpisodeNo,
                                        seasonLabel: providerSeasonLabel,
                                        mediaTitle: providerMediaTitle,
                                    });
                                    failReasons.push(`${providerLabel(provider)} exact season match failed`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                            }

                            if (
                                !info &&
                                !provEpisodeId &&
                                (
                                    !cached ||
                                    shouldBypassCacheForSatoruTv ||
                                    !((Date.now() - cached.ts) < ANIME_PROVIDER_INFO_CACHE_TTL_MS)
                                )
                            ) {
                                const searchTerms = Array.from(
                                    new Set(
                                        [
                                            seasonAwareTitle,
                                            providerSeasonLabel ? `${providerMediaTitle} ${providerSeasonLabel}` : '',
                                            providerSeasonLabel,
                                            ...getAnimeSearchTerms(providerMediaTitle, preferredYear, providerSeasonNo, providerSeasonLabel),
                                        ].filter(Boolean),
                                    ),
                                );
                                let bestAnime = null;
                                let lastSearchStatus = 0;
                                for (const term of searchTerms) {
                                    const searchUrl = new URL(`${API_BASE.replace('/meta/tmdb', '/anime/' + provider)}/${encodeURIComponent(term)}`);
                                    const animeSearchTimeoutMs = getProviderTimeout(provider, 'animeSearch', REQ_TIMEOUT.animeSearch);
                                    const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl.toString(), { signal: AbortSignal.timeout(animeSearchTimeoutMs) });
                                    lastSearchStatus = searchRes.status;
                                    if (!searchRes.ok) continue;
                                    const searchData = await searchRes.json();
                                    const searchResults = getAnimeSearchResults(searchData);
                                    if (Array.isArray(searchResults) && searchResults.length) {
                                        aggregatedSearchResults.push(...searchResults);
                                    }
                                    bestAnime = findExactProviderSeasonMatch(provider, searchResults, providerSeasonLabel)
                                        || pickAnimeResultByTitle(searchResults, seasonAwareTitle, preferredYear, providerSeasonNo, providerSeasonLabel)
                                        || pickAnimeResultByTitle(searchResults, providerMediaTitle, preferredYear, providerSeasonNo, providerSeasonLabel);
                                    if (bestAnime?.id) break;
                                }
                                if (!bestAnime) {
                                    failReasons.push(`${providerLabel(provider)} search ${lastSearchStatus || 500}`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                                const animeId = bestAnime?.id;
                                if (!isValidAnimeInfoId(animeId)) {
                                    failReasons.push(`${providerLabel(provider)} no anime found`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                                // Get anime info to get the episode list
                                const animeInfoTimeoutMs = getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS);
                                const { res: infoRes } = await fetchJsonWithApiFallback(buildAnimeInfoUrl(provider, animeId), { signal: AbortSignal.timeout(animeInfoTimeoutMs) });
                                if (!infoRes.ok) {
                                    failReasons.push(`${providerLabel(provider)} info ${infoRes.status}`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                                info = await infoRes.json();
                                if (info.data) info = info.data;
                                animeProviderInfoCache.set(cacheKey, {
                                    ts: Date.now(),
                                    info,
                                    searchResults: aggregatedSearchResults,
                                });
                            } else {
                                info = cached?.info;
                                aggregatedSearchResults = hasReusableSearchResults ? cached.searchResults : [];
                            }

                            // Find the episode by season/episode number.
                            info = info || {};
                            let episodes = info.episodes || [];
                            const toEpisodeNo = (ep) => Number(ep?.number || ep?.episodeNum || ep?.episode || 0);
                            const toSeasonNo = (ep) => Number(ep?.season || ep?.seasonNumber || ep?.seasonNum || 0);
                            let selectedEpisodeNoForProvider = providerEpisodeNo;
                            let hasSeasonMarkers = episodes.some((ep) => toSeasonNo(ep) > 0);

                            // Satoru splits many long shows into separate season pages (e.g. "...season-2+").
                            // Resolve against that season chain so S2E1 does not get mistaken as episode 1 of season 1.
                            if ((provider === 'satoru') && MEDIA_TYPE === 'tv' && !satoruResolvedExactly) {
                                const relatedRows = Array.isArray(info?.related) ? info.related : [];
                                const normalizeLoose = (v) =>
                                    String(v || '')
                                        .toLowerCase()
                                        .replace(/[^a-z0-9]+/g, ' ')
                                        .replace(/\s+/g, ' ')
                                        .trim();
                                const requestedSeasonNo = Number(selectedSeasonNo || 1);
                                const requestedPartNo = extractPartNumberFromTitle(seasonLabel) || null;
                                const rankedRelated = relatedRows
                                    .map((row) => {
                                        const rowTitle = String(row?.title || row?.id || '');
                                        const rowNorm = normalizeLoose(rowTitle);
                                        const rowSeason = extractSeasonNumberFromTitle(rowTitle) || 1;
                                        const rowPart = extractPartNumberFromTitle(rowTitle);
                                        let score = 0;

                                        if (rowSeason === requestedSeasonNo) score += 260;
                                        else score -= Math.abs(rowSeason - requestedSeasonNo) * 120;

                                        if (requestedPartNo !== null && rowPart !== null) {
                                            if (requestedPartNo === rowPart) score += 180;
                                            else score -= Math.abs(requestedPartNo - rowPart) * 120;
                                        }

                                        if (seasonLabel) {
                                            const wantedLabel = normalizeLoose(seasonLabel);
                                            if (wantedLabel && rowNorm.includes(wantedLabel)) score += 240;
                                            const common = wantedLabel.split(' ').filter(Boolean).filter((w) => rowNorm.split(' ').includes(w)).length;
                                            score += common * 35;
                                        }

                                        return { row, score };
                                    })
                                    .sort((a, b) => b.score - a.score);

                                const preferredRelated = rankedRelated[0]?.row;
                                if (preferredRelated?.id && String(preferredRelated.id) !== String(info?.id || '')) {
                                    try {
                                        const { res: relatedInfoRes } = await fetchJsonWithApiFallback(
                                            buildAnimeInfoUrl(provider, String(preferredRelated.id)),
                                            { signal: AbortSignal.timeout(getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS)) },
                                        );
                                        if (relatedInfoRes.ok) {
                                            let relatedInfo = await relatedInfoRes.json();
                                            if (relatedInfo?.data) relatedInfo = relatedInfo.data;
                                            if (Array.isArray(relatedInfo?.episodes) && relatedInfo.episodes.length) {
                                                info = relatedInfo;
                                                episodes = relatedInfo.episodes;
                                            }
                                        }
                                    } catch (_) {
                                        // fall back to the existing search-result season chain below
                                    }
                                }

                                const parseFromTitle = (title) => extractSeasonNumberFromTitle(title) || 1;
                                const normalize = (v) =>
                                    String(v || '')
                                        .toLowerCase()
                                        .replace(/[^a-z0-9]+/g, ' ')
                                        .trim();
                                const core = normalize(mediaTitle);
                                const uniqueResults = Array.from(
                                    new Map(
                                        (Array.isArray(aggregatedSearchResults) ? aggregatedSearchResults : [])
                                            .filter((row) => row?.id && normalize(row?.title || '').includes(core))
                                            .filter((row) => !String(row?.title || '').includes(':'))
                                            .map((row) => [String(row.id), row]),
                                    ).values(),
                                );

                                if (uniqueResults.length) {
                                    const infoCache = new Map();
                                    if (info?.id) infoCache.set(String(info.id), info);
                                    const fetchInfoById = async (animeId) => {
                                        if (infoCache.has(animeId)) return infoCache.get(animeId);
                                        const { res: iRes } = await fetchJsonWithApiFallback(
                                            buildAnimeInfoUrl(provider, animeId),
                                            { signal: AbortSignal.timeout(getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS)) },
                                        );
                                        if (!iRes.ok) return null;
                                        let parsed = await iRes.json();
                                        if (parsed?.data) parsed = parsed.data;
                                        infoCache.set(animeId, parsed);
                                        return parsed;
                                    };

                                    const seasonRows = uniqueResults
                                        .map((row) => ({ id: String(row.id), seasonNo: parseFromTitle(row?.title) }))
                                        .sort((a, b) => a.seasonNo - b.seasonNo);
                                    const ordered = [];
                                    for (const row of seasonRows) {
                                        const inf = await fetchInfoById(row.id);
                                        const eps = Array.isArray(inf?.episodes) ? inf.episodes : [];
                                        if (eps.length) ordered.push({ seasonNo: row.seasonNo, info: inf, episodes: eps });
                                    }

                                    if (ordered.length) {
                                        const exactSeason =
                                            ordered.find((row) => Number(row.seasonNo || 0) === Number(selectedSeasonNo || 0)) ||
                                            null;
                                        const inferredSeason =
                                            (!exactSeason && selectedSeasonNo > 1)
                                                ? ordered[Math.max(0, Math.min(ordered.length - 1, selectedSeasonNo - 1))]
                                                : null;
                                        const pickedSeasonRow = exactSeason || inferredSeason || ordered[0];

                                        if (pickedSeasonRow) {
                                            info = pickedSeasonRow.info;
                                            episodes = pickedSeasonRow.episodes;
                                            selectedEpisodeNoForProvider = Math.max(1, providerEpisodeNo);
                                            hasSeasonMarkers = episodes.some((ep) => toSeasonNo(ep) > 0);
                                        }
                                    }
                                }
                            }

                            const targetEpisode =
                                (hasSeasonMarkers
                                    ? episodes.find((ep) =>
