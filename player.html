        async function fetchJsonWithRetry(url, timeoutMs = 12000, retryTimeoutMs = 25000) {
            const tryFetch = async (ms) => {
                // Check if AbortSignal.timeout is available
                const signal = typeof AbortSignal !== 'undefined' && AbortSignal.timeout
                    ? AbortSignal.timeout(ms)
                    : undefined;
                const options = signal ? { signal } : {};
                const { res } = await fetchJsonWithApiFallback(url, options);
                if (!res.ok) throw new Error(`Info fetch failed (${res.status})`);
                return res.json();
            };
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const isRetriable = (err) => {
                const msg = String(err?.message || '').toLowerCase();
                if (err?.name === 'TimeoutError' || msg.includes('timed out') || msg.includes('abort')) return true;
                if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('load failed')) return true;
                const statusMatch = msg.match(/\((\d{3})\)/);
                const status = statusMatch ? Number(statusMatch[1]) : 0;
                if (status === 404 || status === 429 || status >= 500) return true;
                return false;
            };

            try {
                return await tryFetch(timeoutMs);
            } catch (err) {
                if (!isRetriable(err)) throw err;
                await sleep(1200);
                try {
                    return await tryFetch(retryTimeoutMs);
                } catch (err2) {
                    if (!isRetriable(err2)) throw err2;
                    await sleep(2200);
                    return await tryFetch(Math.max(retryTimeoutMs, 30000));
                }
            }
        }

        function normalizeAnimeSearchQuery(raw) {
            return String(getAnimeTitleText(raw) || '')
                .replace(/[_-]+/g, ' ')
                .replace(/[:\-!?,.]/g, ' ') // Strip common punctuation for search
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getAnimeProviderBase(provider) {
            return activeApiBase.replace('/meta/tmdb', `/anime/${provider}`);
        }

        function buildAnimeInfoUrl(provider, animeId) {
            const base = getAnimeProviderBase(provider);
            if (provider === 'satoru') {
                return `${base}/info/${encodeURIComponent(animeId)}`;
            }
            if (provider === 'animesalt') {
                // AnimeSalt uses /info?id={seriesSlug}
                const url = new URL(`${base}/info`);
                url.searchParams.set('id', animeId);
                return url.toString();
            }
            const url = new URL(`${base}/info`);
            url.searchParams.set('id', animeId);
            return url.toString();
        }

        /**
         * Constructs an AnimeSalt episode ID directly from the series slug + season/episode numbers.
         * AnimeSalt episode IDs follow the pattern: {seriesSlug}-{seasonNo}x{episodeNo}
         * e.g. 'series-slug' + S3E5 => 'series-slug-3x5'
         */
        function buildAnimesaltEpisodeId(seriesSlug, seasonNo, episodeNo) {
            const slug = String(seriesSlug || '').trim();
            const s = Math.max(1, Number(seasonNo || 1));
            const e = Math.max(1, Number(episodeNo || 1));
            return `${slug}-${s}x${e}`;
        }

        // Cache: animesalt series slug per title+season scope
        const animesaltSlugCache = new Map();

        /**
         * Resolves an AnimeSalt episode ID by:
         * 1. Checking cache for known series slug
         * 2. Searching AnimeSalt with base title (not season name, since AnimeSalt groups all
         *    seasons under one series slug)
         * 3. Constructing episode ID directly as {slug}-{seasonNo}x{episodeNo}
         * 
         * AnimeSalt slugs the ENTIRE series regardless of arcs/seasons, so searching
         * for the base series title can find episodes across multiple seasons.
         */
        async function resolveAnilistEpisodeId(resolvedContext, timeoutMs) {
            const base = getAnimeProviderBase('anilist');
            const { mediaTitle, seasonNo, episodeNo, episodeOffset } = resolvedContext;
            const finalEpisodeNo = episodeNo + (episodeOffset || 0);
            const normTitle = normalizeAnimeSearchQuery(mediaTitle);

            // Search AniList for the title
            const searchUrl = `${base}/${encodeURIComponent(normTitle)}`;
            const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl, { signal: AbortSignal.timeout(timeoutMs) });
            if (!searchRes.ok) return null;
            const searchData = await searchRes.json();
            const results = getAnimeSearchResults(searchData);
            if (!results.length) return null;

            // Pick the best result
            const picked = pickAnimeResultByTitle(results, normTitle, null, 1, '', false);
            if (!picked?.id) return null;
            const anilistId = picked.id;

            // Get info to find the episode
            const infoUrl = `${base}/info?id=${encodeURIComponent(anilistId)}`;
            const { res: infoRes } = await fetchJsonWithApiFallback(infoUrl, { signal: AbortSignal.timeout(timeoutMs) });
            if (!infoRes.ok) return null;
            const infoData = await infoRes.json();
            const episodes = infoData.episodes || [];

            // Find the episode by finalEpisodeNo
            const episode = episodes.find(ep => ep.number === finalEpisodeNo);
            if (!episode?.id) return null;

            return episode.id; // AniList episode ID
        }

        async function resolveAnimesaltEpisodeId(resolvedContext, timeoutMs) {
            const base = getAnimeProviderBase('animesalt');
            const { mediaTitle, seasonNo, episodeNo, preferredYear, episodeOffset, seasonNoOverride } = resolvedContext;
            const isMovieContext = !!resolvedContext.isMovie;
            const normTitle = normalizeAnimeSearchQuery(mediaTitle);
            const cacheKey = `animesalt::slug::${normTitle.toLowerCase()}::${preferredYear || ''}::${isMovieContext ? 'movie' : 'series'}`;

            // Fast path: we already know the slug for this title
            let seriesSlug = animesaltSlugCache.get(cacheKey);

            if (!seriesSlug) {
                // Generate search terms from base title only (no season label — AnimeSalt groups
                // all seasons/arcs under one series). Try progressively simpler terms.
                const baseTitle = normTitle;
                const searchTerms = Array.from(new Set([
                    baseTitle,
                    baseTitle.replace(/ (Season|Arc|Part|Cour) \d+/gi, ''),
                    baseTitle.split(' ').slice(0, 4).join(' '), // first 4 words
                    baseTitle.split(' ').slice(0, 3).join(' '), // first 3 words
                    baseTitle.split(' ').slice(0, 2).join(' '), // first 2 words
                ].filter(Boolean)));

                let bestResult = null;
                for (const term of searchTerms) {
                    if (!term || term.length < 2) continue;
                    try {
                        const typeParam = isMovieContext ? 'movie' : 'tv';
                        const searchUrl = `${base}/${encodeURIComponent(term)}?type=${encodeURIComponent(typeParam)}`;
                        const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl, { signal: AbortSignal.timeout(timeoutMs) });
                        if (!searchRes.ok) continue;
                        const searchData = await searchRes.json();
                        const results = getAnimeSearchResults(searchData);
                        if (!results.length) continue;

                        // For movies: prefer results with "movie:" prefix IDs.
                        // For series: prefer results without "movie:" prefix.
                        const filteredResults = isMovieContext
                            ? results.filter(r => String(r.id || '').startsWith('movie:'))
                            : results.filter(r => !String(r.id || '').startsWith('movie:'));
                        const pool = filteredResults.length ? filteredResults : results;

                        // Standardize: use context-aware title match (isMovieContext is from resolvedContext)
                        const picked = pickAnimeResultByTitle(pool, baseTitle, preferredYear, 1, '', isMovieContext);
                        if (picked?.id) {
                            bestResult = picked;
                            break;
                        }
                        // Fallback: just use first result if title is close enough
                        if (pool[0]?.id) {
                            const r0Title = normalizeAnimeSearchQuery(String(pool[0].title || pool[0].name || '')).toLowerCase();
                            const normLower = baseTitle.toLowerCase();
                            const overlap = normLower.split(' ').filter(w => r0Title.includes(w)).length;
                            if (overlap >= Math.min(2, normLower.split(' ').length)) {
                                bestResult = pool[0];
                                break;
                            }
                        }
                    } catch (_) { }
                }

                if (!bestResult?.id) {
                    console.warn('[animesalt] Could not find slug for:', normTitle, isMovieContext ? '(movie)' : '(series)');
                    return null;
                }

                seriesSlug = String(bestResult.id || '').trim();
                if (seriesSlug) animesaltSlugCache.set(cacheKey, seriesSlug);
            }

            if (!seriesSlug) return null;

            // For movies, AnimeSalt search returns IDs like "movie:series-slug-0".
            // The watch endpoint expects this ID directly — NOT the series slug-SxE pattern.
            if (isMovieContext || seriesSlug.startsWith('movie:')) {
                const movieId = seriesSlug.startsWith('movie:') ? seriesSlug : `movie:${seriesSlug}`;
                console.log(`[animesalt] movie resolved: episodeId=${movieId}`);
                return movieId;
            }

            // Series: prefer info endpoint episode IDs (authoritative), then fall back
            // to slug pattern construction if info lookup is unavailable.
            const finalSeasonNo = seasonNoOverride !== undefined ? seasonNoOverride : seasonNo;
            const finalEpisodeNo = episodeNo + (episodeOffset || 0);

            try {
                const { res: infoRes } = await fetchJsonWithApiFallback(
                    buildAnimeInfoUrl('animesalt', seriesSlug),
                    { signal: AbortSignal.timeout(timeoutMs) },
                );
                if (infoRes.ok) {
                    let info = await infoRes.json();
                    if (info?.data) info = info.data;
                    const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                    const bySeasonEpisode = episodes.find((ep) => {
                        const id = String(ep?.id || '').trim().toLowerCase();
                        const m = id.match(/-(\d+)x(\d+)$/);
                        if (!m) return false;
                        return Number(m[1]) === Number(finalSeasonNo) && Number(m[2]) === Number(finalEpisodeNo);
                    });
                    if (bySeasonEpisode?.id) {
                        console.log(`[animesalt] resolved by info id: slug=${seriesSlug}, episode=${bySeasonEpisode.id}`);
                        return String(bySeasonEpisode.id).trim();
                    }

                    if (Number(finalSeasonNo) <= 1) {
                        const byEpisodeNumber = episodes.find((ep) => Number(ep?.number || ep?.episode || 0) === Number(finalEpisodeNo));
                        if (byEpisodeNumber?.id) {
                            console.log(`[animesalt] resolved by info number: slug=${seriesSlug}, episode=${byEpisodeNumber.id}`);
                            return String(byEpisodeNumber.id).trim();
                        }
                    }
                }
            } catch (_) {
                // Fall through to deterministic slug mapping below.
            }

            const episodeId = buildAnimesaltEpisodeId(seriesSlug, finalSeasonNo, finalEpisodeNo);
            console.log(`[animesalt] resolved by pattern: slug=${seriesSlug}, episode=${episodeId}`);
            return episodeId;
        }

        function buildSatoruResolveUrl(title, seasonNo, episodeNo, seasonLabel = '', preferredYear = null) {
            const base = getAnimeProviderBase('satoru');
            const url = new URL(`${base}/resolve`);
            url.searchParams.set('title', getAnimeTitleText(title));
            url.searchParams.set('season', String(seasonNo || 1));
            url.searchParams.set('episode', String(episodeNo || 1));
            if (seasonLabel) url.searchParams.set('seasonTitle', seasonLabel);
            if (preferredYear) url.searchParams.set('year', String(preferredYear));
            // Add cache-busting timestamp to force fresh backend responses
            url.searchParams.set('_t', String(Date.now()));
            return url.toString();
        }

        function buildSatoruSeriesUrl(title, preferredYear = null) {
            const base = getAnimeProviderBase('satoru');
            const url = new URL(`${base}/series`);
            url.searchParams.set('title', getAnimeTitleText(title));
            if (preferredYear) url.searchParams.set('year', String(preferredYear));
            return url.toString();
        }

        async function resolveExactSatoruEpisode(mediaTitle, seasonNo, episodeNo, seasonLabel = '', preferredYear = null) {
            try {
                console.log('Satoru resolve for:', { mediaTitle, seasonNo, episodeNo, seasonLabel, preferredYear, TMDB_ID });
                const resolveUrl = buildSatoruResolveUrl(
                    mediaTitle,
                    seasonNo,
                    episodeNo,
                    seasonLabel,
                    preferredYear,
                );
                console.log('Satoru resolve URL:', resolveUrl);
                const { res } = await fetchJsonWithApiFallback(resolveUrl, {
                    signal: AbortSignal.timeout(getProviderTimeout('satoru', 'animeInfo', ANIME_INFO_TIMEOUT_MS)),
                });
                if (!res.ok) {
                    console.log('Satoru resolve failed:', res.status, res.statusText);
                    return null;
                }
                const resolved = await res.json();
                console.log('Satoru resolved response:', resolved);
                const animeId = String(resolved?.anime?.id || '').trim();
                const episodeId = String(resolved?.episode?.id || '').trim();
                const resolvedAnimeTitle = String(resolved?.anime?.title || '').trim();
                if (!animeId || !episodeId) {
                    console.log('Satoru resolve missing IDs:', { animeId, episodeId });
                    return null;
                }
                
                // Validate that the resolved anime title matches the requested title
                const normalizedRequested = normalizeAnimeSearchQuery(getAnimeTitleText(mediaTitle)).toLowerCase();
                const normalizedResolved = normalizeAnimeSearchQuery(getAnimeTitleText(resolvedAnimeTitle)).toLowerCase();
                const titleMatches = normalizedRequested.includes(normalizedResolved) || normalizedResolved.includes(normalizedRequested);
                if (!titleMatches) {
                    console.log('Satoru resolve title mismatch:', { requested: mediaTitle, resolved: resolvedAnimeTitle, normalizedRequested, normalizedResolved });
                    return null;
                }
                
                const result = {
                    animeId,
                    episodeId,
                    animeTitle: resolvedAnimeTitle,
                };
                console.log('Satoru returning:', result);
                return result;
            } catch (e) {
                console.log('Satoru resolve error:', e);
                return null;
            }
        }

        function buildAnimeWatchUrl(provider, episodeId) {
            const base = getAnimeProviderBase(provider);
            const url = new URL(`${base}/watch/${encodeURIComponent(episodeId)}`);
            if (provider === 'animesalt') url.searchParams.set('category', 'both');
            if (provider === 'satoru') url.searchParams.set('_t', String(Date.now())); // Cache-busting for satoru
            return url.toString();
        }

        function getAnimeSearchResults(searchData) {
            if (Array.isArray(searchData?.results)) return searchData.results;
            if (Array.isArray(searchData?.data?.results)) return searchData.data.results;
            if (Array.isArray(searchData?.data)) return searchData.data;
            return Array.isArray(searchData) ? searchData : [];
        }

        function pickAnimeResultByAniListId(results, anilistId) {
            const targetId = String(anilistId || '').trim();
            if (!targetId || !Array.isArray(results) || !results.length) return null;
            return results.find((result) => {
                const resultAniListId = String(result?.anilistId || result?.anilist || result?.anilist_id || '').trim();
                return resultAniListId === targetId;
            }) || null;
        }

        function getPreferredMediaYear() {
            const yearRaw =
                currentMediaInfo?.releaseDate ||
                currentMediaInfo?.release_date ||
                currentMediaInfo?.first_air_date ||
                currentMediaInfo?.startDate ||
                '';
            const y = Number(String(yearRaw).slice(0, 4));
            return Number.isFinite(y) && y > 1900 ? y : null;
        }

        function getAnimeTitleText(value) {
            if (!value) return '';
            if (typeof value === 'string') return value.trim();
            if (typeof value === 'number') return String(value).trim();
            if (Array.isArray(value)) {
                return value.map(getAnimeTitleText).find(Boolean) || '';
            }
            if (typeof value === 'object') {
                return (
                    getAnimeTitleText(value.english) ||
                    getAnimeTitleText(value.romaji) ||
                    getAnimeTitleText(value.native) ||
                    getAnimeTitleText(value.title) ||
                    getAnimeTitleText(value.name) ||
                    ''
                );
            }
            return String(value || '').trim();
        }

        async function getCanonicalAnimeInfo() {
            if (!currentIsLikelyAnime) return null;
            const mediaTitle = getAnimeTitleText(currentMediaInfo?.title || currentMediaInfo?.name || TMDB_ID || '');
            console.log('Canonical mediaTitle:', mediaTitle, 'from currentMediaInfo:', currentMediaInfo?.title);
            // Skip canonical resolution if TMDB failed and we only have a generic fallback title
            if (mediaTitle === 'Unknown' || mediaTitle === 'Unknown Title') return null;
            const requestKey = [
                String(currentMediaInfo?.anilistId || '').trim(),
                mediaTitle.toLowerCase(),
                String(TMDB_ID || '').trim(),
            ].join('::');

            // Check if cached info is still relevant to current media
            if (currentAnimeCanonicalInfo && currentAnimeCanonicalInfoKey !== requestKey) {
                console.warn('Cached anime canonical info key mismatch, clearing');
                currentAnimeCanonicalInfo = null;
                currentAnimeCanonicalInfoKey = '';
            }

            if (currentAnimeCanonicalInfo && currentAnimeCanonicalInfoKey === requestKey) return currentAnimeCanonicalInfo;
            if (currentAnimeCanonicalInfoPromise) return currentAnimeCanonicalInfoPromise;

            const anilistBase = API_BASE.replace('/meta/tmdb', '/meta/anilist');
            const title = normalizeAnimeSearchQuery(mediaTitle);
            const cachedId = String(currentMediaInfo?.anilistId || '').trim();

            currentAnimeCanonicalInfoPromise = (async () => {
                try {
                    let animeId = cachedId;

                    if (!animeId && title) {
                        const { res: searchRes } = await fetchJsonWithApiFallback(
                            `${anilistBase}/${encodeURIComponent(title)}`,
                            { signal: AbortSignal.timeout(REQ_TIMEOUT.animeSearch) },
                        );
                        if (searchRes.ok) {
                            const searchData = await searchRes.json();
                            const results = getAnimeSearchResults(searchData);
                            const picked = pickAnimeResultByTitle(
                                results,
                                title,
                                getPreferredMediaYear(),
                                1,
                                '',
                                false,
                            );
                            animeId = String(picked?.id || '').trim();
                        }
                    }

                    if (!animeId) return null;

                    let info = null;
                    try {
                        const { res: dataRes } = await fetchJsonWithApiFallback(
                            `${anilistBase}/data/${encodeURIComponent(animeId)}`,
                            { signal: AbortSignal.timeout(REQ_TIMEOUT.animeInfo) },
                        );
                        if (dataRes.ok) {
                            const payload = await dataRes.json();
                            info = payload?.data || payload || null;
                        }
                    } catch {
                        // Fall back to a minimal canonical object below.
                    }

                    if (!info) {
                        info = { id: animeId, title: title || getAnimeTitleText(currentMediaInfo?.title || currentMediaInfo?.name || '') };
                    }
                    currentAnimeCanonicalInfo = info;
                    currentAnimeCanonicalInfoKey = requestKey;
                    return info;
                } catch {
                    return null;
                } finally {
                    currentAnimeCanonicalInfoPromise = null;
                }
            })();

            return currentAnimeCanonicalInfoPromise;
        }

        async function resolveMovieProviderEpisodeIdBySearch(provider, mediaType, mediaTitle, seasonNo, episodeNo, allowTypeFallback = true) {
            const normalizeLoose = (v) =>
                String(v || '')
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            const safeNo = (v, fb = 1) => {
                const n = Number(v);
                return Number.isFinite(n) && n > 0 ? n : fb;
            };

            const title = String(mediaTitle || '').trim();
            if (!title) return { info: null, episodeId: null };

            const cacheKey = [
                String(provider || '').toLowerCase(),
                String(mediaType || '').toLowerCase(),
                String(TMDB_ID || ''),
                safeNo(seasonNo, 1),
                safeNo(episodeNo, 1),
            ].join('|');
            if (providerEpisodeIdCache.has(cacheKey)) {
                const cached = providerEpisodeIdCache.get(cacheKey);
                return { info: cached?.info || null, episodeId: cached?.episodeId || null };
            }

            const movieProviderBase = API_BASE.replace('/meta/tmdb', `/movies/${provider}`);
            const terms = Array.from(
                new Set([
                    title,
                    title.replace(/\(\d{4}\)/g, '').trim(),
                    title.replace(/[:\-].*$/, '').trim(),
                    title.replace(/\bagent\b/gi, '').trim(),
                    title.split(/\s+/).slice(-2).join(' ').trim(),
                    title.split(/\s+/).slice(-1).join(' ').trim(),
                ].filter(Boolean)),
            );
            const wanted = normalizeLoose(title);
            const yearHint = Number(getPreferredMediaYear() || 0);
            const wantedType = String(mediaType || '').toLowerCase() === 'tv' ? 'tv' : 'movie';

            for (const term of terms) {
                const searchUrl = `${movieProviderBase}/${encodeURIComponent(term)}?page=1`;
                const { res: sRes } = await fetchJsonWithApiFallback(searchUrl, {
                    signal: AbortSignal.timeout(getProviderTimeout(provider, 'animeSearch', 8000)),
                });
                if (!sRes.ok) continue;

                const payload = await sRes.json();
                const rows = Array.isArray(payload?.results)
                    ? payload.results
                    : Array.isArray(payload?.data)
                        ? payload.data
                        : [];
                if (!rows.length) continue;

                const scored = rows.map((r) => {
                    const rt = normalizeLoose(r?.title || r?.name || r?.id || '');
                    const rowType = String(r?.type || r?.mediaType || '').toLowerCase();
                    let score = 0;
                    if (rt === wanted) score += 100;
                    if (rt.includes(wanted) || wanted.includes(rt)) score += 50;
                    if (rowType === wantedType) score += 80;
                    else if (rowType) score -= 120;
                    const releaseYear = Number(
                        String(r?.releaseDate || '').match(/\b(19|20)\d{2}\b/)?.[0] || 0,
                    );
                    if (yearHint && releaseYear && yearHint === releaseYear) score += 20;
                    return { row: r, score };
                });
                scored.sort((a, b) => b.score - a.score);
                const picked = scored[0]?.row || rows[0];
                if (!picked?.id) continue;

                const pickedId = picked.id;

                const infoUrl = `${movieProviderBase}/info?id=${encodeURIComponent(pickedId)}`;
                const { res: iRes } = await fetchJsonWithApiFallback(infoUrl, {
                    signal: AbortSignal.timeout(getProviderTimeout(provider, 'animeInfo', 12000)),
                });
                if (!iRes.ok) continue;

                let info = await iRes.json();
                if (info?.data) info = info.data;
                if (!info) continue;

                if (mediaType === 'tv') {
                    const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                    const sNo = safeNo(seasonNo, 1);
                    const eNo = safeNo(episodeNo, 1);
                    const toNo = (ep) => safeNo(ep?.number || ep?.episode || ep?.episodeNum, 0);
                    const toSeason = (ep) => safeNo(ep?.season || ep?.seasonNo || ep?.seasonNumber, 0);
                    const pickedEpisode =
                        episodes.find((ep) => toSeason(ep) === sNo && toNo(ep) === eNo) ||
                        episodes.find((ep) => toNo(ep) === eNo) ||
                        episodes[Math.max(0, Math.min(episodes.length - 1, eNo - 1))];
                    const episodeId = pickedEpisode?.id || pickedEpisode?.episodeId || pickedEpisode?.url || null;
                    if (episodeId) {
                        providerEpisodeIdCache.set(cacheKey, { info, episodeId });
                        return { info, episodeId };
                    }
                } else {
                    const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                    const episodeId =
                        info?.episodeId ||
                        episodes?.[0]?.id ||
                        episodes?.[0]?.url ||
                        info?.id ||
                        null;
                    if (episodeId) {
                        providerEpisodeIdCache.set(cacheKey, { info, episodeId });
                        return { info, episodeId };
                    }
                }
            }

            const providerLower = String(provider || '').toLowerCase();
            const supportsMovieToTvFallback = !['flixhq', 'dramacool'].includes(providerLower);
            if (
                allowTypeFallback &&
                supportsMovieToTvFallback &&
                String(mediaType || '').toLowerCase() === 'movie'
            ) {
                try {
                    const tvFallback = await resolveMovieProviderEpisodeIdBySearch(
                        provider,
                        'tv',
                        mediaTitle,
                        safeNo(seasonNo, 1),
                        safeNo(episodeNo, 1),
                        false,
                    );
                    if (tvFallback?.episodeId) {
                        providerEpisodeIdCache.set(cacheKey, tvFallback);
                        return tvFallback;
                    }
                } catch (_) {
                    // keep null fallback below
                }
            }

            return { info: null, episodeId: null };
        }

        function normalizeSeasonSearchLabel(label) {
            const raw = String(label || '').trim();
            if (!raw) return '';
            const cleaned = raw
                .replace(/\bseason\s*\d+\b/ig, ' ')
                .replace(/\bbook\s*\d+\b/ig, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            return cleaned;
        }

        function getAnimeSearchTerms(title, preferredYear = null, seasonNo = 1, seasonLabel = '', isMovie = false) {
            const base = normalizeAnimeSearchQuery(title);
            if (!base) return [];
            const terms = [];
            const normalizedSeasonLabel = String(isMovie ? title : seasonLabel).toLowerCase();

            // Priority: Search with preferred language first if specifically set (e.g. "Naruto Hindi")
            if (preferredAudioToken && !['sub', 'subbed', 'dub', 'dubbed', 'original', 'jp', 'japanese', 'en', 'english'].includes(preferredAudioToken)) {
                terms.push(`${base} ${preferredAudioToken}`);
            }

            if (isMovie) {
                terms.push(`${base} movie`);
                if (preferredYear) terms.push(`${base} ${preferredYear}`);
                terms.push(base);
                return Array.from(new Set(terms.filter(Boolean)));
            }

            // If season 2+, prioritize finding the specific entry.
            if (seasonNo > 1) {
                terms.push(`${base} season ${seasonNo}`);
                terms.push(`${base} ${seasonNo}`);
                terms.push(`${base} S${seasonNo}`);
            }

            if (normalizedSeasonLabel) {
                terms.push(`${base} ${normalizedSeasonLabel}`);
                terms.push(normalizedSeasonLabel);
            }

            if (preferredYear) terms.push(`${base} ${preferredYear}`);
            terms.push(base);
            return Array.from(new Set(terms.filter(Boolean)));
        }

        function extractSeasonNumberFromTitle(title) {
            if (!title) return null;
            const t = String(title).toLowerCase();
            const m = t.match(/\bseason\s*(\d+)\b/i)
                || t.match(/\b(\d+)(st|nd|rd|th)\s*season\b/i)
                || t.match(/\bseason\b\s*([ivx]+)\b/i)
                || t.match(/\bs\s*(\d+)\b/i);
            if (m) {
                if (m[1].match(/^[ivx]+$/)) {
                    const romanMap = { i: 1, ii: 2, iii: 3, iv: 4, v: 5, vi: 6, vii: 7, viii: 8, ix: 9, x: 10 };
                    return romanMap[m[1]] || null;
                }
                return Number(m[1]);
            }
            // Title-based inference for popular anime
            if (t.includes('cour 2')) return 2;
            if (t.includes('part 2')) return 2;
            if (t.includes('part 3')) return 3;

            // Standalone number at end or with hyphen.
            const m2 = t.match(/[\-\s](\d+)$/);
            if (m2) return Number(m2[1]);
            return null;
        }

        function extractPartNumberFromTitle(title) {
            if (!title) return null;
            const t = String(title).toLowerCase();
            const m = t.match(/\bpart\s*(\d+)\b/i) || t.match(/\b(\d+)(st|nd|rd|th)\s*part\b/i);
            if (m) return Number(m[1]);
            return null;
        }

        function getSpecificSeasonLabelTokens(seasonLabel, baseTitle = '') {
            const stopWords = new Set([
                'season', 'part', 'arc', 'tv', 'the', 'and', 'of', 'no', 'to', 'a', 'an'
            ]);
            const labelTokens = normalizeAnimeSearchQuery(seasonLabel)
                .toLowerCase()
                .split(' ')
                .filter(Boolean);
            const baseTokens = new Set(
                normalizeAnimeSearchQuery(baseTitle)
                    .toLowerCase()
                    .split(' ')
                    .filter(Boolean),
            );
            return [...new Set(
                labelTokens.filter((token) =>
                    token.length > 2 &&
                    !stopWords.has(token) &&
                    !baseTokens.has(token),
                ),
            )];
        }

        function normalizeNetMirrorId(id) {
            if (!id) return '';
            return String(id).replace(/^\/+/, '');
        }

        function getProviderAnimeResolutionContext(provider, mediaTitle, seasonNo, episodeNo, seasonLabel, isMovie = false) {
            const resolved = {
                mediaTitle: normalizeAnimeSearchQuery(getAnimeTitleText(mediaTitle)),
                seasonNo: Number(seasonNo || 1),
                episodeNo: Number(episodeNo || 1),
                seasonLabel: normalizeSeasonSearchLabel(seasonLabel),
                animeIdOverride: '',
                episodeOffset: 0, // Default offset
                seasonNoOverride: undefined, // Default override
            };

            // ── AnimeSalt resolution ─────────────────────────────────────────────────
            if (provider === 'animesalt') {
                if (isMovie) {
                    resolved.seasonLabel = '';
                    return resolved;
                }

                // AnimeSalt groups sections differently for some shows.
                // Default: strip season-specific suffixes to find the main series slug.
                const baseTitle = resolved.mediaTitle
                    .replace(/\b(season|part|cour|arc)\s*\d+\b/gi, '')
                    .replace(/\b(part|cour)\s+[ivxlc]+\b/gi, '')
                    .replace(/\b(TV|Specials|Recaps)\b/gi, '')
                    .replace(/\s+/g, ' ')
                    .trim();

                resolved.mediaTitle = baseTitle || resolved.mediaTitle;
                resolved.seasonLabel = ''; // AnimeSalt doesn't use season labels in its IDs
                return resolved;
            }

            if (provider !== 'justanime') return resolved;
            return resolved;
        }

        function getProviderAnimeCacheScope(provider, mediaTitle, preferredYear, seasonLabel = '') {
            const canonicalId = String(currentAnimeCanonicalInfo?.id || currentMediaInfo?.anilistId || '').trim();
            const baseKey = canonicalId
                ? `anilist::${canonicalId}`
                : `${normalizeAnimeSearchQuery(getAnimeTitleText(mediaTitle)).toLowerCase()}::${preferredYear || ''}`;
            const scopedLabel = normalizeSeasonSearchLabel(seasonLabel).toLowerCase();
            // Include season label for every provider to avoid cross-season anime ID reuse.
            return `${provider}::v4::${baseKey}::${scopedLabel}`;
        }

        async function resolveJustAnimeOverrideEpisodeId(animeId, episodeNo, timeoutMs) {
            const safeAnimeId = String(animeId || '').trim();
            const safeEpisodeNo = Math.max(1, Number(episodeNo || 1));
            if (!safeAnimeId) return '';

            try {
                const { res: infoRes } = await fetchJsonWithApiFallback(
                    buildAnimeInfoUrl('justanime', safeAnimeId),
                    { signal: AbortSignal.timeout(timeoutMs) },
                );
                if (!infoRes.ok) return `${safeAnimeId}$episode$${safeEpisodeNo}`;
                let info = await infoRes.json();
                if (info?.data) info = info.data;
                const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                const target =
                    episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode || 0) === safeEpisodeNo) ||
                    episodes[safeEpisodeNo - 1] ||
                    null;
                return String(target?.id || `${safeAnimeId}$episode$${safeEpisodeNo}`);
            } catch (_) {
                return `${safeAnimeId}$episode$${safeEpisodeNo}`;
            }
        }

        function findExactProviderSeasonMatch(provider, results, seasonLabel = '') {
            // AnimeSalt: ALL seasons/arcs are under one series slug — no season matching needed,
            // just pick the best overall title match. Return null to let pickAnimeResultByTitle handle it.
            if (provider === 'animesalt') return null;

            if (provider !== 'justanime' || !Array.isArray(results) || results.length === 0) return null;
            const normalizedSeasonLabel = normalizeSeasonSearchLabel(seasonLabel).toLowerCase();
            if (!normalizedSeasonLabel) return null;

            const seasonTokens = normalizedSeasonLabel.split(' ').filter(Boolean);
            if (!seasonTokens.length) return null;

            const exact = results.find((row) => {
                let rawTitle = row?.title || row?.name || '';
                if (typeof rawTitle === 'object') {
                    rawTitle = rawTitle.english || rawTitle.romaji || rawTitle.native || String(rawTitle);
                }
                const itemTitle = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                if (!itemTitle) return false;
                if (itemTitle.includes(normalizedSeasonLabel)) return true;
                const matches = seasonTokens.filter((token) => itemTitle.includes(token)).length;
                return matches >= Math.min(2, seasonTokens.length);
            });

            return exact || null;
        }

        function pickAnimeResultByTitle(results, title, preferredYear = null, targetSeason = 1, seasonLabel = '', isMovie = false) {
            if (!Array.isArray(results) || results.length === 0) return null;
            if (!title) return results[0];

            const normTitle = normalizeAnimeSearchQuery(title).toLowerCase();
            const qWords = normTitle.split(' ').filter(Boolean);
            const normalizedSeasonLabel = String(isMovie ? title : seasonLabel).toLowerCase();
            const seasonWords = isMovie ? [] : normalizedSeasonLabel.split(' ').filter(Boolean);
            const specificSeasonTokens = isMovie ? [] : getSpecificSeasonLabelTokens(seasonLabel, title);
            let best = null;
            let bestScore = -Infinity;

            const parseYear = (item) => {
                const raw = String(
                    item?.releaseDate ||
                    item?.release_date ||
                    item?.year ||
                    item?.startDate ||
                    '',
                );
                const y = Number(raw.slice(0, 4));
                return Number.isFinite(y) ? y : null;
            };

            for (const r of results) {
                let rawTitle = r?.title || r?.name || '';
                if (typeof rawTitle === 'object') {
                    rawTitle = rawTitle.english || rawTitle.romaji || rawTitle.native || String(rawTitle);
                }
                const itemTitle = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                if (!itemTitle) continue;

                let score = 0;

                // Audio Language matching (high priority for Satoru/Dubs)
                const prefAudio = String(preferredAudioToken || '').toLowerCase();
                const itemRawTitle = String(rawTitle).toLowerCase();
                if (prefAudio && itemRawTitle.includes(prefAudio)) {
                    score += 100;
                    if (itemRawTitle === `${normTitle} ${prefAudio}`) score += 50; // exact "Show Hindi" match 
                }

                if (itemTitle === normTitle) score += 120;
                else if (itemTitle.startsWith(normTitle)) score += 95;
                else if (itemTitle.includes(normTitle)) score += 80;

                const tWords = itemTitle.split(' ').filter(Boolean);
                const common = qWords.filter((w) => tWords.includes(w)).length;
                score += common * 10;
                score -= Math.abs(itemTitle.length - normTitle.length) * 0.2;

                if (seasonWords.length) {
                    const seasonCommon = seasonWords.filter((w) => tWords.includes(w)).length;
                    score += seasonCommon * 28;
                    if (normalizedSeasonLabel && itemTitle.includes(normalizedSeasonLabel)) score += 140;
                }
                if (specificSeasonTokens.length) {
                    const specificMatches = specificSeasonTokens.filter((w) => tWords.includes(w)).length;
                    if (specificMatches > 0) score += specificMatches * 95;
                    else score -= 220;
                }

                // Specific Part/Cour support for anime
                if (normTitle.includes('part 2') && itemTitle.includes('part 2')) score += 140;
                if (normTitle.includes('part 3') && itemTitle.includes('part 3')) score += 140;
                if (normTitle.includes('cour 2') && itemTitle.includes('cour 2')) score += 140;

                const itemYear = parseYear(r);
                if (preferredYear && itemYear) {
                    if (itemYear === preferredYear) score += 30;
                    else if (Math.abs(itemYear - preferredYear) === 1) score += 12;
                }

                // Season Matching
                const itemSeason = extractSeasonNumberFromTitle(rawTitle);
                if (targetSeason > 1) {
                    if (itemSeason === targetSeason) score += 180; // Very strong preferred entry
                    else if (itemSeason && itemSeason !== targetSeason) score -= 120; // Penalize wrong season
                } else {
                    // Watching S1: penalize if it says S2, S3, etc.
                    if (itemSeason && itemSeason > 1) score -= 100;
                }

                if (score > bestScore) {
                    bestScore = score;
                    best = r;
                }
            }

            // Reject weak matches instead of forcing a wrong ID.
            if (!best || bestScore < 35) return null;
            return best;
        }

        function isValidAnimeInfoId(v) {
            const id = String(v || '').trim().toLowerCase();
            if (!id) return false;
            if (id === 'watch' || id === 'info' || id === 'search') return false;
            return true;
        }

        function normalizeSubtitleEntries(watchData, provider, referer = null) {
            const toArray = (v) => Array.isArray(v) ? v : [];
            const all = [
                ...toArray(watchData?.subtitles),
                ...toArray(watchData?.captions),
                ...toArray(watchData?.tracks)
            ];
            const out = [];

            all.forEach((item, idx) => {
                const kind = String(item?.kind || '').toLowerCase();
                if (kind && kind !== 'captions' && kind !== 'subtitles') return;
                const src = item?.url || item?.file || item?.src;
                if (!src || typeof src !== 'string') return;

                const rawLang = String(item?.lang || item?.language || item?.label || `Track ${idx + 1}`).trim();
                const langLower = rawLang.toLowerCase();
                let srclang = 'en';
                if (langLower === 'ja' || langLower === 'jpn' || langLower.includes('japanese')) srclang = 'ja';
                else if (langLower === 'en' || langLower === 'eng' || langLower.includes('english')) srclang = 'en';
                else if (/^[a-z]{2,3}$/i.test(rawLang)) srclang = rawLang.toLowerCase();

                out.push({
                    label: item?.label || item?.language || rawLang,
                    srclang,
                    src,
                    provider,
                    referer: item?.referer || referer
                });
            });

            const seen = new Set();
            const deduped = out.filter((t) => {
                const key = `${t.src}|${t.srclang}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            const scoreSubtitle = (track) => {
                const label = String(track?.label || '').toLowerCase();
                const lang = String(track?.srclang || '').toLowerCase();
                let score = 0;
                if (lang === 'en') score += 100;
                if (label.includes('english')) score += 80;
                if (label.includes('sdh') || label.includes('cc')) score -= 5;
                if (label.includes('forced')) score += 10;
                return score;
            };

            const providerName = String(provider || '').toLowerCase();
            const maxTracks = providerName === 'flixhq' ? 2 : MAX_EXTERNAL_SUBTITLE_TRACKS;

            return deduped
                .sort((a, b) => scoreSubtitle(b) - scoreSubtitle(a))
                .slice(0, maxTracks);
        }

        function shouldUsePreviewHls(sourceUrl, sourceProvider) {
            const provider = String(sourceProvider || '').toLowerCase();
            const raw = String(sourceUrl || '').toLowerCase();
            // FlixHQ direct hosts often become unstable with dual HLS sessions (main + preview).
            if (provider === 'flixhq') return false;
            if (
                raw.includes('bluehorizon') ||
                raw.includes('mistwolf') ||
                raw.includes('silvercloud') ||
                raw.includes('megafiles.store')
            ) {
                return false;
            }
            return true;
        }

        async function resolveSubtitleTrackSrc(sub) {
            const rawSrc = String(sub?.src || '').trim();
            if (!rawSrc) return '';

            // iOS AVKit native fullscreen CANNOT load data: URI text tracks — needs a real HTTP URL.
            // Route all subtitle fetching through /utils/vtt which does server-side fetch+convert
            // and returns proper text/vtt with CORS headers that iOS AVKit can load natively.
            try {
                const apiOrigin = activeApiBase.split('/meta/tmdb')[0];
                const referer = String(sub?.referer || '').trim();
                const refParam = referer ? `&referer=${encodeURIComponent(referer)}` : '';
                const vttUrl = `${apiOrigin}/utils/vtt?url=${encodeURIComponent(rawSrc)}${refParam}`;
                console.log('[sub] track src → /utils/vtt proxy:', rawSrc.slice(0, 60));
                return vttUrl;
            } catch (_) { /* fall through to legacy data URI path */ }

            const proxied = proxiedStreamUrl(rawSrc, sub?.referer || null);
            const toVttBlobUrl = (text) => {
                const vttText = String(text || '');
                try {
                    const blob = new Blob([vttText], { type: 'text/vtt' });
                    const url = URL.createObjectURL(blob);
                    // Keep a reference to prevent premature garbage collection
                    if (!window._activeSubtitleBlobs) window._activeSubtitleBlobs = [];
                    window._activeSubtitleBlobs.push(url);
                    return url;
                } catch (e) {
                    // Fallback to Data URI if Blob fails
                    const b64 = btoa(unescape(encodeURIComponent(vttText)));
                    return `data:text/vtt;base64,${b64}`;
                }
            };
            const sanitizeText = (text) => String(text || '').replace(/\r+/g, '').replace(/^\uFEFF/, '');
            const srtToVtt = (srtText) => {
                const clean = sanitizeText(srtText);
                return `WEBVTT\n\n${clean.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')}`;
            };
            const assTimeToVtt = (t) => {
                const m = String(t || '').trim().match(/^(\d+):(\d{1,2}):(\d{1,2})[.](\d{1,2})$/);
                if (!m) return '';
                const hh = String(Number(m[1] || 0)).padStart(2, '0');
                const mm = String(Number(m[2] || 0)).padStart(2, '0');
                const ss = String(Number(m[3] || 0)).padStart(2, '0');
                const ms = String(Math.round(Number(`0.${m[4] || '0'}`) * 1000)).padStart(3, '0');
                return `${hh}:${mm}:${ss}.${ms}`;
            };
            const assToVtt = (assText) => {
                const lines = sanitizeText(assText).split('\n');
                const cues = [];
                let idx = 1;
                for (const line of lines) {
                    const m = line.match(/^Dialogue:\s*[^,]*,([^,]+),([^,]+),[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,(.*)$/i);
                    if (!m) continue;
                    const start = assTimeToVtt(m[1]);
                    const end = assTimeToVtt(m[2]);
                    if (!start || !end) continue;
                    const text = String(m[3] || '')
                        .replace(/\{[^}]*\}/g, '')
                        .replace(/\\N/gi, '\n')
                        .replace(/\\n/g, '\n')
                        .trim();
                    if (!text) continue;
                    cues.push(`${idx++}\n${start} --> ${end}\n${text}`);
                }
                if (!cues.length) return '';
                return `WEBVTT\n\n${cues.join('\n\n')}`;
            };

            try {
                const lower = String(rawSrc || '').toLowerCase();
                
                // CRITICAL FIX: Direct skip if already a VTT and on iOS 
                // Normal HTTP URLs are much more stable for AVKit probes than Blobs.
                if (IS_IOS && lower.split('?')[0].endsWith('.vtt')) {
                     return proxied;
                }

                if (subtitleBlobCache.has(lower)) {
                    const cachedVtt = subtitleBlobCache.get(lower);
                    return cachedVtt ? toVttUrl(cachedVtt) : '';
                }

                // Correctly use the already computed proxied URL which includes the referer.
                const proxiedSub = proxied;
                try {
                    const looksLikeSrt = /\.srt(\?|$)/i.test(rawSrc);
                    const looksLikeAss = /\.ass(\?|$)/i.test(rawSrc) || /\.ssa(\?|$)/i.test(rawSrc);
                    const txtRes = await fetch(proxiedSub, { signal: AbortSignal.timeout(12000) });
                    if (txtRes.ok) {
                        const txt = await txtRes.text();
                        if (!txt) return '';
                        const ln = txt.trim().toLowerCase();
                        
                        // Ignore HTML responses (common for 404/WAF pages)
                        if (ln.startsWith('<!doctype html') || ln.startsWith('<html')) return '';

                        let content = txt;
                        // Check for AnimeSalt base64 encryption 
                        // Enhanced: strip all whitespace/newlines that AnimeSalt CDNs might inject
                        const trimmedContent = content.trim();
                        if (!trimmedContent.includes('-->') && trimmedContent.length > 50 && /^[a-z0-9+/= \n\r\t]+$/i.test(trimmedContent)) {
                            try {
                                const cleanB64 = trimmedContent.replace(/\s/g, ''); 
                                const decoded = atob(cleanB64);
                                if (decoded.includes('-->') || /\d{1,2}:\d{2}:\d{2}/.test(decoded) || /\[Script Info\]/i.test(decoded)) {
                                    content = decoded;
                                }
                            } catch (_) { }
                        }

                        const finalLn = content.trim().toLowerCase();
                        const finalHasCue = content.includes('-->');
                        const finalHasSrt = /\d{1,2}:\d{2}:\d{2}[.,]\d{2,3}/.test(content);
                        const looksAssBody = /^\s*\[script info\]/i.test(content) || /^\s*\[events\]/im.test(content) || /dialogue:\s*[^,]*,\d+:\d{1,2}:\d{1,2}\.\d{1,2}/i.test(content);

                        let vttContent = '';
                        if (looksLikeSrt || (finalHasCue && finalHasSrt && !finalLn.startsWith('webvtt'))) vttContent = srtToVtt(content);
                        else if (looksLikeAss || looksAssBody) vttContent = assToVtt(content);
                        else if (finalLn.startsWith('webvtt')) vttContent = sanitizeText(content);
                        else if (finalHasCue) vttContent = `WEBVTT\n\n${sanitizeText(content)}`;

                        if (vttContent) {
                            subtitleBlobCache.set(lower, vttContent);
                            return toVttUrl(vttContent);
                        }
                    } else if (txtRes.status === 404 || txtRes.status === 403) {
                        subtitleBlobCache.set(lower, '');
                        return '';
                    }
                } catch (e) { console.warn('Sub fetch fail:', e); }
                
                // Fallback: if we couldn't parse/download but the file exists, return the raw proxied URL
                try {
                    const testRes = await fetch(proxied, { method: 'HEAD', signal: AbortSignal.timeout(8000) });
                    if (testRes.ok) return proxied;
                } catch (_) { }
            } catch (_) { }
            return '';
        }

        function applyExternalSubtitlesToVideoSync(videoEl) {
            if (!videoEl || !Array.isArray(window.externalSubtitleTracks) || window.externalSubtitleTracks.length === 0) return;
            
            // Derive API origin for proxy. Must point to the BACKEND server, not the frontend origin.
            let apiOrigin = '';
            try {
                // Priority: activeApiBase (runtime) -> window.__STREAMVERSE_CONFIG__ -> API_BASE -> location.origin
                const configBase = (typeof window !== 'undefined' && window.__STREAMVERSE_CONFIG__?.PROD_META_API_BASE);
                const base = (typeof activeApiBase !== 'undefined' && activeApiBase) ? activeApiBase : 
                             (configBase || (typeof API_BASE !== 'undefined' ? API_BASE : ''));
                
                if (base && base.startsWith('http')) {
                    const urlObj = new URL(base);
                    apiOrigin = `${urlObj.protocol}//${urlObj.host}`;
                } else {
                    apiOrigin = location.origin; // Last resort
                }
            } catch (e) {
                apiOrigin = location.origin;
            }

            console.log('[sub] iOS Sync Injection using API Origin:', apiOrigin);
            videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach(t => t.remove());

            (window.externalSubtitleTracks || []).forEach((sub, i) => {
                const track = document.createElement('track');
                track.kind = 'captions';
                track.label = sub.label || `Subtitle ${i + 1}`;
                track.srclang = sub.srclang || 'en';
                const rs = String(sub?.src || '').trim();
                const rf = String(sub?.referer || '').trim();

                const vttUrl = `${apiOrigin}/utils/vtt?url=${encodeURIComponent(rs)}${rf ? `&referer=${encodeURIComponent(rf)}` : ''}`;
                track.src = vttUrl;
                track.type = 'text/vtt';
                track.dataset.extSub = '1';
                track.id = `track-${i}`;

                if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                    track.default = true;
                }

                videoEl.appendChild(track);

                try {
                    if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                        track.track.mode = 'showing';
                    } else {
                        track.track.mode = 'disabled';
                    }
                } catch(e) { }
            });
            console.log(`[sub] iOS Sync Injection complete: ${window.externalSubtitleTracks.length} tracks added.`);
        }

        async function applyExternalSubtitlesToVideo(videoEl) {
            if (!videoEl) return;
            const applyVersion = ++subtitleApplyVersion;

            if (!Array.isArray(externalSubtitleTracks) || externalSubtitleTracks.length === 0) {
                videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }


            const prepared = await Promise.all(
                externalSubtitleTracks.map(async (sub) => ({
                    ...sub,
                    resolvedSrc: await resolveSubtitleTrackSrc(sub),
                })),
            );
            if (applyVersion !== subtitleApplyVersion) return;

            const resolved = prepared.filter((sub) => !!sub.resolvedSrc);
            if (!resolved.length) {
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }

            // Replace old external tracks only when we have a ready replacement set.
            videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());

            resolved.forEach((sub, i) => {
                const track = document.createElement('track');
                track.kind = 'captions'; // captions work more reliably in native iOS menu
                
                let trackLabel = sub.label || `Subtitle ${i + 1}`;
                if (sub.provider) {
                    const pLabel = providerLabel(sub.provider);
                    if (!trackLabel.toLowerCase().includes(pLabel.toLowerCase())) {
                        trackLabel += ` (${pLabel})`;
                    }
                }
                track.label = trackLabel;
                
                track.srclang = sub.srclang || 'en';
                track.src = sub.resolvedSrc || '';
                track.dataset.extSub = '1';

                // On iOS, the 'default' attribute is the most reliable way to ensure the track 
                // is auto-selected in the native system menu when entering fullscreen.
                if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                    track.default = true;
                }
                // track.crossOrigin is not a valid property; handled by video element
                track.addEventListener('load', () => {
                    console.log('[sub] track loaded:', track.label);
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                    // If this was the intended active track, refresh
                    if (activeSubtitleTrackIndex >= 0 && videoEl.textTracks?.[activeSubtitleTrackIndex]?.label === track.label) {
                       renderSubtitleOverlayFromTrack(videoEl.textTracks[activeSubtitleTrackIndex]);
                    }
                });
                track.addEventListener('error', (e) => {
                    console.warn('[sub] track load error:', track.label, e);
                });
                videoEl.appendChild(track);
            });
            console.log(`Subtitles prepared=${prepared.length}, attached=${videoEl.querySelectorAll('track[data-ext-sub="1"]').length}`);

            setTimeout(() => {
                bindSubtitleCueListeners();
                bindNativeTrackChangeListener();

                const currentProvider = String(currentStreamProvider || allSources?.[currentIdx]?.provider || '').toLowerCase();
                if (currentProvider === 'flixhq') {
                    // FlixHQ subtitle endpoints are often unstable/slow. Keep subtitles off by default
                    // so startup buffering is prioritized for video playback.
                    selectSubtitleTrack(-1);
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                    return;
                }

                const preferredLabel = localStorage.getItem('preferredSubtitleLabel');
                const tracks = Array.from(videoEl.textTracks || []);
                let bestIdx = -1;

                if (preferredLabel && tracks.length) {
                    bestIdx = tracks.findIndex(t => t.label === preferredLabel);
                }

                if (bestIdx === -1) {
                    bestIdx = getDefaultEnglishSubtitleIndex();
                }

                selectSubtitleTrack(bestIdx);
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
            }, 200);
        }

        function mergeSubtitleTrackLists(primary, secondary) {
            const p = Array.isArray(primary) ? primary : [];
            const s = Array.isArray(secondary) ? secondary : [];
            const merged = [...p, ...s].filter((t) => t && (t.src || t.url));
            const seen = new Set();
            return merged.filter((t) => {
                const key = `${String(t.src || t.url)}|${String(t.srclang || '').toLowerCase()}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        async function fetchAnimeSubtitleFallback() {
            if (!currentIsLikelyAnime) return [];
            const canonicalAnimeInfo = currentAnimeCanonicalInfo || await getCanonicalAnimeInfo();
            const mediaTitle = normalizeAnimeSearchQuery(
                canonicalAnimeInfo?.title ||
                canonicalAnimeInfo?.name ||
                currentMediaInfo?.title ||
                currentMediaInfo?.name ||
                '',
            );
            const preferredYear = getPreferredMediaYear();
            if (!mediaTitle) return [];
            const absoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);
            const subtitleCacheKey = `${mediaTitle.toLowerCase()}::${preferredYear || ''}::ep${absoluteEpisodeNo}`;
            if (animeSubtitleCache.has(subtitleCacheKey)) {
                return animeSubtitleCache.get(subtitleCacheKey) || [];
            }

            for (const provider of ANIME_SUBTITLE_FALLBACK_PROVIDERS) {
                try {
                    const base = getAnimeProviderBase(provider);
                    const selectedSeason = tvSeasons?.[curSeason];
                    const sNoRaw = Number(selectedSeason?.seasonNo);
                    const selectedSeasonNo = Number.isFinite(sNoRaw) && sNoRaw > 0 ? sNoRaw : (curSeason + 1);
                    const providerResolution = getProviderAnimeResolutionContext(
                        provider,
                        mediaTitle,
                        selectedSeasonNo,
                        absoluteEpisodeNo,
                        selectedSeason?.name || '',
                        MEDIA_TYPE === 'movie'
                    );

                    const terms = getAnimeSearchTerms(
                        providerResolution.mediaTitle,
                        preferredYear,
                        providerResolution.seasonNo,
                        providerResolution.seasonLabel,
                        MEDIA_TYPE === 'movie'
                    );
                    const providerEpisodeNo = Math.max(1, Number(providerResolution.episodeNo || absoluteEpisodeNo || 1));
                    const providerAnimeIdOverride = String(providerResolution.animeIdOverride || '').trim();
                    let providerEpisodeId = null;
                    if (provider === 'justanime' && providerAnimeIdOverride) {
                        providerEpisodeId = await resolveJustAnimeOverrideEpisodeId(
                            providerAnimeIdOverride,
                            MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1,
                            getProviderTimeout(provider, 'subtitleFallback', REQ_TIMEOUT.subtitleFallback),
                        );
                    }
                    const providerCacheScope = getProviderAnimeCacheScope(
                        provider,
                        providerResolution.mediaTitle,
                        preferredYear,
                        providerResolution.seasonLabel,
                    );
                    const subtitleTimeoutMs = getProviderTimeout(provider, 'subtitleFallback', REQ_TIMEOUT.subtitleFallback);

                    // Check show-level cache to skip search+info on subsequent episodes
                    const cachedAnimeId = providerAnimeIdOverride || justanimeAnimeIdCache.get(providerCacheScope);

                    if (cachedAnimeId) {
                        // Fast path: already know the anime ID, build episode ID directly
                        if (provider === 'justanime') {
                            providerEpisodeId = `${cachedAnimeId}$episode$${MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1}`;
                        } else {
                            // For other providers we still need the episode list, but we skip the search
                            const { res: infoRes } = await fetchJsonWithApiFallback(
                                buildAnimeInfoUrl(provider, cachedAnimeId),
                                { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                            );
                            if (infoRes.ok) {
                                let info = await infoRes.json();
                                if (info?.data) info = info.data;
                                const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                                const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                    || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                    || episodes[0];
                                providerEpisodeId = target?.id;
                            }
                        }
                    } else {
                        // Slow path: search + info to discover anime ID
                        let best = null;
                        for (const term of terms) {
                            const searchUrl = `${base}/${encodeURIComponent(term)}`;
                            const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl, { signal: AbortSignal.timeout(subtitleTimeoutMs) });
                            if (!searchRes.ok) continue;
                            const searchData = await searchRes.json();
                            const results = getAnimeSearchResults(searchData);
                            best = pickAnimeResultByTitle(results, mediaTitle, preferredYear, selectedSeasonNo, '', MEDIA_TYPE === 'movie');
                            if (best?.id) break;
                        }
                        const animeId = best?.id;
                        if (!isValidAnimeInfoId(animeId)) continue;

                        // Cache the anime ID so future episodes skip this step
                        justanimeAnimeIdCache.set(providerCacheScope, providerAnimeIdOverride || animeId);

                        const resolvedAnimeId = providerAnimeIdOverride || animeId;
                        const { res: infoRes } = await fetchJsonWithApiFallback(
                            buildAnimeInfoUrl(provider, resolvedAnimeId),
                            { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                        );
                        if (!infoRes.ok) continue;
                        let info = await infoRes.json();
                        if (info?.data) info = info.data;

                        if (provider === 'justanime' && info?.id) {
                            providerEpisodeId = `${info.id}$episode$${MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1}`;
                        } else {
                            const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                            const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                || episodes[0];
                            providerEpisodeId = target?.id;
                        }
                    }

                    if (!providerEpisodeId) continue;

                    const { res: watchRes } = await fetchJsonWithApiFallback(
                        buildAnimeWatchUrl(provider, providerEpisodeId),
                        { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                    );
                    if (!watchRes.ok) continue;
                    const watchData = await watchRes.json();
                    const headers = watchData?.headers || watchData?.data?.headers || {};
                    const referer = headers?.Referer || headers?.referer || null;
                    const subs = normalizeSubtitleEntries(watchData?.data || watchData, provider, referer);
                    if (subs.length) {
                        console.log(`Subtitle fallback success from ${provider}: ${subs.length}`);
                        animeSubtitleCache.set(subtitleCacheKey, subs);
                        return subs;
                    }
                } catch (_) { }
            }
            animeSubtitleCache.set(subtitleCacheKey, []);
            return [];
        }

        function renderSubtitleOverlayFromTrack(track) {
            const overlay = ensureSubtitleOverlay();
            if (!track || track.mode === 'disabled') {
                overlay.innerHTML = '';
                overlay.style.display = 'none';
                return;
            }
            const cues = track.activeCues ? Array.from(track.activeCues) : [];
            const text = cues.map((c) => c.text || '').filter(Boolean).join('\n');
            
            // Optimization: Only update DOM if the content has changed to avoid flickering
            if (overlay.innerHTML !== text) {
                overlay.innerHTML = text;
                overlay.style.display = text ? 'block' : 'none';
            }
        }

        function bindSubtitleCueListeners() {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((track) => {
                if (track.__overlayBound) return;
                track.addEventListener('cuechange', () => {
                    const activeTrack = activeSubtitleTrackIndex >= 0
                        ? (video.textTracks[activeSubtitleTrackIndex] || null)
                        : null;
                    renderSubtitleOverlayFromTrack(activeTrack);
                });
                track.__overlayBound = true;
            });
        }

        // Flag to suppress our own programmatic track mode changes from triggering the native listener
        let _suppressNativeTrackChange = false;

        function bindNativeTrackChangeListener() {
            if (!video || !video.textTracks) return;
            if (video.textTracks.__nativeChangeBound) return;
            video.textTracks.__nativeChangeBound = true;

            video.textTracks.addEventListener('change', () => {
                // Ignore changes we made ourselves (silenceNativeTracks)
                if (_suppressNativeTrackChange) return;

                const tracks = Array.from(video.textTracks);
                const nativeShowingIdx = tracks.findIndex(t => t.mode === 'showing');

                if (nativeShowingIdx >= 0) {
                    // iOS selected a track natively — sync our state
                    console.log('[sub] iOS native track change → idx', nativeShowingIdx, tracks[nativeShowingIdx].label);
                    activeSubtitleTrackIndex = nativeShowingIdx;
                    localStorage.setItem('preferredSubtitleLabel', tracks[nativeShowingIdx].label);

                    // Sync overlay display if not in native fullscreen
                    if (!_iosNativePlayerActive) {
                        renderSubtitleOverlayFromTrack(tracks[nativeShowingIdx]);
                    }
                } else if (!_iosNativePlayerActive) {
                    // iOS turned off all tracks — only sync 'Off' if NOT in native player
                    // (Native player might briefly set all to hidden during transitions)
                    activeSubtitleTrackIndex = -1;
                    localStorage.removeItem('preferredSubtitleLabel');
                    renderSubtitleOverlayFromTrack(null);
                }
                buildCaptionsMenu();
            });
        }

        function silenceNativeTracks() {
            // On iOS when the native player is active, we must NOT toggle modes as it breaks the HUD.
            if (_iosNativePlayerActive) return;
            if (!video || !video.textTracks) return;

            _suppressNativeTrackChange = true;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((t, i) => {
                const isTheActiveOne = (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex);
                if (isTheActiveOne) {
                    // 'hidden' is the magic mode: events fire (for our overlay) but browser doesn't draw.
                    // On iOS, we only elevate to 'showing' when fullscreen is active.
                    t.mode = (IS_IOS && document.webkitDisplayingFullscreen) ? 'showing' : 'hidden';
                } else {
                    t.mode = 'disabled';
                }
            });
            setTimeout(() => { _suppressNativeTrackChange = false; }, 50);
        }

        function activateTracksForIOSNativePlayer(showNative = true) {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            
            // To avoid double subtitles in the browser (inline), we set mode to 'hidden' (still loads but doesn't render).
            // When in native fullscreen, we set it to 'showing'.
            const targetMode = showNative ? 'showing' : 'hidden';

            console.log(`[sub] iOS Native Handoff: ${tracks.length} tracks, targetMode=${targetMode}, activeIdx=${activeSubtitleTrackIndex}`);
            
            tracks.forEach((t, i) => {
                const shouldBeActive = activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex;
                if (shouldBeActive) {
                    t.mode = targetMode;
                } else {
                    t.mode = 'disabled';
                }
            });
        }

        // Restore subtitle tracks to 'hidden'/'disabled' after iOS native player exits
        function deactivateTracksFromIOSNativePlayer() {
             _iosNativePlayerActive = false;
             silenceNativeTracks();
             // Re-bind cue listeners in case iOS cleared them
             bindSubtitleCueListeners();
             // Ensure custom overlay is updated
             if (activeSubtitleTrackIndex >= 0 && video && video.textTracks) {
                 renderSubtitleOverlayFromTrack(video.textTracks[activeSubtitleTrackIndex]);
             }
        }

        function selectSubtitleTrack(index) {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            activeSubtitleTrackIndex = (index >= 0 && index < tracks.length) ? index : -1;
            
            console.log('[sub] selecting track:', activeSubtitleTrackIndex, activeSubtitleTrackIndex >= 0 ? tracks[activeSubtitleTrackIndex].label : 'Off');
            
            silenceNativeTracks();
            const activeTrack = activeSubtitleTrackIndex >= 0 ? tracks[activeSubtitleTrackIndex] : null;
            
            renderSubtitleOverlayFromTrack(activeTrack);
            buildCaptionsMenu();
            
            // Persist preference
            if (activeSubtitleTrackIndex >= 0) {
                localStorage.setItem('preferredSubtitleLabel', tracks[activeSubtitleTrackIndex].label);
            } else {
                localStorage.removeItem('preferredSubtitleLabel');
            }
        }

        function getDefaultEnglishSubtitleIndex() {
            if (!video || !video.textTracks) return -1;
            const tracks = Array.from(video.textTracks);
            const idx = tracks.findIndex((track) => {
                const label = String(track.label || '').toLowerCase();
                const language = String(track.language || '').toLowerCase();
                return (
                    language === 'en' ||
                    language === 'eng' ||
                    language.startsWith('en-') ||
                    label === 'en' ||
                    label.includes('english')
                );
            });
            return idx >= 0 ? idx : (tracks.length > 0 ? 0 : -1);
        }
