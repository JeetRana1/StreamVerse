        // -----------------------------------------------------------------------
        //  FETCH SOURCES - per-provider: get that provider's own episodeId, then watch
        // -----------------------------------------------------------------------
        async function fetchSources(_unused) {
            allSources.length = 0;
            satoruAudioSources = [];
            currentAudioSource = 'justanime';
            activeSatoruTrackIndex = -1;
            externalSubtitleTracks = [];
            currentIdx = 0;
            hideError();
            setLoader('Searching providers...', 'Trying available sources');
            resetPlayerSurface();
            const selectedSeason = tvSeasons?.[curSeason];
            const selectedEpisode = selectedSeason?.episodes?.[curEpisode];
            const selectedSeasonNoRaw = Number(selectedSeason?.seasonNo);
            let selectedSeasonNo = Number.isFinite(selectedSeasonNoRaw) && selectedSeasonNoRaw > 0
                ? selectedSeasonNoRaw
                : (curSeason + 1);
            const selectedEpisodeNoRaw = Number(
                selectedEpisode?.episode || selectedEpisode?.number || selectedEpisode?.episodeNum,
            );
            let selectedEpisodeNo = Number.isFinite(selectedEpisodeNoRaw) && selectedEpisodeNoRaw > 0
                ? selectedEpisodeNoRaw
                : (curEpisode + 1);

            // ANIME FIX: If we are in a later season, providers like Satoru/JustAnime expect 
            // relative episode numbers (starting from 1 for each season entry).
            // Absolute numbers (e.g. 50) fail to match. We force relative numbering for seasons > 1.
            if (currentIsLikelyAnime && curSeason > 0 && selectedEpisodeNo > 15) {
                selectedEpisodeNo = curEpisode + 1;
            }

            // If the selected episode already carries a provider-style SxE id,
            // trust that mapping over derived season/episode counters.
            const selectedEpisodeId = String(selectedEpisode?.id || '').trim();
            const selectedEpisodeIdMatch = selectedEpisodeId.match(/-(\d+)x(\d+)$/i);
            if (currentIsLikelyAnime && selectedEpisodeIdMatch) {
                const idSeasonNo = Number(selectedEpisodeIdMatch[1]);
                const idEpisodeNo = Number(selectedEpisodeIdMatch[2]);
                if (Number.isFinite(idSeasonNo) && idSeasonNo > 0) selectedSeasonNo = idSeasonNo;
                if (Number.isFinite(idEpisodeNo) && idEpisodeNo > 0) selectedEpisodeNo = idEpisodeNo;
            }
            const selectedAbsoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);

            // Defer subtitle fallback prefetch so primary provider can start playback first.
            const forcedProviderHasOwnSubs = FORCED_PROVIDER === 'justanime';

            activeProviders.forEach(p => chipState(p, ''));

            const failReasons = [];
            const providerResults = {};
            const providersToRun = FORCED_PROVIDER
                ? [FORCED_PROVIDER]
                : (
                    MEDIA_TYPE === 'movie' && !currentIsLikelyAnime
                        ? activeProviders.filter((p) => !['animesalt', 'justanime', 'satoru', 'dramacool'].includes(String(p || '').toLowerCase()))
                        : activeProviders
                  );
            const orderedProviders = providersToRun;
            providersToRun.forEach(p => providerResults[p] = []);

            let isFirstLoaded = false;
            if (pendingEpisodeStartTime !== null) {
                startT = Math.max(0, Number(pendingEpisodeStartTime || 0));
            } else {
                startT = Number.isFinite(URL_TIME) && URL_TIME > 0 ? URL_TIME : 0;
                if (!startT && !URL_DISABLE_RESUME && Number.isFinite(RESUME_TIME_FALLBACK) && RESUME_TIME_FALLBACK > 5) {
                    startT = RESUME_TIME_FALLBACK;
                }
            }
            pendingEpisodeStartTime = null;
            console.log('[init] startT set to:', startT, 'url t:', URL_TIME, 'resume fallback:', RESUME_TIME_FALLBACK);

            const updateSourceList = () => {
                const newAllSources = [];
                // Re-compile allSources in the correct priority order
                orderedProviders.forEach(p => {
                    const provSources = providerResults[p] || [];
                    newAllSources.push(...provSources);
                });

                // Standard sorting: Direct streams (M3U8/MP4) first, then Embeds
                newAllSources.sort((a, b) => {
                    const rank = (s) => (s.isEmbed ? 1 : 0);
                    const r = rank(a) - rank(b);
                    if (r !== 0) return r;
                    if (preferredSourceLabelMatch) {
                        const aMatch = String(a.label).toLowerCase().includes(preferredSourceLabelMatch);
                        const bMatch = String(b.label).toLowerCase().includes(preferredSourceLabelMatch);
                        if (aMatch && !bMatch) return -1;
                        if (!aMatch && bMatch) return 1;
                    }
                    return 0;
                });

                allSources = newAllSources;
                
                if (allSources.length > 0) {
                    // Re-sync currentIdx after sort: find where the currently-streaming
                    // URL ended up so the active highlight and index stay accurate.
                    if (currentStreamUrl) {
                        const syncedIdx = allSources.findIndex(s => s.url === currentStreamUrl);
                        if (syncedIdx >= 0) currentIdx = syncedIdx;
                    }

                    const currentProvider = String(allSources?.[currentIdx]?.provider || '').trim().toLowerCase();
                    if (currentProvider && providerSeasonCatalog.has(currentProvider)) {
                        activeMenuProvider = currentProvider;
                    }

                    buildSourcePanel();
                    if (MEDIA_TYPE === 'tv') {
                        buildEpPanel();
                        updateEpUI(curSeason, curEpisode);
                    }
                    sourceBtn.style.display = 'flex';
                    showPlyrSourceBtn = true;

                    if (!isFirstLoaded) {
                        isFirstLoaded = true;
                        currentIdx = 0;
                        playSource(0, startT);
                    }
                }
            };

            // Fast boot: if we recently played this media with FlixHQ, start immediately from cache.
            const preferProviderForFastBoot = FORCED_PROVIDER || (MEDIA_TYPE === 'movie' ? 'flixhq' : '');
            if (preferProviderForFastBoot) {
                const cachedSources = readCachedProviderSources(preferProviderForFastBoot);
                if (cachedSources.length) {
                    providerResults[preferProviderForFastBoot] = cachedSources;
                    chipState(preferProviderForFastBoot, 'success');
                    setLoader('Loading cached stream...', 'Refreshing sources in background');
                    updateSourceList();
                }
            }

            const processProvider = async (provider) => {
                console.log('Processing provider:', provider);
                chipState(provider, 'trying');
                try {
                    let info, provEpisodeId;
                    let satoruResolvedExactly = false;
                    const isAnimeProvider = ['satoru', 'justanime', 'animesalt'].includes(provider);
                    const isNetMirrorProvider = ['flixhq', 'viewvault', 'netmirror'].some(v => String(provider || '').toLowerCase().includes(v));

                    if (isAnimeProvider) {
                        const canonicalAnimeInfo = currentAnimeCanonicalInfo || await getCanonicalAnimeInfo();
                        const canonicalAnimeId = String(canonicalAnimeInfo?.id || currentMediaInfo?.anilistId || '').trim();
                        const rawTitle = canonicalAnimeInfo?.title ||
                                canonicalAnimeInfo?.name ||
                                currentMediaInfo?.title ||
                                currentMediaInfo?.name ||
                                TMDB_ID;
                        // If TMDB failed and we have a generic fallback title, try to use TMDB_ID for searching
                        const searchTitle = (rawTitle === 'Unknown Title' || rawTitle === 'Unknown') ? TMDB_ID : rawTitle;
                        const mediaTitle = normalizeAnimeSearchQuery(getAnimeTitleText(searchTitle));
                        const selectedSeasonMeta =
                            tvSeasons?.[Math.max(0, Number(curSeason || 0))] ||
                            currentMediaInfo?.seasons?.find?.((s) => Number(s?.season || s?.seasonNumber || s?.number || 0) === selectedSeasonNo) ||
                            null;
                        const seasonLabel = normalizeSeasonSearchLabel(selectedSeasonMeta?.name || selectedSeasonMeta?.title || '');
                        if (!provEpisodeId) {
                            // Generic Anime Resolution
                            const resContext = getProviderAnimeResolutionContext(provider, mediaTitle, selectedSeasonNo, selectedEpisodeNo, seasonLabel, MEDIA_TYPE === 'movie');
                            if (provider === 'satoru') {
                                const resolved = await resolveExactSatoruEpisode(
                                    resContext.mediaTitle,
                                    resContext.seasonNo,
                                    resContext.episodeNo,
                                    resContext.seasonLabel,
                                    getPreferredMediaYear(),
                                );
                                if (!resolved?.episodeId) {
                                    throw new Error('Satoru exact resolve failed');
                                }
                                provEpisodeId = resolved.episodeId;
                            }
                            if (provider === 'animesalt') {
                                // Best-case path: AnimeSalt ids include explicit season/episode (slug-SxE).
                                // If the clicked row already has this id, use it directly to prevent cross-season drift.
                                const selectedEpisodeId = String(selectedEpisode?.id || '').trim();
                                if (selectedEpisodeId && /-\d+x\d+$/i.test(selectedEpisodeId)) {
                                    provEpisodeId = selectedEpisodeId;
                                }
                            }

                            if (!provEpisodeId && provider === 'animesalt') {
                                provEpisodeId = await resolveAnimesaltEpisodeId(
                                    {
                                        ...resContext,
                                        preferredYear: getPreferredMediaYear(),
                                        isMovie: MEDIA_TYPE === 'movie',
                                    },
                                    getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS),
                                );
                            }
                            if (provider === 'justanime' && resContext.animeIdOverride) {
                                provEpisodeId = await resolveJustAnimeOverrideEpisodeId(resContext.animeIdOverride, MEDIA_TYPE === 'tv' ? resContext.episodeNo : 1, getProviderTimeout(provider, 'animeInfo', ANIME_INFO_TIMEOUT_MS));
                            }
                            
                            if (!provEpisodeId && provider !== 'satoru') {
                                // Search fallback with canonical AniList id preference.
                                const searchTerms = getAnimeSearchTerms(resContext.mediaTitle, getPreferredMediaYear(), resContext.seasonNo, resContext.seasonLabel, MEDIA_TYPE === 'movie');
                                let bestAnime = null;
                                for (const term of searchTerms) {
                                    const typeHint = MEDIA_TYPE === 'tv' && provider === 'animesalt' ? '?type=tv' : '';
                                    const { res: searchRes } = await fetchJsonWithApiFallback(`${API_BASE.replace('/meta/tmdb', '/anime/' + provider)}/${encodeURIComponent(term)}${typeHint}`, { signal: AbortSignal.timeout(REQ_TIMEOUT.animeSearch) });
                                    if (!searchRes.ok) continue;
                                    const searchData = await searchRes.json();
                                    const results = getAnimeSearchResults(searchData);
                                    const isTvContext = MEDIA_TYPE === 'tv';
                                    const filteredResults = isTvContext
                                        ? results.filter((row) => {
                                            const rowId = String(row?.id || '').toLowerCase();
                                            const rowType = String(row?.type || row?.format || '').toLowerCase();
                                            if (rowId.startsWith('movie:')) return false;
                                            if (rowType.includes('movie') || rowType === 'film') return false;
                                            return true;
                                        })
                                        : results;
                                    const searchPool = filteredResults.length ? filteredResults : results;
                                    bestAnime =
                                        pickAnimeResultByAniListId(searchPool, canonicalAnimeId) ||
                                        findExactProviderSeasonMatch(provider, searchPool, resContext.seasonLabel) ||
                                        pickAnimeResultByTitle(searchPool, resContext.mediaTitle, getPreferredMediaYear(), resContext.seasonNo, resContext.seasonLabel, MEDIA_TYPE === 'movie');
                                    if (bestAnime?.id) break;
                                }
                                if (!bestAnime) throw new Error('title not found');
                                const { res: infoRes } = await fetchJsonWithApiFallback(buildAnimeInfoUrl(provider, bestAnime.id), { signal: AbortSignal.timeout(ANIME_INFO_TIMEOUT_MS) });
                                if (infoRes.ok) { let d = await infoRes.json(); info = d.data || d; }
                            }

                            if (!provEpisodeId && info) {
                                const episodes = info.episodes || [];
                                const exactSeasonEpisode = episodes.find(ep => Number(ep.season || 0) === selectedSeasonNo && Number(ep.number || ep.episode || 0) === selectedEpisodeNo);
                                const allowCrossSeasonFallback = !(provider === 'animesalt' && Number(selectedSeasonNo) > 1);
                                const byEpisodeNumber = allowCrossSeasonFallback
                                    ? episodes.find(ep => Number(ep.number || ep.episode || 0) === selectedEpisodeNo)
                                    : null;
                                const positionalFallback = allowCrossSeasonFallback ? (episodes[selectedEpisodeNo - 1] || episodes[0]) : null;
                                const target = exactSeasonEpisode || byEpisodeNumber || positionalFallback;
                                provEpisodeId = target?.id;

                                if (!provEpisodeId && provider === 'animesalt') {
                                    const infoSlug = String(info?.id || '').trim().replace(/^movie:/i, '');
                                    if (infoSlug) {
                                        provEpisodeId = buildAnimesaltEpisodeId(infoSlug, selectedSeasonNo, selectedEpisodeNo);
                                    }
                                }
                                if (provider === 'justanime' && info.id) provEpisodeId = provEpisodeId || `${info.id}$episode$${MEDIA_TYPE === 'tv' ? selectedEpisodeNo : 1}`;
                            }
                        }
                    } else {
                        // Movie/TV Providers (FlixHQ, etc.)
                        const isFlixhqProvider = provider === 'flixhq' && (MEDIA_TYPE === 'movie' || MEDIA_TYPE === 'tv');
                        if (isFlixhqProvider) {
                            // Fast path: let backend resolve FlixHQ source IDs during watch.
                            // If current episode already has a provider id, use it directly.
                            if (MEDIA_TYPE === 'tv' && selectedEpisode?.id) {
                                provEpisodeId = String(selectedEpisode.id).trim();
                            }
                        } else if (provider === 'dramacool') {
                            const resolved = await resolveDramacoolEpisodeId(currentMediaInfo?.title || currentMediaInfo?.name || '', selectedSeasonNo, selectedEpisodeNo, getProviderTimeout(provider, 'metaInfo', REQ_TIMEOUT.metaInfo));
                            provEpisodeId = resolved?.episodeId;
                        }
                        if (!provEpisodeId && !isFlixhqProvider) {
                            const resolved = await resolveMovieProviderEpisodeIdBySearch(provider, MEDIA_TYPE, currentMediaInfo?.title || currentMediaInfo?.name || '', selectedSeasonNo, selectedEpisodeNo);
                            provEpisodeId = resolved?.episodeId;
                            if (resolved?.info) info = resolved.info;
                        }
                        if (!provEpisodeId && !isFlixhqProvider) {
                            const { res: infoRes } = await fetchJsonWithApiFallback(`${API_BASE}/info/${TMDB_ID}?type=${MEDIA_TYPE}&provider=${provider}`, { signal: AbortSignal.timeout(getProviderTimeout(provider, 'metaInfo', REQ_TIMEOUT.metaInfo)) });
                            if (infoRes.ok) { 
                                let d = await infoRes.json(); info = d.data || d; 
                                if (MEDIA_TYPE === 'tv') {
                                    const s = (info.seasons || []).find(s => Number(s.number || s.season) === selectedSeasonNo) || info.seasons?.[curSeason];
                                    const e = (s?.episodes || []).find(e => Number(e.number || e.episode) === selectedEpisodeNo) || s?.episodes?.[curEpisode];
                                    provEpisodeId = e?.id || e?.episodeId;
                                } else {
                                    provEpisodeId = info.episodeId || info.id;
                                }
                            }
                        }
                    }

                    const canResolveOnWatch = provider === 'flixhq' && (MEDIA_TYPE === 'movie' || MEDIA_TYPE === 'tv');
                    if (!provEpisodeId && !canResolveOnWatch) throw new Error('No episode ID found');

                    // Watch (try TMDB provider watch first so backend can resolve missing TV episode IDs)
                    const watchCandidates = [];
                    if (isAnimeProvider) {
                        watchCandidates.push(buildAnimeWatchUrl(provider, provEpisodeId));
                    } else {
                        const movieBase = API_BASE.replace('/meta/tmdb', `/movies/${provider}`);

                        // For FlixHQ with a known provider episode ID, hit direct provider watch first.
                        if (provider === 'flixhq' && provEpisodeId) {
                            watchCandidates.push(`${movieBase}/watch?episodeId=${encodeURIComponent(provEpisodeId)}${DIRECT_ONLY ? '&directOnly=true' : ''}`);
                        }

                        const tmdbWatchParams = new URLSearchParams();
                        tmdbWatchParams.set('id', String(TMDB_ID || ''));
                        tmdbWatchParams.set('type', String(MEDIA_TYPE || 'movie'));
                        tmdbWatchParams.set('provider', String(provider || ''));
                        if (MEDIA_TYPE === 'tv') {
                            tmdbWatchParams.set('season', String(selectedSeasonNo || 1));
                            tmdbWatchParams.set('episode', String(selectedEpisodeNo || 1));
                        }
                        if (provEpisodeId) tmdbWatchParams.set('episodeId', String(provEpisodeId));
                        if (DIRECT_ONLY) tmdbWatchParams.set('directOnly', 'true');
                        watchCandidates.push(`${API_BASE}/watch?${tmdbWatchParams.toString()}`);
                        if (provider === 'dramacool') {
                            watchCandidates.push(`${movieBase}/watch?episodeId=${encodeURIComponent(provEpisodeId)}${DIRECT_ONLY ? '&directOnly=true' : ''}`);
                        } else {
                            if (provEpisodeId) {
                                const mediaIdRaw = String(info?.id || provEpisodeId || '').trim();
                                const episodeIdRaw = String(provEpisodeId || '').trim();
                                const mediaId = isNetMirrorProvider ? normalizeNetMirrorId(mediaIdRaw) : mediaIdRaw;
                                const episodeId = isNetMirrorProvider ? normalizeNetMirrorId(episodeIdRaw) : episodeIdRaw;
                                watchCandidates.push(
                                    `${movieBase}/watch?episodeId=${encodeURIComponent(episodeId)}&mediaId=${encodeURIComponent(mediaId)}${DIRECT_ONLY ? '&directOnly=true' : ''}`,
                                );
                            }
                        }
                    }

                    let data = null;
                    let lastWatchErr = null;
                    for (const watchUrl of watchCandidates) {
                        try {
                            const { res: watchRes } = await fetchJsonWithApiFallback(watchUrl, {
                                signal: AbortSignal.timeout(
                                    isAnimeProvider
                                        ? ANIME_WATCH_TIMEOUT_MS
                                        : getProviderTimeout(provider, 'watch', REQ_TIMEOUT.watch),
                                ),
                            });
                            if (!watchRes.ok) {
                                lastWatchErr = new Error(`HTTP ${watchRes.status}`);
                                continue;
                            }
                            data = await watchRes.json();
                            if (data?.sources?.length) break;
                            lastWatchErr = new Error('No sources');
                        } catch (watchErr) {
                            lastWatchErr = watchErr;
                        }
                    }

                    if (!data?.sources?.length && lastWatchErr) throw lastWatchErr;

                    if (!data?.sources?.length) throw new Error('No sources');

                    const providerSources = data.sources
                    .filter((src) => {
                        const url = String(src?.url || '');
                        if (!url || isBrokenEmbedUrl(url) || isLikelyPlaceholderSource(url)) return false;
                        return true;
                    })
                    .map((src, i) => {
                        const low = String(src.url).toLowerCase();
                        const isM3U8 = src.isM3U8 || src.isM3u8 || low.includes('.m3u8') || low.includes('m3u8-proxy') || low.includes('getm3u8');
                        const isEmbed = src.isEmbed ?? (!isM3U8 && !low.includes('.mp4'));
                        return {
                            label: `${providerLabel(provider)} - ${src.quality || `Source ${i + 1}`}`,
                            url: src.url,
                            isM3U8,
                            isEmbed,
                            referer: src.referer || data.headers?.Referer || null,
                            provider,
                        };
                    });

                    if (providerSources.length > 0) {
                        providerResults[provider] = providerSources;
                        writeCachedProviderSources(provider, providerSources);
                        chipState(provider, 'success');
                        
                        // Background tasks
                        if (currentIsLikelyAnime) fetchAniSkipSegmentsForCurrentEpisode();
                        const subs = normalizeSubtitleEntries(data.data || data, provider, data.headers?.Referer || null);
                        if (subs.length) externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);

                        // Trigger UI update
                        updateSourceList();
                    } else {
                        throw new Error('Unusable sources');
                    }
                } catch (err) {
                    console.warn(`[${provider}] failed:`, err.message);
                    failReasons.push(`${providerLabel(provider)}: ${err.message}`);
                    chipState(provider, 'failed');
                }
            };

            // For movie playback, prefer FlixHQ first. Only fall back to other providers if FlixHQ fails.
            const shouldPreferFlixhqFirst =
                !FORCED_PROVIDER &&
                !currentIsLikelyAnime &&
                orderedProviders.includes('flixhq');

            const shouldPreferAnimeSaltFirst =
                !FORCED_PROVIDER &&
                currentIsLikelyAnime &&
                orderedProviders.includes('animesalt');

            if (shouldPreferAnimeSaltFirst) {
                await processProvider('animesalt');

                if (allSources.length > 0) {
                    const backgroundProviders = orderedProviders.filter((p) => p !== 'animesalt');
                    Promise.all(backgroundProviders.map((p) => processProvider(p))).catch((err) => {
                        console.warn('[anime background providers] failed:', err?.message || err);
                    });
                } else {
                    const fallbackProviders = orderedProviders.filter((p) => p !== 'animesalt');
                    await Promise.all(fallbackProviders.map((p) => processProvider(p)));
                }
            } else if (shouldPreferFlixhqFirst) {
                await processProvider('flixhq');
                if (allSources.length === 0) {
                    const fallbackProviders = orderedProviders.filter((p) => p !== 'flixhq');
                    await Promise.all(fallbackProviders.map((p) => processProvider(p)));
                } else if (MEDIA_TYPE !== 'movie') {
                    const backgroundProviders = orderedProviders.filter((p) => p !== 'flixhq');
                    Promise.all(backgroundProviders.map((p) => processProvider(p))).catch((err) => {
                        console.warn('[movie background providers] failed:', err?.message || err);
                    });
                }
            } else {
                await Promise.all(orderedProviders.map(p => processProvider(p)));
            }

            if (allSources.length === 0) {
                showError('No Streams Found', `None of the providers could find a stream for this title.\n\nDetails:\n- ${failReasons.slice(0, 5).join('\n- ')}`);
            }
        }
        // ----------------------------------------------------------------------------------------------------
        //  SOURCE PANEL
        // ----------------------------------------------------------------------------------------------------
        function providerLabel(p) {
            const map = {
                flixhq: 'FlixHQ',
                dramacool: 'DramaCool',
                satoru: 'Satoru',
                justanime: 'JustAnime',
                animesalt: 'AnimeSalt',
            };
            return map[p] || p;
        }

        function isBrokenEmbedUrl(url) {
            if (!url) return true;
            return /streameeeeee\.site\/embed-1\/v3\/e-1\/[^?]+\?z=$/i.test(url.trim());
        }

        function captureVideoFrameToOverlay(allowBlackFallback = true) {
            const overlay = document.getElementById('transition-overlay');
            if (!overlay) return false;
            const canvas = overlay.querySelector('canvas');
            if (!canvas) return false;

            // Activate overlay immediately — spinner will show regardless of canvas success
            let drewFrame = false;

            // Dimensions from the actual player wrap
            const wrap = document.querySelector('.player-wrap');
            const vw = wrap ? wrap.offsetWidth : (window.innerWidth || 1920);
            const vh = wrap ? wrap.offsetHeight : (window.innerHeight || 1080);

            // Helper: draw video frame onto canvas using object-fit:contain logic
            // (exactly matches how #player-video renders — no zoom, no crop, letterbox/pillarbox)
            function drawVideoToCanvas(src) {
                if (!src || !src.videoWidth || src.readyState < 2) return false;
                try {
                    canvas.width = vw;
                    canvas.height = vh;
                    const ctx = canvas.getContext('2d');
                    // Black bars fill (letterbox / pillarbox)
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, vw, vh);
                    const vAspect = src.videoWidth / src.videoHeight;
                    const cAspect = vw / vh;
                    let drawW, drawH, drawX, drawY;
                    // CONTAIN: fit the whole frame inside the canvas, preserve aspect ratio
                    if (vAspect > cAspect) {
                        // Video is wider than canvas → fit width, letterbox top/bottom
                        drawW = vw;
                        drawH = vw / vAspect;
                        drawX = 0;
                        drawY = (vh - drawH) / 2;
                    } else {
                        // Video is taller than canvas → fit height, pillarbox left/right
                        drawH = vh;
                        drawW = vh * vAspect;
                        drawX = (vw - drawW) / 2;
                        drawY = 0;
                    }
                    ctx.drawImage(src, drawX, drawY, drawW, drawH);
                    return true;
                } catch (e) {
                    // SecurityError from tainted canvas — that's okay, spinner still shows
                    return false;
                }
            }

            // 1. Try main video first
            drewFrame = drawVideoToCanvas(video);
            if (!drewFrame) {
                // 2. Try the hidden preview video
                const previewVideo = document.getElementById('previewVideo');
                drewFrame = drawVideoToCanvas(previewVideo);
                if (!drewFrame && allowBlackFallback) {
                    // 3. No live frame — draw the cover/poster image instead of plain black
                    if (currentCoverUrl) {
                        const img = new Image();
                        const coverSrc = getProxiedUrl(currentCoverUrl);
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            try {
                                canvas.width = vw;
                                canvas.height = vh;
                                const ctx = canvas.getContext('2d');
                                // Draw cover image with object-fit:cover (fills canvas, crops edges)
                                const iAspect = img.naturalWidth / img.naturalHeight;
                                const cAspect = vw / vh;
                                let dw, dh, dx, dy;
                                if (iAspect > cAspect) {
                                    dh = vh; dw = vh * iAspect;
                                    dx = (vw - dw) / 2; dy = 0;
                                } else {
                                    dw = vw; dh = vw / iAspect;
                                    dx = 0; dy = (vh - dh) / 2;
                                }
                                ctx.drawImage(img, dx, dy, dw, dh);
                                // Dark gradient overlay matching the loader style
                                const grad = ctx.createLinearGradient(0, 0, 0, vh);
                                grad.addColorStop(0, 'rgba(9,9,11,0.55)');
                                grad.addColorStop(1, 'rgba(9,9,11,0.88)');
                                ctx.fillStyle = grad;
                                ctx.fillRect(0, 0, vw, vh);
                            } catch (_) { }
                        };
                        img.onerror = () => {
                            canvas.width = 1; canvas.height = 1;
                        };
                        img.src = coverSrc || currentCoverUrl;
                    } else {
                        canvas.width = 1;
                        canvas.height = 1;
                    }
                }
            }
            if (drewFrame || allowBlackFallback) {
                overlay.classList.add('active');
            }
            return drewFrame;
        }

        function hideTransitionOverlay() {
            const overlay = document.getElementById('transition-overlay');
            if (!overlay) return;
            overlay.classList.remove('active');
            overlay.classList.remove('buffering-lite');
        }


        function showToast(message) {
            try {
                console.warn('[toast]', message);
            } catch (_) { }
        }

        function isLikelyPlaceholderSource(url) {
            const u = String(url || '').toLowerCase();
            if (!u) return true;
            if (u.includes('kaa.lt/intro.mp4')) return true;
            if (u.endsWith('/intro.mp4')) return true;
            if (u.includes('/trailer') || u.includes('/preview')) return true;
            return false;
        }

        function buildSourcePanel() {
            sourcePanel.innerHTML = `<div class="panel-label">Select Server</div>`;
            allSources.forEach((src, i) => {
                const item = document.createElement('div');
                // Use currentIdx to preserve active highlight when list rebuilds after new provider arrives
                item.className = `src-item ${i === (currentIdx ?? 0) ? 'active' : ''}`;
                item.innerHTML = `<span class="src-dot"></span>${src.label}`;
                item.onclick = () => { selectSource(i); sourcePanel.classList.remove('open'); };
                sourcePanel.appendChild(item);
            });
        }

        function updateSourceUI(idx) {
            sourcePanel.querySelectorAll('.src-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        }

        function selectSource(idx) {
            const savedTime = (video && !video.ended) ? video.currentTime : 0;
            currentIdx = idx;
            updateSourceUI(idx);

            const src = allSources[idx];
            if (!src) return;

            // Remember if user prefers Dubbed or Subbed
            const label = String(src.label || '').toLowerCase();
            if (label.includes('dubbed')) {
                preferredSourceLabelMatch = 'dubbed';
                preferredAudioToken = 'dubbed';
            } else if (label.includes('subbed')) {
                preferredSourceLabelMatch = 'subbed';
                preferredAudioToken = 'subbed';
            }

            // Also remember the provider preference
            if (src.provider) {
                FORCED_PROVIDER = src.provider;
                const scopedProvider = String(src.provider || '').trim().toLowerCase();
                if (providerSeasonCatalog.has(scopedProvider)) {
                    activeMenuProvider = scopedProvider;
                }
            }

            if (MEDIA_TYPE === 'tv') {
                buildEpPanel();
                updateEpUI(curSeason, curEpisode);
            }

            playSource(idx, savedTime);
            syncUrlState();
        }

        function resetPlayerSurface() {
            if (hlsInst) { try { hlsInst.stopLoad(); hlsInst.detachMedia(); hlsInst.destroy(); } catch (_) { } hlsInst = null; }
            if (dashInst) { try { dashInst.reset(); } catch (_) { } dashInst = null; }
            if (plyr) { try { plyr.destroy(); } catch (_) { } plyr = null; }
            const wrap = document.querySelector('.player-wrap');
            if (wrap) {
                // Remove only the video element, keep the brightness overlay
                const oldVideo = wrap.querySelector('video');
                if (oldVideo) oldVideo.remove();
                
                // Also clean up any extra plyr wrappers that might have been left behind
                const extraWrappers = wrap.querySelectorAll('.plyr');
                extraWrappers.forEach(w => w.remove());

                const newVideo = document.createElement('video');
                newVideo.id = 'player-video';
                newVideo.className = 'plyr-video';
                // On iOS, autoplaying often leads to persistent loaders or audio track issues.
                // Disabling it ensures a clean user gesture when they tap play.
                newVideo.autoplay = !IS_IOS;
                newVideo.muted = IS_IOS ? true : false;
                // Force playsinline on all iOS devices to ensure track probing happens properly in the browser context.
                newVideo.playsInline = true;
                newVideo.setAttribute('playsinline', '');
                newVideo.setAttribute('webkit-playsinline', 'true');
                newVideo.crossOrigin = 'anonymous';
                newVideo.preload = 'auto';
                wrap.insertBefore(newVideo, wrap.firstChild);
            }
            video = document.getElementById('player-video');
        }

        // ----------------------------------------------------------------------------------------------------
        //  PLAY SOURCE
        // ----------------------------------------------------------------------------------------------------
        function playSource(idx, startTime = 0) {
            const src = allSources[idx];
            if (!src) return;
            const statusLabel = startTime > 0 ? 'Switching Server...' : 'Buffering...';
            setLoader(statusLabel, src.label);
            loadStream(src.url, src.isM3U8, src.isEmbed, src.referer, idx, startTime);
        }

        function proxiedStreamUrl(url, referer) {
            const rawUrl = String(url || '').trim();
            // Cinezo already returns proxy-wrapped HLS links; avoid double-proxying those.
            if (/\/m3u8-proxy\?/i.test(rawUrl)) {
                return rawUrl;
            }
            // StreamRuby HLS often rejects server-side proxy requests (403) even with referer,
            // but plays directly in browser context.
            if (/https?:\/\/[^/]*streamruby\.net\//i.test(rawUrl)) {
                return rawUrl;
            }
            const apiBaseUrl = new URL(activeApiBase || API_BASE, location.href);
            let apiOrigin = `${apiBaseUrl.protocol}//${apiBaseUrl.host}`;
            const ref = referer ? `&referer=${encodeURIComponent(referer)}` : '';
            return `${apiOrigin}/utils/proxy?url=${encodeURIComponent(rawUrl)}${ref}`;
        }

        function warmupPreviewVideo(previewVideo) {
            if (!previewVideo) return;
            try {
                previewVideo.muted = true;
                previewVideo.preload = 'auto';
                previewVideo.playsInline = true;
                previewVideo.setAttribute('playsinline', 'true');
                previewVideo.setAttribute('webkit-playsinline', 'true');

                const onReady = () => {
                    try {
                        if (isFinite(previewVideo.duration) && previewVideo.duration > 2) {
                            previewVideo.currentTime = 1.0;
                        }
                        const maybe = previewVideo.play?.();
                        if (maybe && typeof maybe.then === 'function') {
                            maybe.then(() => {
                                try { previewVideo.pause(); } catch (_) { }
                            }).catch(() => { });
                        }
                    } catch (_) { }
                };

                previewVideo.addEventListener('loadedmetadata', onReady, { once: true });
                previewVideo.addEventListener('canplay', onReady, { once: true });
            } catch (_) {
                // ignore preview warmup failures
            }
        }

        function loadStream(url, isM3U8, isEmbed, referer, srcIdx, startTime = 0) {
            console.log('loadStream:', { url, isM3U8, isEmbed, srcIdx, startTime });
            const sourceProvider = String(allSources?.[srcIdx]?.provider || '').toLowerCase();
            const resumeTargetTime = Math.max(0, Number(startTime || 0));
            const useWarmStartResume = sourceProvider === 'flixhq' && resumeTargetTime > 20;
            let nextSourceFallbackUsed = false;
            let flixhqAltServerAttempted = false;
            const failoverToNextSource = (reason = 'unknown') => {
                if (nextSourceFallbackUsed) return false;
                const nextIdx = Array.isArray(allSources)
                    ? allSources.findIndex((_, i) => i > srcIdx)
                    : -1;
                if (nextIdx < 0) return false;
                nextSourceFallbackUsed = true;
                console.warn(`[stream-failover] Switching to next source idx=${nextIdx} reason=${reason}`);
                try {
                    selectSource(nextIdx);
                    return true;
                } catch (_) {
                    return false;
                }
            };
            const tryAlternateFlixhqServer = async (reason = 'unknown') => {
                if (flixhqAltServerAttempted) return false;
                if (String(sourceProvider || '').toLowerCase() !== 'flixhq') return false;
                if (String(MEDIA_TYPE || '').toLowerCase() !== 'movie') return false;
                flixhqAltServerAttempted = true;
                const candidateServers = ['vidcloud', 'upcloud'];
                for (const serverName of candidateServers) {
                    try {
                        const watchUrl = `${API_BASE}/watch?id=${encodeURIComponent(String(TMDB_ID || ''))}&type=movie&provider=flixhq&directOnly=true&server=${encodeURIComponent(serverName)}`;
                        const { res } = await fetchJsonWithApiFallback(watchUrl, {
                            signal: AbortSignal.timeout(30000),
                        });
                        if (!res.ok) continue;
                        const payload = await res.json();
                        const rows = Array.isArray(payload?.sources) ? payload.sources : [];
                        const mapped = rows
                            .filter((src) => {
                                const srcUrl = String(src?.url || '');
                                if (!srcUrl || isBrokenEmbedUrl(srcUrl) || isLikelyPlaceholderSource(srcUrl)) return false;
                                return srcUrl !== String(url || '');
                            })
                            .map((src, i) => {
                                const low = String(src.url || '').toLowerCase();
                                const isM3U8 = src.isM3U8 || src.isM3u8 || low.includes('.m3u8') || low.includes('m3u8-proxy') || low.includes('getm3u8');
                                const isEmbed = src.isEmbed ?? (!isM3U8 && !low.includes('.mp4'));
                                return {
                                    label: `FlixHQ - ${serverName} backup ${i + 1}`,
                                    url: src.url,
                                    isM3U8,
                                    isEmbed,
                                    referer: src.referer || payload?.headers?.Referer || null,
                                    provider: 'flixhq',
                                };
                            });
                        if (!mapped.length) continue;
                        allSources.push(...mapped);
                        buildSourcePanel();
                        sourceBtn.style.display = 'flex';
                        console.warn(`[stream-failover] Injected FlixHQ ${serverName} backup source(s) due to ${reason}`);
                        selectSource(allSources.length - mapped.length);
                        return true;
                    } catch (_) {
                        // try next server candidate
                    }
                }
                return false;
            };
            const effectiveStartTime = useWarmStartResume ? 0 : resumeTargetTime;
            skipInitialCanplaySeekOnce = useWarmStartResume;
            window.previewSeeking = false;
            isSourceSwitching = true;
            hlsFragErrorBurst = 0;
            hlsSessionIsFragile = false;
            initialSeekDone = false;
            lastRequestedPlaybackTarget = effectiveStartTime;
            jumpCooldownUntil = 0;
            jumpInFlightUntil = 0;
            pendingJumpTarget = null;
            if (jumpRecoveryTimer) {
                clearTimeout(jumpRecoveryTimer);
                jumpRecoveryTimer = null;
            }
            let sameSourceRecoveryLock = false;
            const recoveryKey = `${srcIdx}|${String(url || '')}`;
            if (sameSourceRecoverKey !== recoveryKey) {
                sameSourceRecoverKey = recoveryKey;
                sameSourceRecoverCount = 0;
            }
            
            // Reset state for new load
            activeSubtitleTrackIndex = -1;
            renderSubtitleOverlayFromTrack(null);
            
            const previewVideo = document.getElementById('previewVideo');
            if (previewVideo) previewVideo.muted = true;

            // Check if we can seek instead of reloading for the same source
            if (hlsInst && url === currentStreamUrl && isM3U8 && Hls.isSupported() && video && isFinite(video.duration) && effectiveStartTime > 0 && effectiveStartTime < video.duration) {
                console.log('Seamless seek: seeking to', effectiveStartTime, 'without reloading HLS');
                isSourceSwitching = false;
                video.currentTime = effectiveStartTime;
                hideLoader();
                return;
            }

            currentStreamUrl = String(url || '');
            currentStreamReferer = referer || null;
            currentStreamProvider = sourceProvider;

            // Visual Bridge: capture current frame before we wipe anything.
            // Skip on the very first load — the #loader (with cover art) is already
            // covering everything, so there's no black gap to bridge.
            if (!isFirstLoad) {
                captureVideoFrameToOverlay();
            } else {
                showLoader();
            }

            // Capture volume/mute state before teardown so we can restore it
            const savedVolume = (video && isFinite(video.volume)) ? video.volume : 1;
            const savedMuted = video ? video.muted : false;

            // Tear down previous
            if (hlsInst) { try { hlsInst.stopLoad(); hlsInst.detachMedia(); hlsInst.destroy(); } catch (_) { } hlsInst = null; }
            if (window.previewHlsInst) { try { window.previewHlsInst.stopLoad(); window.previewHlsInst.detachMedia(); window.previewHlsInst.destroy(); } catch (_) { } window.previewHlsInst = null; }
            if (dashInst) { try { dashInst.reset(); } catch (_) { } dashInst = null; }
            if (window.previewDashInst) { try { window.previewDashInst.reset(); } catch (_) { } window.previewDashInst = null; }
            if (plyr) { try { plyr.destroy(); } catch (_) { } plyr = null; }

            // Prepare video element with extra attributes for better mobile/chrome compatibility
            // Overlay is already 'active' from captureVideoFrameToOverlay() — keep it visible
            // so there's NO flash of a resized/blank video during teardown
            const overlay = document.getElementById('transition-overlay');
            if (!isFirstLoad && overlay && !overlay.classList.contains('active')) {
                overlay.style.backgroundColor = '#000';
                overlay.classList.add('active');
            }

            const wrap = document.querySelector('.player-wrap');
            if (wrap) {
                // Preserve the brightness overlay to keep gesture functionality working
                const oldVideo = wrap.querySelector('video');
                if (oldVideo) wrap.removeChild(oldVideo);
                const newVideo = document.createElement('video');
                newVideo.id = 'player-video';
                newVideo.className = 'plyr-video';
                newVideo.autoplay = !IS_IOS;
                newVideo.muted = IS_IOS ? true : false;
                // Force playsinline on all iOS devices to ensure track probing happens properly in the browser context.
                newVideo.playsInline = true;
                newVideo.setAttribute('playsinline', '');
                newVideo.setAttribute('webkit-playsinline', 'true');
                newVideo.crossOrigin = 'anonymous';
                newVideo.preload = 'auto';
                wrap.insertBefore(newVideo, wrap.firstChild);
            }
            video = document.getElementById('player-video');
            if (video) { video.volume = savedVolume; video.muted = savedMuted; } // Restore volume across switches

            let startT = effectiveStartTime;
            let overlayHidden = false;
            const hideOverlay = () => {
                if (overlayHidden) return;

            const cleanup = () => {
                if (video && video.currentTime > startT + 0.5) {

                }

            video.addEventListener('timeupdate', cleanup);
            // Safety: hide overlay after 6s max so it never gets stuck
            setTimeout(hideOverlay, 6000);

            // Volume boost
            setVolumeBoost(volumeBoost);

            const initPlyr = () => {
                console.log('Initializing Plyr...');
                // Ensure subtitles are applied to the NEW video element. 
                // Sync version for native iOS probe early-takeover, async for others.
                applyExternalSubtitlesToVideoSync(video);
                applyExternalSubtitlesToVideo(video);
                // Extra sync for iOS just in case
                if (IS_IOS) setTimeout(() => applyExternalSubtitlesToVideoSync(video), 600);
                const qualities = hlsInst
                    ? [...new Set(hlsInst.levels.map(l => l.height).filter(Boolean))]
                    : [];
                const maxH = qualities.length ? Math.max(...qualities) : 720;

                plyr = new Plyr(video, {
                    blankVideo: 'data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAADpmcmVlAAAAAG1kYXQ=',
                    autoplay: !IS_IOS,
                    muted: video.muted,
                    clickToPlay: false,
                    keyboard: false,
                    controls: [
                        'play-large',
                        'play',
                        'rewind',
                        'fast-forward',
                        'progress',
                        'current-time',
                        'duration',
                        'mute',
                        'volume',
                        'settings',
                        'captions',
                        'pip',
                        'airplay',
                        'fullscreen'
                    ],
                    captions: { active: false, update: true, language: 'auto' },
                    quality: qualities.length
                        ? { default: maxH, options: [0, ...qualities], forced: true, onChange: changeQuality }
                        : {},
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                });
                bindVideoEvents();
                syncTimeUI();
                updateMuteIcon();
                updateCaptionsButtonVisibility();
                showControlSurface();

                // Load subtitles after player is ready
                plyr.on('ready', async () => {
                    // Hide loader on iOS or if not first load
                    if (!isFirstLoad || IS_IOS) hideLoader();
                });

                // Sync play icon in case video was already playing when Plyr initialized
                if (video && !video.paused) setPlayIcon(true);
                plyr.on('canplay', hideIfReady);
                plyr.on('playing', () => {
                    isFirstLoad = false;
                    hideLoader();
                    try { hideTransitionOverlay(); } catch (_) { }
                });
                plyr.on('play', () => {
                    setPlayIcon(true);
                    showControlSurface();
                });
                plyr.on('pause', () => {
                    setPlayIcon(false);
                    controlSurface.classList.add('visible');
                });
            };

            const recoverSameSource = (reason = 'unknown') => {
                if (sameSourceRecoveryLock) return;
                sameSourceRecoveryLock = true;
                const currentTime = (video && video.currentTime > 0) ? video.currentTime : startTime;
                sameSourceRecoverCount += 1;
                console.warn(`[hls] Recovering same source (attempt ${sameSourceRecoverCount}) reason=${reason}`);

                // Capture last visible frame immediately to prevent black screen flash during rebuild
                try { captureVideoFrameToOverlay(); } catch (_) { }

                const maxAttempts = reason === 'fatal_network_error' ? 1 : 8;

                if (hlsInst && isM3U8 && sameSourceRecoverCount <= maxAttempts) {
                    try {
                        const jump = sameSourceRecoverCount > 12 ? 2.6 : (sameSourceRecoverCount > 5 ? 1.4 : 0.25);
                        const pendingTargetTime = pendingJumpTarget?.time;
                        const near = Math.max(0, Number.isFinite(pendingTargetTime) ? pendingTargetTime : Number(currentTime || 0) + jump);
                        const resumeAt = Math.max(0, Number.isFinite(pendingTargetTime) ? pendingTargetTime : Number(video?.currentTime || near));
                        showBufferingOverlay();

                        // Always do a clean in-place HLS rebuild.
                        // recoverMediaError() alone leaves a blank video when the pipeline is truly broken.
                        // svSwitchHlsSourceSilent destroys the old instance and rebuilds from scratch,
                        // ensuring video resumes at the correct time without a black frame.
                        pendingJumpTarget = { time: resumeAt, reason: pendingJumpTarget?.reason || 'recover' };
                        const isForced = reason === 'fatal_frag_parse_jump'
                            || reason === 'watchdog_stall'
                            || reason === 'buffer_full_unrecoverable';
                        setTemporaryRecoveryQuality(isForced ? 7000 : 5000);
                        svSwitchHlsSourceSilent(url, referer, () => {
                            hlsFragErrorBurst = 0;
                            hlsSessionIsFragile = false;
                            hideBufferingOverlaySoon(120);
                            if (video && video.paused) {
                                Promise.resolve(video.play()).catch(() => {
                                    video.muted = true;
                                    Promise.resolve(video.play()).catch(() => { });
                                });
                            }
                        }, null, true);
                    } catch (_) { }
                    setTimeout(() => { sameSourceRecoveryLock = false; }, 600);
                    return;
                }

                // Exhausted all recovery attempts
                sameSourceRecoveryLock = false;
                if (failoverToNextSource(`same_source_exhausted:${reason}`)) {
                    return;
                }
                tryAlternateFlixhqServer(`same_source_exhausted:${reason}`).then((switched) => {
                    if (switched) return;
                    showError(
                        'Stream Decode Error',
                        'Playback could not recover. Please choose another server manually.'
                    );
                });
            };

            const isMPD = String(url || '').toLowerCase().includes('.mpd');

            // 1. HLS with hls.js
            if (isM3U8 && Hls.isSupported()) {
                console.log('Branch: HLS.js');
                const streamUrl = proxiedStreamUrl(url, referer);
                // Track whether we've already tried the raw (unproxied) URL.
                // Some CDNs (e.g. satoru.one) block reverse-proxy user agents with 502/403
                // but allow direct browser access, so we fall back to raw after proxy failure.
                let hlsDirectFallbackAttempted = false;

                const recoverWithDirectUrl = (resumeTime) => {
                    if (hlsDirectFallbackAttempted) return false;
                    hlsDirectFallbackAttempted = true;
                    const directUrl = String(url || '').trim();
                    if (!directUrl || directUrl === streamUrl) return false; // same URL — nothing to try
                    console.warn('[hls] Proxy returned error; retrying with direct (unproxied) URL:', directUrl);
                    showBufferingOverlay();
                    try {
                        if (hlsInst) { hlsInst.stopLoad(); hlsInst.detachMedia(); hlsInst.destroy(); hlsInst = null; }
                        hlsInst = svCreateHlsInstance(resumeTime);
                        svAttachHlsListeners(hlsInst, resumeTime, () => {
                            // If Plyr was never initialized (proxy failed before MANIFEST_PARSED),
                            // we must initialize it now so the player controls appear.

                            hideBufferingOverlaySoon(120);
                            isFirstLoad = false;
                            hideLoader();
                            if (video && video.paused) {
                                Promise.resolve(video.play()).catch(() => { video.muted = true; Promise.resolve(video.play()).catch(() => {}); });
                            }
                        }, (reason2) => {
                            // Direct URL also failed — give up
                            console.warn('[hls] Direct URL also failed:', reason2);
                            sameSourceRecoveryLock = false;
                            showError('Stream Error', 'Playback could not recover. Please choose another server.');
                        });
                        hlsInst.loadSource(directUrl);
                        hlsInst.attachMedia(video);
                    } catch (_) { return false; }
                    return true;
                };

                // Wrap recoverSameSource to inject direct-URL step before giving up
                const recoverSameSourceWithDirectFallback = (reason) => {
                    if (reason === 'fatal_network_error' && !hlsDirectFallbackAttempted) {
                        const resumeTime = Number(video?.currentTime || startTime || 0);
                        const tried = recoverWithDirectUrl(resumeTime);
                        if (tried) {
                            setTimeout(() => { sameSourceRecoveryLock = false; }, 600);
                            return;
                        }
                    }

                    // Repeated timeout-like stalls should failover to the next available source quickly.
                    const timeoutLikeReason = String(reason || '').includes('watchdog') || String(reason || '').includes('timeout') || String(reason || '').includes('network');
                    if (timeoutLikeReason && sameSourceRecoverCount >= 2) {
                        if (failoverToNextSource(`timeout_like:${reason}`)) {
                            sameSourceRecoveryLock = false;
                            return;
                        }
                        tryAlternateFlixhqServer(`timeout_like:${reason}`).then((switched) => {
                            if (switched) return;
                            recoverSameSource(reason);
                        });
                        return;
                    }
                    recoverSameSource(reason);
                };

                // Startup watchdog: if this source remains stuck in waiting state, try next source.
                let hlsStartupHasProgress = false;
                const markHlsProgress = () => {
                    if (!video) return;
                    if ((video.currentTime || 0) > 0.2) {
                        hlsStartupHasProgress = true;
                        clearHlsStartupWatchdog();
                    }
                };
                video && video.addEventListener('timeupdate', markHlsProgress);
                video && video.addEventListener('playing', markHlsProgress);
                const hlsStartupWatchdog = setTimeout(() => {
                    if (hlsStartupHasProgress) return;
                    if (currentIdx !== srcIdx) return;
                    console.warn('[hls] startup timeout: source did not begin playback, attempting failover');
                    const switched = failoverToNextSource('hls_startup_timeout');
                    if (!switched) {
                        tryAlternateFlixhqServer('hls_startup_timeout').then((altSwitched) => {
                            if (!altSwitched) recoverSameSourceWithDirectFallback('hls_startup_timeout');
                        });
                    }
                }, 18000);
                const clearHlsStartupWatchdog = () => {
                    clearTimeout(hlsStartupWatchdog);
                    video && video.removeEventListener('timeupdate', markHlsProgress);
                    video && video.removeEventListener('playing', markHlsProgress);
                };

                hlsInst = svCreateHlsInstance(effectiveStartTime);
                svAttachHlsListeners(hlsInst, effectiveStartTime, () => {
                    initPlyr();
                    if (useWarmStartResume && resumeTargetTime > 0) {
                        setTimeout(() => {
                            if (!video || !isFinite(video.duration)) return;
                            if (resumeTargetTime >= video.duration) return;
                            if (Math.abs(Number(video.currentTime || 0) - resumeTargetTime) < 1) return;
                            console.log('[flixhq] warm-start resume seek ->', resumeTargetTime);
                            applyGuardedJump(resumeTargetTime, 'resume');
                        }, 1200);
                    }
                    // On first load, wait for real video frames before hiding the loader
                    // so the cover-art loader stays visible the whole time instead of
                    // showing a black gap between loader and first frame.
                    if (isFirstLoad) {
                        const onFirstFrame = () => {
                            isFirstLoad = false;
                            hideLoader();
                            video && video.removeEventListener('timeupdate', onFirstFrame);
                        };
                        video && video.addEventListener('timeupdate', onFirstFrame);
                        // Safety: hide after 10s no matter what
                        setTimeout(() => { if (isFirstLoad) { isFirstLoad = false; hideLoader(); } }, 10000);
                        setTimeout(clearHlsStartupWatchdog, 30000);
                    }
                if (!IS_IOS) {
                    video.play().catch(() => {
                        video.muted = true;
                        video.play()
                            .then(() => setPlayIcon(true))
                            .catch(() => hideLoader());
                    }).then(() => {
                        if (video && !video.paused) setPlayIcon(true);
                    });
                } else {
                    // On iOS, we just make sure we're ready for the user to tap play
                    setPlayIcon(false);
                }
                }, recoverSameSourceWithDirectFallback);

                hlsInst.loadSource(streamUrl);
                hlsInst.attachMedia(video);
                video.preload = 'auto';

                const previewVideo = document.getElementById('previewVideo');
                const currentSourceProvider = String(allSources?.[srcIdx]?.provider || '').toLowerCase();
                const usePreviewHls = shouldUsePreviewHls(url, currentSourceProvider);
                if (previewVideo) {
                    window.previewUseCanvasFallbackOnly = !usePreviewHls;

                    if (!usePreviewHls) {
                        try {
                            if (window.previewHlsInst) {
                                window.previewHlsInst.stopLoad();
                                window.previewHlsInst.detachMedia();
                                window.previewHlsInst.destroy();
                            }
                        } catch (_) { }
                        window.previewHlsInst = null;
                        window.previewHlsErrorCount = 0;
                        window.previewHlsIsUnhealthy = true;
                        console.log('[preview] Using canvas-only preview mode for stream stability.');
                        warmupPreviewVideo(previewVideo);
                    } else {
                    window.previewHlsInst = svCreateHlsInstance(0, true);
                    window.previewHlsInst.on(Hls.Events.MANIFEST_LOADED, () => {
                        // ENHANCED: Use level 1 (if available) instead of always lowest for better quality
                        if (window.previewHlsInst.levels && window.previewHlsInst.levels.length > 1) {
                            const targetLevel = 1; // Medium quality
                            window.previewHlsInst.autoLevelCapping = targetLevel;
                            window.previewHlsInst.currentLevel = targetLevel;
                            window.previewHlsInst.nextLevel = targetLevel;
                            window.previewHlsInst.loadLevel = targetLevel;
                            console.log('[preview] Using quality level 1 for better thumbnails');
                        } else {
                            // Fallback to level 0 if only one level available
                            window.previewHlsInst.autoLevelCapping = 0;
                            window.previewHlsInst.currentLevel = 0;
                            window.previewHlsInst.nextLevel = 0;
                            window.previewHlsInst.loadLevel = 0;
                        }
                    });

                    // ENHANCED: Better error handling for preview stream
                    // Disable preview seeking during main video startup (first 8 seconds)
                    window.previewSeekingDisabledUntil = Date.now() + 8000;

                    window.previewHlsInst.on(Hls.Events.ERROR, (_, data) => {
                        window.previewHlsErrorCount = (window.previewHlsErrorCount || 0) + 1;

                        // Non-fatal errors - mark as unhealthy but limit retries to avoid resource exhaustion
                        if (!data.fatal) {
                            console.warn(`[preview] Non-fatal error (count: ${window.previewHlsErrorCount}): ${data.details}`);
                            // Only retry once for non-fatal errors to avoid hammering connection
                            if (window.previewHlsErrorCount === 1 || window.previewHlsErrorCount === 3) {
                                window.previewHlsIsUnhealthy = true;
                                setTimeout(() => {
                                    if (window.previewHlsInst && window.previewHlsIsUnhealthy && !video?.seeking) {
                                        try {
                                            console.log('[preview] Retrying after non-fatal error (limited)...');
                                            window.previewHlsInst.recoverMediaError?.();
                                        } catch (_) { }
                                    }
                                }, 1500); // Increased delay to let main stream priority
                            }
                            // After 5 consecutive non-fatal errors, switch to fallback mode permanently
                            if (window.previewHlsErrorCount >= 5) {
                                console.warn('[preview] Too many non-fatal errors, switching to canvas fallback permanently');
                                window.previewHlsIsUnhealthy = true;
                                window.previewUseCanvasFallbackOnly = true; // Force canvas fallback
                            }
                            return;
                        }

                        // Fatal errors - escalate recovery with more conservative timing
                        console.warn(`[preview] Fatal error (attempt ${window.previewHlsErrorCount}): ${data.details}`);
                        window.previewHlsIsUnhealthy = true;

                        // Only one recovery attempt per consecutive fatals
                        if (window.previewHlsErrorCount <= 2) {
                            try {
                                console.log('[preview] Fatal: attempting stopLoad for recovery');
                                window.previewHlsInst.stopLoad();
                            } catch (_) { }
                        } else {
                            // Multiple failures - signal that we should use main video canvas fallback
                            console.warn('[preview] Fatal errors persistent, fallback to main video capture enabled');
                            window.previewUseCanvasFallbackOnly = true; // Force canvas fallback
                        }
                    });

                    window.previewHlsInst.loadSource(streamUrl);
                    window.previewHlsInst.attachMedia(previewVideo);

                    // Track preview errors to know when to fallback
                    window.previewHlsErrorCount = 0;
                    window.previewHlsIsUnhealthy = false;

                    warmupPreviewVideo(previewVideo);
                    }
                }

            } else if (isM3U8 && (
                video?.canPlayType?.('application/vnd.apple.mpegurl') ||
                video?.canPlayType?.('application/x-mpegURL') ||
                IS_IOS ||
                IS_SAFARI
            )) {
                console.log('Branch: Native HLS (iOS Safari/WebKit)');
                // On iOS, crossOrigin='anonymous' triggers CORS preflight for every segment
                // request, which can cause failures when the CDN doesn't support CORS.
                // Remove it for native HLS — canvas thumbnail capture isn't used on iOS.
                // Exception: 'justanime' uses external subtitles resolving to a cross-origin /utils/vtt.
                // If we remove crossorigin, iOS WebKit instantly crashes the <video> when the <track> is added.
                video.setAttribute('crossorigin', 'anonymous');
                video.crossOrigin = 'anonymous';

                // CRITICAL SYNC INJECTION for iOS Safari/AVKit.
