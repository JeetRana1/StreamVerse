        function setVolumeBoost(level) {
            if (!video) return;
            // Extended: 0 = mute, 100 = normal, 200 = double boost
            volumeBoost = Math.max(0, Math.min(200, level));

            if (volumeBoost !== 100 || IS_IOS) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // If sourceNode doesn't exist or is attached to the wrong element
                if (!sourceNode || sourceNode.mediaElement !== video) {
                    try {
                        if (sourceNode) sourceNode.disconnect();
                        sourceNode = audioCtx.createMediaElementSource(video);
                        if (!gainNode) gainNode = audioCtx.createGain();
                        sourceNode.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                    } catch (e) {
                        console.warn('AudioContext boost failed:', e);
                        return;
                    }
                }
            }

            if (audioCtx && gainNode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                gainNode.gain.value = volumeBoost / 100;
            }

            const boostValEl = document.querySelector('.boost-value');
            if (boostValEl) {
                boostValEl.textContent = volumeBoost > 100 ? `${volumeBoost}%` : 'Off';
            }

            const boostSlider = document.querySelector('.boost-slider');
            if (boostSlider) {
                boostSlider.value = String(volumeBoost);
                const percent = (volumeBoost - 100) + '%';
                boostSlider.style.setProperty('--boost-percent', percent);
            }

            // Update tick highlights
            const ticks = document.querySelectorAll('.tick');
            const activeCount = Math.round(((volumeBoost - 100) / 100) * (ticks.length - 1));
            ticks.forEach((t, i) => {
                t.classList.toggle('active', i <= activeCount && volumeBoost > 100);
            });
        }

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function setPlayIcon(isPlaying) {
            if (!playPauseBtn) return;
            playPauseBtn.innerHTML = isPlaying
                ? '<i class="fa-solid fa-pause"></i>'
                : '<i class="fa-solid fa-play"></i>';
        }

        function updateMuteIcon() {
            if (!muteBtn || !video) return;
            if (video.muted || video.volume === 0) muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            else if (video.volume < 0.5) muteBtn.innerHTML = '<i class="fa-solid fa-volume-low"></i>';
            else muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
        }

        function updateVolumeFromClientX(clientX, slider) {
            if (!slider || !Number.isFinite(clientX) || !video) return;
            if (!slider) return;
            const rect = slider.getBoundingClientRect();
            if (!rect || !Number.isFinite(rect.width) || rect.width <= 0) return;
            const clamped = Math.min(rect.right, Math.max(rect.left, clientX));
            const percent = ((clamped - rect.left) / rect.width) * 100;
            const val = Math.max(0, Math.min(100, percent));
            slider.value = String(Math.round(val));
            slider.style.setProperty('--vol-percent', `${val}%`);
            video.volume = val / 100;
            video.muted = val === 0;
            updateMuteIcon();
        }

        function buildVolumeMenu() {
            if (!volumeMenu || !video) return;
            volumeMenu.innerHTML = '';
            volumeSliderEl = null;
            volumeToggleEl = null;

            const row = document.createElement('div');
            row.className = 'volume-row';

            const toggle = document.createElement('button');
            toggle.className = 'volume-toggle';
            toggle.type = 'button';
            toggle.innerHTML = video.muted || video.volume === 0
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
            toggle.onclick = (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                if (!video.muted && video.volume === 0) video.volume = 0.5;
                updateMuteIcon();
                if (volumeSliderEl) {
                    const next = Math.round((video.muted ? 0 : video.volume) * 100);
                    volumeSliderEl.value = String(next);
                    volumeSliderEl.style.setProperty('--vol-percent', `${next}%`);
                }
                if (volumeToggleEl) {
                    volumeToggleEl.innerHTML = video.muted || video.volume === 0
                        ? '<i class="fa-solid fa-volume-xmark"></i>'
                        : '<i class="fa-solid fa-volume-high"></i>';
                }
            };

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = '0';
            slider.max = '100';
            slider.step = '1';
            slider.className = 'volume-slider';
            slider.value = String(Math.round((video.muted ? 0 : video.volume) * 100));
            slider.style.setProperty('--vol-percent', `${slider.value}%`);
            slider.addEventListener('input', (e) => {
                const val = Math.max(0, Math.min(100, Number.parseInt(e.target.value || '0', 10)));
                video.volume = val / 100;
                video.muted = val === 0;
                slider.style.setProperty('--vol-percent', `${val}%`);
                updateMuteIcon();
                // If sliding down, maybe reset boost?
                if (val < 100 && volumeBoost > 100) {
                    setVolumeBoost(100);
                }
            });
            slider.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                slider.setPointerCapture?.(e.pointerId);
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointermove', (e) => {
                if (!slider.hasPointerCapture?.(e.pointerId)) return;
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointerup', (e) => {
                if (slider.hasPointerCapture?.(e.pointerId)) slider.releasePointerCapture?.(e.pointerId);
            });

            volumeSliderEl = slider;
            volumeToggleEl = toggle;
            row.appendChild(toggle);
            row.appendChild(slider);
            volumeMenu.appendChild(row);

            // Boost Row
            const boostRow = document.createElement('div');
            boostRow.className = 'volume-boost-row';

            const boostHeader = document.createElement('div');
            boostHeader.className = 'boost-header';

            const boostLabel = document.createElement('span');
            boostLabel.className = 'boost-label';
            boostLabel.textContent = 'Extra Volume';

            const boostValue = document.createElement('span');
            boostValue.className = 'boost-value';
            boostValue.textContent = volumeBoost > 100 ? `${volumeBoost}%` : 'Off';

            boostHeader.appendChild(boostLabel);
            boostHeader.appendChild(boostValue);
            boostRow.appendChild(boostHeader);

            const sliderCont = document.createElement('div');
            sliderCont.className = 'boost-slider-container';

            const ticksCont = document.createElement('div');
            ticksCont.className = 'boost-ticks';
            // Create 6 ticks from 100% to 200%
            for (let i = 0; i < 6; i++) {
                const t = document.createElement('div');
                t.className = 'tick';
                ticksCont.appendChild(t);
            }
            sliderCont.appendChild(ticksCont);

            const bSlider = document.createElement('input');
            bSlider.type = 'range';
            bSlider.min = '100';
            bSlider.max = '200';
            bSlider.step = '2'; // small steps for smoothness
            bSlider.className = 'boost-slider';
            bSlider.value = String(volumeBoost);
            bSlider.oninput = (e) => {
                const val = parseInt(e.target.value, 10);
                if (video.volume < 1.0 && val > 100) {
                    video.volume = 1.0;
                    if (volumeSliderEl) {
                        volumeSliderEl.value = '100';
                        volumeSliderEl.style.setProperty('--vol-percent', '100%');
                    }
                }
                setVolumeBoost(val);
            };

            sliderCont.appendChild(bSlider);
            boostRow.appendChild(sliderCont);
            volumeMenu.appendChild(boostRow);

            // Initial tick update
            setTimeout(() => setVolumeBoost(volumeBoost), 0);
        }

        function syncTimeUI() {
            if (!video) return;
            durationTimeEl.textContent = formatTime(video.duration);
            if (isSeekDragging && Number.isFinite(pendingSeekPercent) && isFinite(video.duration) && video.duration > 0) {
                const previewTimeSec = (pendingSeekPercent / 100) * video.duration;
                currentTimeEl.textContent = formatTime(previewTimeSec);
                seekBar.style.setProperty('--seek-percent', `${pendingSeekPercent}%`);
                return;
            }

            currentTimeEl.textContent = formatTime(video.currentTime);
            if (isFinite(video.duration) && video.duration > 0) {
                // Update slider UI color fill percentage AND native thumb position
                const p = (video.currentTime / video.duration) * 100;
                seekBar.value = String(p);
                seekBar.style.setProperty('--seek-percent', p + '%');

                // Also update markers in case video duration unexpectedly changed
                updateSkipMarkers();
                updateUrlTime();
        }
    }

        let _saveProgressLastAt = 0;
        function saveProgress() {
            if (!video || !currentMediaInfo) return;
            const now = Date.now();
            // Throttle: only write to localStorage every 5 seconds
            if (now - _saveProgressLastAt < 5000) return;
            _saveProgressLastAt = now;

            const currentTime = video.currentTime;
            const duration = video.duration;
            if (!isFinite(currentTime) || !isFinite(duration) || duration <= 0) return;

            // Don't save if we are at the very beginning
            if (currentTime < 5) return; 

            // If we are at the end (90%+ and 20s remaining), remove from continue watching
            if (currentTime / duration > 0.9 && duration - currentTime < 20) {
                removeFromContinueWatching(TMDB_ID, MEDIA_TYPE);
                return;
            }

            const seasonRef = tvSeasons?.[Number(curSeason || 0)] || null;
            const episodeRef = seasonRef?.episodes?.[Number(curEpisode || 0)] || null;
            const seasonNoRaw = Number(seasonRef?.seasonNo);
            const seasonNo = Number.isFinite(seasonNoRaw) && seasonNoRaw > 0
                ? seasonNoRaw
                : (Number(curSeason || 0) + 1);
            const episodeNoRaw = Number(episodeRef?.episode || episodeRef?.number || episodeRef?.episodeNum);
            const episodeNo = Number.isFinite(episodeNoRaw) && episodeNoRaw > 0
                ? episodeNoRaw
                : (Number(curEpisode || 0) + 1);

            const item = {
                id: TMDB_ID,
                type: MEDIA_TYPE,
                title: document.getElementById('media-title').textContent,
                poster: currentCoverUrl,
                currentTime: currentTime,
                duration: duration,
                lastUpdated: now,
                provider: FORCED_PROVIDER || lastSuccessfulProvider || '',
                seasonNo,
                episodeNo,
                seasonIndex: Number(curSeason || 0),
                episodeIndex: Number(curEpisode || 0),
                audio: preferredAudioToken || ''
            };

            let list = [];
            try {
                const raw = localStorage.getItem('sv_continue_watching');
                if (raw) list = JSON.parse(raw);
            } catch (e) {}

            if (!Array.isArray(list)) list = [];

            // Remove existing entry for this media
            list = list.filter(i => !(i.id === item.id && i.type === item.type));

            // Add to front
            list.unshift(item);

            // Keep only top 20
            if (list.length > 20) list = list.slice(0, 20);

            // Try to write; if quota exceeded, evict older entries and retry once
            try {
                localStorage.setItem('sv_continue_watching', JSON.stringify(list));
            } catch (e) {
                try {
                    // Aggressively trim to 5 items and retry
                    const trimmed = list.slice(0, 5);
                    localStorage.setItem('sv_continue_watching', JSON.stringify(trimmed));
                } catch (_) {
                    // Storage completely full — skip silently
                }
            }
        }

        function removeFromContinueWatching(id, type) {
            try {
                const raw = localStorage.getItem('sv_continue_watching');
                if (!raw) return;
                let list = JSON.parse(raw);
                if (!Array.isArray(list)) return;
                list = list.filter(i => !(i.id === id && i.type === type));
                localStorage.setItem('sv_continue_watching', JSON.stringify(list));
            } catch (e) {}
        }

        function updateUrlTime() {
            if (!video || !initialSeekDone) return;
            const t = Math.floor(video.currentTime);
            const u = new URL(location.href);
            // Don't update if same to avoid unnecessary history churn
            if (u.searchParams.get('t') === String(t)) return;
            u.searchParams.set('t', t);
            history.replaceState(null, '', u.toString());
        }

        function resetAnimeSkipState() {
            animeSkipSegments = { intro: null, outro: null };
            skippedSegments = { intro: false, outro: false };
            hasApiSkipSegments = false;
            _lastSkipUiTime = 0;
            _skipBtnWasVisible = false;
            _clearSkipCountdown();
            if (skipSegmentBtn) {
                skipSegmentBtn.style.display = 'none';
                skipSegmentBtn.textContent = '';
                skipSegmentBtn.classList.remove('counting', 'countdown-paused');
            }
            updateSkipMarkers(); // Clear markers from seekbar
        }

        let aniSkipFetchStatus = 'none'; // 'none', 'fetching', 'success', 'failed'

        function normalizeSegmentWindow(segment) {
            if (!segment) return null;
            const start =
                Number(segment.start ?? segment.from ?? segment.begin ?? segment.startTime ?? segment[0]);
            const end =
                Number(segment.end ?? segment.to ?? segment.finish ?? segment.endTime ?? segment[1]);
            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
            if (end <= start) return null;
            return { start: Math.max(0, start), end: Math.max(0, end) };
        }

        function applyApiSkipSegments(payload) {
            if (!payload || !currentIsLikelyAnime) return false;

            const intro = normalizeSegmentWindow(
                payload.intro ||
                payload.skip?.intro ||
                payload.skips?.intro ||
                payload.timestamps?.intro
            );
            const outro = normalizeSegmentWindow(
                payload.outro ||
                payload.skip?.outro ||
                payload.skips?.outro ||
                payload.timestamps?.outro
            );

            if (!intro && !outro) {
                updateSkipMarkers();
                return false;
            }
            animeSkipSegments.intro = intro;
            animeSkipSegments.outro = outro;
            hasApiSkipSegments = true;
            aniSkipFetchStatus = 'success';
            updateSkipMarkers();
            return true;
        }

        function updateSkipMarkers() {
            const container = document.getElementById('skipMarkerContainer');
            if (!container) return;
            container.innerHTML = '';

            if (!hasApiSkipSegments || !video || !video.duration || !isFinite(video.duration) || video.duration <= 0) return;

            const dur = video.duration;
            const segments = [];
            if (animeSkipSegments.intro) segments.push({ ...animeSkipSegments.intro, type: 'intro' });
            if (animeSkipSegments.outro) segments.push({ ...animeSkipSegments.outro, type: 'outro' });

            segments.forEach(seg => {
                if (seg.start >= 0 && seg.end <= dur && seg.end > seg.start) {
                    const startPct = (seg.start / dur) * 100;
                    const endPct = (seg.end / dur) * 100;
                    const widthPct = endPct - startPct;

                    const marker = document.createElement('div');
                    marker.className = 'skip-marker';
                    if (seg.type) marker.dataset.type = seg.type;
                    marker.style.left = startPct + '%';
                    marker.style.width = widthPct + '%';
                    container.appendChild(marker);
                }
            });
        }

        function parseAniSkipResults(payload) {
            const results = Array.isArray(payload?.results) ? payload.results : [];
            let intro = null;
            let outro = null;
            for (const entry of results) {
                const type = String(entry?.skipType || entry?.skip_type || '').toLowerCase();
                const interval = entry?.interval || {};
                const seg = normalizeSegmentWindow({
                    start: interval.startTime ?? interval.start_time ?? entry?.startTime ?? entry?.start_time,
                    end: interval.endTime ?? interval.end_time ?? entry?.endTime ?? entry?.end_time,
                });
                if (!seg) continue;
                if (!intro && (type === 'op' || type === 'mixed-op' || type === 'opening')) intro = seg;
                if (!outro && (type === 'ed' || type === 'mixed-ed' || type === 'ending')) outro = seg;
            }
            return { intro, outro };
        }

        function getTitleMatchScore(media, queryTitle) {
            const norm = (v) => normalizeAnimeSearchQuery(v || '').toLowerCase();
            const q = norm(queryTitle);
            if (!q) return 0;

            const titles = [
                norm(media?.title?.english),
                norm(media?.title?.romaji),
                norm(media?.title?.native),
            ].filter(Boolean);
            if (!titles.length) return 0;

            let score = 0;
            for (const t of titles) {
                if (t === q) score = Math.max(score, 100);
                else if (t.includes(q) || q.includes(t)) score = Math.max(score, 70);
                else {
                    const qWords = q.split(' ').filter(Boolean);
                    const tWords = t.split(' ').filter(Boolean);
                    const common = qWords.filter((w) => tWords.includes(w)).length;
                    if (common > 0) {
                        const overlap = common / Math.max(1, qWords.length);
                        score = Math.max(score, Math.floor(overlap * 60));
                    }
                }
            }
            return score;
        }

        async function fetchAniSkipSegmentsForCurrentEpisode() {
            if (!currentIsLikelyAnime || MEDIA_TYPE !== 'tv') return false;
            const title = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || '');
            const selectedSeason = tvSeasons?.[Number(curSeason || 0)];
            const seasonLabel = selectedSeason?.name || `Season ${Number(curSeason || 0) + 1}`;
            const targetSeasonNo = Number.isFinite(Number(selectedSeason?.seasonNo)) 
                ? Number(selectedSeason?.seasonNo) 
                : (Number(curSeason || 0) + 1);
            const episodeNum = Number(curEpisode || 0) + 1;
            if (!title || !Number.isFinite(episodeNum) || episodeNum <= 0) return false;

            const cacheKey = `${title.toLowerCase()}::${seasonLabel.toLowerCase()}::${episodeNum}`;
            if (animeSkipCache.has(cacheKey)) {
                const cached = animeSkipCache.get(cacheKey);
                if (cached) return applyApiSkipSegments(cached);
                return false;
            }

            try {
                aniSkipFetchStatus = 'fetching';
                console.log(`[aniskip] Fetching skip times for "${title}" ${seasonLabel} Ep ${episodeNum}...`);
                const gqlQuery = `
                  query ($search: String) {
                    Page(page: 1, perPage: 15) {
                      media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                        id
                        idMal
                        title { romaji english native }
                        seasonYear
                        format
                      }
                    }
                  }
                `;
                const aniRes = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: gqlQuery, variables: { search: title } }),
                    signal: AbortSignal.timeout(7000),
                });
                if (!aniRes.ok) {
                    aniSkipFetchStatus = 'failed';
                    resetAnimeSkipState();
                    return false;
                }
                const aniJson = await aniRes.json();
                const mediaList = Array.isArray(aniJson?.data?.Page?.media) ? aniJson.data.Page.media : [];
                
                mediaList.forEach(m => {
                    if (m.seasonYear) m.year = m.seasonYear;
                });
                const picked = pickAnimeResultByTitle(mediaList, title, null, targetSeasonNo, seasonLabel, MEDIA_TYPE === 'movie');
                
                if (!picked) {
                    resetAnimeSkipState();
                    return false;
                }
                const aniId = Number(picked.id || 0);
                const malId = Number(picked.idMal || 0);
                const candidateIds = [];
                if (aniId > 0) candidateIds.push(aniId);
                if (malId > 0 && malId !== aniId) candidateIds.push(malId);

                if (!candidateIds.length) {
                    resetAnimeSkipState();
                    return false;
                }

                const failedAny = (animeSkipCache.get('__failedIds__') || new Set());
                if (candidateIds.every(id => failedAny.has(id))) {
                    resetAnimeSkipState();
                    return false;
                }

                setTimeout(async () => {
                    let found = false;
                    for (const id of candidateIds) {
                        if (failedAny.has(id)) continue;
                        const u2 = `https://api.aniskip.com/v2/skip-times/${id}/${episodeNum}?types=op&types=ed&episodeLength=0`;
                        const u1 = `https://api.aniskip.com/v1/skip-times/${id}/${episodeNum}?types=op&types=ed`;
                        const skipUrls = [u2, u1, getProxiedUrl(u2), getProxiedUrl(u1)];

                        for (const url of skipUrls) {
                            try {
                                const skipRes = await fetch(url, {
                                    headers: { 'Accept': 'application/json' },
                                    signal: AbortSignal.timeout(6000),
                                });
                                if (skipRes.status === 404 || skipRes.status === 502 || skipRes.status === 500) {
                                  if (skipRes.status !== 404) failedAny.add(id); // Only mark ID as failed if it's a real server error
                                  continue;
                                }
                                if (!skipRes.ok) continue;
                                const skipJson = await skipRes.json();
                                const parsed = parseAniSkipResults(skipJson);
                                if (parsed.intro || parsed.outro) {
                                    console.log(`[aniskip] ✔ Found segments via ${url.includes('v1') ? 'v1' : 'v2'} API for ID ${id}`);
                                    animeSkipCache.set(cacheKey, parsed);
                                    applyApiSkipSegments(parsed);
                                    updateSkipSegmentButton();
                                    found = true;
                                    return;
                                }
                            } catch (_) { 
                                // On network failure, might be a proxy issue, try next URL
                            }
                        }
                    }
                    if (!found) {
                        animeSkipCache.set(cacheKey, null);
                        aniSkipFetchStatus = 'failed';
                        resetAnimeSkipState();
                    }
                    animeSkipCache.set('__failedIds__', failedAny);
                }, 100);
                return false;
            } catch (_) {
                animeSkipCache.set(cacheKey, null);
                aniSkipFetchStatus = 'failed';
                resetAnimeSkipState();
                return false;
            }
        }

        function getActiveSkipSegment(nowSec) {
            if (!Number.isFinite(nowSec)) return null;
            const intro = animeSkipSegments.intro;
            if (intro && nowSec >= intro.start && nowSec < intro.end) {
                return { type: 'intro', start: intro.start, end: intro.end };
            }
            const outro = animeSkipSegments.outro;
            if (outro && nowSec >= outro.start && nowSec < outro.end) {
                return { type: 'outro', start: outro.start, end: outro.end };
            }
            return null;
        }

        function updateSkipSegmentButton() {
            if (!video || !currentIsLikelyAnime || !hasApiSkipSegments) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            const nowSec = Number(video.currentTime || 0);
            if (nowSec < (_lastSkipUiTime - 1)) {
                rearmSkippedSegmentsForTime(nowSec);
            }
            _lastSkipUiTime = nowSec;
            const active = getActiveSkipSegment(nowSec);

            // Countdown state is sticky: once auto-skip starts, keep it pinned to the captured segment.
            if (_skipActiveType && _skipActiveSegment && skipSegmentBtn && skipSegmentBtn.classList.contains('counting')) {
                const seg = _skipActiveSegment;
                if (skippedSegments[_skipActiveType]) {
                    _clearSkipCountdown();
                    _skipBtnWasVisible = false;
                    if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                    return;
                }

                // Only cancel if the user actually seeks away from the captured segment window.
                if (nowSec < seg.start - 5 || nowSec > seg.end + 5) {
                    console.log(`[Skip] User moved far from ${_skipActiveType} segment. Resetting.`);
                    _clearSkipCountdown();
                    _skipBtnWasVisible = false;
                } else {
                    const icon = _skipActiveType === 'intro' ? 'fa-forward' : 'fa-forward-step';
                    skipSegmentBtn.innerHTML = `<i class="fa-solid ${icon}"></i><span>${_skipActiveType === 'intro' ? 'Skip Intro' : 'Skip Outro'}</span>`;
                    skipSegmentBtn.dataset.segmentType = _skipActiveType;
                    skipSegmentBtn.style.display = 'inline-flex';
                    return;
                }
            }

            if (!active || skippedSegments[active.type]) {
                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                return;
            }

            // Sync UI markers
            const markers = document.querySelectorAll('.skip-marker');
            markers.forEach(m => {
                if (active && m.dataset.type === active.type) {
                    m.classList.add('active');
                } else {
                    m.classList.remove('active');
                }
            });

            if (!hasApiSkipSegments) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            if (!active) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            const alreadySkipped = (active.type === 'intro' && skippedSegments.intro) ||
                (active.type === 'outro' && skippedSegments.outro);

            if (alreadySkipped) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            // Detect NEW segment detection to start countdown
            if (!_skipBtnWasVisible) {
                _skipBtnWasVisible = true;
                _startSkipCountdown();
            }

            if (skipSegmentBtn) {
                const icon = active.type === 'intro' ? 'fa-forward' : 'fa-forward-step';
                skipSegmentBtn.innerHTML = `<i class="fa-solid ${icon}"></i><span>${active.type === 'intro' ? 'Skip Intro' : 'Skip Outro'}</span>`;
                skipSegmentBtn.dataset.segmentType = active.type;
                skipSegmentBtn.style.display = 'inline-flex';
            }
        }

        function showControlSurface() {
            if (isUiLocked || !video) {
                controlSurface.classList.remove('visible');
                playerHeader.classList.add('hidden');
                return;
            }
            controlSurface.classList.add('visible');
            playerHeader.classList.remove('hidden');

            clearTimeout(controlsHideTimer);
            clearTimeout(headerTimer);

            // Auto-hide after 3 seconds
            const hideDelay = 3000;

            controlsHideTimer = setTimeout(() => {
                // Check if any menu is open - if so, extend the hold time
                const hasOpenMenu = document.querySelector('.control-menu.active, .panel.open');
                if (hasOpenMenu) {
                    // Extend hold time by 3 seconds when menu is open
                    controlsHoldVisibleUntil = Date.now() + 3000;
                    showControlSurface();
                    return;
                }

                if (Date.now() < controlsHoldVisibleUntil) {
                    showControlSurface();
                    return;
                }
                if (video && !video.paused) {
                    controlSurface.classList.remove('visible');
                    playerHeader.classList.add('hidden');
                    closeCustomMenus();
                }
            }, hideDelay);
        }

        let controlsShownAt = 0;
        function holdControlsVisible(ms = 900) {
            // Enforce minimum 3 seconds on all devices
            const minHold = 3000;
            const effectiveMs = Math.max(ms, minHold);
            controlsHoldVisibleUntil = Math.max(controlsHoldVisibleUntil, Date.now() + effectiveMs);
            controlsShownAt = Date.now();
            lastTap = 0; // Reset double-tap sequence on reveal to avoid accidental skips
            showControlSurface();
        }

        function toggleControls() {
            if (isUiLocked || !video) return;
            // Prevent immediate toggle-off if they were just shown by a tap-down interaction
            if (Date.now() - controlsShownAt < 350) return;

            if (controlSurface.classList.contains('visible')) {
                hideControlSurfaceNow();
            } else {
                holdControlsVisible(3000);
            }
        }

        function hideControlSurfaceNow() {
            clearTimeout(controlsHideTimer);
            clearTimeout(headerTimer);
            controlSurface.classList.remove('visible');
            playerHeader.classList.add('hidden');
            closeCustomMenus();
            lastTap = 0; // Reset double-tap sequence on hide
        }

                else if (h >= 1440) tier = 'QHD';
                else if (h >= 1080) tier = 'FHD';
                else if (h >= 720) tier = 'HD';
                else if (h > 0) tier = 'SD';

            const autoItem = document.createElement('div');

        function bindVideoEvents() {
            if (!video || video.dataset.customBound === '1') return;
            video.dataset.customBound = '1';
            video.addEventListener('error', () => {
                const err = video.error;
                let msg = 'Unknown Error';
                if (err) {
                    switch (err.code) {
                        case 1: msg = 'MEDIA_ERR_ABORTED'; break;
                        case 2: msg = 'MEDIA_ERR_NETWORK'; break;

        function positionMenuAbove(menu, button) {
            if (!menu || !button) return;
            // Set display to inline-flex/flex temporarily to get accurate dimensions
            const isControlMenu = menu.classList.contains('control-menu');
            const isOpenPanel = menu.id.includes('-panel');

            menu.style.display = isControlMenu ? 'flex' : (isOpenPanel ? 'flex' : 'block');
            menu.style.visibility = 'hidden';

            if (!button) return;
            const rect = button.getBoundingClientRect();
            const menuWidth = menu.offsetWidth;
            const screenWidth = window.innerWidth;

            let left = rect.left + (rect.width / 2) - (menuWidth / 2);
            // Constraint within screen
            left = Math.max(12, Math.min(left, screenWidth - menuWidth - 12));

            menu.style.left = `${left}px`;
            menu.style.bottom = `${window.innerHeight - rect.top + 12}px`;

            menu.style.display = ''; // Reset display
            menu.style.visibility = '';
        }

        function initMobileSheetDragToClose() {
            const sheets = [sourcePanel, epPanel, audioPanel, qualityMenu, captionsMenu, playbackMenu, preferencesMenu, volumeMenu].filter(Boolean);
            const state = new WeakMap();
            const isSheetOpen = (el) => el.classList.contains('active') || el.classList.contains('open');

            sheets.forEach((sheet) => {
                state.set(sheet, { dragging: false, startY: 0, startAt: 0, dy: 0 });

                const onStart = (e) => {
                    if (!IS_MOBILE_CLIENT || !isSheetOpen(sheet)) return;
                    const touch = e.touches?.[0];
                    if (!touch) return;
                    const rect = sheet.getBoundingClientRect();
                    const yInSheet = touch.clientY - rect.top;
                    // Start drag from top grab area (80px)
                    if (yInSheet > 80) return;
                    const s = state.get(sheet);
                    s.dragging = true;
                    s.startY = touch.clientY;
                    s.startAt = Date.now();
                    s.dy = 0;
                    sheet.classList.add('sheet-dragging');
                };

                const onMove = (e) => {
                    const s = state.get(sheet);
                    if (!s.dragging) return;
                    const touch = e.touches?.[0];
                    if (!touch) return;

                    const deltaY = touch.clientY - s.startY;

                    // Responsive dragging with rubber-band effect
                    if (deltaY < 0) {
                        // Dragging upwards: apply resistance
                        s.dy = deltaY * 0.25;
                    } else {
                        // Dragging downwards: 1:1 movement
                        s.dy = deltaY;
                    }

                    sheet.style.transform = `translateY(${s.dy}px)`;

                    // Adjust opacity based on downward drag distance
                    if (s.dy > 0) {
                        sheet.style.opacity = Math.max(0.6, 1 - (s.dy / sheet.offsetHeight));
                    } else {
                        sheet.style.opacity = "1";
                    }

                    if (e.cancelable) e.preventDefault();
                };

                const onEnd = () => {
                    const s = state.get(sheet);
                    if (!s.dragging) return;
                    s.dragging = false;

                    const elapsed = Date.now() - s.startAt;
                    const velocity = s.dy / (elapsed || 1);

                    // Close if dragged down far enough (120px) or swiped down fast
                    const shouldClose = s.dy > 120 || (velocity > 0.6 && s.dy > 30);

                    sheet.classList.remove('sheet-dragging');

                    if (shouldClose) {
                        animateCloseMenuElement(sheet);
                    } else {
                        // Spring back animation
                        sheet.classList.add('sheet-animating');
                        sheet.style.transform = '';
                        sheet.style.opacity = '';
                        setTimeout(() => sheet.classList.remove('sheet-animating'), 300);
                    }
                };

                sheet.addEventListener('touchstart', onStart, { passive: true });
                sheet.addEventListener('touchmove', onMove, { passive: false });
                sheet.addEventListener('touchend', onEnd, { passive: true });
                sheet.addEventListener('touchcancel', onEnd, { passive: true });
            });
        }

                        if (hlsInst) {

                            rememberAudioPreference(track);
                            updateAudioTracks();
                        }

                        if (!label || label === 'und') label = 'Japanese';
                        const isActive = track.enabled;
                        addItem(label, isActive, () => {
                            // Disable all tracks then enable the picked one
                            iosNativeTracks.forEach(t => { t.enabled = false; });

                            if (typeof IS_IOS !== 'undefined' && IS_IOS && typeof video !== 'undefined' && video && video.readyState >= 1) {
                                video.currentTime = video.currentTime + 0.001;
                            }
                            rememberAudioPreference({ lang: track.language, name: track.label });
                            updateAudioTracks();

                    const jaSource = allSources.find((s) => s.provider === 'justanime');
                    if (!jaSource) return;
                    const resumeAt = Math.max(0, Number(video?.currentTime || 0));
                    audioSwitchInFlightUntil = Date.now() + 9000;
                    hlsFragErrorBurst = 0;
                    hlsSessionIsFragile = false;

                    currentAudioSource = 'justanime';

                    if (jaSource.isM3U8 && Hls.isSupported() && typeof hlsInst !== 'undefined' && hlsInst) {

            // Virtual Satoru tracks
            const showVirtualSatoruTracks = hasSatoruSources && (!isOnSatoru || !!hlsInst);
            if (showVirtualSatoruTracks) {
                satoruAudioSources.forEach((src, idx) => {
                    const isActive = isOnSatoru && activeSatoruTrackIndex === idx;
                    addItem(src.label, isActive, () => {
                        if (isOnSatoru && activeSatoruTrackIndex === idx) return;

                        // Set state immediately for UI 
                        currentAudioSource = 'satoru';
                        activeSatoruTrackIndex = idx;

                        // IMPORTANT: Set preferredAudioToken to the specific track name/label WITHOUT the provider suffix
                        let rawToken = src.hlsTrackName || src.label || '';
                        preferredAudioToken = rawToken.replace(/\s*\(.*?\)\s*/g, '').trim().toLowerCase();

                        if (preferredSourceLabelMatch) preferredSourceLabelMatch = preferredAudioToken;
                        rememberProviderPreference('satoru');
                        syncUrlState();

                        updateAudioTracks(); // Render optimistic UI
                        const resumeAt = Math.max(0, Number(video?.currentTime || 0));
                        audioSwitchInFlightUntil = Date.now() + 9000;

                                const currentTime = Math.max(0, Number(video?.currentTime || 0));
                                const wasPlaying = !video?.paused;

                                console.log('Zero-lag audio switch to satoru:', src.label, 'at time:', currentTime);

                                // Use zero-lag switching if available, otherwise fallback
                                if (typeof svZeroLagAudioSwitch === 'function') {
                                    svZeroLagAudioSwitch(src.url, src.referer, currentTime, wasPlaying, () => {

                                    // Fallback to ultra-seamless
                                    svUltraSeamlessAudioSwitch(src.url, src.referer, currentTime, wasPlaying, () => {
                                        svApplyPreferredAudioToHls(hlsInst);

                                        if (wasPlaying && video) {
                                            setTimeout(() => {
                                                video.play().catch(() => {
                                                    video.muted = true;
                                                    video.play().catch(() => { });

            el.classList.remove('animate');
            void el.offsetWidth; // trigger reflow

            const maxCacheSize = 150; // Cache up to 150 frames

            window._lastCapturedFrameHash = null;

            window._previewHlsResetAttempts = 0;

            function getFrameDataHash(frameDataUrl) {

                if (!frameDataUrl) return null;
                // Use first 100 chars of data URL as a quick hash
                return frameDataUrl.substring(0, 100);
            }

            function cachePreviewFrame(roundedSecond, frameData = null) {
                // If frameData is provided, use it directly (from canvas capture)
                if (frameData) {
                    // Check for frame repetition
                    const frameHash = getFrameDataHash(frameData);
                    if (frameHash === window._lastCapturedFrameHash) {
                        window._captureFailureCount++;
                        // If we're getting the same frame too many times, try to reset preview HLS
                        if (window._captureFailureCount > 2 && window._previewHlsResetAttempts < 3) {
                            console.log('[preview] Frame repetition detected, attempting preview HLS reset...');
                            window._previewHlsResetAttempts++;

                    } else {
                        window._lastCapturedFrameHash = frameHash;
                        window._captureFailureCount = 0;
                    }

                    previewFrameCache.set(roundedSecond, frameData);
                    if (previewFrameCache.size > maxCacheSize) {
                        const firstKey = previewFrameCache.keys().next().value;
                        previewFrameCache.delete(firstKey);
                    }
                    return;
                }

                const previewVideo = document.getElementById('previewVideo');
                if (!previewVideo || previewVideo.readyState < 2) return;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = previewVideo.videoWidth;
                    canvas.height = previewVideo.videoHeight;
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.drawImage(previewVideo, 0, 0);
                        const frameUrl = canvas.toDataURL('image/jpeg', 0.75);

                        // Check for frame repetition in preview video capture too
                        const frameHash = getFrameDataHash(frameUrl);
                        if (frameHash === window._lastCapturedFrameHash) {
                            window._captureFailureCount++;
                            if (window._captureFailureCount > 2) {
                                console.log('[preview] Preview video capturing same frame repeatedly');
                                return; // Skip caching duplicate frames
                            }
                        } else {
                            window._lastCapturedFrameHash = frameHash;
                            window._captureFailureCount = 0;
                        }

                        previewFrameCache.set(roundedSecond, frameUrl);
                        // Clean up old cache entries
                        if (previewFrameCache.size > maxCacheSize) {
                            const firstKey = previewFrameCache.keys().next().value;
                            previewFrameCache.delete(firstKey);
                        }
                    }
                } catch (_) { }
            }

            function getPreviewFrameFromCache(roundedSecond) {
                return previewFrameCache.get(roundedSecond) || null;
            }

            function handleSeekPreview(e) {
                if (!video || !isFinite(video.duration)) return;

                const rect = seekBar.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const x = clientX - rect.left;
                const percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
                const seekTime = (percent / 100) * video.duration;

                // Position preview in its own offset-parent coordinate space (control-bottom),
                // then clamp against viewport so it never gets cut off at 0:00 or near the end.
                const parentEl = seekPreview.offsetParent || seekBar.closest('.control-bottom') || document.body;
                const parentRect = parentEl.getBoundingClientRect();
                const anchorClientX = rect.left + (percent / 100) * rect.width;
                const leftInParent = anchorClientX - parentRect.left;
                // Keep alignment to hovered time; only tiny edge padding to avoid hard clipping.
                const edgePad = 8;
                const minLeft = edgePad;
                const maxLeft = Math.max(minLeft, parentRect.width - edgePad);
                const clampedLeft = Math.max(minLeft, Math.min(maxLeft, leftInParent));
                seekPreview.style.left = `${clampedLeft}px`;

                // ENHANCED: Frame-accurate preview thumbnail display
                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    const wholeSecond = Math.max(0, Math.min(Math.floor(seekTime), Math.floor(video.duration)));

                    // Check if we already have this frame cached
                    const cachedFrame = getPreviewFrameFromCache(wholeSecond);
                    if (cachedFrame) {
                        // Display cached frame immediately
                        if (!previewVideo._cacheDisplay) {

                    }

                        const ctx = canvas.getContext('2d');

                            ctx.drawImage(video, 0, 0, 240, 135);

                        }
                    } catch (_) { }

                };

                window.previewSeekTimer = setTimeout(() => {

                        // ENHANCED: Check preview HLS health - more conservative to avoid main stream interference
                        if (window.previewHlsInst && !window.previewHlsIsUnhealthy && window.previewHlsErrorCount < 3) {

                                }
                            } catch (_) {

                            }

                            } else {

                            }
                        }

        async function init() {
