                terms.push(`${base} ${preferredAudioToken}`);
            }

            // If season 2+, priority is finding the specific entry
            if (seasonNo > 1) {
                // Specific Arc Support for major series (e.g., JJK)
                if (base.toLowerCase().includes('jujutsu kaisen')) {
                    if (seasonNo === 2) terms.push(`${base} shibuya incident`);
                    if (seasonNo === 3) terms.push(`${base} culling game`);
                }

                terms.push(`${base} season ${seasonNo}`);
                terms.push(`${base} ${seasonNo}`);
                terms.push(`${base} S${seasonNo}`);
            }

            if (normalizedSeasonLabel) {
                terms.push(`${base} ${normalizedSeasonLabel}`);
                terms.push(normalizedSeasonLabel);
            }

            if (base.toLowerCase().includes('demon slayer') || base.toLowerCase().includes('kimetsu no yaiba')) {
                if (normalizedSeasonLabel.includes('mugen train')) {
                    terms.push(`${base} mugen train arc`);
                    terms.push('demon slayer mugen train arc');
                    terms.push('kimetsu no yaiba mugen train arc');
                }
                if (normalizedSeasonLabel.includes('entertainment district')) {
                    terms.push(`${base} entertainment district arc`);
                    terms.push('demon slayer entertainment district arc');
                    terms.push('kimetsu no yaiba entertainment district arc');
                }
                if (normalizedSeasonLabel.includes('swordsmith village')) {
                    terms.push(`${base} swordsmith village arc`);
                    terms.push('demon slayer swordsmith village arc');
                    terms.push('kimetsu no yaiba swordsmith village arc');
                }
                if (normalizedSeasonLabel.includes('hashira training')) {
                    terms.push(`${base} hashira training arc`);
                    terms.push('demon slayer hashira training arc');
                    terms.push('kimetsu no yaiba hashira training arc');
                }
            }

            if (preferredYear) terms.push(`${base} ${preferredYear}`);
            terms.push(base);
            return Array.from(new Set(terms.filter(Boolean)));
        }

        function extractSeasonNumberFromTitle(title) {
            if (!title) return null;
            const t = String(title).toLowerCase();
            const m = t.match(/\bseason\s*(\d+)\b/i)
                || t.match(/\b(\d+)(st|nd|rd|th)\s*season\b/i)
                || t.match(/\bseason\b\s*([ivx]+)\b/i)
                || t.match(/\bs\s*(\d+)\b/i);
            if (m) {
                if (m[1].match(/^[ivx]+$/)) {
                    const romanMap = { i: 1, ii: 2, iii: 3, iv: 4, v: 5, vi: 6, vii: 7, viii: 8, ix: 9, x: 10 };
                    return romanMap[m[1]] || null;
                }
                return Number(m[1]);
            }
            // Title-based inference for popular anime
            if (t.includes('culling game')) return 3;
            if (t.includes('shibuya incident')) return 2;
            if (t.includes('cour 2')) return 2;
            if (t.includes('part 2')) return 2;
            if (t.includes('part 3')) return 3;
            if (t.includes('mugen train')) return 2;
            if (t.includes('entertainment district')) return 2;
            if (t.includes('swordsmith village')) return 3;
            if (t.includes('hashira training')) return 4;

            // Standalone number at end or with hyphen? e.g. "Jujutsu Kaisen 2" or "Jujutsu Kaisen - 2"
            const m2 = t.match(/[\-\s](\d+)$/);
            if (m2) return Number(m2[1]);
            return null;
        }

        function extractPartNumberFromTitle(title) {
            if (!title) return null;
            const t = String(title).toLowerCase();
            const m = t.match(/\bpart\s*(\d+)\b/i) || t.match(/\b(\d+)(st|nd|rd|th)\s*part\b/i);
            if (m) return Number(m[1]);
            return null;
        }

        function getSpecificSeasonLabelTokens(seasonLabel, baseTitle = '') {
            const stopWords = new Set([
                'season', 'part', 'arc', 'tv', 'the', 'and', 'of', 'no', 'to', 'a', 'an'
            ]);
            const labelTokens = normalizeAnimeSearchQuery(seasonLabel)
                .toLowerCase()
                .split(' ')
                .filter(Boolean);
            const baseTokens = new Set(
                normalizeAnimeSearchQuery(baseTitle)
                    .toLowerCase()
                    .split(' ')
                    .filter(Boolean),
            );
            return [...new Set(
                labelTokens.filter((token) =>
                    token.length > 2 &&
                    !stopWords.has(token) &&
                    !baseTokens.has(token),
                ),
            )];
        }

        function getProviderAnimeResolutionContext(provider, mediaTitle, seasonNo, episodeNo, seasonLabel) {
            const resolved = {
                mediaTitle: normalizeAnimeSearchQuery(mediaTitle),
                seasonNo: Number(seasonNo || 1),
                episodeNo: Number(episodeNo || 1),
                seasonLabel: normalizeSeasonSearchLabel(seasonLabel),
                animeIdOverride: '',
                episodeOffset: 0, // Default offset
                seasonNoOverride: undefined, // Default override
            };

            // ── AnimeSalt resolution ─────────────────────────────────────────────────
            if (provider === 'animesalt') {
                // AnimeSalt groups sections differently for some shows.
                // Default: strip season-specific suffixes to find the main series slug.
                let baseTitle = resolved.mediaTitle
                    .replace(/\b(season|part|cour|arc)\s*\d+\b/gi, '')
                    .replace(/\b(part|cour)\s+[ivxlc]+\b/gi, '')
                    .replace(/\b(TV|Specials|Recaps|The Culling Game|Hidden Inventory|Shibuya|Entertainment District|Swordsmith Village|Hashira Training)\b/gi, '')
                    .replace(/\s+/g, ' ')
                    .trim();

                let lowerBase = baseTitle.toLowerCase();
                let lowerLabel = resolved.seasonLabel.toLowerCase();

                // ── Special Normalization for Major Titles ──────────────────────────
                if (lowerBase.includes('demon slayer') || lowerBase.includes('kimetsu no yaiba')) {
                    baseTitle = 'Demon Slayer: Kimetsu no Yaiba';
                } else if (lowerBase.includes('jujutsu kaisen')) {
                    baseTitle = 'Jujutsu Kaisen';
                } else if (lowerBase.includes('mushoku tensei')) {
                    baseTitle = 'Mushoku Tensei: Jobless Reincarnation';
                }
                
                // Refresh lowerBase after normalization
                lowerBase = baseTitle.toLowerCase();

                // ── Jujutsu Kaisen ───────────────────────────────────────────────────
                if (lowerBase.includes('jujutsu kaisen')) {
                    // Season 2 in TMDB:
                    // 1-5: Hidden Inventory / Premature Death
                    // 6: Recap
                    // 7-23: Shibuya Incident
                    if (resolved.seasonNo === 2) {
                        // Offsets etc could be handled here if needed
                    }
                }

                // ── Demon Slayer ─────────────────────────────────────────────────────
                if (lowerBase.includes('demon slayer') || lowerBase.includes('kimetsu no yaiba')) {
                    // TMDB Season 2 includes Mugen Train (7 eps) + Entertainment District (11 eps)
                    // AnimeSalt usually treats these as separate seasons OR total offset.
                    if (lowerLabel.includes('entertainment district')) {
                        resolved.seasonNoOverride = 3; // Entertainment District is often S3 in tracker-based lists
                        if (resolved.episodeNo >= 8) {
                           // If it's part of TMDB S2, ep 8+ is Ent District
                           resolved.episodeNo = resolved.episodeNo - 7;
                        }
                    } else if (lowerLabel.includes('mugen train')) {
                        resolved.seasonNoOverride = 2;
                    } else if (lowerLabel.includes('swordsmith village')) {
                        resolved.seasonNoOverride = 4;
                    } else if (lowerLabel.includes('hashira training')) {
                        resolved.seasonNoOverride = 5;
                    }
                }

                resolved.mediaTitle = baseTitle || resolved.mediaTitle;
                resolved.seasonLabel = ''; // AnimeSalt doesn't use season labels in its IDs
                return resolved;
            }

            if (provider !== 'justanime') return resolved;

            const base = resolved.mediaTitle.toLowerCase();
            const label = resolved.seasonLabel.toLowerCase();
            const isDemonSlayer = base.includes('demon slayer') || base.includes('kimetsu no yaiba');

            if (!isDemonSlayer) return resolved;

            if (label.includes('entertainment district')) {
                resolved.seasonLabel = 'Kimetsu no Yaiba Entertainment District Arc';
                if (resolved.episodeNo >= 8) {
                    resolved.episodeNo = resolved.episodeNo - 7;
                }
                resolved.animeIdOverride = '142329';
            } else if (label.includes('mugen train')) {
                resolved.seasonLabel = 'Kimetsu no Yaiba Entertainment District Arc';
                resolved.episodeNo = resolved.episodeNo + 4;
                resolved.animeIdOverride = '142329';
            } else if (label.includes('swordsmith village')) {
                resolved.seasonLabel = 'Kimetsu no Yaiba Swordsmith Village Arc';
                resolved.animeIdOverride = '145139';
            } else if (label.includes('hashira training')) {
                resolved.seasonLabel = 'Kimetsu no Yaiba Hashira Training Arc';
                resolved.animeIdOverride = '166240';
            }

            return resolved;
        }

        function getProviderAnimeCacheScope(provider, mediaTitle, preferredYear, seasonLabel = '') {
            const baseKey = `${normalizeAnimeSearchQuery(mediaTitle).toLowerCase()}::${preferredYear || ''}`;
            if (provider !== 'justanime') return `${provider}::v2::${baseKey}`;
            const scopedLabel = normalizeSeasonSearchLabel(seasonLabel).toLowerCase();
            return `${provider}::v3::${baseKey}::${scopedLabel}`;
        }

        async function resolveJustAnimeOverrideEpisodeId(animeId, episodeNo, timeoutMs) {
            const safeAnimeId = String(animeId || '').trim();
            const safeEpisodeNo = Math.max(1, Number(episodeNo || 1));
            if (!safeAnimeId) return '';

            try {
                const { res: infoRes } = await fetchJsonWithApiFallback(
                    buildAnimeInfoUrl('justanime', safeAnimeId),
                    { signal: AbortSignal.timeout(timeoutMs) },
                );
                if (!infoRes.ok) return `${safeAnimeId}$episode$${safeEpisodeNo}`;
                let info = await infoRes.json();
                if (info?.data) info = info.data;
                const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                const target =
                    episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode || 0) === safeEpisodeNo) ||
                    episodes[safeEpisodeNo - 1] ||
                    null;
                return String(target?.id || `${safeAnimeId}$episode$${safeEpisodeNo}`);
            } catch (_) {
                return `${safeAnimeId}$episode$${safeEpisodeNo}`;
            }
        }

        function findExactProviderSeasonMatch(provider, results, seasonLabel = '') {
            // AnimeSalt: ALL seasons/arcs are under one series slug — no season matching needed,
            // just pick the best overall title match. Return null to let pickAnimeResultByTitle handle it.
            if (provider === 'animesalt') return null;

            if (provider !== 'justanime' || !Array.isArray(results) || results.length === 0) return null;
            const normalizedSeasonLabel = normalizeSeasonSearchLabel(seasonLabel).toLowerCase();
            if (!normalizedSeasonLabel) return null;

            const seasonTokens = normalizedSeasonLabel.split(' ').filter(Boolean);
            if (!seasonTokens.length) return null;

            const exact = results.find((row) => {
                let rawTitle = row?.title || row?.name || '';
                if (typeof rawTitle === 'object') {
                    rawTitle = rawTitle.english || rawTitle.romaji || rawTitle.native || String(rawTitle);
                }
                const itemTitle = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                if (!itemTitle) return false;
                if (itemTitle.includes(normalizedSeasonLabel)) return true;
                const matches = seasonTokens.filter((token) => itemTitle.includes(token)).length;
                return matches >= Math.min(2, seasonTokens.length);
            });

            return exact || null;
        }

        function pickAnimeResultByTitle(results, title, preferredYear = null, targetSeason = 1, seasonLabel = '') {
            if (!Array.isArray(results) || results.length === 0) return null;
            if (!title) return results[0];

            const normTitle = normalizeAnimeSearchQuery(title).toLowerCase();
            const qWords = normTitle.split(' ').filter(Boolean);
            const normalizedSeasonLabel = normalizeSeasonSearchLabel(seasonLabel).toLowerCase();
            const seasonWords = normalizedSeasonLabel.split(' ').filter(Boolean);
            const specificSeasonTokens = getSpecificSeasonLabelTokens(seasonLabel, title);
            let best = null;
            let bestScore = -Infinity;

            const parseYear = (item) => {
                const raw = String(
                    item?.releaseDate ||
                    item?.release_date ||
                    item?.year ||
                    item?.startDate ||
                    '',
                );
                const y = Number(raw.slice(0, 4));
                return Number.isFinite(y) ? y : null;
            };

            for (const r of results) {
                let rawTitle = r?.title || r?.name || '';
                if (typeof rawTitle === 'object') {
                    rawTitle = rawTitle.english || rawTitle.romaji || rawTitle.native || String(rawTitle);
                }
                const itemTitle = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                if (!itemTitle) continue;

                let score = 0;

                // Audio Language matching (high priority for Satoru/Dubs)
                const prefAudio = String(preferredAudioToken || '').toLowerCase();
                const itemRawTitle = String(rawTitle).toLowerCase();
                if (prefAudio && itemRawTitle.includes(prefAudio)) {
                    score += 100;
                    if (itemRawTitle === `${normTitle} ${prefAudio}`) score += 50; // exact "Show Hindi" match 
                }

                if (itemTitle === normTitle) score += 120;
                else if (itemTitle.startsWith(normTitle)) score += 95;
                else if (itemTitle.includes(normTitle)) score += 80;

                const tWords = itemTitle.split(' ').filter(Boolean);
                const common = qWords.filter((w) => tWords.includes(w)).length;
                score += common * 10;
                score -= Math.abs(itemTitle.length - normTitle.length) * 0.2;

                if (seasonWords.length) {
                    const seasonCommon = seasonWords.filter((w) => tWords.includes(w)).length;
                    score += seasonCommon * 28;
                    if (normalizedSeasonLabel && itemTitle.includes(normalizedSeasonLabel)) score += 140;
                }
                if (specificSeasonTokens.length) {
                    const specificMatches = specificSeasonTokens.filter((w) => tWords.includes(w)).length;
                    if (specificMatches > 0) score += specificMatches * 95;
                    else score -= 220;
                }

                // Specific Arc / Part Support for anime
                if (normTitle.includes('culling game') && itemTitle.includes('culling game')) score += 180;
                if (normTitle.includes('shibuya incident') && itemTitle.includes('shibuya incident')) score += 180;
                if (normTitle.includes('part 2') && itemTitle.includes('part 2')) score += 140;
                if (normTitle.includes('part 3') && itemTitle.includes('part 3')) score += 140;
                if (normTitle.includes('cour 2') && itemTitle.includes('cour 2')) score += 140;
                if (normalizedSeasonLabel.includes('mugen train') && itemTitle.includes('mugen train')) score += 220;
                if (normalizedSeasonLabel.includes('entertainment district') && itemTitle.includes('entertainment district')) score += 220;
                if (normalizedSeasonLabel.includes('swordsmith village') && itemTitle.includes('swordsmith village')) score += 220;
                if (normalizedSeasonLabel.includes('hashira training') && itemTitle.includes('hashira training')) score += 220;

                const itemYear = parseYear(r);
                if (preferredYear && itemYear) {
                    if (itemYear === preferredYear) score += 30;
                    else if (Math.abs(itemYear - preferredYear) === 1) score += 12;
                }

                // Season Matching
                const itemSeason = extractSeasonNumberFromTitle(rawTitle);
                if (targetSeason > 1) {
                    if (itemSeason === targetSeason) score += 180; // Very strong preferred entry
                    else if (itemSeason && itemSeason !== targetSeason) score -= 120; // Penalize wrong season
                } else {
                    // Watching S1: penalize if it says S2, S3, etc.
                    if (itemSeason && itemSeason > 1) score -= 100;
                }

                if (score > bestScore) {
                    bestScore = score;
                    best = r;
                }
            }

            // Reject weak matches instead of forcing a wrong ID.
            if (!best || bestScore < 35) return null;
            return best;
        }

        function isValidAnimeInfoId(v) {
            const id = String(v || '').trim().toLowerCase();
            if (!id) return false;
            if (id === 'watch' || id === 'info' || id === 'search') return false;
            return true;
        }

        function normalizeSubtitleEntries(watchData, provider, referer = null) {
            const toArray = (v) => Array.isArray(v) ? v : [];
            const all = [
                ...toArray(watchData?.subtitles),
                ...toArray(watchData?.captions),
                ...toArray(watchData?.tracks)
            ];
            const out = [];

            all.forEach((item, idx) => {
                const kind = String(item?.kind || '').toLowerCase();
                if (kind && kind !== 'captions' && kind !== 'subtitles') return;
                const src = item?.url || item?.file || item?.src;
                if (!src || typeof src !== 'string') return;

                const rawLang = String(item?.lang || item?.language || item?.label || `Track ${idx + 1}`).trim();
                const langLower = rawLang.toLowerCase();
                let srclang = 'en';
                if (langLower === 'ja' || langLower === 'jpn' || langLower.includes('japanese')) srclang = 'ja';
                else if (langLower === 'en' || langLower === 'eng' || langLower.includes('english')) srclang = 'en';
                else if (/^[a-z]{2,3}$/i.test(rawLang)) srclang = rawLang.toLowerCase();

                out.push({
                    label: item?.label || item?.language || rawLang,
                    srclang,
                    src,
                    provider,
                    referer: item?.referer || referer
                });
            });

            const seen = new Set();
            return out.filter((t) => {
                const key = `${t.src}|${t.srclang}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        async function resolveSubtitleTrackSrc(sub) {
            const rawSrc = String(sub?.src || '').trim();
            if (!rawSrc) return '';

            // iOS AVKit native fullscreen CANNOT load data: URI text tracks — needs a real HTTP URL.
            // Route all subtitle fetching through /utils/vtt which does server-side fetch+convert
            // and returns proper text/vtt with CORS headers that iOS AVKit can load natively.
            try {
                const apiOrigin = activeApiBase.split('/meta/tmdb')[0];
                const referer = String(sub?.referer || '').trim();
                const refParam = referer ? `&referer=${encodeURIComponent(referer)}` : '';
                const vttUrl = `${apiOrigin}/utils/vtt?url=${encodeURIComponent(rawSrc)}${refParam}`;
                console.log('[sub] track src → /utils/vtt proxy:', rawSrc.slice(0, 60));
                return vttUrl;
            } catch (_) { /* fall through to legacy data URI path */ }

            const proxied = proxiedStreamUrl(rawSrc, sub?.referer || null);
            const toVttBlobUrl = (text) => {
                const vttText = String(text || '');
                try {
                    const blob = new Blob([vttText], { type: 'text/vtt' });
                    const url = URL.createObjectURL(blob);
                    // Keep a reference to prevent premature garbage collection
                    if (!window._activeSubtitleBlobs) window._activeSubtitleBlobs = [];
                    window._activeSubtitleBlobs.push(url);
                    return url;
                } catch (e) {
                    // Fallback to Data URI if Blob fails
                    const b64 = btoa(unescape(encodeURIComponent(vttText)));
                    return `data:text/vtt;base64,${b64}`;
                }
            };
            const sanitizeText = (text) => String(text || '').replace(/\r+/g, '').replace(/^\uFEFF/, '');
            const srtToVtt = (srtText) => {
                const clean = sanitizeText(srtText);
                return `WEBVTT\n\n${clean.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')}`;
            };
            const assTimeToVtt = (t) => {
                const m = String(t || '').trim().match(/^(\d+):(\d{1,2}):(\d{1,2})[.](\d{1,2})$/);
                if (!m) return '';
                const hh = String(Number(m[1] || 0)).padStart(2, '0');
                const mm = String(Number(m[2] || 0)).padStart(2, '0');
                const ss = String(Number(m[3] || 0)).padStart(2, '0');
                const ms = String(Math.round(Number(`0.${m[4] || '0'}`) * 1000)).padStart(3, '0');
                return `${hh}:${mm}:${ss}.${ms}`;
            };
            const assToVtt = (assText) => {
                const lines = sanitizeText(assText).split('\n');
                const cues = [];
                let idx = 1;
                for (const line of lines) {
                    const m = line.match(/^Dialogue:\s*[^,]*,([^,]+),([^,]+),[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,(.*)$/i);
                    if (!m) continue;
                    const start = assTimeToVtt(m[1]);
                    const end = assTimeToVtt(m[2]);
                    if (!start || !end) continue;
                    const text = String(m[3] || '')
                        .replace(/\{[^}]*\}/g, '')
                        .replace(/\\N/gi, '\n')
                        .replace(/\\n/g, '\n')
                        .trim();
                    if (!text) continue;
                    cues.push(`${idx++}\n${start} --> ${end}\n${text}`);
                }
                if (!cues.length) return '';
                return `WEBVTT\n\n${cues.join('\n\n')}`;
            };

            try {
                const lower = String(rawSrc || '').toLowerCase();
                
                // CRITICAL FIX: Direct skip if already a VTT and on iOS 
                // Normal HTTP URLs are much more stable for AVKit probes than Blobs.
                if (IS_IOS && lower.split('?')[0].endsWith('.vtt')) {
                     return proxied;
                }

                if (subtitleBlobCache.has(lower)) {
                    const cachedVtt = subtitleBlobCache.get(lower);
                    return cachedVtt ? toVttUrl(cachedVtt) : '';
                }

                // Correctly use the already computed proxied URL which includes the referer.
                const proxiedSub = proxied;
                try {
                    const looksLikeSrt = /\.srt(\?|$)/i.test(rawSrc);
                    const looksLikeAss = /\.ass(\?|$)/i.test(rawSrc) || /\.ssa(\?|$)/i.test(rawSrc);
                    const txtRes = await fetch(proxiedSub, { signal: AbortSignal.timeout(12000) });
                    if (txtRes.ok) {
                        const txt = await txtRes.text();
                        if (!txt) return '';
                        const ln = txt.trim().toLowerCase();
                        
                        // Ignore HTML responses (common for 404/WAF pages)
                        if (ln.startsWith('<!doctype html') || ln.startsWith('<html')) return '';

                        let content = txt;
                        // Check for AnimeSalt base64 encryption 
                        // Enhanced: strip all whitespace/newlines that AnimeSalt CDNs might inject
                        const trimmedContent = content.trim();
                        if (!trimmedContent.includes('-->') && trimmedContent.length > 50 && /^[a-z0-9+/= \n\r\t]+$/i.test(trimmedContent)) {
                            try {
                                const cleanB64 = trimmedContent.replace(/\s/g, ''); 
                                const decoded = atob(cleanB64);
                                if (decoded.includes('-->') || /\d{1,2}:\d{2}:\d{2}/.test(decoded) || /\[Script Info\]/i.test(decoded)) {
                                    content = decoded;
                                }
                            } catch (_) { }
                        }

                        const finalLn = content.trim().toLowerCase();
                        const finalHasCue = content.includes('-->');
                        const finalHasSrt = /\d{1,2}:\d{2}:\d{2}[.,]\d{2,3}/.test(content);
                        const looksAssBody = /^\s*\[script info\]/i.test(content) || /^\s*\[events\]/im.test(content) || /dialogue:\s*[^,]*,\d+:\d{1,2}:\d{1,2}\.\d{1,2}/i.test(content);

                        let vttContent = '';
                        if (looksLikeSrt || (finalHasCue && finalHasSrt && !finalLn.startsWith('webvtt'))) vttContent = srtToVtt(content);
                        else if (looksLikeAss || looksAssBody) vttContent = assToVtt(content);
                        else if (finalLn.startsWith('webvtt')) vttContent = sanitizeText(content);
                        else if (finalHasCue) vttContent = `WEBVTT\n\n${sanitizeText(content)}`;

                        if (vttContent) {
                            subtitleBlobCache.set(lower, vttContent);
                            return toVttUrl(vttContent);
                        }
                    } else if (txtRes.status === 404 || txtRes.status === 403) {
                        subtitleBlobCache.set(lower, '');
                        return '';
                    }
                } catch (e) { console.warn('Sub fetch fail:', e); }
                
                // Fallback: if we couldn't parse/download but the file exists, return the raw proxied URL
                try {
                    const testRes = await fetch(proxied, { method: 'HEAD', signal: AbortSignal.timeout(8000) });
                    if (testRes.ok) return proxied;
                } catch (_) { }
            } catch (_) { }
            return '';
        }

        function applyExternalSubtitlesToVideoSync(videoEl) {
            if (!videoEl || !Array.isArray(window.externalSubtitleTracks) || window.externalSubtitleTracks.length === 0) return;
            
            // Derive API origin for proxy. Must point to the BACKEND server, not the frontend origin.
            let apiOrigin = '';
            try {
                // Priority: activeApiBase (runtime) -> window.__STREAMVERSE_CONFIG__ -> API_BASE -> location.origin
                const configBase = (typeof window !== 'undefined' && window.__STREAMVERSE_CONFIG__?.PROD_META_API_BASE);
                const base = (typeof activeApiBase !== 'undefined' && activeApiBase) ? activeApiBase : 
                             (configBase || (typeof API_BASE !== 'undefined' ? API_BASE : ''));
                
                if (base && base.startsWith('http')) {
                    const urlObj = new URL(base);
                    apiOrigin = `${urlObj.protocol}//${urlObj.host}`;
                } else {
                    apiOrigin = location.origin; // Last resort
                }
            } catch (e) {
                apiOrigin = location.origin;
            }

            console.log('[sub] iOS Sync Injection using API Origin:', apiOrigin);
            videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach(t => t.remove());
            
            window.externalSubtitleTracks.forEach((sub, i) => {
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = sub.label || `Subtitle ${i + 1}`;
                track.srclang = sub.srclang || 'en';
                const rs = String(sub?.src || '').trim();
                const rf = String(sub?.referer || '').trim();
                
                // Use the /utils/vtt proxy. IMPORTANT: Server must return Content-Type: text/vtt
                const vttUrl = `${apiOrigin}/utils/vtt?url=${encodeURIComponent(rs)}${rf ? `&referer=${encodeURIComponent(rf)}` : ''}`;
                track.src = vttUrl;
                track.dataset.extSub = '1';
                track.id = `track-${i}`;
                
                if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                    track.default = true;
                }
                
                videoEl.appendChild(track);
                
                // Immediately force the track to be active in the native media engine
                // On iOS, this ensures the 'CC' button in native HUD shows the track as selected.
                try {
                    if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                        track.track.mode = 'showing';
                    } else {
                        track.track.mode = 'disabled';
                    }
                } catch(e) { /* Track might not be ready yet */ }
            });
            console.log(`[sub] iOS Sync Injection complete: ${window.externalSubtitleTracks.length} tracks added.`);
        }

        async function applyExternalSubtitlesToVideo(videoEl) {
            if (!videoEl) return;
            const applyVersion = ++subtitleApplyVersion;

            if (!Array.isArray(externalSubtitleTracks) || externalSubtitleTracks.length === 0) {
                videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }


            const prepared = await Promise.all(
                externalSubtitleTracks.map(async (sub) => ({
                    ...sub,
                    resolvedSrc: await resolveSubtitleTrackSrc(sub),
                })),
            );
            if (applyVersion !== subtitleApplyVersion) return;

            const resolved = prepared.filter((sub) => !!sub.resolvedSrc);
            if (!resolved.length) {
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }

            // Replace old external tracks only when we have a ready replacement set.
            videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());

            resolved.forEach((sub, i) => {
                const track = document.createElement('track');
                track.kind = 'captions'; // captions work more reliably in native iOS menu
                
                let trackLabel = sub.label || `Subtitle ${i + 1}`;
                if (sub.provider) {
                    const pLabel = providerLabel(sub.provider);
                    if (!trackLabel.toLowerCase().includes(pLabel.toLowerCase())) {
                        trackLabel += ` (${pLabel})`;
                    }
                }
                track.label = trackLabel;
                
                track.srclang = sub.srclang || 'en';
                track.src = sub.resolvedSrc || '';
                track.dataset.extSub = '1';

                // On iOS, the 'default' attribute is the most reliable way to ensure the track 
                // is auto-selected in the native system menu when entering fullscreen.
                if (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex) {
                    track.default = true;
                }
                // track.crossOrigin is not a valid property; handled by video element
                track.addEventListener('load', () => {
                    console.log('[sub] track loaded:', track.label);
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                    // If this was the intended active track, refresh
                    if (activeSubtitleTrackIndex >= 0 && videoEl.textTracks?.[activeSubtitleTrackIndex]?.label === track.label) {
                       renderSubtitleOverlayFromTrack(videoEl.textTracks[activeSubtitleTrackIndex]);
                    }
                });
                track.addEventListener('error', (e) => {
                    console.warn('[sub] track load error:', track.label, e);
                });
                videoEl.appendChild(track);
            });
            console.log(`Subtitles prepared=${prepared.length}, attached=${videoEl.querySelectorAll('track[data-ext-sub="1"]').length}`);

            setTimeout(() => {
                bindSubtitleCueListeners();
                bindNativeTrackChangeListener();

                const preferredLabel = localStorage.getItem('preferredSubtitleLabel');
                const tracks = Array.from(videoEl.textTracks || []);
                let bestIdx = -1;

                if (preferredLabel && tracks.length) {
                    bestIdx = tracks.findIndex(t => t.label === preferredLabel);
                }

                if (bestIdx === -1) {
                    bestIdx = getDefaultEnglishSubtitleIndex();
                }

                selectSubtitleTrack(bestIdx);
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
            }, 200);
        }

        function mergeSubtitleTrackLists(primary, secondary) {
            const p = Array.isArray(primary) ? primary : [];
            const s = Array.isArray(secondary) ? secondary : [];
            const merged = [...p, ...s].filter((t) => t && (t.src || t.url));
            const seen = new Set();
            return merged.filter((t) => {
                const key = `${String(t.src || t.url)}|${String(t.srclang || '').toLowerCase()}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        async function fetchAnimeSubtitleFallback() {
            if (!currentIsLikelyAnime) return [];
            const mediaTitle = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || '');
            const preferredYear = getPreferredMediaYear();
            if (!mediaTitle) return [];
            const absoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);
            const subtitleCacheKey = `${mediaTitle.toLowerCase()}::${preferredYear || ''}::ep${absoluteEpisodeNo}`;
            if (animeSubtitleCache.has(subtitleCacheKey)) {
                return animeSubtitleCache.get(subtitleCacheKey) || [];
            }

            for (const provider of ANIME_SUBTITLE_FALLBACK_PROVIDERS) {
                try {
                    const base = getAnimeProviderBase(provider);
                    const selectedSeason = tvSeasons?.[curSeason];
                    const sNoRaw = Number(selectedSeason?.seasonNo);
                    const selectedSeasonNo = Number.isFinite(sNoRaw) && sNoRaw > 0 ? sNoRaw : (curSeason + 1);
                    const providerResolution = getProviderAnimeResolutionContext(
                        provider,
                        mediaTitle,
                        selectedSeasonNo,
                        absoluteEpisodeNo,
                        selectedSeason?.name || '',
                    );

                    const terms = getAnimeSearchTerms(
                        providerResolution.mediaTitle,
                        preferredYear,
                        providerResolution.seasonNo,
                        providerResolution.seasonLabel,
                    );
                    const providerEpisodeNo = Math.max(1, Number(providerResolution.episodeNo || absoluteEpisodeNo || 1));
                    const providerAnimeIdOverride = String(providerResolution.animeIdOverride || '').trim();
                    let providerEpisodeId = null;
                    if (provider === 'justanime' && providerAnimeIdOverride) {
                        providerEpisodeId = await resolveJustAnimeOverrideEpisodeId(
                            providerAnimeIdOverride,
                            MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1,
                            getProviderTimeout(provider, 'subtitleFallback', REQ_TIMEOUT.subtitleFallback),
                        );
                    }
                    const providerCacheScope = getProviderAnimeCacheScope(
                        provider,
                        providerResolution.mediaTitle,
                        preferredYear,
                        providerResolution.seasonLabel,
                    );
                    const subtitleTimeoutMs = getProviderTimeout(provider, 'subtitleFallback', REQ_TIMEOUT.subtitleFallback);

                    // Check show-level cache to skip search+info on subsequent episodes
                    const cachedAnimeId = providerAnimeIdOverride || justanimeAnimeIdCache.get(providerCacheScope);

                    if (cachedAnimeId) {
                        // Fast path: already know the anime ID, build episode ID directly
                        if (provider === 'justanime') {
                            providerEpisodeId = `${cachedAnimeId}$episode$${MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1}`;
                        } else {
                            // For other providers we still need the episode list, but we skip the search
                            const { res: infoRes } = await fetchJsonWithApiFallback(
                                buildAnimeInfoUrl(provider, cachedAnimeId),
                                { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                            );
                            if (infoRes.ok) {
                                let info = await infoRes.json();
                                if (info?.data) info = info.data;
                                const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                                const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                    || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                    || episodes[0];
                                providerEpisodeId = target?.id;
                            }
                        }
                    } else {
                        // Slow path: search + info to discover anime ID
                        let best = null;
                        for (const term of terms) {
                            const searchUrl = `${base}/${encodeURIComponent(term)}`;
                            const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl, { signal: AbortSignal.timeout(subtitleTimeoutMs) });
                            if (!searchRes.ok) continue;
                            const searchData = await searchRes.json();
                            const results = getAnimeSearchResults(searchData);
                            best = pickAnimeResultByTitle(results, mediaTitle, preferredYear, selectedSeasonNo);
                            if (best?.id) break;
                        }
                        const animeId = best?.id;
                        if (!isValidAnimeInfoId(animeId)) continue;

                        // Cache the anime ID so future episodes skip this step
                        justanimeAnimeIdCache.set(providerCacheScope, providerAnimeIdOverride || animeId);

                        const resolvedAnimeId = providerAnimeIdOverride || animeId;
                        const { res: infoRes } = await fetchJsonWithApiFallback(
                            buildAnimeInfoUrl(provider, resolvedAnimeId),
                            { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                        );
                        if (!infoRes.ok) continue;
                        let info = await infoRes.json();
                        if (info?.data) info = info.data;

                        if (provider === 'justanime' && info?.id) {
                            providerEpisodeId = `${info.id}$episode$${MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1}`;
                        } else {
                            const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                            const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                || episodes[0];
                            providerEpisodeId = target?.id;
                        }
                    }

                    if (!providerEpisodeId) continue;

                    const { res: watchRes } = await fetchJsonWithApiFallback(
                        buildAnimeWatchUrl(provider, providerEpisodeId),
                        { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                    );
                    if (!watchRes.ok) continue;
                    const watchData = await watchRes.json();
                    const headers = watchData?.headers || watchData?.data?.headers || {};
                    const referer = headers?.Referer || headers?.referer || null;
                    const subs = normalizeSubtitleEntries(watchData?.data || watchData, provider, referer);
                    if (subs.length) {
                        console.log(`Subtitle fallback success from ${provider}: ${subs.length}`);
                        animeSubtitleCache.set(subtitleCacheKey, subs);
                        return subs;
                    }
                } catch (_) { }
            }
            animeSubtitleCache.set(subtitleCacheKey, []);
            return [];
        }

        function closeCustomMenus() {
            qualityMenu.classList.remove('active');
            captionsMenu.classList.remove('active');
            playbackMenu.classList.remove('active');
            preferencesMenu.classList.remove('active');
            volumeMenu.classList.remove('active');
        }

        function updateCaptionsButtonVisibility() {
            if (!captionsBtn || !video) return;
            const hasTracks = (video.querySelectorAll('track').length > 0)
                || (video.textTracks && video.textTracks.length > 0);
            const showForAnime = currentIsLikelyAnime === true;
            captionsBtn.style.display = (hasTracks || showForAnime) ? 'inline-flex' : 'none';
            if (!hasTracks && !showForAnime) captionsMenu.classList.remove('active');
        }

        function ensureSubtitleOverlay() {
            let overlay = document.getElementById('subtitleOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'subtitleOverlay';
                overlay.style.position = 'fixed';
                overlay.style.left = '8%';
                overlay.style.right = '8%';
                overlay.style.bottom = '12%';
                overlay.style.zIndex = '240';
                overlay.style.textAlign = 'center';
                overlay.style.pointerEvents = 'none';
                overlay.style.color = '#fff';
                overlay.style.fontSize = 'clamp(16px, 2.2vw, 30px)';
                overlay.style.fontWeight = '700';
                overlay.style.textShadow = '0 2px 6px rgba(0,0,0,.95), 0 0 12px rgba(0,0,0,.8)';
                overlay.style.lineHeight = '1.35';
                overlay.style.whiteSpace = 'pre-line';
                overlay.style.display = 'none';
                overlay.style.userSelect = 'none';
                document.body.appendChild(overlay);
            }
            return overlay;
        }

        function renderSubtitleOverlayFromTrack(track) {
            const overlay = ensureSubtitleOverlay();
            if (!track) {
                overlay.innerHTML = '';
                overlay.style.display = 'none';
                return;
            }
            const cues = track.activeCues ? Array.from(track.activeCues) : [];
            const text = cues.map((c) => c.text || '').filter(Boolean).join('\n');
            // Use innerHTML to allow basic formatting tags like <i>, <b> provided by VTT
            overlay.innerHTML = text;
            overlay.style.display = text ? 'block' : 'none';
        }

        function bindSubtitleCueListeners() {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((track) => {
                if (track.__overlayBound) return;
                track.addEventListener('cuechange', () => {
                    const activeTrack = activeSubtitleTrackIndex >= 0
                        ? (video.textTracks[activeSubtitleTrackIndex] || null)
                        : null;
                    renderSubtitleOverlayFromTrack(activeTrack);
                });
                track.__overlayBound = true;
            });
        }

        // Flag to suppress our own programmatic track mode changes from triggering the native listener
        let _suppressNativeTrackChange = false;

        function bindNativeTrackChangeListener() {
            if (!video || !video.textTracks) return;
            if (video.textTracks.__nativeChangeBound) return;
            video.textTracks.__nativeChangeBound = true;

            video.textTracks.addEventListener('change', () => {
                // Ignore changes we made ourselves (silenceNativeTracks)
                if (_suppressNativeTrackChange) return;

                const tracks = Array.from(video.textTracks);
                const nativeShowingIdx = tracks.findIndex(t => t.mode === 'showing');

                if (nativeShowingIdx >= 0) {
                    // iOS selected a track natively — sync our state
                    console.log('[sub] iOS native track change → idx', nativeShowingIdx, tracks[nativeShowingIdx].label);
                    activeSubtitleTrackIndex = nativeShowingIdx;
                    localStorage.setItem('preferredSubtitleLabel', tracks[nativeShowingIdx].label);

                    // Sync overlay display if not in native fullscreen
                    if (!_iosNativePlayerActive) {
                        renderSubtitleOverlayFromTrack(tracks[nativeShowingIdx]);
                    }
                } else if (!_iosNativePlayerActive) {
                    // iOS turned off all tracks — only sync 'Off' if NOT in native player
                    // (Native player might briefly set all to hidden during transitions)
                    activeSubtitleTrackIndex = -1;
                    localStorage.removeItem('preferredSubtitleLabel');
                    renderSubtitleOverlayFromTrack(null);
                }
                buildCaptionsMenu();
            });
        }

        function silenceNativeTracks() {
            // On iOS when the native player is active, we must NOT silence tracks.
            // NEW STRATEGY: We keep the active track in 'showing' mode even when inline, 
            // but we hide the browser's native rendering of it using CSS. This ensures 
            // the System Player (AVKit) already has the track active when entering fullscreen.
            if (_iosNativePlayerActive) return;
            if (!video || !video.textTracks) return;

            _suppressNativeTrackChange = true;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((t, i) => {
                const isTheActiveOne = (activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex);
                if (isTheActiveOne) {
                    // On iOS, use 'showing' so it's ready for native fullscreen.
                    // On other platforms, 'hidden' is safer to rely solely on our custom overlay.
                    if (IS_IOS) {
                        t.mode = 'showing';
                    } else {
                        t.mode = 'hidden';
                    }
                } else {
                    t.mode = 'disabled';
                }
            });
            setTimeout(() => { _suppressNativeTrackChange = false; }, 50);
        }

        // Switch subtitle tracks to 'showing' for iOS native player
        function activateTracksForIOSNativePlayer() {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            console.log(`[sub] iOS Native Handoff: ${tracks.length} tracks, activeIdx=${activeSubtitleTrackIndex}`);
            
            const runActivation = () => {
                tracks.forEach((t, i) => {
                    const shouldBeActive = activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex;
                    if (shouldBeActive) {
                        t.mode = 'showing';
                    } else {
                        t.mode = 'disabled';
                    }
                });
            };

            // Run immediately and again with increasing delays to catch the native transition
            runActivation();
            setTimeout(runActivation, 300);
            setTimeout(runActivation, 800);
            setTimeout(runActivation, 1500);
        }

        // Restore subtitle tracks to 'hidden'/'disabled' after iOS native player exits
        function deactivateTracksFromIOSNativePlayer() {
             _iosNativePlayerActive = false;
             silenceNativeTracks();
             // Re-bind cue listeners in case iOS cleared them
             bindSubtitleCueListeners();
             // Ensure custom overlay is updated
             if (activeSubtitleTrackIndex >= 0 && video && video.textTracks) {
                 renderSubtitleOverlayFromTrack(video.textTracks[activeSubtitleTrackIndex]);
             }
        }

        function selectSubtitleTrack(index) {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            activeSubtitleTrackIndex = (index >= 0 && index < tracks.length) ? index : -1;
            
            console.log('[sub] selecting track:', activeSubtitleTrackIndex, activeSubtitleTrackIndex >= 0 ? tracks[activeSubtitleTrackIndex].label : 'Off');
            
            silenceNativeTracks();
            const activeTrack = activeSubtitleTrackIndex >= 0 ? tracks[activeSubtitleTrackIndex] : null;
            
            renderSubtitleOverlayFromTrack(activeTrack);
            buildCaptionsMenu();
            
            // Persist preference
            if (activeSubtitleTrackIndex >= 0) {
                localStorage.setItem('preferredSubtitleLabel', tracks[activeSubtitleTrackIndex].label);
            } else {
                localStorage.removeItem('preferredSubtitleLabel');
            }
        }

        function getDefaultEnglishSubtitleIndex() {
            if (!video || !video.textTracks) return -1;
            const tracks = Array.from(video.textTracks);
            const idx = tracks.findIndex((track) => {
                const label = String(track.label || '').toLowerCase();
                const language = String(track.language || '').toLowerCase();
                return (
                    language === 'en' ||
                    language === 'eng' ||
                    language.startsWith('en-') ||
                    label === 'en' ||
                    label.includes('english')
                );
            });
            return idx >= 0 ? idx : (tracks.length > 0 ? 0 : -1);
        }

        function buildCaptionsMenu() {
            if (!captionsMenu || !video) return;
            captionsMenu.innerHTML = '';
            const tracks = video.textTracks ? Array.from(video.textTracks) : [];
            const activeIdx = (activeSubtitleTrackIndex >= 0 && activeSubtitleTrackIndex < tracks.length)
                ? activeSubtitleTrackIndex
                : -1;

            if (tracks.length === 0 && currentIsLikelyAnime) {
                const emptyItem = document.createElement('div');
                emptyItem.className = 'menu-item';
                emptyItem.textContent = 'No subtitles loaded';
                emptyItem.style.opacity = '0.8';
                captionsMenu.appendChild(emptyItem);

                const retryItem = document.createElement('div');
                retryItem.className = 'menu-item';
                retryItem.textContent = 'Retry subtitle fetch';
                retryItem.onclick = async () => {
                    try {
                        const subs = await fetchAnimeSubtitleFallback();
                        if (Array.isArray(subs) && subs.length) {
                            externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);
                            if (video) await applyExternalSubtitlesToVideo(video);
                        }
                    } catch (_) { }
                    buildCaptionsMenu();
                    updateCaptionsButtonVisibility();
                };
                captionsMenu.appendChild(retryItem);
                return;
            }

            const offItem = document.createElement('div');
            offItem.className = `menu-item ${activeIdx === -1 ? 'selected' : ''}`;
            offItem.textContent = 'Off';
            offItem.onclick = () => {
                selectSubtitleTrack(-1);
            };
            captionsMenu.appendChild(offItem);

            tracks.forEach((track, idx) => {
                const label = track.label || track.language || `Subtitle ${idx + 1}`;
                const item = document.createElement('div');
                item.className = `menu-item ${idx === activeIdx ? 'selected' : ''}`;
                item.textContent = label;
                item.onclick = () => {
                    selectSubtitleTrack(idx);
                };
                captionsMenu.appendChild(item);
            });
        }

        function setVolumeBoost(level) {
            if (!video) return;
            // Extended: 0 = mute, 100 = normal, 200 = double boost
            volumeBoost = Math.max(0, Math.min(200, level));

            if (volumeBoost !== 100 || IS_IOS) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // If sourceNode doesn't exist or is attached to the wrong element
                if (!sourceNode || sourceNode.mediaElement !== video) {
                    try {
                        if (sourceNode) sourceNode.disconnect();
                        sourceNode = audioCtx.createMediaElementSource(video);
                        if (!gainNode) gainNode = audioCtx.createGain();
                        sourceNode.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                    } catch (e) {
                        console.warn('AudioContext boost failed:', e);
                        return;
                    }
                }
            }

            if (audioCtx && gainNode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                gainNode.gain.value = volumeBoost / 100;
            }

            const boostValEl = document.querySelector('.boost-value');
            if (boostValEl) {
                boostValEl.textContent = volumeBoost > 100 ? `${volumeBoost}%` : 'Off';
            }

            const boostSlider = document.querySelector('.boost-slider');
            if (boostSlider) {
                boostSlider.value = String(volumeBoost);
                const percent = (volumeBoost - 100) + '%';
                boostSlider.style.setProperty('--boost-percent', percent);
            }

            // Update tick highlights
            const ticks = document.querySelectorAll('.tick');
            const activeCount = Math.round(((volumeBoost - 100) / 100) * (ticks.length - 1));
            ticks.forEach((t, i) => {
                t.classList.toggle('active', i <= activeCount && volumeBoost > 100);
            });
        }

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function setPlayIcon(isPlaying) {
            if (!playPauseBtn) return;
            playPauseBtn.innerHTML = isPlaying
                ? '<i class="fa-solid fa-pause"></i>'
                : '<i class="fa-solid fa-play"></i>';
        }

        function updateMuteIcon() {
            if (!muteBtn || !video) return;
            if (video.muted || video.volume === 0) muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            else if (video.volume < 0.5) muteBtn.innerHTML = '<i class="fa-solid fa-volume-low"></i>';
            else muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
        }

        function updateVolumeFromClientX(clientX, slider) {
            if (!slider || !Number.isFinite(clientX) || !video) return;
            if (!slider) return;
            const rect = slider.getBoundingClientRect();
            if (!rect || !Number.isFinite(rect.width) || rect.width <= 0) return;
            const clamped = Math.min(rect.right, Math.max(rect.left, clientX));
            const percent = ((clamped - rect.left) / rect.width) * 100;
            const val = Math.max(0, Math.min(100, percent));
            slider.value = String(Math.round(val));
            slider.style.setProperty('--vol-percent', `${val}%`);
            video.volume = val / 100;
            video.muted = val === 0;
            updateMuteIcon();
        }

        function buildVolumeMenu() {
            if (!volumeMenu || !video) return;
            volumeMenu.innerHTML = '';
            volumeSliderEl = null;
            volumeToggleEl = null;

            const row = document.createElement('div');
            row.className = 'volume-row';

            const toggle = document.createElement('button');
            toggle.className = 'volume-toggle';
            toggle.type = 'button';
            toggle.innerHTML = video.muted || video.volume === 0
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
            toggle.onclick = (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                if (!video.muted && video.volume === 0) video.volume = 0.5;
                updateMuteIcon();
                if (volumeSliderEl) {
                    const next = Math.round((video.muted ? 0 : video.volume) * 100);
                    volumeSliderEl.value = String(next);
                    volumeSliderEl.style.setProperty('--vol-percent', `${next}%`);
                }
                if (volumeToggleEl) {
                    volumeToggleEl.innerHTML = video.muted || video.volume === 0
                        ? '<i class="fa-solid fa-volume-xmark"></i>'
                        : '<i class="fa-solid fa-volume-high"></i>';
                }
            };

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = '0';
            slider.max = '100';
            slider.step = '1';
            slider.className = 'volume-slider';
            slider.value = String(Math.round((video.muted ? 0 : video.volume) * 100));
            slider.style.setProperty('--vol-percent', `${slider.value}%`);
            slider.addEventListener('input', (e) => {
                const val = Math.max(0, Math.min(100, Number.parseInt(e.target.value || '0', 10)));
                video.volume = val / 100;
                video.muted = val === 0;
                slider.style.setProperty('--vol-percent', `${val}%`);
                updateMuteIcon();
                // If sliding down, maybe reset boost?
                if (val < 100 && volumeBoost > 100) {
                    setVolumeBoost(100);
                }
            });
            slider.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                slider.setPointerCapture?.(e.pointerId);
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointermove', (e) => {
                if (!slider.hasPointerCapture?.(e.pointerId)) return;
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointerup', (e) => {
                if (slider.hasPointerCapture?.(e.pointerId)) slider.releasePointerCapture?.(e.pointerId);
            });

            volumeSliderEl = slider;
            volumeToggleEl = toggle;
            row.appendChild(toggle);
            row.appendChild(slider);
            volumeMenu.appendChild(row);

            // Boost Row

            const boostValue = document.createElement('span');
            boostValue.className = 'boost-value';
            boostValue.textContent = volumeBoost > 100 ? `${volumeBoost}%` : 'Off';

            boostHeader.appendChild(boostLabel);
            boostHeader.appendChild(boostValue);
            boostRow.appendChild(boostHeader);

            const sliderCont = document.createElement('div');
            sliderCont.className = 'boost-slider-container';

            const ticksCont = document.createElement('div');

            // Create 6 ticks from 100% to 200%

            }
            sliderCont.appendChild(ticksCont);

            const bSlider = document.createElement('input');
            bSlider.type = 'range';
            bSlider.min = '100';
            bSlider.max = '200';
            bSlider.step = '2'; // small steps for smoothness
            bSlider.className = 'boost-slider';
            bSlider.value = String(volumeBoost);
            bSlider.oninput = (e) => {
                const val = parseInt(e.target.value, 10);
                if (video.volume < 1.0 && val > 100) {

                    if (volumeSliderEl) {
                        volumeSliderEl.value = '100';
                        volumeSliderEl.style.setProperty('--vol-percent', '100%');
                    }
                }
                setVolumeBoost(val);
            };

            sliderCont.appendChild(bSlider);
            boostRow.appendChild(sliderCont);
            volumeMenu.appendChild(boostRow);

            // Initial tick update
            setTimeout(() => setVolumeBoost(volumeBoost), 0);
        }

        function syncTimeUI() {
            if (!video) return;
            durationTimeEl.textContent = formatTime(video.duration);
            if (isSeekDragging && Number.isFinite(pendingSeekPercent) && isFinite(video.duration) && video.duration > 0) {
