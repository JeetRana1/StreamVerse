                        try {
                            parsed = await fetchJsonWithRetry(infoUrl, 12000, 30000);
                            if (parsed) break;
                        } catch (e) {
                            lastErr = e;
                        }
                    }
                    info = parsed?.data || parsed;
                    if (!info || info.title === 'Unknown' || info.message === 'TMDB metadata fetch failed') {
                        console.warn('No valid info received, using fallback');
                        // Provide fallback info to prevent crashes
                        info = {
                            id: TMDB_ID,
                            title: 'Unknown Title',
                            name: 'Unknown Title',
                            type: MEDIA_TYPE,
                            genres: [],
                            original_language: 'en'
                        };
                        setLoader('Fetching media info...', 'Using fallback data (API unavailable)');
                    }
                }
                currentMediaInfo = info;
                console.log('currentMediaInfo.title:', currentMediaInfo?.title, 'TMDB_ID:', TMDB_ID);
                currentAnimeCanonicalInfo = null;
                currentAnimeCanonicalInfoPromise = null;
                currentAnimeCanonicalInfoKey = '';
                // Clear anime caches when loading new media to prevent cross-contamination
                justanimeAnimeIdCache.clear();
                animeProviderInfoCache.clear();
                animeSubtitleCache.clear();
                clearTimeout(safetyTimer);

                // Safety check: ensure info is valid
                if (!info || typeof info !== 'object') {
                    console.error('Invalid info object:', info);
                    // Create emergency fallback
                    info = {
                        id: TMDB_ID,
                        title: 'Unknown Title',
                        name: 'Unknown Title',
                        type: MEDIA_TYPE,
                        genres: [],
                        original_language: 'en'
                    };
                }

                const title = info.title || info.name || 'Unknown Title';
                document.title = `Watching: ${title} | StreamVerse`;
                document.getElementById('media-title').textContent = title;
                if (info.cover || info.image) {
                    currentCoverUrl = info.cover || info.image;
                    loader.style.backgroundImage = `url('${currentCoverUrl}')`;
                }

                const isTv = MEDIA_TYPE === 'tv' ||
                    (info.type || '').toLowerCase().includes('tv') ||
                    (info.type || '').toLowerCase().includes('series');

                const genreNames = (Array.isArray(info.genres) ? info.genres : [])
                    .map(g => (typeof g === 'string' ? g : (g?.name || '')))
                    .map(g => String(g).toLowerCase());
                const originalLang = String(info.original_language || info.originalLanguage || '').toLowerCase();
                const animeHint = String(info.title || info.name || '').toLowerCase();
                const isLikelyAnime = (
                    genreNames.includes('animation') ||
                    originalLang === 'ja' ||
                    animeHint.includes('anime')
                );
                currentIsLikelyAnime = isLikelyAnime;
                aniSkipFetchStatus = 'none';
                resetAnimeSkipState();

                if (currentIsLikelyAnime) {
                    await getCanonicalAnimeInfo();
                }

                // Provider pool selection:
                // - Forced provider: run only that provider.
                // - Movie mode: never mix anime providers.
                // - Anime mode: prefer anime providers first, then movie providers as fallback.
                if (FORCED_PROVIDER) {
                    activeProviders = [FORCED_PROVIDER];
                } else if (MEDIA_TYPE === 'movie') {
                    activeProviders = [...MOVIE_PROVIDERS];
                } else if (isLikelyAnime) {
                    activeProviders = [...ANIME_PROVIDERS];
                } else {
                    activeProviders = [...MOVIE_PROVIDERS];
                }
                console.log('activeProviders:', activeProviders, 'FORCED_PROVIDER:', FORCED_PROVIDER);
                buildChips();

                if (isTv) {
                    await initTv(info);
                } else {
                    document.getElementById('media-meta').textContent = 'Movie';
                    if (customEpisodeBtn) customEpisodeBtn.style.display = 'none';
                    if (nextEpisodeBtn) nextEpisodeBtn.style.display = 'none';
                    const epId = info?.episodeId || info?.id || null;
                    // Some provider-specific TMDB info responses omit episodeId/id.
                    // fetchSources() resolves provider episode IDs independently via search/info paths.
                    await fetchSources(epId);
                }
            } catch (err) {
                clearTimeout(safetyTimer);
                console.error('Init error:', err);
                showError('Failed to Load', err.message);
            }
        }

        // ----------------------------------------------------------------------------------------------------
        //  TV SERIES
        // ----------------------------------------------------------------------------------------------------
        async function initTv(info) {
            setLoader('Loading series...', 'Building episode list');
            tvSeasons = buildTvSeasonsFromInfo(info);
            providerSeasonCatalog = new Map();
            activeMenuProvider = '';
            const preferredYear = getPreferredMediaYear();
            const animeSeriesTitle = normalizeAnimeSearchQuery(
                info?.title || info?.name || currentMediaInfo?.title || currentMediaInfo?.name || '',
            );
            if (currentIsLikelyAnime && animeSeriesTitle) {
                const makeSeasonKey = (seasonNo, partNo = 0) => `${Number(seasonNo || 0)}::${Number(partNo || 0)}`;
                const isGenericSeasonName = (value) => /^\s*(season|part)\s*\d+\s*$/i.test(String(value || '').trim());
                const toEpisodeNumber = (ep, fallbackIndex) => {
                    const raw = Number(ep?.number || ep?.episode || ep?.episodeNum || 0);
                    if (Number.isFinite(raw) && raw > 0) return raw;
                    const idMatch = String(ep?.id || '').match(/(?:-|\b)(\d+)x(\d+)$/i);
                    if (idMatch?.[2]) return Number(idMatch[2]);
                    return fallbackIndex + 1;
                };
                const toSeasonNumber = (ep, fallbackSeason) => {
                    const raw = Number(ep?.season || ep?.seasonNumber || ep?.season_number || ep?.seasonNo || 0);
                    if (Number.isFinite(raw) && raw > 0) return raw;
                    const idMatch = String(ep?.id || '').match(/(?:-|\b)(\d+)x(\d+)$/i);
                    if (idMatch?.[1]) return Number(idMatch[1]);
                    return fallbackSeason;
                };
                const buildSeasonListFromEpisodes = (provider, providerAnimeId, providerTitle, episodes) => {
                    const buckets = new Map();
                    (Array.isArray(episodes) ? episodes : []).forEach((ep, index) => {
                        if (!ep || typeof ep !== 'object') return;
                        const seasonNo = toSeasonNumber(ep, 1);
                        const seasonPartNo = Number(ep?.part || ep?.partNo || ep?.seasonPart || 0) || 0;
                        const key = makeSeasonKey(seasonNo, seasonPartNo);
                        const episodeNo = toEpisodeNumber(ep, index);
                        const episodeTitle = String(ep?.title || `Episode ${episodeNo}`);
                        if (!buckets.has(key)) {
                            buckets.set(key, {
                                seasonNo,
                                seasonPartNo,
                                sourceOrder: index,
                                dedupeKey: key,
                                name: seasonPartNo > 0 ? `Part ${seasonPartNo}` : `Season ${seasonNo}`,
                                providerAnimeId: providerAnimeId || null,
                                episodes: [],
                                provider,
                                providerTitle: String(providerTitle || '').trim(),
                            });
                        }
                        const bucket = buckets.get(key);
                        bucket.episodes.push({
                            id: String(ep?.id || '').trim() || null,
                            episode: episodeNo,
                            number: episodeNo,
                            episodeNum: episodeNo,
                            title: episodeTitle,
                        });
                        if (!bucket.providerAnimeId && providerAnimeId) bucket.providerAnimeId = providerAnimeId;
                    });

                    return Array.from(buckets.values())
                        .map((season) => ({
                            ...season,
                            episodes: season.episodes.sort((a, b) => Number(a.episode || 0) - Number(b.episode || 0)),
                        }))
                        .sort((a, b) => {
                            const seasonDiff = Number(a.seasonNo || 0) - Number(b.seasonNo || 0);
                            if (seasonDiff !== 0) return seasonDiff;
                            const partDiff = Number(a.seasonPartNo || 0) - Number(b.seasonPartNo || 0);
                            if (partDiff !== 0) return partDiff;
                            return Number(a.sourceOrder || 0) - Number(b.sourceOrder || 0);
                        });
                };
                const mergeSeasonLists = (baseList, extraList) => {
                    const merged = [...(Array.isArray(baseList) ? baseList : [])];
                    for (const season of (Array.isArray(extraList) ? extraList : [])) {
                        const key = makeSeasonKey(season?.seasonNo, season?.seasonPartNo);
                        const existing = merged.find((row) => makeSeasonKey(row?.seasonNo, row?.seasonPartNo) === key);
                        if (!existing) {
                            merged.push({ ...season, episodes: [...(season?.episodes || [])] });
                            continue;
                        }
                        if ((season?.episodes?.length || 0) > (existing?.episodes?.length || 0)) {
                            existing.episodes = [...season.episodes];
                        }
                        if (!existing.providerAnimeId && season.providerAnimeId) existing.providerAnimeId = season.providerAnimeId;
                        if (isGenericSeasonName(existing.name) && !isGenericSeasonName(season.name) && season.name) {
                            existing.name = season.name;
                        }
                    }
                    return merged.sort((a, b) => {
                        const seasonDiff = Number(a?.seasonNo || 0) - Number(b?.seasonNo || 0);
                        if (seasonDiff !== 0) return seasonDiff;
                        const partDiff = Number(a?.seasonPartNo || 0) - Number(b?.seasonPartNo || 0);
                        if (partDiff !== 0) return partDiff;
                        return Number(a?.sourceOrder || 0) - Number(b?.sourceOrder || 0);
                    });
                };
                const hydrateAnimeProviderSeasons = async (provider) => {
                    const providerName = String(provider || '').toLowerCase();
                    const timeoutMs = 12000;

                    if (providerName === 'satoru') {
                        const { res: seriesRes } = await fetchJsonWithApiFallback(
                            buildSatoruSeriesUrl(animeSeriesTitle, preferredYear),
                            { signal: AbortSignal.timeout(timeoutMs) },
                        );
                        if (!seriesRes.ok) return [];
                        const seriesData = await seriesRes.json();
                        const entries = Array.isArray(seriesData?.entries) ? seriesData.entries : [];
                        return entries.flatMap((entry, index) => {
                            const entryTitle = String(entry?.title || `Part ${index + 1}`).trim();
                            const entryId = String(entry?.id || '').trim();
                            const seasonNo = Number(
                                extractSeasonNumberFromTitle(entryTitle)
                                || extractSeasonNumberFromTitle(entryId)
                                || entry?.season
                                || entry?.seasonNo
                                || index + 1,
                            ) || (index + 1);
                            const seasonPartNo = Number(
                                extractPartNumberFromTitle(entryTitle)
                                || extractPartNumberFromTitle(entryId)
                                || 0,
                            ) || 0;
                            const episodes = Array.isArray(entry?.episodes) ? entry.episodes : [];
                            if (!episodes.length) return [];
                            return [{
                                seasonNo,
                                seasonPartNo,
                                sourceOrder: index,
                                dedupeKey: makeSeasonKey(seasonNo, seasonPartNo),
                                name: /^season\s+\d+$/i.test(entryTitle) ? entryTitle.replace(/season/i, 'Part') : entryTitle,
                                providerAnimeId: entryId || null,
                                episodes: episodes.map((ep, epIndex) => ({
                                    id: ep?.id || null,
                                    episode: ep?.number || epIndex + 1,
                                    number: ep?.number || epIndex + 1,
                                    episodeNum: ep?.number || epIndex + 1,
                                    title: String(ep?.title || `Episode ${epIndex + 1}`),
                                })),
                                provider: providerName,
                            }];
                        });
                    }

                    const searchTerms = getAnimeSearchTerms(animeSeriesTitle, preferredYear, 1, '', false);
                    let bestResult = null;
                    for (const term of searchTerms) {
                        const typeHint = providerName === 'animesalt' ? '?type=tv' : '';
                        const { res: searchRes } = await fetchJsonWithApiFallback(
                            `${API_BASE.replace('/meta/tmdb', '/anime/' + providerName)}/${encodeURIComponent(term)}${typeHint}`,
                            { signal: AbortSignal.timeout(timeoutMs) },
                        );
                        if (!searchRes.ok) continue;
                        const searchData = await searchRes.json();
                        const results = getAnimeSearchResults(searchData);
                        const filteredResults = results.filter((row) => {
                            const rowId = String(row?.id || '').toLowerCase();
                            const rowType = String(row?.type || row?.format || '').toLowerCase();
                            if (rowId.startsWith('movie:')) return false;
                            if (rowType.includes('movie') || rowType === 'film') return false;
                            return true;
                        });
                        const searchPool = filteredResults.length ? filteredResults : results;
                        bestResult =
                            pickAnimeResultByAniListId(searchPool, String((currentAnimeCanonicalInfo || await getCanonicalAnimeInfo())?.id || currentMediaInfo?.anilistId || '').trim()) ||
                            findExactProviderSeasonMatch(providerName, searchPool, '') ||
                            pickAnimeResultByTitle(searchPool, animeSeriesTitle, preferredYear, 1, '', false);
                        if (bestResult?.id) break;
                    }
                    if (!bestResult?.id) return [];

                    const { res: infoRes } = await fetchJsonWithApiFallback(
                        buildAnimeInfoUrl(providerName, bestResult.id),
                        { signal: AbortSignal.timeout(timeoutMs) },
                    );
                    if (!infoRes.ok) return [];
                    let providerInfo = await infoRes.json();
                    if (providerInfo?.data) providerInfo = providerInfo.data;
                    const episodes = Array.isArray(providerInfo?.episodes) ? providerInfo.episodes : [];
                    if (!episodes.length) return [];
                    return buildSeasonListFromEpisodes(providerName, String(bestResult.id), providerInfo?.title || animeSeriesTitle, episodes);
                };

                const hydrateProviders = Array.from(new Set([
                    ...(FORCED_PROVIDER ? [FORCED_PROVIDER] : []),
                    ...ANIME_PROVIDERS,
                ]))
                    .map((p) => String(p || '').toLowerCase())
                    .filter((p) => ['satoru', 'animesalt', 'justanime'].includes(p));

                for (const provider of hydrateProviders) {
                    try {
                        const hydrated = await hydrateAnimeProviderSeasons(provider);
                        if (hydrated.length) {
                            const normalizedHydrated = dedupeTvSeasonEntries(hydrated, true);
                            providerSeasonCatalog.set(provider, normalizedHydrated);
                            tvSeasons = mergeSeasonLists(tvSeasons, normalizedHydrated);
                        }
                    } catch (err) {
                        console.warn('[initTv] Anime provider hydration failed for', provider, err);
                    }
                }

                const preferredMenuProvider = String(FORCED_PROVIDER || '').trim().toLowerCase();
                if (preferredMenuProvider && providerSeasonCatalog.has(preferredMenuProvider)) {
                    activeMenuProvider = preferredMenuProvider;
                } else {
                    activeMenuProvider = Array.from(providerSeasonCatalog.keys())[0] || '';
                }
            }

            episodeFillerStatus = new Map();
            fillerLookupState = 'loading';
            if (!tvSeasons.length) {
                // API can return partial TV info during transient backend failures.
                // Build a minimal placeholder so playback can continue via provider search.
                const safeSeasonNo = (Number.isFinite(URL_SEASON) && URL_SEASON > 0) ? URL_SEASON : 1;
                const safeEpisodeNo = (Number.isFinite(URL_EPISODE) && URL_EPISODE > 0) ? URL_EPISODE : 1;
                const fallbackTitle = String(
                    info?.title ||
                    info?.name ||
                    currentMediaInfo?.title ||
                    currentMediaInfo?.name ||
                    `Episode ${safeEpisodeNo}`
                ).trim();
                tvSeasons = [{
                    seasonNo: safeSeasonNo,
                    name: `Season ${safeSeasonNo}`,
                    episodes: [{
                        episode: safeEpisodeNo,
                        number: safeEpisodeNo,
                        episodeNum: safeEpisodeNo,
                        title: fallbackTitle,
                        id: null,
                    }],
                }];
                console.warn('[initTv] No episodes in info payload. Using URL-based fallback season/episode map.');
            }

            tvSeasons = dedupeTvSeasonEntries(tvSeasons, currentIsLikelyAnime);

            buildEpPanel();
            epBtn.style.display = 'flex';
            if (customEpisodeBtn) customEpisodeBtn.style.display = 'inline-flex';
            // Mark episode button for showing in Plyr control bar
            showPlyrEpBtn = true;
            const fillerTitle = info?.title || info?.name || currentMediaInfo?.title || currentMediaInfo?.name || '';
            fetchAnimeFillerStatusMap(fillerTitle)
                .then((map) => {
                    episodeFillerStatus = map;
                    fillerLookupState = map.size > 0
                        ? 'ready'
                        : (fillerLookupState === 'fetch_failed' ? 'fetch_failed' : 'not_found');
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                })
                .catch(() => {
                    fillerLookupState = 'fetch_failed';
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                });
            const initialPos = getInitialTvPositionFromUrl(tvSeasons);
            await playTvEp(initialPos.seasonIndex, initialPos.episodeIndex, null);
        }

        function getActiveEpisodeMenuProvider() {
            if (!currentIsLikelyAnime) return '';
            const pinnedProvider = String(activeMenuProvider || '').trim().toLowerCase();
            if (pinnedProvider && providerSeasonCatalog.has(pinnedProvider)) return pinnedProvider;
            const activeSourceProvider = String(allSources?.[currentIdx]?.provider || '').trim().toLowerCase();
            const forcedProvider = String(FORCED_PROVIDER || '').trim().toLowerCase();
            const provider = activeSourceProvider || forcedProvider;
            if (!provider) return '';
            const seasons = providerSeasonCatalog.get(provider);
            return Array.isArray(seasons) && seasons.length ? provider : '';
        }

        function getEpisodeMenuSeasons() {
            const scopedProvider = getActiveEpisodeMenuProvider();
            if (scopedProvider) {
                const scoped = providerSeasonCatalog.get(scopedProvider);
                if (Array.isArray(scoped) && scoped.length) {
                    const providerScoped = scopedProvider === 'animesalt'
                        ? mergeMenuSeasonsBySeasonNo(scoped)
                        : scoped;
                    return cloneAndSortMenuSeasons(providerScoped);
                }
            }
            if (currentIsLikelyAnime) {
                // Strict mode for anime: do not show merged/global list when active provider
                // catalog is unavailable, because it causes mixed/incorrect ordering/titles.
                return [];
            }
            return cloneAndSortMenuSeasons(tvSeasons);
        }

        function mergeMenuSeasonsBySeasonNo(seasons) {
            const list = Array.isArray(seasons) ? seasons : [];
            const grouped = new Map();
            list.forEach((season, idx) => {
                const seasonNoRaw = Number(season?.seasonNo);
                const seasonNo = Number.isFinite(seasonNoRaw) && seasonNoRaw > 0 ? seasonNoRaw : (idx + 1);
                if (!grouped.has(seasonNo)) {
                    const initialName = String(season?.name || '').trim();
                    grouped.set(seasonNo, {
                        ...season,
                        seasonNo,
                        seasonPartNo: 0,
                        name: initialName || `Season ${seasonNo}`,
                        episodes: [],
                    });
                }
                const bucket = grouped.get(seasonNo);
                const add = Array.isArray(season?.episodes) ? season.episodes : [];
                bucket.episodes.push(...add);
                const candidateName = String(season?.name || '').trim();
                const bucketName = String(bucket?.name || '').trim();
                const bucketGeneric = /^(season|part)\s+\d+$/i.test(bucketName);
                const candidateGeneric = /^(season|part)\s+\d+$/i.test(candidateName);
                if ((!bucketName || bucketGeneric) && candidateName && !candidateGeneric) {
                    bucket.name = candidateName;
                }
            });
            return Array.from(grouped.values());
        }

        function getEpisodeOrdinalForMenu(ep, fallback = 0) {
            const numeric = Number(ep?.episode || ep?.number || ep?.episodeNum || 0);
            if (Number.isFinite(numeric) && numeric > 0) return numeric;

            const idMatch = String(ep?.id || '').match(/-(\d+)x(\d+)$/i);
            if (idMatch?.[2]) {
                const fromId = Number(idMatch[2]);
                if (Number.isFinite(fromId) && fromId > 0) return fromId;
            }

            const title = String(ep?.title || '');
            const taggedMatch = title.match(/(?:episode|ep)\s*\.?\s*(\d+)/i);
            if (taggedMatch?.[1]) {
                const fromTaggedTitle = Number(taggedMatch[1]);
                if (Number.isFinite(fromTaggedTitle) && fromTaggedTitle > 0) return fromTaggedTitle;
            }
            const leadingMatch = title.match(/^\s*(\d+)\b/);
            if (leadingMatch?.[1]) {
                const fromLeadingTitle = Number(leadingMatch[1]);
                if (Number.isFinite(fromLeadingTitle) && fromLeadingTitle > 0) return fromLeadingTitle;
            }

            return fallback;
        }

        function normalizeAndSortMenuEpisodes(episodes) {
            const rows = Array.isArray(episodes) ? episodes : [];
            const ordered = rows
                .map((ep, idx) => {
                    const episodeNo = getEpisodeOrdinalForMenu(ep, idx + 1);
                    const normalizedTitle = normalizeTitleForMatch(String(ep?.title || ''));
                    return {
                        ...ep,
                        _menuEpisodeNo: episodeNo,
                        _menuOrder: idx,
                        _menuNormalizedTitle: normalizedTitle,
                    };
                })
                .sort((a, b) => {
                    if (a._menuEpisodeNo !== b._menuEpisodeNo) return a._menuEpisodeNo - b._menuEpisodeNo;
                    const titleCmp = String(a._menuNormalizedTitle || '').localeCompare(String(b._menuNormalizedTitle || ''));
                    if (titleCmp !== 0) return titleCmp;
                    return Number(a._menuOrder || 0) - Number(b._menuOrder || 0);
                });

            const deduped = [];
            const seen = new Set();
            ordered.forEach((ep) => {
                const epId = String(ep?.id || '').trim().toLowerCase();
                const key = epId || `${Number(ep?._menuEpisodeNo || 0)}::${String(ep?._menuNormalizedTitle || '')}`;
                if (seen.has(key)) return;
                seen.add(key);
                deduped.push({
                    ...ep,
                    episode: ep._menuEpisodeNo,
                    number: ep._menuEpisodeNo,
                    episodeNum: ep._menuEpisodeNo,
                });
            });
            return deduped;
        }

        function cloneAndSortMenuSeasons(seasons) {
            const list = Array.isArray(seasons) ? seasons : [];
            return list
                .map((season, seasonIndex) => {
                    const episodes = Array.isArray(season?.episodes) ? season.episodes : [];
                    return {
                        ...season,
                        _menuSeasonIndex: seasonIndex,
                        episodes: normalizeAndSortMenuEpisodes(episodes),
                    };
                })
                .sort((a, b) => {
                    const aSeason = Number(a?.seasonNo || 0);
                    const bSeason = Number(b?.seasonNo || 0);
                    if (aSeason !== bSeason) return aSeason - bSeason;
                    const aPart = Number(a?.seasonPartNo || a?.part || a?.partNo || 0);
                    const bPart = Number(b?.seasonPartNo || b?.part || b?.partNo || 0);
                    if (aPart !== bPart) return aPart - bPart;
                    return Number(a?._menuSeasonIndex || 0) - Number(b?._menuSeasonIndex || 0);
                });
        }

        function resolveGlobalEpisodeIndices(menuSeason, menuEpisode, fallbackSeasonIndex, fallbackEpisodeIndex) {
            const episodeId = String(menuEpisode?.id || '').trim().toLowerCase();
            if (episodeId) {
                for (let si = 0; si < tvSeasons.length; si += 1) {
                    const eps = Array.isArray(tvSeasons[si]?.episodes) ? tvSeasons[si].episodes : [];
                    const ei = eps.findIndex((ep) => String(ep?.id || '').trim().toLowerCase() === episodeId);
                    if (ei >= 0) return { seasonIndex: si, episodeIndex: ei };
                }
            }

            const seasonNoRaw = Number(menuSeason?.seasonNo);
            const seasonNo = Number.isFinite(seasonNoRaw) && seasonNoRaw > 0 ? seasonNoRaw : (fallbackSeasonIndex + 1);
            const episodeNoRaw = Number(menuEpisode?.episode || menuEpisode?.number || menuEpisode?.episodeNum);
            const episodeNo = Number.isFinite(episodeNoRaw) && episodeNoRaw > 0 ? episodeNoRaw : (fallbackEpisodeIndex + 1);
            const menuTitle = normalizeTitleForMatch(String(menuEpisode?.title || ''));

            const seasonIndexByNo = tvSeasons.findIndex((s) => Number(s?.seasonNo || 0) === seasonNo);
            if (seasonIndexByNo >= 0) {
                const eps = Array.isArray(tvSeasons[seasonIndexByNo]?.episodes) ? tvSeasons[seasonIndexByNo].episodes : [];
                const byNumber = eps.findIndex((ep) => Number(ep?.episode || ep?.number || ep?.episodeNum || 0) === episodeNo);
                if (byNumber >= 0) return { seasonIndex: seasonIndexByNo, episodeIndex: byNumber };
                const byTitle = menuTitle ? eps.findIndex((ep) => normalizeTitleForMatch(String(ep?.title || '')) === menuTitle) : -1;
                if (byTitle >= 0) return { seasonIndex: seasonIndexByNo, episodeIndex: byTitle };
            }

            for (let si = 0; si < tvSeasons.length; si += 1) {
                const eps = Array.isArray(tvSeasons[si]?.episodes) ? tvSeasons[si].episodes : [];
                const byNumber = eps.findIndex((ep) => Number(ep?.episode || ep?.number || ep?.episodeNum || 0) === episodeNo);
                if (byNumber >= 0) return { seasonIndex: si, episodeIndex: byNumber };
            }

            const safeSeasonIndex = Math.max(0, Math.min(tvSeasons.length - 1, Number(fallbackSeasonIndex || 0)));
            const safeEpisodes = Array.isArray(tvSeasons[safeSeasonIndex]?.episodes) ? tvSeasons[safeSeasonIndex].episodes : [];
            const safeEpisodeIndex = Math.max(0, Math.min(Math.max(0, safeEpisodes.length - 1), Number(fallbackEpisodeIndex || 0)));
            return { seasonIndex: safeSeasonIndex, episodeIndex: safeEpisodeIndex };
        }

        function buildEpPanel() {
            epPanel.innerHTML = '';
            const legend = document.createElement('div');
            legend.className = 'ep-legend';
            legend.innerHTML = `
                <span class="ep-legend-badge manga">Manga Canon</span>
                <span class="ep-legend-badge mixed">Mixed</span>
                <span class="ep-legend-badge filler">Filler</span>
                <span class="ep-legend-note">${fillerLookupState === 'loading' ? 'checking...' : (fillerLookupState === 'ready' ? 'from animefillerlist' : (fillerLookupState === 'fetch_failed' ? 'fetch blocked' : 'not found'))}</span>
            `;
            epPanel.appendChild(legend);

            const menuSeasons = getEpisodeMenuSeasons();
            if (!menuSeasons.length) {
                const empty = document.createElement('div');
                empty.className = 'audio-item';
                empty.textContent = 'Episode list not available for active server yet.';
                epPanel.appendChild(empty);
                return;
            }
            menuSeasons.forEach((s, si) => {
                const lbl = document.createElement('div');
                lbl.className = 'ep-season';

        function getNextEpisodeRef() {

            const episodes = season?.episodes || [];
            if (curEpisode + 1 < episodes.length) {

            for (let si = curSeason + 1; si < tvSeasons.length; si += 1) {

        let _nextEpCountdownTimer = null;

        function _tickNextEpCountdown() {

        // --- Skip Countdown logic ---

        function rearmSkippedSegmentsForTime(nowSec) {
            if (!Number.isFinite(nowSec)) return;

            const segments = {
                intro: animeSkipSegments.intro,
                outro: animeSkipSegments.outro
            };

            for (const [type, seg] of Object.entries(segments)) {
                if (!seg || !skippedSegments[type]) continue;
                if (nowSec < seg.start + 0.25) {
                    skippedSegments[type] = false;
                }
            }

            if (!skippedSegments.intro && !skippedSegments.outro) {

            }
        }

        function forceVideoSeek(target, attempt = 0) {
            if (!video || !Number.isFinite(target)) return;

            const clampedTarget = Math.max(0, target);

            // ENHANCED: Flush audio buffer before seeking to prevent robotic/distorted audio
            if (hlsInst && attempt === 0) {
                try {
                    // Stop loading momentarily to allow clean buffer flush
                    hlsInst.stopLoad();

                    // Force a small audio buffer flush by temporarily disabling/re-enabling audio
                    if (video.audioTracks && video.audioTracks.length > 0) {
                        // Try to cycle through audio tracks briefly to reset decoder
                        const originalEnabled = [];
                        for (let i = 0; i < video.audioTracks.length; i++) {
                            originalEnabled[i] = video.audioTracks[i].enabled;
                            if (originalEnabled[i]) {
                                video.audioTracks[i].enabled = false;
                            }
                        }

                        // Re-enable after a brief moment
                        setTimeout(() => {
                            if (video && video.audioTracks) {
                                for (let i = 0; i < video.audioTracks.length; i++) {
                                    if (originalEnabled[i]) {
                                        video.audioTracks[i].enabled = true;
                                    }
                                }
                            }
                        }, 50);
                    }

                    // Also try to reset HLS audio track if available
                    if (hlsInst.audioTrack !== undefined && hlsInst.audioTrack >= 0) {
                        const currentAudioTrack = hlsInst.audioTrack;
                        // Temporarily switch to a different track and back
                        setTimeout(() => {
                            if (hlsInst && hlsInst.audioTracks && hlsInst.audioTracks.length > 1) {
                                // Switch to another track briefly
                                const altTrack = (currentAudioTrack + 1) % hlsInst.audioTracks.length;
                                hlsInst.audioTrack = altTrack;

                                // Switch back after a moment
                                setTimeout(() => {
                                    if (hlsInst) {
                                        hlsInst.audioTrack = currentAudioTrack;
                                    }
                                }, 100);
                            }
                        }, 25);
                    }

                    // Resume loading from target position
                    setTimeout(() => {
                        if (hlsInst) {
                            try { hlsInst.startLoad(Math.max(0, clampedTarget - 0.5)); } catch (_) { }
                        }
                    }, 100);
                } catch (_) { }
            }

            // ENHANCED: Add small delay for audio reset to take effect before seeking
            const seekDelay = (hlsInst && attempt === 0) ? 150 : 0;

            setTimeout(() => {
                if (!video) return;
                video.currentTime = clampedTarget;

                const pct = video.duration > 0 ? (clampedTarget / video.duration) * 100 : 0;
                if (seekBar) {
                    seekBar.value = pct;
                    seekBar.style.setProperty('--seek-percent', pct + '%');
                }

                const reachedTarget = Math.abs((video.currentTime || 0) - clampedTarget) <= 0.75;
                if (reachedTarget || attempt >= 4) return;

                setTimeout(() => {
                    if (!video) return;
                    const stillOffTarget = Math.abs((video.currentTime || 0) - clampedTarget) > 0.75;
                    if (stillOffTarget) {
                        forceVideoSeek(clampedTarget, attempt + 1);
                    }
                }, 120 + (attempt * 80));
            }, seekDelay);
        }

        function performSkipJump(type, manual = false) {
            if (!video || !type || !isFinite(video.duration)) return;

            const preservedSegment = _skipActiveSegment && _skipActiveType === type ? { ..._skipActiveSegment } : null;
            _clearSkipCountdown();
            const active = getActiveSkipSegment(video.currentTime);
            const segment = preservedSegment || active || (type === 'intro' ? animeSkipSegments.intro : animeSkipSegments.outro);

            if (!segment) {
                console.log(`[Skip] Cannot skip ${type}: segment metadata missing.`);
                return;
            }

            console.log(`[Skip] Executing ${type} skip to ${segment.end} (Manual: ${manual})`);

            if (type === 'intro') skippedSegments.intro = true;
            if (type === 'outro') skippedSegments.outro = true;

            const target = Math.max(0, segment.end + 0.3);

            // ENHANCED: Pre-buffer strategy for smooth skips
            // Pause preview operations during skip to avoid interfering with main stream
            const previewVideo = document.getElementById('previewVideo');
            if (previewVideo) {
                try {
                    previewVideo.pause();
                } catch (_) { }
            }

            // Pre-buffer the target area before executing the skip
            const jumpDistance = Math.abs(target - (video.currentTime || 0));
            const prebufferTime = Math.max(0, target - (jumpDistance > 30 ? 5 : 1.5));

            // Use gentler quality tuning for the skip operation
            tuneHlsForJump(target, jumpDistance, 'skip');

            if (hlsInst && hlsSessionIsFragile) {
                console.log(`[Skip] HLS session is fragile, hot-reloading stream for ${type} skip.`);
                performHotReloadJump(target, 'skip');
                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                syncTimeUI();
                window.isAutoSkipping = false;
                return;
            }

            // Wait briefly for pre-buffering before seeking (gives HLS time to prepare chunks)
            setTimeout(() => {
                // Force the media element to settle on the skip target even if the stream briefly resists seeks.
                applyGuardedJump(target, 'skip');

                if (!video.paused) {
                    video.play().catch(() => { });
                }

                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';

                // Ensure UI updates to reflect the new position
                syncTimeUI();
                window.isAutoSkipping = false;

                // Resume preview after skip completes
                setTimeout(() => {
                    if (previewVideo && !manual) {
                        try {
                            const warmupOnReady = () => {
                                try {
                                    if (isFinite(previewVideo.duration) && previewVideo.duration > 2) {
                                        previewVideo.currentTime = 1.0;
                                    }
                                    previewVideo.pause();
                                } catch (_) { }
                            };
                            previewVideo.addEventListener('canplay', warmupOnReady, { once: true });
                        } catch (_) { }
                    }
                }, 300);
            }, 500); // Short pre-buffer delay before actual skip (avoids jarring transitions)
        }

        function _tickSkipCountdown() {
            if (!_skipActiveType || !_skipActiveSegment || !skipSegmentBtn) return;
            if (!skipSegmentBtn.classList.contains('counting')) return;

            const now = Date.now();
            const videoPaused = !video || (video.paused && !video.ended);

            // Accumulate time only while playing
            if (!videoPaused) {
                _skipElapsed += now - _skipLastTick;
            }
            _skipLastTick = now;

            // Handle visual pause state
            if (videoPaused) {
                skipSegmentBtn.classList.add('countdown-paused');
            } else {
                skipSegmentBtn.classList.remove('countdown-paused');
            }

            if (_skipElapsed >= SKIP_COUNTDOWN_DURATION_MS) {
                const finalType = _skipActiveType;
                const finalSegment = _skipActiveSegment ? { ..._skipActiveSegment } : null;
                console.log(`[AutoSkip] COMPLETED countdown for: ${finalType}`);

                _clearSkipCountdown();

                if (finalType && finalSegment) {
                    const shouldAuto = (finalType === 'intro' && autoSkipIntroEnabled) || (finalType === 'outro' && autoSkipOutroEnabled);
                    if (shouldAuto) {
                        _skipActiveType = finalType;
                        _skipActiveSegment = finalSegment;
                        performSkipJump(finalType, false);
                    }
                }
                return;
            }
            _skipCountdownTimer = setTimeout(_tickSkipCountdown, 100);
        }

        function _startSkipCountdown() {
            const active = getActiveSkipSegment(video.currentTime);
            if (!active) return;
            const shouldAuto = (active.type === 'intro' && autoSkipIntroEnabled) ||
                (active.type === 'outro' && autoSkipOutroEnabled);

            if (!shouldAuto) return;

            _clearSkipCountdown();
            window.isAutoSkipping = true;
            _skipActiveType = active.type;
            _skipActiveSegment = { ...active };
            void skipSegmentBtn.offsetWidth;
            skipSegmentBtn.classList.add('counting');
            _skipElapsed = 0;
            _skipLastTick = Date.now();
            _tickSkipCountdown();
        }

        let _nextEpBtnWasVisible = false; // tracks previous visibility state

        function updateNextEpisodeButton(forceShow = false) {
            if (!nextEpisodeBtn) return;
            const next = getNextEpisodeRef();
            if (!next || !video) {
                nextEpisodeBtn.style.display = 'none';
                _clearNextEpCountdown();
                _nextEpBtnWasVisible = false;
                return;
            }
            if (forceShow) {
                nextEpisodeBtn.style.display = 'inline-flex';
                if (!_nextEpBtnWasVisible) {
                    _nextEpBtnWasVisible = true;
                    _startNextEpCountdown();
                }
                return;
            }
            if (!isFinite(video.duration) || video.duration <= 0) {
                nextEpisodeBtn.style.display = 'none';
                _clearNextEpCountdown();
                _nextEpBtnWasVisible = false;
                return;
            }
            const remaining = video.duration - (video.currentTime || 0);
            const shouldShow = remaining <= 30;

            nextEpisodeBtn.style.display = shouldShow ? 'inline-flex' : 'none';

            if (shouldShow && !_nextEpBtnWasVisible) {
                // Just entered the last-30s window — start the countdown
                _nextEpBtnWasVisible = true;
                _startNextEpCountdown();
            } else if (!shouldShow && _nextEpBtnWasVisible) {
                // Seeked back out — cancel the countdown
                _nextEpBtnWasVisible = false;
                _clearNextEpCountdown();
            }
        }



        async function goToNextEpisode() {
            const next = getNextEpisodeRef();

            await playTvEp(next.seasonIndex, next.episodeIndex, 0);

        async function playTvEp(si, ei, startTime = null) {
            curSeason = si; curEpisode = ei;
            pendingEpisodeStartTime = Number.isFinite(startTime) ? Number(startTime) : null;
            updateEpisodeUrlState(false);
            const season = tvSeasons[si];
            const ep = (season?.episodes || [])[ei];
            if (!ep) return;
            resetAnimeSkipState();
            updateNextEpisodeButton(false);

            updateEpUI(si, ei);
            const epNo = Number(ep.episode || ep.number || ep.episodeNum || (ei + 1));
            const epTitle = String(ep.title || '').trim();
            let seasonTitle = String(season?.name || `Season ${si + 1}`).trim();
            if (currentIsLikelyAnime) {
                seasonTitle = seasonTitle.replace(/^Season /i, 'Part ');
            }
            const metaText = epTitle
                ? `${seasonTitle} - Episode ${epNo}: ${epTitle}`
                : `${seasonTitle} - Episode ${epNo}`;
            document.getElementById('media-meta').textContent = metaText;

            // Store current season/episode indices for the per-provider fetch
            await fetchSources(null);
