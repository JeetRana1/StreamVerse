                                        toSeasonNo(ep) === selectedSeasonNo &&
                                        toEpisodeNo(ep) === selectedEpisodeNoForProvider,
                                    )
                                    : null) ||
                                episodes.find((ep) => toEpisodeNo(ep) === selectedEpisodeNoForProvider) ||
                                episodes[Math.max(0, Math.min(episodes.length - 1, selectedEpisodeNoForProvider - 1))] ||
                                episodes.find((ep) => toEpisodeNo(ep) === selectedAbsoluteEpisodeNo) ||
                                episodes[Math.max(0, Math.min(episodes.length - 1, selectedAbsoluteEpisodeNo - 1))] ||
                                episodes.find((ep) => toEpisodeNo(ep) === selectedEpisodeNo) ||
                                episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))];
                            if (provider === 'justanime' && info?.id) {
                                provEpisodeId = provEpisodeId || `${info.id}$episode$${MEDIA_TYPE === 'tv' ? providerEpisodeNo : 1}`;
                            } else {
                                provEpisodeId = provEpisodeId || targetEpisode?.id;
                            }
                            } // end if (provider !== 'animesalt')
                        }
                    }

                    if (!provEpisodeId) {
                        // Fallback 0: provider-level title search, then provider /info resolution.
                        if (!isAnimeProvider) {
                            try {
                                // Specific fallback for Dramacool which often has broken TMDB mappings
                                if (provider === 'dramacool') {
                                    const resolved = await resolveDramacoolEpisodeId(
                                        currentMediaInfo?.title || currentMediaInfo?.name || '',
                                        selectedSeasonNo,
                                        selectedEpisodeNo,
                                        REQ_TIMEOUT.metaInfo
                                    );
                                    if (resolved?.episodeId) {
                                        info = resolved.info || info;
                                        provEpisodeId = resolved.episodeId;
                                    }
                                }

                                if (!provEpisodeId) {
                                    const resolved = await resolveMovieProviderEpisodeIdBySearch(
                                        provider,
                                        MEDIA_TYPE,
                                        currentMediaInfo?.title || currentMediaInfo?.name || '',
                                        selectedSeasonNo,
                                        selectedEpisodeNo,
                                    );
                                    if (resolved?.episodeId) {
                                        info = resolved.info || info;
                                        provEpisodeId = resolved.episodeId;
                                    }
                                }
                            } catch (searchFallbackErr) {
                                console.warn(
                                    `[${provider}] provider-search fallback failed`,
                                    searchFallbackErr?.message || searchFallbackErr,
                                );
                            }
                        }

                        if (!provEpisodeId) {
                            // Step 1: get this provider's own info (and episodeId)
                            const infoUrl = new URL(`${API_BASE}/info/${TMDB_ID}`);
                            infoUrl.searchParams.set('type', MEDIA_TYPE);
                            infoUrl.searchParams.set('provider', provider);

                            const { res: infoRes } = await fetchJsonWithApiFallback(infoUrl.toString(), { signal: AbortSignal.timeout(REQ_TIMEOUT.metaInfo) });
                            if (!infoRes.ok) {
                                let reason = '';
                                try {
                                    const b = await infoRes.clone().json();
                                    reason = b?.message ? `: ${b.message}` : '';
                                } catch (_) { }
                                failReasons.push(`${providerLabel(provider)} info ${infoRes.status}${reason}`);
                                console.warn(`[${provider}] info HTTP ${infoRes.status}`);
                                chipState(provider, 'failed');
                                continue;
                            }

                            info = await infoRes.json();
                            if (info.data) info = info.data;

                            // For TV: find the matching episode's ID from this provider's season list
                            // For movies: use info.episodeId directly
                            if (MEDIA_TYPE === 'tv') {
                                const seasons = info.seasons || [];
                                const season =
                                    seasons.find((s) => Number(s?.season || s?.number || 0) === selectedSeasonNo) ||
                                    seasons[curSeason];
                                let episode = season?.episodes?.find((e) =>
                                    Number(e?.episode || e?.number || e?.episodeNum || 0) === selectedEpisodeNo,
                                ) || season?.episodes?.[curEpisode];
                                if (!episode) {
                                    const targetEpNum = selectedEpisodeNo;
                                    for (const s of seasons) {
                                        const byNum = (s?.episodes || []).find((e) =>
                                            Number(e?.episode || e?.number || 0) === targetEpNum
                                        );
                                        if (byNum) {
                                            episode = byNum;
                                            break;
                                        }
                                    }
                                }
                                provEpisodeId = episode?.id || episode?.episodeId || episode?.url;
                            } else {
                                provEpisodeId = info.episodeId || info.id;
                            }
                        }
                    }

                    if (!provEpisodeId) {
                        console.warn(`[${provider}] No episodeId found`);
                        chipState(provider, 'failed');
                        continue;
                    }

                    console.log(`[${provider}] episodeId = ${provEpisodeId}`);
                    document.getElementById('loader-sub').textContent = `Fetching stream from ${providerLabel(provider)}...`;

                    // Step 2: watch using that provider's episodeId
                    let watchUrl;
                    if (isAnimeProvider) {
                        // Use provider-specific watch endpoint shape.
                        watchUrl = new URL(buildAnimeWatchUrl(provider, provEpisodeId));
                    } else {
                        watchUrl = new URL(`${API_BASE}/watch/${encodeURIComponent(provEpisodeId)}`);
                        watchUrl.searchParams.set('id', info.id);
                        watchUrl.searchParams.set('provider', provider);
                        if (DIRECT_ONLY) watchUrl.searchParams.set('directOnly', 'true');
                    }

                    const baseWatchTimeoutMs = isAnimeProvider ? ANIME_WATCH_TIMEOUT_MS : REQ_TIMEOUT.watch;
                    const watchTimeoutMs = getProviderTimeout(provider, 'watch', baseWatchTimeoutMs);
                    let watchRes;
                    try {
                        ({ res: watchRes } = await fetchJsonWithApiFallback(watchUrl.toString(), { signal: AbortSignal.timeout(watchTimeoutMs) }));
                    } catch (watchErr) {
                        if (isTimeoutLikeError(watchErr)) {
                            if (provider === 'satoru') {
                                const retryTimeoutMs = getProviderTimeout(provider, 'watchRetry', Math.max(watchTimeoutMs, 25000));
                                console.warn(`[${provider}] watch timed out after ${watchTimeoutMs}ms, retrying once (${retryTimeoutMs}ms)`);
                                try {
                                    ({ res: watchRes } = await fetchJsonWithApiFallback(watchUrl.toString(), { signal: AbortSignal.timeout(retryTimeoutMs) }));
                                } catch (retryErr) {
                                    failReasons.push(`${providerLabel(provider)} timed out`);
                                    console.warn(`[${provider}] watch retry also timed out, skipping`);
                                    chipState(provider, 'failed');
                                    continue;
                                }
                            } else {
                                failReasons.push(`${providerLabel(provider)} timed out`);
                                console.warn(`[${provider}] watch timed out, skipping`);
                                chipState(provider, 'failed');
                                continue;
                            }
                        } else {
                            throw watchErr;
                        }
                    }
                    let data = null;

                    if (watchRes.ok) {
                        data = await watchRes.json();
                    } else {
                        // Fallback: hit provider-specific watch endpoint directly when meta/tmdb watch fails
                        let directUrl = null;
                        if (isAnimeProvider) {
                            // Already tried direct URL above, so this is a failure
                            failReasons.push(`${providerLabel(provider)} watch ${watchRes.status}`);
                            console.warn(`[${provider}] watch HTTP ${watchRes.status}`);
                            chipState(provider, 'failed');
                            continue;
                        } else if (provider === 'dramacool') {
                            directUrl = `${API_BASE.replace('/meta/tmdb', '/movies/dramacool')}/watch?episodeId=${encodeURIComponent(provEpisodeId)}${DIRECT_ONLY ? '&directOnly=true' : ''}`;
                        } else if (isNetMirrorProvider) {
                            const nmEpisodeId = normalizeNetMirrorId(provEpisodeId);
                            const nmMediaId = normalizeNetMirrorId(info?.id || provEpisodeId);
                            directUrl = `${API_BASE.replace('/meta/tmdb', `/movies/${provider}`)}/watch?episodeId=${encodeURIComponent(nmEpisodeId)}&mediaId=${encodeURIComponent(nmMediaId)}${DIRECT_ONLY ? '&directOnly=true' : ''}`;
                        } else {
                            directUrl = `${API_BASE.replace('/meta/tmdb', `/movies/${provider}`)}/watch?episodeId=${encodeURIComponent(provEpisodeId)}&mediaId=${encodeURIComponent(info.id || '')}${DIRECT_ONLY ? '&directOnly=true' : ''}`;
                        }

                        if (directUrl) {
                            const directWatchTimeoutMs = getProviderTimeout(provider, 'directWatch', REQ_TIMEOUT.directWatch);
                            const { res: directRes } = await fetchJsonWithApiFallback(directUrl, { signal: AbortSignal.timeout(directWatchTimeoutMs) });
                            if (directRes.ok) {
                                data = await directRes.json();
                            } else {
                                let directReason = '';
                                try {
                                    const b = await directRes.clone().json();
                                    directReason = b?.message ? `: ${b.message}` : '';
                                } catch (_) { }
                                failReasons.push(`${providerLabel(provider)} watch ${watchRes.status} / direct ${directRes.status}${directReason}`);
                                console.warn(`[${provider}] watch HTTP ${watchRes.status}; direct HTTP ${directRes.status}`);
                                chipState(provider, 'failed');
                                continue;
                            }
                        } else {
                            failReasons.push(`${providerLabel(provider)} watch ${watchRes.status}`);
                            console.warn(`[${provider}] watch HTTP ${watchRes.status}`);
                            chipState(provider, 'failed');
                            continue;
                        }
                    }

                    if (!data.sources?.length) {
                        failReasons.push(`${providerLabel(provider)} returned no sources`);
                        console.warn(`[${provider}] No sources returned`);
                        chipState(provider, 'failed');
                        continue;
                    }

                    console.log(`[${provider}] ✔ ${data.sources.length} source(s) found`);
                    chipState(provider, 'success');
                    lastSuccessfulProvider = provider;
                    if (provider === 'satoru') satoruAudioSources = []; // satoru is primary; no need for virtual tracks
                    
                    if (currentIsLikelyAnime) {
                        // Background fetch skip times to avoid blocking video load
                        fetchAniSkipSegmentsForCurrentEpisode();
                    }
                    const extractedSubs = normalizeSubtitleEntries(data?.data || data, provider, data?.headers?.Referer || data?.headers?.referer || null);
                    if (extractedSubs.length) {
                        externalSubtitleTracks = extractedSubs;
                        if (currentIsLikelyAnime) {
                            subtitlePrefetchPromise
                                .then((subs) => {
                                    if (!Array.isArray(subs) || !subs.length) return;
                                    externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);
                                    if (video) applyExternalSubtitlesToVideo(video);
                                })
                                .catch(() => { });
                        }
                    } else if (currentIsLikelyAnime) {
                        externalSubtitleTracks = [];
                        subtitlePrefetchPromise
                            .then((subs) => {
                                if (!Array.isArray(subs) || !subs.length) return;
                                externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);
                                if (video) applyExternalSubtitlesToVideo(video);
                            })
                            .catch(() => { });
                    }

                    // === BACKGROUND SATORU AUDIO FETCH ===
                    // When JustAnime is the primary provider, silently fetch Satoru in parallel
                    // so its audio tracks (Hindi dub, etc.) appear in the Audio Track menu.
                    if (provider === 'justanime' && currentIsLikelyAnime && activeProviders.includes('satoru')) {
                        (async () => {
                            try {
                                satoruAudioSources = [];
                                const addSatoruWatchSources = async (watch, fallbackLabel = 'Default', animeId = '') => {
                                    if (!watch?.sources?.length) return false;
                                    const m3u8 = watch.sources.find(s => String(s.url).includes('.m3u8')) || watch.sources[0];
                                    const referer = watch.headers?.Referer || watch.headers?.referer || null;

                                    let subTracks = [fallbackLabel];
                                    try {
                                        const mText = await (await fetch(m3u8.url, { signal: AbortSignal.timeout(10000) })).text();
                                        const matches = mText.matchAll(/#EXT-X-MEDIA:TYPE=AUDIO.*?NAME="([^"]+)"/g);
                                        const internal = Array.from(matches).map(m => m[1]);
                                        if (internal.length) subTracks = internal;
                                    } catch (_) { }

                                    subTracks.forEach(tName => {
                                        satoruAudioSources.push({
                                            url: m3u8.url,
                                            isM3U8: true,
                                            referer: referer,
                                            label: subTracks.length > 1 ? `${tName} (Satoru)` : `${fallbackLabel} (Satoru)`,
                                            hlsTrackName: tName,
                                            animeId,
                                        });
                                    });

                                    // Check if user prefers this Satoru track (e.g. from previous episode or URL)
                                    if (preferredAudioToken && currentAudioSource !== 'satoru') {
                                        const matchingIdx = satoruAudioSources.findIndex(src => {
                                            const rawToken = src.hlsTrackName || src.label || '';
                                            return rawToken.replace(/\s*\(.*?\)\s*/g, '').trim().toLowerCase() === preferredAudioToken;
                                        });
                                        if (matchingIdx !== -1) {
                                            currentAudioSource = 'satoru';
                                            activeSatoruTrackIndex = matchingIdx;
                                            const sSrc = satoruAudioSources[matchingIdx];
                                            const resumeAt = Math.max(0, document.getElementById('player-video')?.currentTime || 0);
                                            // Silently hot-swap HLS over the currently playing JustAnime stream
                                            if (sSrc.isM3U8 && Hls.isSupported() && typeof hlsInst !== 'undefined' && hlsInst) {
                                                svSwitchHlsSourceSilent(sSrc.url, sSrc.referer, () => { }, resumeAt);
                                            } else {
                                                loadStream(sSrc.url, !!sSrc.isM3U8, false, sSrc.referer, currentIdx, resumeAt);
                                            }
                                        }
                                    }

                                    updateAudioTracks();
                                    return true;
                                };

                                if (selectedSeason?.providerAnimeId && selectedEpisode?.id) {
                                    try {
                                        const watch = await fetchJsonWithRetry(buildAnimeWatchUrl('satoru', String(selectedEpisode.id)), 12000, 20000);
                                        if (await addSatoruWatchSources(watch, 'Default', String(selectedSeason.providerAnimeId))) {
                                            return;
                                        }
                                    } catch (_) { }
                                }

                                const metaTitle = currentMediaInfo?.title || currentMediaInfo?.name || '';
                                if (!metaTitle) return;
                                const year = getPreferredMediaYear();

                                const exactResolved = await resolveExactSatoruEpisode(
                                    metaTitle,
                                    selectedSeasonNo,
                                    selectedEpisodeNo,
                                    selectedSeason?.name || '',
                                    year,
                                );
                                if (exactResolved?.episodeId) {
                                    try {
                                        const watch = await fetchJsonWithRetry(buildAnimeWatchUrl('satoru', exactResolved.episodeId), 12000, 20000);
                                        if (await addSatoruWatchSources(watch, 'Default', exactResolved.animeId)) {
                                            return;
                                        }
                                    } catch (_) { }
                                }

                                const satoruBase = `${API_BASE.replace('/meta/tmdb', '/anime/satoru')}`;
                                const terms = getAnimeSearchTerms(metaTitle, year, selectedSeasonNo, selectedSeason?.name || '');

                                let searchResults = [];
                                for (const q of terms) {
                                    try {
                                        const r = await fetch(`${satoruBase}/${encodeURIComponent(q)}`, { signal: AbortSignal.timeout(8000) });
                                        if (r.ok) {
                                            const d = await r.json();
                                            const res = getAnimeSearchResults(d);
                                            if (res.length) {
                                                searchResults.push(...res);
                                                // If we searched for a specific language and found it, prioritize it
                                                if (q.includes(preferredAudioToken)) break;
                                            }
                                        }
                                    } catch (_) { }
                                }
                                if (searchResults.length === 0) return;

                                const normMetaTitle = normalizeAnimeSearchQuery(metaTitle).toLowerCase();
                                const dubKeywords = ['hindi', 'tamil', 'telugu', 'malayalam', 'kannada', 'marathi', 'bengali', 'english', 'multi', 'dub'];
                                const languageMap = new Map();

                                for (const item of searchResults) {
                                    let rawTitle = item?.title || item?.name || '';
                                    if (typeof rawTitle === 'object') rawTitle = rawTitle.english || rawTitle.romaji || String(rawTitle);
                                    rawTitle = rawTitle.toLowerCase();

                                    const itemTitleNorm = normalizeAnimeSearchQuery(rawTitle).toLowerCase();
                                    if (!itemTitleNorm.includes(normMetaTitle) && !normMetaTitle.includes(itemTitleNorm)) continue;

                                    const languagesFound = dubKeywords.filter(k => rawTitle.includes(k));
                                    languagesFound.forEach(lang => {
                                        const dubType = lang.charAt(0).toUpperCase() + lang.slice(1);
                                        let score = 50;
                                        const isSpecificMatch = rawTitle.includes(`(${lang})`) || rawTitle.includes(`[${lang}]`) || rawTitle === `${normMetaTitle} ${lang}`;
                                        if (isSpecificMatch) score += 100;
                                        if (lang === preferredAudioToken) score += 80;
                                        if (!rawTitle.includes('multi')) score += 30;

                                        const existing = languageMap.get(dubType);
                                        if (!existing || score > existing.score) {
                                            languageMap.set(dubType, { item, score });
                                        }
                                    });

                                    if (languagesFound.length === 0 && !languageMap.has('Default')) {
                                        languageMap.set('Default', { item, score: 30 });
                                    }
                                }

                                const candidates = Array.from(languageMap.entries())
                                    .map(([dubType, data]) => ({ item: data.item, dubType }))
                                    .sort((a, b) => {
                                        const aMatch = a.dubType.toLowerCase() === preferredAudioToken;
                                        const bMatch = b.dubType.toLowerCase() === preferredAudioToken;
                                        if (aMatch && !bMatch) return -1;
                                        if (!aMatch && bMatch) return 1;
                                        return 0;
                                    })
                                    .slice(0, 6);

                                for (const cand of candidates) {
                                    try {
                                        const info = await fetchJsonWithRetry(buildAnimeInfoUrl('satoru', cand.item.id), 8000, 12000);
                                        const eps = (info?.episodes || info?.data?.episodes || []);
                                        const target = eps.find(ep => Number(ep?.number || ep?.episode || 0) === selectedEpisodeNo) || eps[selectedEpisodeNo - 1] || eps[0];
                                        if (target?.id) {
                                            const watch = await fetchJsonWithRetry(buildAnimeWatchUrl('satoru', target.id), 12000, 20000);
                                            await addSatoruWatchSources(watch, cand.dubType, cand.item.id);
                                        }
                                    } catch (_) { }
                                }

                                // ENHANCED: Auto-update audio panel when sources are ready
                                if (satoruAudioSources.length > 0) {
                                    setTimeout(() => {
                                        if (audioPanel.classList.contains('open')) {
                                            updateAudioTracks();
                                        }
                                    }, 500);
                                }
                            } catch (e) {
                                console.warn('[satoru-bg] Failed:', e.message);
                            }
                        })();
                    }

                    const providerSources = [];
                    data.sources.forEach((src, i) => {
                        if (!src.url) return;
                        if (isBrokenEmbedUrl(src.url)) {
                            console.warn(`[${provider}] Skipping broken embed url`, src.url);
                            return;
                        }
                        if (isLikelyPlaceholderSource(src.url)) {
                            console.warn(`[${provider}] Skipping placeholder source`, src.url);
                            return;
                        }
                        const lowerUrl = String(src.url).toLowerCase();
                        if (lowerUrl.includes('.mpd')) {
                            console.warn(`[${provider}] Skipping DASH source`, src.url);
                            return;
                        }
                        const providerMarkedEmbed = typeof src.isEmbed === 'boolean' ? src.isEmbed : null;
                        const providerMarkedM3U8 = typeof src.isM3U8 === 'boolean' ? src.isM3U8 : null;
                        const isM3U8 =
                            (providerMarkedM3U8 === true) ||
                            lowerUrl.includes('.m3u8') ||
                            lowerUrl.includes('m3u8-proxy') ||
                            lowerUrl.includes('manifest') ||
                            lowerUrl.includes('playlist');
                        const isMp4 = lowerUrl.includes('.mp4');
                        const isMpd = lowerUrl.includes('.mpd');
                        const looksDirectByUrl = isM3U8 || isMp4 || isMpd;
                        const isEmbed = providerMarkedEmbed !== null
                            ? (looksDirectByUrl ? false : providerMarkedEmbed)
                            : (!isM3U8 && !isMp4 && !isMpd);
                        providerSources.push({
                            label: `${providerLabel(provider)} - ${src.quality || `Source ${i + 1}`}`,
                            url: src.url,
                            isM3U8: isM3U8,
                            isEmbed,
                            referer: src.referer || data.headers?.Referer || data.headers?.referer || null,
                            provider,
                        });
                    });

                    if (!providerSources.length) {
                        failReasons.push(`${providerLabel(provider)} returned unusable sources`);
                        chipState(provider, 'failed');
                        continue;
                    }

                    allSources.push(...providerSources);
                    const hasDirectStream = providerSources.some((src) => src.isM3U8 || !src.isEmbed);
                    if (hasDirectStream) {
                        found = true;
                        // For anime-like movies, keep scanning remaining providers
                        // so one dead direct MP4 does not end the search.
                        function needsProxy(url) {
                            if (!url) return false;
                            const low = url.toLowerCase();
                            return low.includes('net20.cc') ||
                                low.includes('netmagcdn.com') ||
                                low.includes('as-cdn') ||
                                low.includes('m3u8-proxy');
                        }
                        const keepCollectingForAnimeMovie =
                            !FORCED_PROVIDER &&
                            MEDIA_TYPE === 'movie' &&
                            currentIsLikelyAnime;
                        if (!keepCollectingForAnimeMovie) break;
                        continue;
                    }

                    console.warn(`[${provider}] only returned embed sources; trying next provider for direct stream`);
                } catch (err) {
                    failReasons.push(`${providerLabel(provider)} error: ${err.message}`);
                    console.warn(`[${provider}] Error:`, err.message);
                    chipState(provider, 'failed');
                }
            }

            if (!allSources.length) {
                const reasonText = failReasons.length
                    ? `\n\nProvider details:\n- ${failReasons.slice(0, 5).join('\n- ')}`
                    : '';
                showError(
                    'No mp4/m3u8 Streams Found',
                    `None of the providers (${providers.map(providerLabel).join(', ')}) could find a stream for this title. ` +
                    `The content may not be indexed yet, or providers are blocked in this network environment.${reasonText}`
                );
                return;
            }

            // Prefer direct m3u8/mp4 streams over iframe embeds.
            allSources.sort((a, b) => {
                const rank = (s) => (s.isEmbed ? 1 : 0);
                const r = rank(a) - rank(b);
                if (r !== 0) return r;
                // If ranks are equal, try to match user preference (Dubbed/Subbed)
                if (preferredSourceLabelMatch) {
                    const aMatch = String(a.label).toLowerCase().includes(preferredSourceLabelMatch);
                    const bMatch = String(b.label).toLowerCase().includes(preferredSourceLabelMatch);
                    if (aMatch && !bMatch) return -1;
                    if (!aMatch && bMatch) return 1;
                }
                return 0;
            });

            buildSourcePanel();
            sourceBtn.style.display = 'flex';
            showPlyrSourceBtn = true;
            playSource(0);
        }
        // ----------------------------------------------------------------------------------------------------
        //  SOURCE PANEL
        // ----------------------------------------------------------------------------------------------------
        function providerLabel(p) {
            const map = {
                flixhq: 'FlixHQ',
                goku: 'Goku',
                sflix: 'SFlix',
                himovies: 'HiMovies',
                dramacool: 'DramaCool',
                satoru: 'Satoru',
                justanime: 'JustAnime',
            };
            return map[p] || p;
        }

        function isBrokenEmbedUrl(url) {
            if (!url) return true;
            return /streameeeeee\.site\/embed-1\/v3\/e-1\/[^?]+\?z=$/i.test(url.trim());
        }

        function captureVideoFrameToOverlay(allowBlackFallback = true) {
            const overlay = document.getElementById('transition-overlay');
            if (!overlay) return false;
            const canvas = overlay.querySelector('canvas');
            if (!canvas) return false;

            // Activate overlay immediately — spinner will show regardless of canvas success
            let drewFrame = false;

            // Dimensions from the actual player wrap
            const wrap = document.querySelector('.player-wrap');
            const vw = wrap ? wrap.offsetWidth : (window.innerWidth || 1920);
            const vh = wrap ? wrap.offsetHeight : (window.innerHeight || 1080);

            // Helper: draw video frame onto canvas using object-fit:contain logic
            // (exactly matches how #player-video renders — no zoom, no crop, letterbox/pillarbox)
            function drawVideoToCanvas(src) {
                if (!src || !src.videoWidth || src.readyState < 2) return false;
                try {
                    canvas.width = vw;
                    canvas.height = vh;
                    const ctx = canvas.getContext('2d');
                    // Black bars fill (letterbox / pillarbox)
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, vw, vh);
                    const vAspect = src.videoWidth / src.videoHeight;
                    const cAspect = vw / vh;
                    let drawW, drawH, drawX, drawY;
                    // CONTAIN: fit the whole frame inside the canvas, preserve aspect ratio
                    if (vAspect > cAspect) {
                        // Video is wider than canvas → fit width, letterbox top/bottom
                        drawW = vw;
                        drawH = vw / vAspect;
                        drawX = 0;
                        drawY = (vh - drawH) / 2;
                    } else {
                        // Video is taller than canvas → fit height, pillarbox left/right
                        drawH = vh;
                        drawW = vh * vAspect;
                        drawX = (vw - drawW) / 2;
                        drawY = 0;
                    }
                    ctx.drawImage(src, drawX, drawY, drawW, drawH);
                    return true;
                } catch (e) {
                    // SecurityError from tainted canvas — that's okay, spinner still shows
                    return false;
                }
            }

            // 1. Try main video first
            drewFrame = drawVideoToCanvas(video);
            if (!drewFrame) {
                // 2. Try the hidden preview video
                const previewVideo = document.getElementById('previewVideo');
                drewFrame = drawVideoToCanvas(previewVideo);
                if (!drewFrame && allowBlackFallback) {
                    // 3. No live frame — draw the cover/poster image instead of plain black
                    if (currentCoverUrl) {
                        const img = new Image();
                        const coverSrc = getProxiedUrl(currentCoverUrl);
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            try {
                                canvas.width = vw;
                                canvas.height = vh;
                                const ctx = canvas.getContext('2d');
                                // Draw cover image with object-fit:cover (fills canvas, crops edges)
                                const iAspect = img.naturalWidth / img.naturalHeight;
                                const cAspect = vw / vh;
                                let dw, dh, dx, dy;
                                if (iAspect > cAspect) {
                                    dh = vh; dw = vh * iAspect;
                                    dx = (vw - dw) / 2; dy = 0;
                                } else {
                                    dw = vw; dh = vw / iAspect;
                                    dx = 0; dy = (vh - dh) / 2;
                                }
                                ctx.drawImage(img, dx, dy, dw, dh);
                                // Dark gradient overlay matching the loader style
                                const grad = ctx.createLinearGradient(0, 0, 0, vh);
                                grad.addColorStop(0, 'rgba(9,9,11,0.55)');
                                grad.addColorStop(1, 'rgba(9,9,11,0.88)');
                                ctx.fillStyle = grad;
                                ctx.fillRect(0, 0, vw, vh);
                            } catch (_) { }
                        };
                        img.onerror = () => {
                            canvas.width = 1; canvas.height = 1;
                        };
                        img.src = coverSrc || currentCoverUrl;
                    } else {
                        canvas.width = 1;
                        canvas.height = 1;
                    }
                }
            }
            if (drewFrame || allowBlackFallback) {
                overlay.classList.add('active');
            }
            return drewFrame;
        }

        function hideTransitionOverlay() {
            const overlay = document.getElementById('transition-overlay');
            if (!overlay) return;
            overlay.classList.remove('active');
            overlay.classList.remove('buffering-lite');
        }


        function showToast(message) {
            try {
                console.warn('[toast]', message);
            } catch (_) { }
        }

        function isLikelyPlaceholderSource(url) {
            const u = String(url || '').toLowerCase();
            if (!u) return true;
            if (u.includes('kaa.lt/intro.mp4')) return true;
            if (u.endsWith('/intro.mp4')) return true;
            if (u.includes('/trailer') || u.includes('/preview')) return true;
            return false;
        }

        function buildSourcePanel() {
            sourcePanel.innerHTML = `<div class="panel-label">Select Server</div>`;
            allSources.forEach((src, i) => {
                const item = document.createElement('div');
                item.className = `src-item ${i === 0 ? 'active' : ''}`;
                item.innerHTML = `<span class="src-dot"></span>${src.label}`;
                item.onclick = () => { selectSource(i); sourcePanel.classList.remove('open'); };
                sourcePanel.appendChild(item);
            });
        }

        function updateSourceUI(idx) {
            sourcePanel.querySelectorAll('.src-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        }

        function selectSource(idx) {
            const savedTime = (video && !video.ended) ? video.currentTime : 0;
            currentIdx = idx;
            updateSourceUI(idx);

            const src = allSources[idx];
            if (!src) return;

            // Remember if user prefers Dubbed or Subbed
            const label = String(src.label || '').toLowerCase();
            if (label.includes('dubbed')) {
                preferredSourceLabelMatch = 'dubbed';
                preferredAudioToken = 'dubbed';
            } else if (label.includes('subbed')) {
                preferredSourceLabelMatch = 'subbed';
                preferredAudioToken = 'subbed';
            }

            // Also remember the provider preference
            if (src.provider) {
                FORCED_PROVIDER = src.provider;
            }

            playSource(idx, savedTime);
            syncUrlState();
        }

        function resetPlayerSurface() {
            if (hlsInst) { try { hlsInst.stopLoad(); hlsInst.detachMedia(); hlsInst.destroy(); } catch (_) { } hlsInst = null; }
            if (dashInst) { try { dashInst.reset(); } catch (_) { } dashInst = null; }
            if (plyr) { try { plyr.destroy(); } catch (_) { } plyr = null; }
            const wrap = document.querySelector('.player-wrap');
            if (wrap) {
                // Remove only the video element, keep the brightness overlay
                const oldVideo = wrap.querySelector('video');
                if (oldVideo) oldVideo.remove();
                
                // Also clean up any extra plyr wrappers that might have been left behind
                const extraWrappers = wrap.querySelectorAll('.plyr');
                extraWrappers.forEach(w => w.remove());

                const newVideo = document.createElement('video');
                newVideo.id = 'player-video';
                newVideo.className = 'plyr-video';
                // On iOS, autoplaying often leads to persistent loaders or audio track issues.
                // Disabling it ensures a clean user gesture when they tap play.
                newVideo.autoplay = !IS_IOS;
                newVideo.muted = IS_IOS ? true : false;
                if (!IS_IOS || IS_PWA) {
                    newVideo.playsInline = true;
                    newVideo.setAttribute('playsinline', '');
                    newVideo.setAttribute('webkit-playsinline', 'true');
                }
                newVideo.crossOrigin = 'anonymous';
                newVideo.preload = 'auto';
                wrap.insertBefore(newVideo, wrap.firstChild);
            }
            video = document.getElementById('player-video');
        }

        // ----------------------------------------------------------------------------------------------------
        //  PLAY SOURCE
        // ----------------------------------------------------------------------------------------------------
        function playSource(idx, startTime = 0) {
            const src = allSources[idx];
            if (!src) return;
            const statusLabel = startTime > 0 ? 'Switching Server...' : 'Buffering...';
            setLoader(statusLabel, src.label);
            loadStream(src.url, src.isM3U8, src.isEmbed, src.referer, idx, startTime);
        }

        function proxiedStreamUrl(url, referer) {
            const rawUrl = String(url || '').trim();
            // Cinezo already returns proxy-wrapped HLS links; avoid double-proxying those.
            if (/\/m3u8-proxy\?/i.test(rawUrl)) {
                return rawUrl;
            }
            // StreamRuby HLS often rejects server-side proxy requests (403) even with referer,
            // but plays directly in browser context.
            if (/https?:\/\/[^/]*streamruby\.net\//i.test(rawUrl)) {
                return rawUrl;
            }
            const apiBaseUrl = new URL(activeApiBase || API_BASE, location.href);
            let apiOrigin = `${apiBaseUrl.protocol}//${apiBaseUrl.host}`;
            const ref = referer ? `&referer=${encodeURIComponent(referer)}` : '';
            return `${apiOrigin}/utils/proxy?url=${encodeURIComponent(rawUrl)}${ref}`;
        }

        function warmupPreviewVideo(previewVideo) {
            if (!previewVideo) return;
            try {
                previewVideo.muted = true;
                previewVideo.preload = 'auto';
                previewVideo.playsInline = true;
                previewVideo.setAttribute('playsinline', 'true');
                previewVideo.setAttribute('webkit-playsinline', 'true');

                const onReady = () => {
                    try {
                        if (isFinite(previewVideo.duration) && previewVideo.duration > 2) {
                            previewVideo.currentTime = 1.0;
                        }
                        const maybe = previewVideo.play?.();
                        if (maybe && typeof maybe.then === 'function') {
                            maybe.then(() => {
                                try { previewVideo.pause(); } catch (_) { }
                            }).catch(() => { });
                        }
                    } catch (_) { }
                };

                previewVideo.addEventListener('loadedmetadata', onReady, { once: true });
                previewVideo.addEventListener('canplay', onReady, { once: true });
            } catch (_) {
                // ignore preview warmup failures
            }
        }

        function loadStream(url, isM3U8, isEmbed, referer, srcIdx, startTime = 0) {
            console.log('loadStream:', { url, isM3U8, isEmbed, srcIdx, startTime });
            window.previewSeeking = false;
            isSourceSwitching = true;
            hlsFragErrorBurst = 0;
            hlsSessionIsFragile = false;
            lastRequestedPlaybackTarget = Math.max(0, Number(startTime || 0));
            jumpCooldownUntil = 0;
            jumpInFlightUntil = 0;
            pendingJumpTarget = null;
            if (jumpRecoveryTimer) {
                clearTimeout(jumpRecoveryTimer);
                jumpRecoveryTimer = null;
            }
            let sameSourceRecoveryLock = false;
            const recoveryKey = `${srcIdx}|${String(url || '')}`;
            if (sameSourceRecoverKey !== recoveryKey) {
                sameSourceRecoverKey = recoveryKey;
                sameSourceRecoverCount = 0;
            }
            const previewVideo = document.getElementById('previewVideo');
            if (previewVideo) previewVideo.muted = true;

            // Check if we can seek instead of reloading for the same source
            if (hlsInst && url === currentStreamUrl && isM3U8 && Hls.isSupported() && video && isFinite(video.duration) && startTime > 0 && startTime < video.duration) {
                console.log('Seamless seek: seeking to', startTime, 'without reloading HLS');
                isSourceSwitching = false;
                video.currentTime = startTime;
                hideLoader();
                return;
            }

            currentStreamUrl = String(url || '');
            currentStreamReferer = referer || null;

            // Visual Bridge: capture current frame before we wipe anything.
            // Skip on the very first load — the #loader (with cover art) is already
            // covering everything, so there's no black gap to bridge.
            if (!isFirstLoad) {
                captureVideoFrameToOverlay();
            } else {
                showLoader();
            }

            // Capture volume/mute state before teardown so we can restore it
            const savedVolume = (video && isFinite(video.volume)) ? video.volume : 1;
            const savedMuted = video ? video.muted : false;

            // Tear down previous
            if (hlsInst) { try { hlsInst.stopLoad(); hlsInst.detachMedia(); hlsInst.destroy(); } catch (_) { } hlsInst = null; }
            if (window.previewHlsInst) { try { window.previewHlsInst.stopLoad(); window.previewHlsInst.detachMedia(); window.previewHlsInst.destroy(); } catch (_) { } window.previewHlsInst = null; }
            if (dashInst) { try { dashInst.reset(); } catch (_) { } dashInst = null; }
            if (window.previewDashInst) { try { window.previewDashInst.reset(); } catch (_) { } window.previewDashInst = null; }
            if (plyr) { try { plyr.destroy(); } catch (_) { } plyr = null; }

            // Prepare video element with extra attributes for better mobile/chrome compatibility
            // Overlay is already 'active' from captureVideoFrameToOverlay() — keep it visible
            // so there's NO flash of a resized/blank video during teardown
            const overlay = document.getElementById('transition-overlay');
            if (!isFirstLoad && overlay && !overlay.classList.contains('active')) {
                overlay.style.backgroundColor = '#000';
                overlay.classList.add('active');
            }

            const wrap = document.querySelector('.player-wrap');
            if (wrap) {
                // Preserve the brightness overlay to keep gesture functionality working
                const oldVideo = wrap.querySelector('video');
                if (oldVideo) wrap.removeChild(oldVideo);
                const newVideo = document.createElement('video');
                newVideo.id = 'player-video';
                newVideo.className = 'plyr-video';
                newVideo.autoplay = !IS_IOS;
                newVideo.muted = IS_IOS ? true : false;
                if (!IS_IOS || IS_PWA) {
                    newVideo.playsInline = true;
                    newVideo.setAttribute('playsinline', '');
                    newVideo.setAttribute('webkit-playsinline', 'true');
                }
                newVideo.crossOrigin = 'anonymous';
                newVideo.preload = 'auto';
                wrap.insertBefore(newVideo, wrap.firstChild);
            }
            video = document.getElementById('player-video');
            if (video) { video.volume = savedVolume; video.muted = savedMuted; } // Restore volume across switches

            let startT = startTime;
            let overlayHidden = false;
            const hideOverlay = () => {
                if (overlayHidden) return;
                overlayHidden = true;
                hideTransitionOverlay();
            };
            const cleanup = () => {
                if (video && video.currentTime > startT + 0.5) {
                    hideOverlay();
                    video.removeEventListener('timeupdate', cleanup);
                }
            };
            video.addEventListener('timeupdate', cleanup);
            // Safety: hide overlay after 6s max so it never gets stuck
            setTimeout(hideOverlay, 6000);

            // Volume boost
            setVolumeBoost(volumeBoost);

            const initPlyr = () => {
                console.log('Initializing Plyr...');
                // Ensure subtitles are applied to the NEW video element created by loadStream
                applyExternalSubtitlesToVideo(video);
                const qualities = hlsInst
                    ? [...new Set(hlsInst.levels.map(l => l.height).filter(Boolean))]
                    : [];
                const maxH = qualities.length ? Math.max(...qualities) : 720;

                plyr = new Plyr(video, {
                    blankVideo: 'data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAADpmcmVlAAAAAG1kYXQ=',
                    autoplay: !IS_IOS,
                    muted: video.muted,
                    clickToPlay: false,
                    controls: [
                        'play-large',
                        'play',
                        'rewind',
                        'fast-forward',
                        'progress',
                        'current-time',
                        'duration',
                        'mute',
                        'volume',
                        'settings',
                        'pip',
                        'airplay',
                        'fullscreen'
                    ],
                    captions: { active: false, update: false, language: 'auto' },
                    quality: qualities.length
                        ? { default: maxH, options: [0, ...qualities], forced: true, onChange: changeQuality }
                        : {},
                    speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                });
                bindVideoEvents();
                syncTimeUI();
                updateMuteIcon();
                updateCaptionsButtonVisibility();
                showControlSurface();

                // Sync play icon in case video was already playing when Plyr initialized
                if (video && !video.paused) setPlayIcon(true);

                const hideIfReady = () => { 
                    // On iOS, we don't autoplay, so we MUST hide the loader when ready 
                    // to show the play button. On other platforms, we wait for 'playing'.
                    if (!isFirstLoad || IS_IOS) hideLoader(); 
                };
                plyr.on('ready', hideIfReady);
                plyr.on('canplay', hideIfReady);
                plyr.on('playing', () => {
                    isFirstLoad = false;
                    hideLoader();
                    try { hideTransitionOverlay(); } catch (_) { }
                });
                plyr.on('play', () => {
                    setPlayIcon(true);
                    showControlSurface();
                });
                plyr.on('pause', () => {
                    setPlayIcon(false);
                    controlSurface.classList.add('visible');
                });
            };

            const recoverSameSource = (reason = 'unknown') => {
                if (sameSourceRecoveryLock) return;
                sameSourceRecoveryLock = true;
                const currentTime = (video && video.currentTime > 0) ? video.currentTime : startTime;
                sameSourceRecoverCount += 1;
                console.warn(`[hls] Recovering same source (attempt ${sameSourceRecoverCount}) reason=${reason}`);

                // Capture last visible frame immediately to prevent black screen flash during rebuild
                try { captureVideoFrameToOverlay(); } catch (_) { }

                const maxAttempts = reason === 'fatal_network_error' ? 1 : 40;

                if (hlsInst && isM3U8 && sameSourceRecoverCount <= maxAttempts) {
                    try {
                        const jump = sameSourceRecoverCount > 12 ? 2.6 : (sameSourceRecoverCount > 5 ? 1.4 : 0.25);
                        const pendingTargetTime = pendingJumpTarget?.time;
                        const near = Math.max(0, Number.isFinite(pendingTargetTime) ? pendingTargetTime : Number(currentTime || 0) + jump);
                        const resumeAt = Math.max(0, Number.isFinite(pendingTargetTime) ? pendingTargetTime : Number(video?.currentTime || near));
                        showBufferingOverlay();

                        // Always do a clean in-place HLS rebuild.
                        // recoverMediaError() alone leaves a blank video when the pipeline is truly broken.
                        // svSwitchHlsSourceSilent destroys the old instance and rebuilds from scratch,
                        // ensuring video resumes at the correct time without a black frame.
                        pendingJumpTarget = { time: resumeAt, reason: pendingJumpTarget?.reason || 'recover' };
                        const isForced = reason === 'fatal_frag_parse_jump'
                            || reason === 'watchdog_stall'
                            || reason === 'buffer_full_unrecoverable';
                        setTemporaryRecoveryQuality(isForced ? 7000 : 5000);
                        svSwitchHlsSourceSilent(url, referer, () => {
                            hlsFragErrorBurst = 0;
                            hlsSessionIsFragile = false;
                            hideBufferingOverlaySoon(120);
                            if (video && video.paused) {
                                Promise.resolve(video.play()).catch(() => {
                                    video.muted = true;
                                    Promise.resolve(video.play()).catch(() => { });
                                });
                            }
                        }, null, true);
                    } catch (_) { }
                    setTimeout(() => { sameSourceRecoveryLock = false; }, 600);
                    return;
                }

                // Exhausted all recovery attempts
                sameSourceRecoveryLock = false;
                showError(
                    'Stream Decode Error',
                    'Playback could not recover. Please choose another server manually.'
                );
            };

            const isMPD = String(url || '').toLowerCase().includes('.mpd');

            // 1. HLS with hls.js
            if (isM3U8 && Hls.isSupported()) {
                console.log('Branch: HLS.js');
                const streamUrl = proxiedStreamUrl(url, referer);

                hlsInst = svCreateHlsInstance(startTime);
                svAttachHlsListeners(hlsInst, startTime, () => {
                    initPlyr();
                    // On first load, wait for real video frames before hiding the loader
                    // so the cover-art loader stays visible the whole time instead of
                    // showing a black gap between loader and first frame.
                    if (isFirstLoad) {
                        const onFirstFrame = () => {
                            isFirstLoad = false;
                            hideLoader();
                            video && video.removeEventListener('timeupdate', onFirstFrame);
                        };
                        video && video.addEventListener('timeupdate', onFirstFrame);
                        // Safety: hide after 10s no matter what
                        setTimeout(() => { if (isFirstLoad) { isFirstLoad = false; hideLoader(); } }, 10000);
                    }
                if (!IS_IOS) {
                    video.play().catch(() => {
                        video.muted = true;
                        video.play()
                            .then(() => setPlayIcon(true))
                            .catch(() => hideLoader());
                    }).then(() => {
                        if (video && !video.paused) setPlayIcon(true);
                    });
                } else {
                    // On iOS, we just make sure we're ready for the user to tap play
                    setPlayIcon(false);
                }
                }, recoverSameSource);

                hlsInst.loadSource(streamUrl);
                hlsInst.attachMedia(video);
                video.preload = 'auto';

                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    window.previewHlsInst = svCreateHlsInstance(0, true);
                    window.previewHlsInst.on(Hls.Events.MANIFEST_LOADED, () => {
                        // ENHANCED: Use level 1 (if available) instead of always lowest for better quality
                        if (window.previewHlsInst.levels && window.previewHlsInst.levels.length > 1) {
                            const targetLevel = 1; // Medium quality
                            window.previewHlsInst.autoLevelCapping = targetLevel;
                            window.previewHlsInst.currentLevel = targetLevel;
                            window.previewHlsInst.nextLevel = targetLevel;
                            window.previewHlsInst.loadLevel = targetLevel;
                            console.log('[preview] Using quality level 1 for better thumbnails');
                        } else {
                            // Fallback to level 0 if only one level available
                            window.previewHlsInst.autoLevelCapping = 0;
                            window.previewHlsInst.currentLevel = 0;
                            window.previewHlsInst.nextLevel = 0;
                            window.previewHlsInst.loadLevel = 0;
                        }
                    });

                    // ENHANCED: Better error handling for preview stream
                    // Disable preview seeking during main video startup (first 8 seconds)
                    window.previewSeekingDisabledUntil = Date.now() + 8000;

                    window.previewHlsInst.on(Hls.Events.ERROR, (_, data) => {
                        window.previewHlsErrorCount = (window.previewHlsErrorCount || 0) + 1;

                        // Non-fatal errors - mark as unhealthy but limit retries to avoid resource exhaustion
                        if (!data.fatal) {
                            console.warn(`[preview] Non-fatal error (count: ${window.previewHlsErrorCount}): ${data.details}`);
                            // Only retry once for non-fatal errors to avoid hammering connection
                            if (window.previewHlsErrorCount === 1 || window.previewHlsErrorCount === 3) {
                                window.previewHlsIsUnhealthy = true;
                                setTimeout(() => {
                                    if (window.previewHlsInst && window.previewHlsIsUnhealthy && !video?.seeking) {
                                        try {
                                            console.log('[preview] Retrying after non-fatal error (limited)...');
                                            window.previewHlsInst.recoverMediaError?.();
                                        } catch (_) { }
                                    }
                                }, 1500); // Increased delay to let main stream priority
                            }
                            // After 5 consecutive non-fatal errors, switch to fallback mode permanently
                            if (window.previewHlsErrorCount >= 5) {
                                console.warn('[preview] Too many non-fatal errors, switching to canvas fallback permanently');
                                window.previewHlsIsUnhealthy = true;
                                window.previewUseCanvasFallbackOnly = true; // Force canvas fallback
                            }
                            return;
                        }

                        // Fatal errors - escalate recovery with more conservative timing
                        console.warn(`[preview] Fatal error (attempt ${window.previewHlsErrorCount}): ${data.details}`);
                        window.previewHlsIsUnhealthy = true;

                        // Only one recovery attempt per consecutive fatals
                        if (window.previewHlsErrorCount <= 2) {
                            try {
                                console.log('[preview] Fatal: attempting stopLoad for recovery');
                                window.previewHlsInst.stopLoad();
                            } catch (_) { }
                        } else {
                            // Multiple failures - signal that we should use main video canvas fallback
                            console.warn('[preview] Fatal errors persistent, fallback to main video capture enabled');
                            window.previewUseCanvasFallbackOnly = true; // Force canvas fallback
                        }
                    });

                    window.previewHlsInst.loadSource(streamUrl);
                    window.previewHlsInst.attachMedia(previewVideo);

                    // Track preview errors to know when to fallback
                    window.previewHlsErrorCount = 0;
                    window.previewHlsIsUnhealthy = false;

                    warmupPreviewVideo(previewVideo);
                }

            } else if (isM3U8 && (
                video?.canPlayType?.('application/vnd.apple.mpegurl') ||
                video?.canPlayType?.('application/x-mpegURL') ||
                IS_IOS ||
                IS_SAFARI
            )) {
                console.log('Branch: Native HLS (iOS Safari/WebKit)');
                // On iOS, crossOrigin='anonymous' triggers CORS preflight for every segment
                // request, which can cause failures when the CDN doesn't support CORS.
                // Remove it for native HLS — canvas thumbnail capture isn't used on iOS.
                // Exception: 'justanime' uses external subtitles resolving to a cross-origin /utils/vtt.
                // If we remove crossorigin, iOS WebKit instantly crashes the <video> when the <track> is added.
                video.setAttribute('crossorigin', 'anonymous');
                video.crossOrigin = 'anonymous';

                // CRITICAL SYNC INJECTION for iOS Safari/AVKit. 
                // Any 'await' here before source assignment would break the native probe.
                if (IS_IOS && (externalSubtitleTracks || []).length > 0) {
                     applyExternalSubtitlesToVideoSync(video);
                }

                const proxiedUrl = proxiedStreamUrl(url, referer);
                const directUrl = url;
                let fallbackStep = 0; // 0=proxy, 1=proxy-retry, 2=direct

                const tryNextHlsStep = (reason) => {
                    fallbackStep++;
                    console.warn(`Native HLS: step ${fallbackStep} fallback triggered (${reason})`);

                    if (fallbackStep === 1) {
                        // Retry the proxied URL with a cache-buster. The proxy re-fetches the
                        // signed AnimeSalt CDN URL from the server side (no cache), so a retry
                        // often recovers from transient 502s caused by the probe-filter.
                        console.warn('Native HLS: retrying proxied URL (cache-busted)');
                        setTimeout(() => {
                            video.src = proxiedUrl + '&_t=' + Date.now();
                            video.load();
                            video.play().catch(() => {});
                        }, 600);
                    } else if (fallbackStep === 2) {
                        // Try direct URL (without proxy) — works when CDN allows browser access
                        console.warn('Native HLS: trying direct URL (no proxy)');
                        video.src = directUrl;
                        video.load();
                        video.play().catch(err => {
                            console.warn('Native HLS: direct play() failed:', err.message);
                        });
                    } else {
                        // All fallbacks exhausted
                        console.error('Native HLS: All fallbacks exhausted.');
                        showError('Playback Error', 'This stream could not be played. Please try another server.');
                    }
                };

                if (startTime > 0) {
                    video.addEventListener('loadedmetadata', () => {
                        video.currentTime = startTime;
                    }, { once: true });
                }

                video.addEventListener('error', (e) => {
                    const err = video.error;
                    console.error('Native HLS Video Error:', err ? err.code : 'unknown', err ? err.message : '');
                    if (fallbackStep < 3) tryNextHlsStep('video_error');
                });

                // Detect stalling (give proxy 12s — it fetches the CDN manifest server-side)
                const hlsStallTimer = setTimeout(() => {
                    if (video && video.readyState < 2) {
                        console.warn('Native HLS: Stalling at start, attempting fallback');
                        tryNextHlsStep('stall');
                    }
                }, 12000);
                video.addEventListener('loadedmetadata', () => clearTimeout(hlsStallTimer), { once: true });
                video.addEventListener('canplay', () => clearTimeout(hlsStallTimer), { once: true });

                // Refresh audio track UI once metadata is parsed — iOS populates
                // video.audioTracks only AFTER loadedmetadata fires.
                video.addEventListener('loadedmetadata', () => {
                    svApplyPreferredAudioToHls(null);
                    setTimeout(() => updateAudioTracks(), 100);
                }, { once: true });

                video.src = proxiedUrl;
                video.load();

                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    previewVideo.preload = 'auto';
                    previewVideo.src = proxiedUrl;
                    warmupPreviewVideo(previewVideo);
                }

                initPlyr();

                // iOS native HLS: Plyr's event wrappers are not reliable enough for hiding the loader.
                // Hook directly onto the native video element events to guarantee the loader clears.
                const _iosHideLoader = () => {
                    isFirstLoad = false;
                    hideLoader();
                    try { hideTransitionOverlay(); } catch (_) { }
                    // Also refresh audio tracks now that native AudioTrackList is populated
                    setTimeout(() => updateAudioTracks(), 300);
                };
                video.addEventListener('playing', _iosHideLoader, { once: true });
                video.addEventListener('canplay',  _iosHideLoader, { once: true });
                // Hard fallback: if neither fires within 14s, force-clear the loader
                setTimeout(() => { isFirstLoad = false; hideLoader(); updateAudioTracks(); }, 14000);

                if (isFirstLoad) {
                    const onFirstFrame = () => {
                        isFirstLoad = false;
                        hideLoader();
                        if (video) video.removeEventListener('timeupdate', onFirstFrame);
                    };
                    if (video) video.addEventListener('timeupdate', onFirstFrame);
                }

                // Initial play attempt
                if (!IS_IOS) {
                    video.play().catch(err => {
                        console.log('Initial Native HLS play() blocked, waiting for user or fallback:', err.message);
                    });
                }

            } else if (isMPD && window.dashjs?.MediaPlayer) {
                console.log('Branch: DASH.js');
                const mpdUrl = proxiedStreamUrl(url, referer);
                dashInst = window.dashjs.MediaPlayer().create();
                dashInst.initialize(video, mpdUrl, true);
                let dashErrCount = 0;
                let dashTriedNext = false;
                const dashEvents = window.dashjs.MediaPlayer.events;
                dashInst.on(dashEvents.ERROR, (evt) => {
                    const code = Number(evt?.error?.code || evt?.event?.id || 0);
                    const msg = String(evt?.error?.message || evt?.event?.message || '').toLowerCase();
                    if (msg.includes('403') || msg.includes('forbidden') || code === 27) {
                        dashErrCount += 1;
                    }
                    if (!dashTriedNext && dashErrCount >= 2) {
                        dashTriedNext = true;
                        console.warn('DASH source appears blocked (403), recovering same source');
                        recoverSameSource('dash_403');
                    }
                });
                initPlyr();

                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    previewVideo.preload = 'auto';
                    window.previewDashInst = window.dashjs.MediaPlayer().create();
                    window.previewDashInst.initialize(previewVideo, mpdUrl, false);
                    window.previewDashInst.updateSettings({
                        'streaming': {
                            'abr': { 'initialBitrate': 100, 'minBitrate': 1, 'maxBitrate': 180 },
                            'buffer': { 'stableBufferTime': 3, 'bufferTimeAtTopQuality': 3, 'fastSwitchEnabled': true }
                        }
                    });
                    warmupPreviewVideo(previewVideo);
                }

                if (isFirstLoad) {
                    const onFirstFrame = () => {
                        isFirstLoad = false;
                        hideLoader();
                        video && video.removeEventListener('timeupdate', onFirstFrame);
                    };
                    video && video.addEventListener('timeupdate', onFirstFrame);
                    setTimeout(() => { if (isFirstLoad) { isFirstLoad = false; hideLoader(); } }, 10000);
                }

                if (!IS_IOS) video.play().catch(() => hideLoader());

            } else if (isEmbed) {
                console.log('Branch: Direct IFRAME Embed');
                wrap.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;pointer-events:auto;" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>`;
                video = null;
                hideControlSurfaceNow();
                isFirstLoad = false;
                hideLoader();

                // MegaCloud/iframe sources can fail silently in custom players.
                // Auto-rotate to next source if playback does not visibly start soon.
                setTimeout(() => {
                    if (currentIdx === srcIdx) {
                        console.warn('Embed source timeout, recovering same source');
                        recoverSameSource('embed_timeout');
                    }
                }, 9000);

            } else if (!isM3U8) {
                console.log('Branch: Direct MP4');
                if (startTime > 0) {
                    video.addEventListener('loadedmetadata', () => {
                        video.currentTime = startTime;
                    }, { once: true });
                }
                const proxiedMp4Url = proxiedStreamUrl(url, referer);
                const directMp4Url = url;
                let triedDirectFallback = false;

                const tryDirectMp4Fallback = () => {
                    if (triedDirectFallback) return false;
                    triedDirectFallback = true;
                    console.warn('Proxied MP4 failed, retrying with direct MP4 URL');
                    try {
                        video.src = directMp4Url;
                        video.load();
                        video.play().catch(() => { });
                        return true;
                    } catch (_) {
                        return false;
                    }
                };

                video.addEventListener('error', () => {
                    const switched = tryDirectMp4Fallback();
                    if (!switched) {
                        console.warn('Direct MP4 failed, recovering same source');
                        recoverSameSource('mp4_error');
                    }
                });

                // If proxy starts but never gets metadata, fallback to direct URL.
                const metadataFallbackTimer = setTimeout(() => {
                    if (!video || !Number.isFinite(video.duration) || video.duration <= 0) {
                        tryDirectMp4Fallback();
                    }
                }, 4500);
                video.addEventListener('loadedmetadata', () => clearTimeout(metadataFallbackTimer), { once: true });

                video.src = proxiedMp4Url;

                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    previewVideo.preload = 'auto';
                    previewVideo.src = proxiedMp4Url;
                    warmupPreviewVideo(previewVideo);
                }

                initPlyr();

                if (isFirstLoad) {
                    const onFirstFrame = () => {
                        isFirstLoad = false;
                        hideLoader();
                        video && video.removeEventListener('timeupdate', onFirstFrame);
                    };
                    video && video.addEventListener('timeupdate', onFirstFrame);
                    setTimeout(() => { if (isFirstLoad) { isFirstLoad = false; hideLoader(); } }, 10000);
                }

                if (!IS_IOS) video.play().catch(() => hideLoader());

            } else {
                showError('Unsupported Browser', 'Your browser does not support HLS streaming.');
            }
        }

        function changeQuality(q) {
            if (!hlsInst) return;
            hlsInst.nextLevel = q === 0 ? -1 : hlsInst.levels.findIndex(l => l.height === q);
        }

        // -----------------------------------------------------------------------
        //  INIT
        // -----------------------------------------------------------------------
        initCustomControls();
        bindVideoEvents();
        document.addEventListener('fullscreenchange', showControlSurface);
        document.addEventListener('webkitfullscreenchange', showControlSurface);

        // Update fullscreen icon to match iOS pseudo-fullscreen state.
        // Since we no longer call webkitEnterFullscreen(), the icon must be
        // synced to our css class instead of webkitFullscreenElement.
        if (IS_IOS) {
            const _syncIosFsIcon = () => {
                const icon = fullscreenBtn?.querySelector('i');
                if (!icon) return;
                const isPs = document.documentElement.classList.contains('ios-pseudo-fs-active');
                icon.className = isPs ? 'fa-solid fa-compress' : 'fa-solid fa-expand';
            };
            // MutationObserver on <html> classList so the icon stays in sync
            // even if the class is toggled by any path (e.g. back-button, script)
            new MutationObserver(_syncIosFsIcon).observe(document.documentElement, {
                attributes: true, attributeFilter: ['class']
            });
        }
        init();
    </script>
</body>
