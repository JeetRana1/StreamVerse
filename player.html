                if (kind && kind !== 'captions' && kind !== 'subtitles') return;
                const src = item?.url || item?.file || item?.src;
                if (!src || typeof src !== 'string') return;

                const rawLang = String(item?.lang || item?.language || item?.label || `Track ${idx + 1}`).trim();
                const langLower = rawLang.toLowerCase();
                let srclang = 'en';
                if (langLower === 'ja' || langLower === 'jpn' || langLower.includes('japanese')) srclang = 'ja';
                else if (langLower === 'en' || langLower === 'eng' || langLower.includes('english')) srclang = 'en';
                else if (/^[a-z]{2,3}$/i.test(rawLang)) srclang = rawLang.toLowerCase();

                out.push({
                    label: item?.label || item?.language || rawLang,
                    srclang,
                    src,
                    provider,
                    referer
                });
            });

            const seen = new Set();
            return out.filter((t) => {
                const key = `${t.src}|${t.srclang}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        async function resolveSubtitleTrackSrc(sub) {
            const rawSrc = String(sub?.src || '').trim();
            if (!rawSrc) return '';
            const proxied = proxiedStreamUrl(rawSrc, sub?.referer || null);
            const toVttBlobUrl = (text) => {
                const vttText = String(text || '');
                const blob = new Blob([vttText], { type: 'text/vtt' });
                const url = URL.createObjectURL(blob);
                subtitleBlobUrls.push(url); // track for cleanup
                return url;
            };
            const sanitizeText = (text) => String(text || '').replace(/\r+/g, '').replace(/^\uFEFF/, '');
            const srtToVtt = (srtText) => {
                const clean = sanitizeText(srtText);
                return `WEBVTT\n\n${clean.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')}`;
            };
            const assTimeToVtt = (t) => {
                const m = String(t || '').trim().match(/^(\d+):(\d{1,2}):(\d{1,2})[.](\d{1,2})$/);
                if (!m) return '';
                const hh = String(Number(m[1] || 0)).padStart(2, '0');
                const mm = String(Number(m[2] || 0)).padStart(2, '0');
                const ss = String(Number(m[3] || 0)).padStart(2, '0');
                const ms = String(Math.round(Number(`0.${m[4] || '0'}`) * 1000)).padStart(3, '0');
                return `${hh}:${mm}:${ss}.${ms}`;
            };
            const assToVtt = (assText) => {
                const lines = sanitizeText(assText).split('\n');
                const cues = [];
                let idx = 1;
                for (const line of lines) {
                    const m = line.match(/^Dialogue:\s*[^,]*,([^,]+),([^,]+),[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,(.*)$/i);
                    if (!m) continue;
                    const start = assTimeToVtt(m[1]);
                    const end = assTimeToVtt(m[2]);
                    if (!start || !end) continue;
                    const text = String(m[3] || '')
                        .replace(/\{[^}]*\}/g, '')
                        .replace(/\\N/gi, '\n')
                        .replace(/\\n/g, '\n')
                        .trim();
                    if (!text) continue;
                    cues.push(`${idx++}\n${start} --> ${end}\n${text}`);
                }
                if (!cues.length) return '';
                return `WEBVTT\n\n${cues.join('\n\n')}`;
            };

            try {
                const lower = String(rawSrc || '').toLowerCase();
                if (subtitleBlobCache.has(lower)) return subtitleBlobCache.get(lower);

                const proxied = getProxiedUrl(rawSrc);
                try {
                    const looksLikeSrt = /\.srt(\?|$)/i.test(rawSrc);
                    const looksLikeAss = /\.ass(\?|$)/i.test(rawSrc) || /\.ssa(\?|$)/i.test(rawSrc);
                    const txtRes = await fetch(proxied, { signal: AbortSignal.timeout(12000) });
                    if (txtRes.ok) {
                        const txt = await txtRes.text();
                        const ln = txt.trim().toLowerCase();
                        const hasCueArrow = txt.includes('-->');
                        const hasSrtTimestamp = /\d{2}:\d{2}:\d{2},\d{3}/.test(txt);
                        const looksAssBody = /^\s*\[script info\]/i.test(txt) || /^\s*\[events\]/im.test(txt) || /dialogue:\s*[^,]*,\d+:\d{1,2}:\d{1,2}\.\d{1,2}/i.test(txt);
                        if (!ln.startsWith('<!doctype html') && !ln.startsWith('<html')) {
                            let blobUrl = '';
                            if (looksLikeSrt || (hasCueArrow && hasSrtTimestamp)) blobUrl = toVttBlobUrl(srtToVtt(txt));
                            else if (looksLikeAss || looksAssBody) blobUrl = toVttBlobUrl(assToVtt(txt));
                            else if (ln.startsWith('webvtt') || hasCueArrow) blobUrl = toVttBlobUrl(sanitizeText(txt));

                            if (blobUrl) {
                                subtitleBlobCache.set(lower, blobUrl);
                                return blobUrl;
                            }
                        }
                    } else if (txtRes.status === 404 || txtRes.status === 403) {
                        subtitleBlobCache.set(lower, '');
                        return '';
                    }
                } catch (_) { }
                try {
                    const testRes = await fetch(proxied, { method: 'HEAD', signal: AbortSignal.timeout(8000) });
                    if (testRes.ok) return proxied;
                    if (testRes.status === 404 || testRes.status === 403) return '';
                } catch (_) { }
            } catch (_) { }
            return '';
        }

        async function applyExternalSubtitlesToVideo(videoEl) {
            if (!videoEl) return;
            const applyVersion = ++subtitleApplyVersion;

            // Queue old URLs for revocation with a very safe delay to avoid ERR_FILE_NOT_FOUND
            const oldUrls = [...subtitleBlobUrls];
            subtitleBlobUrls = [];
            setTimeout(() => {
                oldUrls.forEach((u) => { try { URL.revokeObjectURL(u); } catch (_) { } });
            }, 300000); // 5 minute delay for maximum safety

            if (!Array.isArray(externalSubtitleTracks) || externalSubtitleTracks.length === 0) {
                videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }


            const prepared = await Promise.all(
                externalSubtitleTracks.map(async (sub) => ({
                    ...sub,
                    resolvedSrc: await resolveSubtitleTrackSrc(sub),
                })),
            );
            if (applyVersion !== subtitleApplyVersion) return;

            const resolved = prepared.filter((sub) => !!sub.resolvedSrc);
            if (!resolved.length) {
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
                return;
            }

            // Replace old external tracks only when we have a ready replacement set.
            videoEl.querySelectorAll('track[data-ext-sub="1"]').forEach((t) => t.remove());

            resolved.forEach((sub, i) => {
                const track = document.createElement('track');
                track.kind = 'metadata'; // Use metadata to prevent ANY browser rendering while still firing events
                track.label = sub.label || `Subtitle ${i + 1}`;
                track.srclang = sub.srclang || 'en';
                track.src = sub.resolvedSrc || '';
                track.dataset.extSub = '1';
                track.crossOrigin = 'anonymous';
                track.addEventListener('load', () => {
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                });
                track.addEventListener('error', () => {
                    if (applyVersion === subtitleApplyVersion) {
                        console.warn('Subtitle track failed to load:', track.label, track.src);
                    }
                });
                videoEl.appendChild(track);
            });
            console.log(`Subtitles prepared=${prepared.length}, attached=${videoEl.querySelectorAll('track[data-ext-sub="1"]').length}`);

            setTimeout(() => {
                bindSubtitleCueListeners();
                activeSubtitleTrackIndex = -1;
                if (videoEl.textTracks) {
                    Array.from(videoEl.textTracks).forEach((t) => { t.mode = 'disabled'; });
                }
                renderSubtitleOverlayFromTrack(null);
                updateCaptionsButtonVisibility();
                buildCaptionsMenu();
            }, 120);
        }

        function mergeSubtitleTrackLists(primary, secondary) {
            const p = Array.isArray(primary) ? primary : [];
            const s = Array.isArray(secondary) ? secondary : [];
            const merged = [...p, ...s].filter((t) => t && (t.src || t.url));
            const seen = new Set();
            return merged.filter((t) => {
                const key = `${String(t.src || t.url)}|${String(t.srclang || '').toLowerCase()}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        async function fetchAnimeSubtitleFallback() {
            if (!currentIsLikelyAnime) return [];
            const mediaTitle = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || '');
            const preferredYear = getPreferredMediaYear();
            if (!mediaTitle) return [];
            const absoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);
            const subtitleCacheKey = `${mediaTitle.toLowerCase()}::${preferredYear || ''}::ep${absoluteEpisodeNo}`;
            if (animeSubtitleCache.has(subtitleCacheKey)) {
                return animeSubtitleCache.get(subtitleCacheKey) || [];
            }

            // Show-level cache key (same across all episodes of a show)
            const showCacheKey = `${mediaTitle.toLowerCase()}::${preferredYear || ''}`;

            for (const provider of ANIME_SUBTITLE_FALLBACK_PROVIDERS) {
                try {
                    const base = getAnimeProviderBase(provider);
                    const selectedSeason = tvSeasons?.[curSeason];
                    const sNoRaw = Number(selectedSeason?.seasonNo);
                    const selectedSeasonNo = Number.isFinite(sNoRaw) && sNoRaw > 0 ? sNoRaw : (curSeason + 1);

                    const terms = getAnimeSearchTerms(mediaTitle, preferredYear, selectedSeasonNo);
                    const subtitleTimeoutMs = getProviderTimeout(provider, 'subtitleFallback', REQ_TIMEOUT.subtitleFallback);
                    let providerEpisodeId = null;

                    // Check show-level cache to skip search+info on subsequent episodes
                    const cachedAnimeId = justanimeAnimeIdCache.get(`${provider}::${showCacheKey}`);

                    if (cachedAnimeId) {
                        // Fast path: already know the anime ID, build episode ID directly
                        if (provider === 'justanime') {
                            providerEpisodeId = `${cachedAnimeId}$episode$${MEDIA_TYPE === 'tv' ? absoluteEpisodeNo : 1}`;
                        } else {
                            // For other providers we still need the episode list, but we skip the search
                            const { res: infoRes } = await fetchJsonWithApiFallback(
                                buildAnimeInfoUrl(provider, cachedAnimeId),
                                { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                            );
                            if (infoRes.ok) {
                                let info = await infoRes.json();
                                if (info?.data) info = info.data;
                                const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                                const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                    || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                    || episodes[0];
                                providerEpisodeId = target?.id;
                            }
                        }
                    } else {
                        // Slow path: search + info to discover anime ID
                        let best = null;
                        for (const term of terms) {
                            const searchUrl = `${base}/${encodeURIComponent(term)}`;
                            const { res: searchRes } = await fetchJsonWithApiFallback(searchUrl, { signal: AbortSignal.timeout(subtitleTimeoutMs) });
                            if (!searchRes.ok) continue;
                            const searchData = await searchRes.json();
                            const results = getAnimeSearchResults(searchData);
                            best = pickAnimeResultByTitle(results, mediaTitle, preferredYear, selectedSeasonNo);
                            if (best?.id) break;
                        }
                        const animeId = best?.id;
                        if (!isValidAnimeInfoId(animeId)) continue;

                        // Cache the anime ID so future episodes skip this step
                        justanimeAnimeIdCache.set(`${provider}::${showCacheKey}`, animeId);

                        const { res: infoRes } = await fetchJsonWithApiFallback(
                            buildAnimeInfoUrl(provider, animeId),
                            { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                        );
                        if (!infoRes.ok) continue;
                        let info = await infoRes.json();
                        if (info?.data) info = info.data;

                        if (provider === 'justanime' && info?.id) {
                            providerEpisodeId = `${info.id}$episode$${MEDIA_TYPE === 'tv' ? absoluteEpisodeNo : 1}`;
                        } else {
                            const episodes = Array.isArray(info?.episodes) ? info.episodes : [];
                            const target = episodes.find((ep) => Number(ep?.number || ep?.episodeNum || ep?.episode) === absoluteEpisodeNo)
                                || episodes[Math.min(curEpisode, Math.max(0, episodes.length - 1))]
                                || episodes[0];
                            providerEpisodeId = target?.id;
                        }
                    }

                    if (!providerEpisodeId) continue;

                    const { res: watchRes } = await fetchJsonWithApiFallback(
                        buildAnimeWatchUrl(provider, providerEpisodeId),
                        { signal: AbortSignal.timeout(subtitleTimeoutMs) },
                    );
                    if (!watchRes.ok) continue;
                    const watchData = await watchRes.json();
                    const headers = watchData?.headers || watchData?.data?.headers || {};
                    const referer = headers?.Referer || headers?.referer || null;
                    const subs = normalizeSubtitleEntries(watchData?.data || watchData, provider, referer);
                    if (subs.length) {
                        console.log(`Subtitle fallback success from ${provider}: ${subs.length}`);
                        animeSubtitleCache.set(subtitleCacheKey, subs);
                        return subs;
                    }
                } catch (_) { }
            }
            animeSubtitleCache.set(subtitleCacheKey, []);
            return [];
        }

        function closeCustomMenus() {
            qualityMenu.classList.remove('active');
            captionsMenu.classList.remove('active');
            settingsMenu.classList.remove('active');
            volumeMenu.classList.remove('active');
        }

        function updateCaptionsButtonVisibility() {
            if (!captionsBtn || !video) return;
            const hasTracks = (video.querySelectorAll('track').length > 0)
                || (video.textTracks && video.textTracks.length > 0);
            const showForAnime = currentIsLikelyAnime === true;
            captionsBtn.style.display = (hasTracks || showForAnime) ? 'inline-flex' : 'none';
            if (!hasTracks && !showForAnime) captionsMenu.classList.remove('active');
        }

        function ensureSubtitleOverlay() {
            let overlay = document.getElementById('subtitleOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'subtitleOverlay';
                overlay.style.position = 'fixed';
                overlay.style.left = '8%';
                overlay.style.right = '8%';
                overlay.style.bottom = '12%';
                overlay.style.zIndex = '240';
                overlay.style.textAlign = 'center';
                overlay.style.pointerEvents = 'none';
                overlay.style.color = '#fff';
                overlay.style.fontSize = 'clamp(16px, 2.2vw, 30px)';
                overlay.style.fontWeight = '700';
                overlay.style.textShadow = '0 2px 6px rgba(0,0,0,.95), 0 0 12px rgba(0,0,0,.8)';
                overlay.style.lineHeight = '1.35';
                overlay.style.whiteSpace = 'pre-line';
                overlay.style.display = 'none';
                overlay.style.userSelect = 'none';
                document.body.appendChild(overlay);
            }
            return overlay;
        }

        function renderSubtitleOverlayFromTrack(track) {
            const overlay = ensureSubtitleOverlay();
            if (!track) {
                overlay.innerHTML = '';
                overlay.style.display = 'none';
                return;
            }
            const cues = track.activeCues ? Array.from(track.activeCues) : [];
            const text = cues.map((c) => c.text || '').filter(Boolean).join('\n');
            // Use innerHTML to allow basic formatting tags like <i>, <b> provided by VTT
            overlay.innerHTML = text;
            overlay.style.display = text ? 'block' : 'none';
        }

        function bindSubtitleCueListeners() {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((track) => {
                if (track.__overlayBound) return;
                track.addEventListener('cuechange', () => {
                    const activeTrack = activeSubtitleTrackIndex >= 0
                        ? (video.textTracks[activeSubtitleTrackIndex] || null)
                        : null;
                    renderSubtitleOverlayFromTrack(activeTrack);
                });
                track.__overlayBound = true;
            });
        }

        function silenceNativeTracks() {
            if (!video || !video.textTracks) return;
            const tracks = Array.from(video.textTracks);
            tracks.forEach((t, i) => {
                const isMetadata = t.kind === 'metadata';
                const shouldBeActive = activeSubtitleTrackIndex >= 0 && i === activeSubtitleTrackIndex;

                if (shouldBeActive) {
                    // hidden mode: track is active (cues fire) but browser doesn't render
                    if (t.mode !== 'hidden') t.mode = 'hidden';
                } else {
                    // disabled mode: track is completely off
                    if (t.mode !== 'disabled') t.mode = 'disabled';
                }
            });
        }

        function selectSubtitleTrack(index) {
            if (!video || !video.textTracks) return;
            activeSubtitleTrackIndex = Number.isInteger(index) ? index : -1;
            silenceNativeTracks();
            const activeTrack = activeSubtitleTrackIndex >= 0
                ? (video.textTracks[activeSubtitleTrackIndex] || null)
                : null;
            renderSubtitleOverlayFromTrack(activeTrack || null);
            buildCaptionsMenu();
        }

        function getDefaultEnglishSubtitleIndex() {
            if (!video || !video.textTracks) return -1;
            const tracks = Array.from(video.textTracks);
            const idx = tracks.findIndex((track) => {
                const label = String(track.label || '').toLowerCase();
                const language = String(track.language || '').toLowerCase();
                return (
                    language === 'en' ||
                    language === 'eng' ||
                    language.startsWith('en-') ||
                    label === 'en' ||
                    label.includes('english')
                );
            });
            return idx >= 0 ? idx : (tracks.length > 0 ? 0 : -1);
        }

        function buildCaptionsMenu() {
            if (!captionsMenu || !video) return;
            captionsMenu.innerHTML = '';
            const tracks = video.textTracks ? Array.from(video.textTracks) : [];
            const activeIdx = (activeSubtitleTrackIndex >= 0 && activeSubtitleTrackIndex < tracks.length)
                ? activeSubtitleTrackIndex
                : -1;

            if (tracks.length === 0 && currentIsLikelyAnime) {
                const emptyItem = document.createElement('div');
                emptyItem.className = 'menu-item';
                emptyItem.textContent = 'No subtitles loaded';
                emptyItem.style.opacity = '0.8';
                captionsMenu.appendChild(emptyItem);

                const retryItem = document.createElement('div');
                retryItem.className = 'menu-item';
                retryItem.textContent = 'Retry subtitle fetch';
                retryItem.onclick = async () => {
                    try {
                        const subs = await fetchAnimeSubtitleFallback();
                        if (Array.isArray(subs) && subs.length) {
                            externalSubtitleTracks = mergeSubtitleTrackLists(externalSubtitleTracks, subs);
                            if (video) await applyExternalSubtitlesToVideo(video);
                        }
                    } catch (_) { }
                    buildCaptionsMenu();
                    updateCaptionsButtonVisibility();
                };
                captionsMenu.appendChild(retryItem);
                return;
            }

            const offItem = document.createElement('div');
            offItem.className = `menu-item ${activeIdx === -1 ? 'selected' : ''}`;
            offItem.textContent = 'Off';
            offItem.onclick = () => {
                selectSubtitleTrack(-1);
            };
            captionsMenu.appendChild(offItem);

            tracks.forEach((track, idx) => {
                const label = track.label || track.language || `Subtitle ${idx + 1}`;
                const item = document.createElement('div');
                item.className = `menu-item ${idx === activeIdx ? 'selected' : ''}`;
                item.textContent = label;
                item.onclick = () => {
                    selectSubtitleTrack(idx);
                };
                captionsMenu.appendChild(item);
            });
        }

        function setVolumeBoost(level) {
            if (!video) return;
            volumeBoost = Math.max(100, Math.min(200, level));

            if (volumeBoost > 100) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // If sourceNode doesn't exist or is attached to the wrong element
                if (!sourceNode || sourceNode.mediaElement !== video) {
                    try {
                        if (sourceNode) sourceNode.disconnect();
                        sourceNode = audioCtx.createMediaElementSource(video);
                        if (!gainNode) gainNode = audioCtx.createGain();
                        sourceNode.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                    } catch (e) {
                        console.warn('AudioContext boost failed:', e);
                        return;
                    }
                }
            }

            if (audioCtx && gainNode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                gainNode.gain.value = volumeBoost / 100;
            }

            const boostValEl = document.querySelector('.boost-value');
            if (boostValEl) {
                boostValEl.textContent = volumeBoost > 100 ? `${volumeBoost}%` : 'Off';
            }

            const boostSlider = document.querySelector('.boost-slider');
            if (boostSlider) {
                boostSlider.value = String(volumeBoost);
                const percent = (volumeBoost - 100) + '%';
                boostSlider.style.setProperty('--boost-percent', percent);
            }

            // Update tick highlights
            const ticks = document.querySelectorAll('.tick');
            const activeCount = Math.round(((volumeBoost - 100) / 100) * (ticks.length - 1));
            ticks.forEach((t, i) => {
                t.classList.toggle('active', i <= activeCount && volumeBoost > 100);
            });
        }

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function setPlayIcon(isPlaying) {
            if (!playPauseBtn) return;
            playPauseBtn.innerHTML = isPlaying
                ? '<i class="fa-solid fa-pause"></i>'
                : '<i class="fa-solid fa-play"></i>';
        }

        function updateMuteIcon() {
            if (!muteBtn || !video) return;
            if (video.muted || video.volume === 0) muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            else if (video.volume < 0.5) muteBtn.innerHTML = '<i class="fa-solid fa-volume-low"></i>';
            else muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
        }

        function updateVolumeFromClientX(clientX, slider) {
            if (!slider || !Number.isFinite(clientX) || !video) return;
            if (!slider) return;
            const rect = slider.getBoundingClientRect();
            if (!rect || !Number.isFinite(rect.width) || rect.width <= 0) return;
            const clamped = Math.min(rect.right, Math.max(rect.left, clientX));
            const percent = ((clamped - rect.left) / rect.width) * 100;
            const val = Math.max(0, Math.min(100, percent));
            slider.value = String(Math.round(val));
            slider.style.setProperty('--vol-percent', `${val}%`);
            video.volume = val / 100;
            video.muted = val === 0;
            updateMuteIcon();
        }

        function buildVolumeMenu() {
            if (!volumeMenu || !video) return;
            volumeMenu.innerHTML = '';
            volumeSliderEl = null;
            volumeToggleEl = null;

            const row = document.createElement('div');
            row.className = 'volume-row';

            const toggle = document.createElement('button');
            toggle.className = 'volume-toggle';
            toggle.type = 'button';
            toggle.innerHTML = video.muted || video.volume === 0
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
            toggle.onclick = (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                if (!video.muted && video.volume === 0) video.volume = 0.5;
                updateMuteIcon();
                if (volumeSliderEl) {
                    const next = Math.round((video.muted ? 0 : video.volume) * 100);
                    volumeSliderEl.value = String(next);
                    volumeSliderEl.style.setProperty('--vol-percent', `${next}%`);
                }
                if (volumeToggleEl) {
                    volumeToggleEl.innerHTML = video.muted || video.volume === 0
                        ? '<i class="fa-solid fa-volume-xmark"></i>'
                        : '<i class="fa-solid fa-volume-high"></i>';
                }
            };

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = '0';
            slider.max = '100';
            slider.step = '1';
            slider.className = 'volume-slider';
            slider.value = String(Math.round((video.muted ? 0 : video.volume) * 100));
            slider.style.setProperty('--vol-percent', `${slider.value}%`);
            slider.addEventListener('input', (e) => {
                const val = Math.max(0, Math.min(100, Number.parseInt(e.target.value || '0', 10)));
                video.volume = val / 100;
                video.muted = val === 0;
                slider.style.setProperty('--vol-percent', `${val}%`);
                updateMuteIcon();
                // If sliding down, maybe reset boost?
                if (val < 100 && volumeBoost > 100) {
                    setVolumeBoost(100);
                }
            });
            slider.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                slider.setPointerCapture?.(e.pointerId);
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointermove', (e) => {
                if (!slider.hasPointerCapture?.(e.pointerId)) return;
                updateVolumeFromClientX(e.clientX, slider);
            });
            slider.addEventListener('pointerup', (e) => {
                if (slider.hasPointerCapture?.(e.pointerId)) slider.releasePointerCapture?.(e.pointerId);

            volumeSliderEl = slider;
            volumeToggleEl = toggle;

            const sliderCont = document.createElement('div');

        function resetAnimeSkipState() {
            animeSkipSegments = { intro: null, outro: null };
            skippedSegments = { intro: false, outro: false };
            hasApiSkipSegments = false;
            if (skipSegmentBtn) {
                skipSegmentBtn.style.display = 'none';
                skipSegmentBtn.textContent = '';
            }
        }

        function normalizeSegmentWindow(segment) {
            if (!segment) return null;
            const start =
                Number(segment.start ?? segment.from ?? segment.begin ?? segment.startTime ?? segment[0]);
            const end =
                Number(segment.end ?? segment.to ?? segment.finish ?? segment.endTime ?? segment[1]);
            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
            if (end <= start) return null;
            return { start: Math.max(0, start), end: Math.max(0, end) };
        }

        function applyApiSkipSegments(payload) {
            if (!payload || !currentIsLikelyAnime) return false;

            const intro = normalizeSegmentWindow(
                payload.intro ||
                payload.skip?.intro ||
                payload.skips?.intro ||
                payload.timestamps?.intro
            );
            const outro = normalizeSegmentWindow(
                payload.outro ||
                payload.skip?.outro ||
                payload.skips?.outro ||
                payload.timestamps?.outro
            );

            if (!intro && !outro) {
                updateSkipMarkers();
                return false;
            }
            animeSkipSegments.intro = intro;
            animeSkipSegments.outro = outro;
            hasApiSkipSegments = true;
            updateSkipMarkers();
            return true;
        }

        function updateSkipMarkers() {
            const container = document.getElementById('skipMarkerContainer');
            if (!container) return;
            container.innerHTML = '';

            if (!video || !video.duration || !isFinite(video.duration) || video.duration <= 0) return;

            const dur = video.duration;
            const segments = [];
            if (animeSkipSegments.intro) segments.push(animeSkipSegments.intro);
            if (animeSkipSegments.outro) segments.push(animeSkipSegments.outro);

            segments.forEach(seg => {
                if (seg.start >= 0 && seg.end <= dur && seg.end > seg.start) {
                    const startPct = (seg.start / dur) * 100;
                    const endPct = (seg.end / dur) * 100;
                    const widthPct = endPct - startPct;

                    const marker = document.createElement('div');
                    marker.className = 'skip-marker';
                    marker.style.left = startPct + '%';
                    marker.style.width = widthPct + '%';
                    container.appendChild(marker);
                }
            });
        }

        function parseAniSkipResults(payload) {
            const results = Array.isArray(payload?.results) ? payload.results : [];
            let intro = null;
            let outro = null;
            for (const entry of results) {
                const type = String(entry?.skipType || entry?.skip_type || '').toLowerCase();
                const interval = entry?.interval || {};
                const seg = normalizeSegmentWindow({
                    start: interval.startTime ?? interval.start_time ?? entry?.startTime ?? entry?.start_time,
                    end: interval.endTime ?? interval.end_time ?? entry?.endTime ?? entry?.end_time,
                });
                if (!seg) continue;
                if (!intro && (type === 'op' || type === 'mixed-op' || type === 'opening')) intro = seg;
                if (!outro && (type === 'ed' || type === 'mixed-ed' || type === 'ending')) outro = seg;
            }
            return { intro, outro };
        }

        function getTitleMatchScore(media, queryTitle) {
            const norm = (v) => normalizeAnimeSearchQuery(v || '').toLowerCase();
            const q = norm(queryTitle);
            if (!q) return 0;

            const titles = [
                norm(media?.title?.english),
                norm(media?.title?.romaji),
                norm(media?.title?.native),
            ].filter(Boolean);
            if (!titles.length) return 0;

            let score = 0;
            for (const t of titles) {
                if (t === q) score = Math.max(score, 100);
                else if (t.includes(q) || q.includes(t)) score = Math.max(score, 70);
                else {
                    const qWords = q.split(' ').filter(Boolean);
                    const tWords = t.split(' ').filter(Boolean);
                    const common = qWords.filter((w) => tWords.includes(w)).length;
                    if (common > 0) {
                        const overlap = common / Math.max(1, qWords.length);
                        score = Math.max(score, Math.floor(overlap * 60));
                    }
                }
            }
            return score;
        }

        async function fetchAniSkipSegmentsForCurrentEpisode() {
            if (!currentIsLikelyAnime || MEDIA_TYPE !== 'tv') return false;
            const title = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || '');
            const episodeNum = Number(curEpisode || 0) + 1;
            if (!title || !Number.isFinite(episodeNum) || episodeNum <= 0) return false;

            const cacheKey = `${title.toLowerCase()}::${episodeNum}`;
            if (animeSkipCache.has(cacheKey)) {
                const cached = animeSkipCache.get(cacheKey);
                if (cached) return applyApiSkipSegments(cached);
                return false;
            }

            try {
                const gqlQuery = `
                  query ($search: String) {
                    Page(page: 1, perPage: 6) {
                      media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                        id
                        idMal
                        title { romaji english native }
                      }
                    }
                  }
                `;
                const aniRes = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: gqlQuery, variables: { search: title } }),
                    signal: AbortSignal.timeout(7000),
                });
                if (!aniRes.ok) return false;
                const aniJson = await aniRes.json();
                const mediaList = Array.isArray(aniJson?.data?.Page?.media) ? aniJson.data.Page.media : [];
                let picked = null;
                let bestScore = -1;
                for (const media of mediaList) {
                    const s = getTitleMatchScore(media, title);
                    if (s > bestScore) {
                        bestScore = s;
                        picked = media;
                    }
                }
                if (!picked || bestScore < 30) return false;
                const aniId = Number(picked.id || 0);
                const malId = Number(picked.idMal || 0);
                const candidateIds = [];
                if (aniId > 0) candidateIds.push(aniId);
                if (malId > 0 && malId !== aniId) candidateIds.push(malId);

                if (!candidateIds.length) return false;

                const failedAny = (animeSkipCache.get('__failedIds__') || new Set());
                if (candidateIds.every(id => failedAny.has(id))) return false;

                setTimeout(async () => {
                    for (const id of candidateIds) {
                        if (failedAny.has(id)) continue;
                        const u2 = `https://api.aniskip.com/v2/skip-times/${id}/${episodeNum}?types=op&types=ed&episodeLength=0`;
                        const u1 = `https://api.aniskip.com/v1/skip-times/${id}/${episodeNum}?types=op&types=ed`;
                        const skipUrls = [u2, u1, getProxiedUrl(u2), getProxiedUrl(u1)];

                        let allFailedForId = true;
                        for (const url of skipUrls) {
                            try {
                                const skipRes = await fetch(url, {
                                    headers: { 'Accept': 'application/json' },
                                    signal: AbortSignal.timeout(6000),
                                });
                                if (skipRes.status === 404) continue;
                                if (!skipRes.ok) continue;
                                const skipJson = await skipRes.json();
                                const parsed = parseAniSkipResults(skipJson);
                                if (parsed.intro || parsed.outro) {
                                    animeSkipCache.set(cacheKey, parsed);
                                    applyApiSkipSegments(parsed);
                                    updateSkipSegmentButton();
                                    return;
                                }
                            } catch (_) { }
                        }
                        if (allFailedForId) {
                            failedAny.add(id);
                            animeSkipCache.set('__failedIds__', failedAny);
                        }
                    }
                }, 100);
                return false;
            } catch (_) { }

            animeSkipCache.set(cacheKey, null);
            return false;
        }

        function detectAnimeSkipSegments() {
            if (!USE_HEURISTIC_SKIP_FALLBACK) return;
            if (!video || !currentIsLikelyAnime || !isFinite(video.duration) || video.duration <= 0) return;
            if (hasApiSkipSegments) return;

            const duration = Number(video.duration);
            const introEnd = Math.min(95, Math.max(45, Math.floor(duration * 0.07)));
            const outroStart = Math.max(duration - 110, Math.floor(duration * 0.86));
            const outroEnd = Math.max(outroStart + 5, duration - 2);

            animeSkipSegments.intro = { start: 0, end: introEnd };
            animeSkipSegments.outro = { start: outroStart, end: outroEnd };
        }

        function getActiveSkipSegment(nowSec) {
            if (!Number.isFinite(nowSec)) return null;
            const intro = animeSkipSegments.intro;
            if (intro && nowSec >= intro.start && nowSec < intro.end) {
                return { type: 'intro', start: intro.start, end: intro.end };
            }
            const outro = animeSkipSegments.outro;
            if (outro && nowSec >= outro.start && nowSec < outro.end) {
                return { type: 'outro', start: outro.start, end: outro.end };
            }
            return null;
        }

        function updateSkipSegmentButton() {
            if (!skipSegmentBtn) return;

            if (!active) {
                skipSegmentBtn.style.display = 'none';

            skipSegmentBtn.textContent = active.type === 'intro' ? 'Skip Intro' : 'Skip Outro';
            skipSegmentBtn.dataset.segmentType = active.type;

        function buildQualityMenuItems() {
            qualityMenu.innerHTML = '';
            const formatQualityLabel = (height) => {
                const h = Number(height) || 0;
                let tier = '';
                if (h >= 2160) tier = 'UHD';
                else if (h >= 1440) tier = 'QHD';
                else if (h >= 1080) tier = 'FHD';
                else if (h >= 720) tier = 'HD';
                else if (h > 0) tier = 'SD';
                return tier ? `${h}p (${tier})` : `${h}p`;
            };

            const isAuto = !hlsInst || hlsInst.autoLevelEnabled !== false;

            const autoItem = document.createElement('div');
            autoItem.className = `menu-item ${isAuto ? 'selected' : ''}`;
            autoItem.textContent = 'Auto';
            autoItem.onclick = () => {
                changeQuality(0);
                buildQualityMenuItems();
            };
            qualityMenu.appendChild(autoItem);

            if (!hlsInst || !Array.isArray(hlsInst.levels) || hlsInst.levels.length === 0) return;
            const heights = [...new Set(hlsInst.levels.map((l) => l.height).filter(Boolean))].sort((a, b) => a - b);

            // If nextLevel is set, use it. Otherwise fallback to currentLevel (if manual)
            const activeIndex = hlsInst.nextLevel !== -1 && hlsInst.nextLevel !== undefined
                ? hlsInst.nextLevel
                : hlsInst.currentLevel;

            heights.forEach((h) => {
                const isSelected = !isAuto && activeIndex >= 0 && hlsInst.levels[activeIndex]?.height === h;
                const item = document.createElement('div');
                item.className = `menu-item ${isSelected ? 'selected' : ''}`;
                item.textContent = formatQualityLabel(h);
                item.onclick = () => {
                    changeQuality(h);
                    buildQualityMenuItems();
                };
                qualityMenu.appendChild(item);
            });
        }

        function buildSettingsMenu() {
            settingsMenu.innerHTML = '';
            const speeds = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 2];
            speeds.forEach((rate) => {
                const item = document.createElement('div');
                item.className = `menu-item ${(video && video.playbackRate === rate) ? 'selected' : ''}`;
                item.textContent = `${rate}x`;
                item.onclick = () => {
                    if (video) video.playbackRate = rate;
                    buildSettingsMenu();
                };
                settingsMenu.appendChild(item);
            });
        }

        function bindVideoEvents() {
            if (!video || video.dataset.customBound === '1') return;
            video.dataset.customBound = '1';
            video.addEventListener('timeupdate', () => {
                syncTimeUI();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
            });
            video.addEventListener('loadedmetadata', () => {
                syncTimeUI();
                detectAnimeSkipSegments();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
                updateCaptionsButtonVisibility();
                bindSubtitleCueListeners();
                buildCaptionsMenu();
            });
            if (video.textTracks && typeof video.textTracks.addEventListener === 'function') {
                video.textTracks.addEventListener('addtrack', (e) => {
                    const t = e.track;
                    if (t) t.mode = 'disabled';
                    silenceNativeTracks();
                    bindSubtitleCueListeners();
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                });
                video.textTracks.addEventListener('change', () => {
                    silenceNativeTracks();
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                });
            }
            video.addEventListener('play', silenceNativeTracks);
            video.addEventListener('playing', silenceNativeTracks);
            video.addEventListener('volumechange', () => {
                updateMuteIcon();
                if (volumeSliderEl) {
                    const val = Math.round((video.muted ? 0 : video.volume) * 100);
                    volumeSliderEl.value = String(val);
                    volumeSliderEl.style.setProperty('--vol-percent', `${val}%`);
                }
                if (volumeToggleEl) {
                    volumeToggleEl.innerHTML = video.muted || video.volume === 0
                        ? '<i class="fa-solid fa-volume-xmark"></i>'
                        : '<i class="fa-solid fa-volume-high"></i>';
                }
            });
            video.addEventListener('play', () => {
                setPlayIcon(true);
                showControlSurface();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
            });
            video.addEventListener('playing', () => {
                setPlayIcon(true); // Chrome sometimes only fires 'playing' on autostart
            });
            video.addEventListener('pause', () => {
                setPlayIcon(false);
                controlSurface.classList.add('visible');
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
            });
            video.addEventListener('ended', () => {
                updateSkipSegmentButton();
                updateNextEpisodeButton(true);
            });
        }

        function positionMenuAbove(menu, button) {
            if (!menu || !button) return;
            // Set display to inline-flex/flex temporarily to get accurate dimensions
            const isControlMenu = menu.classList.contains('control-menu');
            const isOpenPanel = menu.id.includes('-panel');

            menu.style.display = isControlMenu ? 'flex' : (isOpenPanel ? 'flex' : 'block');
            menu.style.visibility = 'hidden';

            if (!button) return;
            const rect = button.getBoundingClientRect();
            const menuWidth = menu.offsetWidth;
            const screenWidth = window.innerWidth;

            let left = rect.left + (rect.width / 2) - (menuWidth / 2);
            // Constraint within screen
            left = Math.max(12, Math.min(left, screenWidth - menuWidth - 12));

            menu.style.left = `${left}px`;
            menu.style.bottom = `${window.innerHeight - rect.top + 12}px`;

            menu.style.display = ''; // Reset display
            menu.style.visibility = '';
        }

        // Audio track selector elements
        const audioBtn = document.getElementById('audio-btn');

        // Update audio track selector UI
        function updateAudioTracks() {
            if (!audioPanel || !audioBtn) return;

            const hlsTracks = (hlsInst && Array.isArray(hlsInst.audioTracks)) ? hlsInst.audioTracks : [];
            const hasSatoruSources = satoruAudioSources.length > 0;
            const hasAnyTracks = hlsTracks.length > 0 || hasSatoruSources;

            audioBtn.style.display = 'flex';

            if (!hasAnyTracks) {
                audioPanel.innerHTML = `
                    <div class="panel-label">Audio Track</div>
                    <div class="audio-item">No audio tracks available</div>
                `;
                return;
            }

            const currentHlsTrack = hlsInst ? hlsInst.audioTrack : -1;
            const isOnSatoru = currentAudioSource === 'satoru';

            audioPanel.innerHTML = '<div class="panel-label">Audio Track</div>';

            const renderedLabels = new Set();
            const addItem = (label, isActive, onClick) => {
                if (renderedLabels.has(label)) return;
                renderedLabels.add(label);
                const item = document.createElement('div');
                item.className = 'audio-item' + (isActive ? ' active' : '');
                item.innerHTML = `<span class="src-dot"></span>${label}`;
                item.onclick = onClick;
                audioPanel.appendChild(item);
            };

            // Native tracks (JustAnime usually just has 'Japanese', but Satoru natively exposes many)
            if (!isOnSatoru) {
                hlsTracks.forEach((track) => {
                    let label = track.name || track.lang || 'Default';
                    if (label === 'Default' || label === 'und') label = 'Japanese';
                    const isActive = track.id === currentHlsTrack;
                    addItem(label, isActive, () => {
                        if (hlsInst) {
                            hlsInst.audioTrack = track.id;
                            rememberAudioPreference(track);
                            updateAudioTracks();
                        }
                    });
                });
            } else {
                // Return to original JustAnime track
                addItem('Japanese', false, () => {
                    const jaSource = allSources.find((s) => s.provider === 'justanime');
                    if (!jaSource) return;
                    currentAudioSource = 'justanime';
                    activeSatoruTrackIndex = -1;
                    rememberProviderPreference(null);
                    svSwitchHlsSourceSilent(jaSource.url, jaSource.referer, () => updateAudioTracks());
                });
            }

            // Virtual Satoru tracks
            if (hasSatoruSources) {
                satoruAudioSources.forEach((src, idx) => {
                    const isActive = isOnSatoru && activeSatoruTrackIndex === idx;
                    addItem(src.label, isActive, () => {
                        if (isOnSatoru && activeSatoruTrackIndex === idx) return;

                        // Set state immediately for UI 
                        currentAudioSource = 'satoru';
                        activeSatoruTrackIndex = idx;

                        // IMPORTANT: Set preferredAudioToken to the specific track name/label WITHOUT the provider suffix
                        let rawToken = src.hlsTrackName || src.label || '';
                        preferredAudioToken = rawToken.replace(/\s*\(.*?\)\s*/g, '').trim().toLowerCase();

                        if (preferredSourceLabelMatch) preferredSourceLabelMatch = preferredAudioToken;
                        rememberProviderPreference('satoru');
                        // syncUrlState() is called inside rememberProviderPreference

                        updateAudioTracks(); // Render optimistic UI

                        if (!isOnSatoru) {
                            svSwitchHlsSourceSilent(src.url, src.referer, () => {
                                // Double apply to be sure HLS catches it after stream swap
                                svApplyPreferredAudioToHls(hlsInst);
                                setTimeout(() => svApplyPreferredAudioToHls(hlsInst), 150);
                                updateAudioTracks();
                            });
                        } else {
                            svApplyPreferredAudioToHls(hlsInst);
                            updateAudioTracks();
                        }
                    });
                });
            }
        }

                if (!active) return;

                video.currentTime = Math.max(0, active.end + 0.2);
                if (!wasPaused) {

            seekBar.addEventListener('input', (e) => {
                if (!video || !isFinite(video.duration)) return;
                const percent = parseFloat(e.target.value || '0');
                const wasPaused = video.paused;
                video.currentTime = (percent / 100) * video.duration;
                if (!wasPaused) {
                    Promise.resolve(video.play()).catch(() => { });
                }
            });

            const seekPreview = document.getElementById('seek-preview');
            const previewTime = document.getElementById('previewTime');

            function handleSeekPreview(e) {
                if (!video || !isFinite(video.duration)) return;

                const rect = seekBar.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const x = clientX - rect.left;
                const percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
                const seekTime = (percent / 100) * video.duration;

                // Position preview box relative to its container
                const parent = seekPreview.offsetParent;
                if (!parent) return;
                const containerRect = parent.getBoundingClientRect();
                seekPreview.style.left = `${clientX - containerRect.left}px`;
                seekPreview.classList.add('visible');
                previewTime.textContent = formatTime(seekTime);

                // Sync hidden preview video
                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo) {
                    window.previewTargetTime = seekTime;
                    if (isFinite(previewVideo.duration)) {
                        window.performPreviewSeek();
                    }
                }
            }

            window.performPreviewSeek = function () {
                const previewVideo = document.getElementById('previewVideo');
                if (!previewVideo || window.previewTargetTime === undefined || !isFinite(previewVideo.duration)) return;
                if (previewVideo.readyState < 1) return;

                // Debounce slightly so we don't spam the browser network pipeline exactly on every pixel of mouse movement
                if (window.previewSeekTimer) clearTimeout(window.previewSeekTimer);
                window.previewSeekTimer = setTimeout(() => {
                    const target = window.previewTargetTime;
                    if (typeof previewVideo.fastSeek === 'function') {
                        previewVideo.fastSeek(target);
                    } else {
                        previewVideo.currentTime = target;
                    }
                }, 40); // 40ms feels instant but prevents hundreds of duplicate rapid requests
            };

            seekBar.addEventListener('mousemove', handleSeekPreview);
            seekBar.addEventListener('touchstart', handleSeekPreview, { passive: true });
            seekBar.addEventListener('touchmove', handleSeekPreview, { passive: true });

            seekBar.addEventListener('mouseleave', () => seekPreview.classList.remove('visible'));
            seekBar.addEventListener('touchend', () => seekPreview.classList.remove('visible'));


            document.addEventListener('click', (e) => {

                if (!captionsMenu.contains(e.target) && !captionsBtn.contains(e.target)) captionsMenu.classList.remove('active');

                if (!volumeMenu.contains(e.target) && !muteBtn.contains(e.target)) volumeMenu.classList.remove('active');
            });

            // MOBILE GESTURES & OVERLAYS
            const bOverlay = document.getElementById('brightness-overlay');
            const bBar = document.getElementById('brightness-bar');
            const vOverlay = document.getElementById('volume-overlay');
            const vBar = document.getElementById('volume-bar');
            const vBrightnessOverlay = document.getElementById('video-brightness-overlay');

            let lastTap = 0;
            const tapThreshold = 300;
            let startX = 0, startY = 0;
            let startVal = 0;
            let isGesturing = false;
            let gestureType = null;
            let bLevel = 1.0;

            let skipAccumulator = 0;
            let skipAccumulatorSide = null;
            let skipAccumulationTimer = null;

            controlSurface.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) return;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                isGesturing = false;
                gestureType = null;
            }, { passive: true });

            controlSurface.addEventListener('touchmove', (e) => {
                if (isUiLocked || e.touches.length > 1) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = startY - touch.clientY;

                if (!isGesturing && Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                    isGesturing = true;
                    const third = window.innerWidth / 3;
                    if (startX < third) {
                        gestureType = 'brightness';
                        startVal = bLevel;
                        bOverlay.classList.add('visible');
                    } else if (startX > 2 * third) {
                        gestureType = 'volume';
                        startVal = video.volume;
                        vOverlay.classList.add('visible');
                    }
                }

                if (isGesturing && gestureType) {
                    if (e.cancelable) e.preventDefault();
                    const sensitivity = 200;
                    const change = dy / sensitivity;
                    let newVal = Math.max(0, Math.min(1, startVal + change));

                    if (gestureType === 'brightness') {
                        bLevel = newVal;
                        const vBO = document.getElementById('video-brightness-overlay');
                        if (vBO) vBO.style.opacity = (1 - bLevel) * 0.8;
                        if (bBar) bBar.style.height = `${bLevel * 100}%`;
                    } else {
                        video.volume = newVal;
                        if (vBar) vBar.style.height = `${newVal * 100}%`;
                    }
                }
            }, { passive: false });

            controlSurface.addEventListener('touchend', () => {
                bOverlay.classList.remove('visible');
                vOverlay.classList.remove('visible');
            }, { passive: true });


            function handleSurfaceInteraction(e) {
                if (isUiLocked && e.target !== uiLockBtn && !uiLockBtn.contains(e.target)) return;

                // Ignore interactive controls
                if (e.target.closest('button, .control-menu, .panel, .seek-bar, .ep-item, .source-item')) return;

                if (isGesturing) return;

                const now = Date.now();

                // Handle touchstart vs click/mousedown normalization
                if (e.type === 'touchstart') {
                    suppressClicksUntil = now + 1200;
                } else if (e.type === 'click' && now < suppressClicksUntil) {
                    return;
                }

                const isVisible = controlSurface.classList.contains('visible');

                const diff = now - lastTap;
                if (diff < tapThreshold && lastTap !== 0) {
                    // Double Tap Logic
                    clearTimeout(window.singleTapTimeout);
                    lastTap = now; // keep chain alive for consecutive double-taps!
                    hideControlSurfaceNow(); // Always hide controls on double tap

                    const rect = controlSurface.getBoundingClientRect();
                    const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
                    const x = clientX - rect.left;
                    const third = rect.width / 3;

                    if (x < third) {
                        if (skipAccumulatorSide !== 'left') skipAccumulator = 0;
                        skipAccumulatorSide = 'left';
                        skipAccumulator += 10;
                        video.currentTime = Math.max(0, video.currentTime - 10);
                        playRipple('left', skipAccumulator);
                    } else if (x > 2 * third) {
                        if (skipAccumulatorSide !== 'right') skipAccumulator = 0;
                        skipAccumulatorSide = 'right';
                        skipAccumulator += 10;
                        if (isFinite(video.duration)) video.currentTime = Math.min(video.duration, video.currentTime + 10);
                        playRipple('right', skipAccumulator);
                    } else {
                        skipAccumulator = 0;
                        skipAccumulatorSide = null;
                        lastTap = 0; // kill chain
                        if (video.paused) video.play(); else video.pause();
                    }

                    if (skipAccumulator > 0) {
                        clearTimeout(skipAccumulationTimer);
                        skipAccumulationTimer = setTimeout(() => {
                            skipAccumulator = 0;
                            skipAccumulatorSide = null;
                        }, tapThreshold + 150);
                    }
                } else {
                    lastTap = now;
                    // Single Tap Logic -> Give a small delay in case a double tap is coming
                    window.singleTapTimeout = setTimeout(() => {
                        if (!controlSurface.classList.contains('visible')) {
                            showControlSurface();
                        } else {
                            hideControlSurfaceNow();
                        }
                    }, 250);
                }
            }

            // Using capture:true for the surface to handle these before other logic if needed, 
            // but standard phase is fine here since we filter by target closest.
            controlSurface.addEventListener('touchstart', handleSurfaceInteraction, { passive: true });
            controlSurface.addEventListener('click', handleSurfaceInteraction);

            function playRipple(side, amount = 10) {
                const el = document.getElementById(`ripple-${side}`);
                if (!el) return;

                const label = el.querySelector('span');
                if (label) {
                    label.textContent = side === 'left' ? `-${amount}s` : `+${amount}s`;
                }

                el.classList.remove('animate');
                void el.offsetWidth; // trigger reflow
                el.classList.add('animate');

                if (el.rippleTimeout) clearTimeout(el.rippleTimeout);
                el.rippleTimeout = setTimeout(() => el.classList.remove('animate'), 700);
            }
        }

        // -----------------------------------------------------------------------

        // ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
        async function init() {
            if (!TMDB_ID) { showError('Missing ID', 'No media ID was provided.'); return; }

            setLoader('Fetching media info...', 'Connecting to TMDB');
            buildChips();

            // Safety timeout
            const safetyTimer = setTimeout(() => {
                if (loader.style.display !== 'none') {
                    showError('Timeout', 'Loading took too long. Please try again.');
                }
            }, 60000);

            try {
                const isAnimeOnlyProvider = ['satoru', 'justanime', 'hianime', 'animesaturn'].includes(FORCED_PROVIDER);
                const infoUrl = (FORCED_PROVIDER && !isAnimeOnlyProvider)
                    ? `${API_BASE.replace('/meta/tmdb', '/movies/' + FORCED_PROVIDER)}/info?id=${encodeURIComponent(TMDB_ID)}&type=${encodeURIComponent(MEDIA_TYPE)}`
                    : `${API_BASE}/info/${TMDB_ID}?type=${MEDIA_TYPE}`;

                let info = readCachedMediaInfo();
                if (info) {
                    setLoader('Fetching media info...', 'Loaded from local cache');
                    fetchJsonWithRetry(infoUrl, 10000, 18000)
                        .then((fresh) => {
                            const payload = fresh?.data || fresh;
                            if (payload && typeof payload === 'object') writeCachedMediaInfo(payload);
                        })
                        .catch(() => { });
                } else {
                    const parsed = await fetchJsonWithRetry(infoUrl, 12000, 30000);
                    info = parsed?.data || parsed;
                    writeCachedMediaInfo(info);
                }
                currentMediaInfo = info;
                clearTimeout(safetyTimer);

                const title = info.title || info.name || 'Unknown Title';
                document.title = `Watching: ${title} | StreamVerse`;
                document.getElementById('media-title').textContent = title;
                if (info.cover || info.image) {
                    currentCoverUrl = info.cover || info.image;
                    loader.style.backgroundImage = `url('${currentCoverUrl}')`;
                }

                const isTv = MEDIA_TYPE === 'tv' ||
                    (info.type || '').toLowerCase().includes('tv') ||
                    (info.type || '').toLowerCase().includes('series');

                const genreNames = (Array.isArray(info.genres) ? info.genres : [])
                    .map(g => (typeof g === 'string' ? g : (g?.name || '')))
                    .map(g => String(g).toLowerCase());
                const originalLang = String(info.original_language || info.originalLanguage || '').toLowerCase();
                const animeHint = String(info.title || info.name || '').toLowerCase();
                const isLikelyAnime = (
                    genreNames.includes('animation') ||
                    originalLang === 'ja' ||
                    animeHint.includes('anime')
                );
                currentIsLikelyAnime = isLikelyAnime;
                resetAnimeSkipState();

                // Reset active providers pool based on content type, regardless of FORCED_PROVIDER
                // This allows fallbacks to work even when a specific provider is requested via URL
                if (isLikelyAnime) {
                    activeProviders = [...new Set([...ANIME_PROVIDERS, ...MOVIE_PROVIDERS])];
                } else if (MEDIA_TYPE === 'movie') {
                    activeProviders = [...new Set([...MOVIE_PROVIDERS, ...ANIME_PROVIDERS])];
                } else {
                    activeProviders = [...MOVIE_PROVIDERS];
                }
                // If a forced provider is set but not in the standard list, add it to the pool
                if (FORCED_PROVIDER && !activeProviders.includes(FORCED_PROVIDER)) {
                    activeProviders.unshift(FORCED_PROVIDER);
                }
                buildChips();

                if (isTv) {
                    await initTv(info);
                } else {
                    document.getElementById('media-meta').textContent = 'Movie';
                    if (customEpisodeBtn) customEpisodeBtn.style.display = 'none';
                    if (nextEpisodeBtn) nextEpisodeBtn.style.display = 'none';
                    const epId = info.episodeId || info.id;
                    if (!epId) throw new Error('No ID found in API response');
                    await fetchSources(epId);
                }
            } catch (err) {
                clearTimeout(safetyTimer);
                console.error('Init error:', err);
                showError('Failed to Load', err.message);
            }
        }

        // ----------------------------------------------------------------------------------------------------
        //  TV SERIES
        // ----------------------------------------------------------------------------------------------------
        async function initTv(info) {
            setLoader('Loading series...', 'Building episode list');
            tvSeasons = buildTvSeasonsFromInfo(info);
            episodeFillerStatus = new Map();
            fillerLookupState = 'loading';
            if (!tvSeasons.length) {
                throw new Error('No episodes found for this series');
            }

            buildEpPanel();
            epBtn.style.display = 'flex';
            if (customEpisodeBtn) customEpisodeBtn.style.display = 'inline-flex';
            // Mark episode button for showing in Plyr control bar
            showPlyrEpBtn = true;
            const fillerTitle = info?.title || info?.name || currentMediaInfo?.title || currentMediaInfo?.name || '';
            fetchAnimeFillerStatusMap(fillerTitle)
                .then((map) => {
                    episodeFillerStatus = map;
                    fillerLookupState = map.size > 0
                        ? 'ready'
                        : (fillerLookupState === 'fetch_failed' ? 'fetch_failed' : 'not_found');
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                })
                .catch(() => {
                    fillerLookupState = 'fetch_failed';
                    buildEpPanel();
                    updateEpUI(curSeason, curEpisode);
                });
            const initialPos = getInitialTvPositionFromUrl(tvSeasons);
            await playTvEp(initialPos.seasonIndex, initialPos.episodeIndex);
        }

        function buildEpPanel() {
            epPanel.innerHTML = '';
            const legend = document.createElement('div');
            legend.className = 'ep-legend';
            legend.innerHTML = `
                <span class="ep-legend-badge manga">Manga Canon</span>
                <span class="ep-legend-badge mixed">Mixed</span>
                <span class="ep-legend-badge filler">Filler</span>
                <span class="ep-legend-note">${fillerLookupState === 'loading' ? 'checking...' : (fillerLookupState === 'ready' ? 'from animefillerlist' : (fillerLookupState === 'fetch_failed' ? 'fetch blocked' : 'not found'))}</span>
            `;
            epPanel.appendChild(legend);

            tvSeasons.forEach((s, si) => {
                const lbl = document.createElement('div');
                lbl.className = 'ep-season';
                const seasonNo = Number(s?.seasonNo || si + 1);
                lbl.textContent = Number.isFinite(seasonNo) && seasonNo > 0 ? `Season ${seasonNo}` : String(s.name || `Season ${si + 1}`);
                epPanel.appendChild(lbl);

                (s.episodes || []).forEach((ep, ei) => {
                    const item = document.createElement('div');
                    item.className = 'ep-item';
                    const epNo = Number(ep.episode || ep.number || ep.episodeNum || (ei + 1));
                    const epTitle = ep.title || `Episode ${epNo}`;

                    let displayEpNo = epNo;
                    if (currentIsLikelyAnime && si > 0 && epNo > 20) {
                        displayEpNo = ei + 1;
                    }

                    const fillerStatus = episodeFillerStatus.get(epNo);
                    let fillerBadge = '';
                    if (fillerStatus === 'manga') {
                        item.classList.add('manga-canon');
                        fillerBadge = '<span class="filler-badge canon">Canon</span>';
                    } else if (fillerStatus === 'mixed') {
                        item.classList.add('filler-mixed');
                        fillerBadge = '<span class="filler-badge mixed">Mixed</span>';
                    } else if (fillerStatus === 'filler') {
                        item.classList.add('filler-full');
                        fillerBadge = '<span class="filler-badge filler">Filler</span>';
                    }

                    item.innerHTML = `
                        <div class="ep-item-info">
                            <span class="ep-item-num">${displayEpNo}</span>
                            <span class="ep-item-title">${epTitle}</span>
                        </div>
                        ${fillerBadge}
                    `;

                    item.dataset.si = si;
                    item.dataset.ei = ei;
                    item.onclick = () => {
                        epPanel.classList.remove('open');
                        playTvEp(si, ei);
                    };
                    epPanel.appendChild(item);
                });
            });
        }

        function updateEpUI(si, ei) {
            epPanel.querySelectorAll('.ep-item').forEach(el => {
                el.classList.toggle('active', +el.dataset.si === si && +el.dataset.ei === ei);
            });
            const sel = epPanel.querySelector('.ep-item.active');
            if (sel) sel.scrollIntoView({ block: 'center' });
        }

        function getNextEpisodeRef() {
            if (MEDIA_TYPE !== 'tv' || !Array.isArray(tvSeasons) || tvSeasons.length === 0) return null;
            const season = tvSeasons[curSeason];
            const episodes = season?.episodes || [];
            if (curEpisode + 1 < episodes.length) {
                return { seasonIndex: curSeason, episodeIndex: curEpisode + 1 };
            }
            for (let si = curSeason + 1; si < tvSeasons.length; si += 1) {
                const eps = tvSeasons[si]?.episodes || [];
                if (eps.length > 0) return { seasonIndex: si, episodeIndex: 0 };
            }
            return null;
        }

        function updateNextEpisodeButton(forceShow = false) {
            if (!nextEpisodeBtn) return;
            const next = getNextEpisodeRef();
            if (!next || isUiLocked || !video) {
                nextEpisodeBtn.style.display = 'none';
                return;
            }
            if (forceShow) {
                nextEpisodeBtn.style.display = 'inline-flex';
                return;
            }
            if (!isFinite(video.duration) || video.duration <= 0) {
                nextEpisodeBtn.style.display = 'none';
                return;
            }
            const remaining = video.duration - (video.currentTime || 0);
            nextEpisodeBtn.style.display = remaining <= 30 ? 'inline-flex' : 'none';
        }

        async function goToNextEpisode() {
            const next = getNextEpisodeRef();
            if (!next) return;
            await playTvEp(next.seasonIndex, next.episodeIndex);
        }

        async function playTvEp(si, ei) {
            curSeason = si; curEpisode = ei;
            updateEpisodeUrlState(si, ei);
            const season = tvSeasons[si];
            const ep = (season?.episodes || [])[ei];
            if (!ep) return;
            resetAnimeSkipState();
            updateNextEpisodeButton(false);

            updateEpUI(si, ei);
            const epNo = Number(ep.episode || ep.number || ep.episodeNum || (ei + 1));
            const epTitle = String(ep.title || '').trim();
            const metaText = epTitle
                ? `${season.name} - Episode ${epNo}: ${epTitle}`
                : `${season.name} - Episode ${epNo}`;
            document.getElementById('media-meta').textContent = metaText;

            // Store current season/episode indices for the per-provider fetch
            await fetchSources(null);
        }

        // -----------------------------------------------------------------------
        //  FETCH SOURCES - per-provider: get that provider's own episodeId, then watch
        // -----------------------------------------------------------------------
        async function fetchSources(_unused) {
            allSources = [];
            satoruAudioSources = [];
            currentAudioSource = 'justanime';
            activeSatoruTrackIndex = -1;
            externalSubtitleTracks = [];
            currentIdx = 0;
            hideError();
            setLoader('Searching providers...', 'Trying available sources');
            resetPlayerSurface();
            const selectedSeason = tvSeasons?.[curSeason];
            const selectedEpisode = selectedSeason?.episodes?.[curEpisode];
            const selectedSeasonNoRaw = Number(selectedSeason?.seasonNo);
            const selectedSeasonNo = Number.isFinite(selectedSeasonNoRaw) && selectedSeasonNoRaw > 0
                ? selectedSeasonNoRaw
                : (curSeason + 1);
            const selectedEpisodeNoRaw = Number(
                selectedEpisode?.episode || selectedEpisode?.number || selectedEpisode?.episodeNum,
            );
            let selectedEpisodeNo = Number.isFinite(selectedEpisodeNoRaw) && selectedEpisodeNoRaw > 0
                ? selectedEpisodeNoRaw
                : (curEpisode + 1);

            // ANIME FIX: If we are in a later season, providers like Satoru/JustAnime expect 
            // relative episode numbers (starting from 1 for each season entry).
            // Absolute numbers (e.g. 50) fail to match. We force relative numbering for seasons > 1.
            if (currentIsLikelyAnime && curSeason > 0 && selectedEpisodeNo > 15) {
                selectedEpisodeNo = curEpisode + 1;
            }
            const selectedAbsoluteEpisodeNo = Number(
                tvSeasons
                    .slice(0, Math.max(0, curSeason))
                    .reduce((sum, season) => sum + (Array.isArray(season?.episodes) ? season.episodes.length : 0), 0),
            ) + (curEpisode + 1);

            // Always prefetch subtitles from JustAnime fallback for anime content,
