        function resetAnimeSkipState() {
            animeSkipSegments = { intro: null, outro: null };
            skippedSegments = { intro: false, outro: false };
            hasApiSkipSegments = false;
            _lastSkipUiTime = 0;
            _skipBtnWasVisible = false;
            _clearSkipCountdown();
            if (skipSegmentBtn) {
                skipSegmentBtn.style.display = 'none';
                skipSegmentBtn.textContent = '';
                skipSegmentBtn.classList.remove('counting', 'countdown-paused');
            }
            updateSkipMarkers(); // Clear markers from seekbar
        }

        let aniSkipFetchStatus = 'none'; // 'none', 'fetching', 'success', 'failed'

        function normalizeSegmentWindow(segment) {
            if (!segment) return null;
            const start =
                Number(segment.start ?? segment.from ?? segment.begin ?? segment.startTime ?? segment[0]);
            const end =
                Number(segment.end ?? segment.to ?? segment.finish ?? segment.endTime ?? segment[1]);
            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
            if (end <= start) return null;
            return { start: Math.max(0, start), end: Math.max(0, end) };
        }

        function applyApiSkipSegments(payload) {
            if (!payload || !currentIsLikelyAnime) return false;

            const intro = normalizeSegmentWindow(
                payload.intro ||
                payload.skip?.intro ||
                payload.skips?.intro ||
                payload.timestamps?.intro
            );
            const outro = normalizeSegmentWindow(
                payload.outro ||
                payload.skip?.outro ||
                payload.skips?.outro ||
                payload.timestamps?.outro
            );

            if (!intro && !outro) {
                updateSkipMarkers();
                return false;
            }
            animeSkipSegments.intro = intro;
            animeSkipSegments.outro = outro;
            hasApiSkipSegments = true;
            aniSkipFetchStatus = 'success';
            updateSkipMarkers();
            return true;
        }

        function updateSkipMarkers() {
            const container = document.getElementById('skipMarkerContainer');
            if (!container) return;
            container.innerHTML = '';

            if (!hasApiSkipSegments || !video || !video.duration || !isFinite(video.duration) || video.duration <= 0) return;

            const dur = video.duration;
            const segments = [];
            if (animeSkipSegments.intro) segments.push({ ...animeSkipSegments.intro, type: 'intro' });
            if (animeSkipSegments.outro) segments.push({ ...animeSkipSegments.outro, type: 'outro' });

            segments.forEach(seg => {
                if (seg.start >= 0 && seg.end <= dur && seg.end > seg.start) {
                    const startPct = (seg.start / dur) * 100;
                    const endPct = (seg.end / dur) * 100;
                    const widthPct = endPct - startPct;

                    const marker = document.createElement('div');
                    marker.className = 'skip-marker';
                    if (seg.type) marker.dataset.type = seg.type;
                    marker.style.left = startPct + '%';
                    marker.style.width = widthPct + '%';
                    container.appendChild(marker);
                }
            });
        }

        function parseAniSkipResults(payload) {
            const results = Array.isArray(payload?.results) ? payload.results : [];
            let intro = null;
            let outro = null;
            for (const entry of results) {
                const type = String(entry?.skipType || entry?.skip_type || '').toLowerCase();
                const interval = entry?.interval || {};
                const seg = normalizeSegmentWindow({
                    start: interval.startTime ?? interval.start_time ?? entry?.startTime ?? entry?.start_time,
                    end: interval.endTime ?? interval.end_time ?? entry?.endTime ?? entry?.end_time,
                });
                if (!seg) continue;
                if (!intro && (type === 'op' || type === 'mixed-op' || type === 'opening')) intro = seg;
                if (!outro && (type === 'ed' || type === 'mixed-ed' || type === 'ending')) outro = seg;
            }
            return { intro, outro };
        }

        function getTitleMatchScore(media, queryTitle) {
            const norm = (v) => normalizeAnimeSearchQuery(v || '').toLowerCase();
            const q = norm(queryTitle);
            if (!q) return 0;

            const titles = [
                norm(media?.title?.english),
                norm(media?.title?.romaji),
                norm(media?.title?.native),
            ].filter(Boolean);
            if (!titles.length) return 0;

            let score = 0;
            for (const t of titles) {
                if (t === q) score = Math.max(score, 100);
                else if (t.includes(q) || q.includes(t)) score = Math.max(score, 70);
                else {
                    const qWords = q.split(' ').filter(Boolean);
                    const tWords = t.split(' ').filter(Boolean);
                    const common = qWords.filter((w) => tWords.includes(w)).length;
                    if (common > 0) {
                        const overlap = common / Math.max(1, qWords.length);
                        score = Math.max(score, Math.floor(overlap * 60));
                    }
                }
            }
            return score;
        }

        async function fetchAniSkipSegmentsForCurrentEpisode() {
            if (!currentIsLikelyAnime || MEDIA_TYPE !== 'tv') return false;
            const title = normalizeAnimeSearchQuery(currentMediaInfo?.title || currentMediaInfo?.name || '');
            const selectedSeason = tvSeasons?.[Number(curSeason || 0)];
            const seasonLabel = selectedSeason?.name || `Season ${Number(curSeason || 0) + 1}`;
            const targetSeasonNo = Number.isFinite(Number(selectedSeason?.seasonNo)) 
                ? Number(selectedSeason?.seasonNo) 
                : (Number(curSeason || 0) + 1);
            const episodeNum = Number(curEpisode || 0) + 1;
            if (!title || !Number.isFinite(episodeNum) || episodeNum <= 0) return false;

            const cacheKey = `${title.toLowerCase()}::${seasonLabel.toLowerCase()}::${episodeNum}`;
            if (animeSkipCache.has(cacheKey)) {
                const cached = animeSkipCache.get(cacheKey);
                if (cached) return applyApiSkipSegments(cached);
                return false;
            }

            try {
                aniSkipFetchStatus = 'fetching';
                console.log(`[aniskip] Fetching skip times for "${title}" ${seasonLabel} Ep ${episodeNum}...`);
                const gqlQuery = `
                  query ($search: String) {
                    Page(page: 1, perPage: 15) {
                      media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                        id
                        idMal
                        title { romaji english native }
                        seasonYear
                        format
                      }
                    }
                  }
                `;
                const aniRes = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: gqlQuery, variables: { search: title } }),
                    signal: AbortSignal.timeout(7000),
                });
                if (!aniRes.ok) {
                    aniSkipFetchStatus = 'failed';
                    resetAnimeSkipState();
                    return false;
                }
                const aniJson = await aniRes.json();
                const mediaList = Array.isArray(aniJson?.data?.Page?.media) ? aniJson.data.Page.media : [];
                
                mediaList.forEach(m => {
                    if (m.seasonYear) m.year = m.seasonYear;
                });

                const picked = pickAnimeResultByTitle(mediaList, title, null, targetSeasonNo, seasonLabel);
                
                if (!picked) {
                    resetAnimeSkipState();
                    return false;
                }
                const aniId = Number(picked.id || 0);
                const malId = Number(picked.idMal || 0);
                const candidateIds = [];
                if (aniId > 0) candidateIds.push(aniId);
                if (malId > 0 && malId !== aniId) candidateIds.push(malId);

                if (!candidateIds.length) {
                    resetAnimeSkipState();
                    return false;
                }

                const failedAny = (animeSkipCache.get('__failedIds__') || new Set());
                if (candidateIds.every(id => failedAny.has(id))) {
                    resetAnimeSkipState();
                    return false;
                }

                setTimeout(async () => {
                    let found = false;
                    for (const id of candidateIds) {
                        if (failedAny.has(id)) continue;
                        const u2 = `https://api.aniskip.com/v2/skip-times/${id}/${episodeNum}?types=op&types=ed&episodeLength=0`;
                        const u1 = `https://api.aniskip.com/v1/skip-times/${id}/${episodeNum}?types=op&types=ed`;
                        const skipUrls = [u2, u1, getProxiedUrl(u2), getProxiedUrl(u1)];

                        for (const url of skipUrls) {
                            try {
                                const skipRes = await fetch(url, {
                                    headers: { 'Accept': 'application/json' },
                                    signal: AbortSignal.timeout(6000),
                                });
                                if (skipRes.status === 404 || skipRes.status === 502 || skipRes.status === 500) {
                                  if (skipRes.status !== 404) failedAny.add(id); // Only mark ID as failed if it's a real server error
                                  continue;
                                }
                                if (!skipRes.ok) continue;
                                const skipJson = await skipRes.json();
                                const parsed = parseAniSkipResults(skipJson);
                                if (parsed.intro || parsed.outro) {
                                    console.log(`[aniskip] ✔ Found segments via ${url.includes('v1') ? 'v1' : 'v2'} API for ID ${id}`);
                                    animeSkipCache.set(cacheKey, parsed);
                                    applyApiSkipSegments(parsed);
                                    updateSkipSegmentButton();
                                    found = true;
                                    return;
                                }
                            } catch (_) { 
                                // On network failure, might be a proxy issue, try next URL
                            }
                        }
                    }
                    if (!found) {
                        animeSkipCache.set(cacheKey, null);
                        aniSkipFetchStatus = 'failed';
                        resetAnimeSkipState();
                    }
                    animeSkipCache.set('__failedIds__', failedAny);
                }, 100);
                return false;
            } catch (_) {
                animeSkipCache.set(cacheKey, null);
                aniSkipFetchStatus = 'failed';
                resetAnimeSkipState();
                return false;
            }
        }

        function getActiveSkipSegment(nowSec) {
            if (!Number.isFinite(nowSec)) return null;
            const intro = animeSkipSegments.intro;
            if (intro && nowSec >= intro.start && nowSec < intro.end) {
                return { type: 'intro', start: intro.start, end: intro.end };
            }
            const outro = animeSkipSegments.outro;
            if (outro && nowSec >= outro.start && nowSec < outro.end) {
                return { type: 'outro', start: outro.start, end: outro.end };
            }
            return null;
        }

        function updateSkipSegmentButton() {
            if (!video || !currentIsLikelyAnime || !hasApiSkipSegments) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            const nowSec = Number(video.currentTime || 0);
            if (nowSec < (_lastSkipUiTime - 1)) {
                rearmSkippedSegmentsForTime(nowSec);
            }
            _lastSkipUiTime = nowSec;
            const active = getActiveSkipSegment(nowSec);

            // Countdown state is sticky: once auto-skip starts, keep it pinned to the captured segment.
            if (_skipActiveType && _skipActiveSegment && skipSegmentBtn && skipSegmentBtn.classList.contains('counting')) {
                const seg = _skipActiveSegment;
                if (skippedSegments[_skipActiveType]) {
                    _clearSkipCountdown();
                    _skipBtnWasVisible = false;
                    if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                    return;
                }

                // Only cancel if the user actually seeks away from the captured segment window.
                if (nowSec < seg.start - 5 || nowSec > seg.end + 5) {
                    console.log(`[Skip] User moved far from ${_skipActiveType} segment. Resetting.`);
                    _clearSkipCountdown();
                    _skipBtnWasVisible = false;
                } else {
                    const icon = _skipActiveType === 'intro' ? 'fa-forward' : 'fa-forward-step';
                    skipSegmentBtn.innerHTML = `<i class="fa-solid ${icon}"></i><span>${_skipActiveType === 'intro' ? 'Skip Intro' : 'Skip Outro'}</span>`;
                    skipSegmentBtn.dataset.segmentType = _skipActiveType;
                    skipSegmentBtn.style.display = 'inline-flex';
                    return;
                }
            }

            if (!active || skippedSegments[active.type]) {
                _skipBtnWasVisible = false;
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                return;
            }

            // Sync UI markers
            const markers = document.querySelectorAll('.skip-marker');
            markers.forEach(m => {
                if (active && m.dataset.type === active.type) {
                    m.classList.add('active');
                } else {
                    m.classList.remove('active');
                }
            });

            if (!hasApiSkipSegments) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            if (!active) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            const alreadySkipped = (active.type === 'intro' && skippedSegments.intro) ||
                (active.type === 'outro' && skippedSegments.outro);

            if (alreadySkipped) {
                if (skipSegmentBtn) skipSegmentBtn.style.display = 'none';
                _clearSkipCountdown();
                _skipBtnWasVisible = false;
                return;
            }

            // Detect NEW segment detection to start countdown
            if (!_skipBtnWasVisible) {
                _skipBtnWasVisible = true;
                _startSkipCountdown();
            }

            if (skipSegmentBtn) {
                const icon = active.type === 'intro' ? 'fa-forward' : 'fa-forward-step';
                skipSegmentBtn.innerHTML = `<i class="fa-solid ${icon}"></i><span>${active.type === 'intro' ? 'Skip Intro' : 'Skip Outro'}</span>`;
                skipSegmentBtn.dataset.segmentType = active.type;
                skipSegmentBtn.style.display = 'inline-flex';
            }
        }

        function showControlSurface() {
            if (isUiLocked || !video) {
                controlSurface.classList.remove('visible');
                playerHeader.classList.add('hidden');
                return;
            }
            controlSurface.classList.add('visible');
            playerHeader.classList.remove('hidden');

            clearTimeout(controlsHideTimer);
            clearTimeout(headerTimer);

            // Auto-hide after 3 seconds
            const hideDelay = 3000;

            controlsHideTimer = setTimeout(() => {
                // Check if any menu is open - if so, extend the hold time
                const hasOpenMenu = document.querySelector('.control-menu.active, .panel.open');
                if (hasOpenMenu) {
                    // Extend hold time by 3 seconds when menu is open
                    controlsHoldVisibleUntil = Date.now() + 3000;
                    showControlSurface();
                    return;
                }

                if (Date.now() < controlsHoldVisibleUntil) {
                    showControlSurface();
                    return;
                }
                if (video && !video.paused) {
                    controlSurface.classList.remove('visible');
                    playerHeader.classList.add('hidden');
                    closeCustomMenus();
                }
            }, hideDelay);
        }

        let controlsShownAt = 0;
        function holdControlsVisible(ms = 900) {
            // Enforce minimum 3 seconds on all devices
            const minHold = 3000;
            const effectiveMs = Math.max(ms, minHold);
            controlsHoldVisibleUntil = Math.max(controlsHoldVisibleUntil, Date.now() + effectiveMs);
            controlsShownAt = Date.now();
            lastTap = 0; // Reset double-tap sequence on reveal to avoid accidental skips
            showControlSurface();
        }

        function toggleControls() {
            if (isUiLocked || !video) return;
            // Prevent immediate toggle-off if they were just shown by a tap-down interaction
            if (Date.now() - controlsShownAt < 350) return;

            if (controlSurface.classList.contains('visible')) {
                hideControlSurfaceNow();
            } else {
                holdControlsVisible(3000);
            }
        }

        function hideControlSurfaceNow() {
            clearTimeout(controlsHideTimer);
            clearTimeout(headerTimer);
            controlSurface.classList.remove('visible');
            playerHeader.classList.add('hidden');
            closeCustomMenus();
            lastTap = 0; // Reset double-tap sequence on hide
        }

                else if (h >= 1440) tier = 'QHD';
                else if (h >= 1080) tier = 'FHD';
                else if (h >= 720) tier = 'HD';
                else if (h > 0) tier = 'SD';
                return tier ? `${h}p (${tier})` : `${h}p`;

            const isAuto = !hlsInst || hlsInst.autoLevelEnabled !== false;

            const autoItem = document.createElement('div');

        function bindVideoEvents() {
            if (!video || video.dataset.customBound === '1') return;
            video.dataset.customBound = '1';
            video.addEventListener('error', () => {
                const err = video.error;
                let msg = 'Unknown Error';
                if (err) {
                    switch (err.code) {
                        case 1: msg = 'MEDIA_ERR_ABORTED'; break;
                        case 2: msg = 'MEDIA_ERR_NETWORK'; break;
                        case 3: msg = 'MEDIA_ERR_DECODE'; break;
                        case 4: msg = 'MEDIA_ERR_SRC_NOT_SUPPORTED'; break;
                    }
                    console.error('[video] Fatal Error:', msg, err.message || '');
                }
            });
            ['stalled', 'suspend', 'waiting', 'emptied'].forEach(evt => {
                video.addEventListener(evt, () => console.warn(`[video] State event: ${evt}`));
            });
            video.addEventListener('timeupdate', () => {
                syncTimeUI();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);

                // Self-healing overlay hide for iOS native HLS:
                // If the video is clearly playing (time is advancing, not paused)
                // but the buffering overlay is still visible, force it away.
                // This catches cases where 'canplay'/'playing' fired before
                // initPlyr() set up Plyr's event listeners.
                if (!hlsInst && IS_IOS) {
                    const overlay = document.getElementById('transition-overlay');
                    if (overlay && overlay.classList.contains('active') && !video.paused && video.currentTime > 0) {
                        hideTransitionOverlay();
                    }
                }
            });
            video.addEventListener('seeked', () => {
                // Immediately re-evaluate after any seek so the countdown
                // resets if the user jumps back past the 30-second threshold.
                updateNextEpisodeButton(false);
            });
            video.addEventListener('loadedmetadata', () => {
                isSourceSwitching = false;
                syncTimeUI();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
                updateCaptionsButtonVisibility();
                bindSubtitleCueListeners();
                buildCaptionsMenu();
            });
            if (video.textTracks && typeof video.textTracks.addEventListener === 'function') {
                video.textTracks.addEventListener('addtrack', (e) => {
                    const t = e.track;
                    if (t) t.mode = 'disabled';
                    silenceNativeTracks();
                    bindSubtitleCueListeners();
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                });
                video.textTracks.addEventListener('change', () => {
                    silenceNativeTracks();
                    updateCaptionsButtonVisibility();
                    buildCaptionsMenu();
                });
            }
            video.addEventListener('play', () => {
                if (!_iosNativePlayerActive) silenceNativeTracks();
            });
            video.addEventListener('playing', () => {
                if (!_iosNativePlayerActive) silenceNativeTracks();
            });
            video.addEventListener('webkitbeginfullscreen', () => {
                console.log('[ios] Native fullscreen begin');
                _iosNativePlayerActive = true;
                document.body.classList.add('ios-native-player');
                
                // Allow CSS rules to update before native player probes
                setTimeout(() => {
                    activateTracksForIOSNativePlayer();
                }, 100);

                const overlay = document.getElementById('subtitleOverlay');
                if (overlay) overlay.style.display = 'none';
            });
            video.addEventListener('webkitendfullscreen', () => {
                console.log('[ios] Native fullscreen end');
                document.body.classList.remove('ios-native-player');
                deactivateTracksFromIOSNativePlayer();
            });
            video.addEventListener('volumechange', () => {
                updateMuteIcon();
                if (volumeSliderEl) {
                    const val = Math.round((video.muted ? 0 : video.volume) * 100);
                    volumeSliderEl.value = String(val);
                    volumeSliderEl.style.setProperty('--vol-percent', `${val}%`);
                }
                if (volumeToggleEl) {
                    volumeToggleEl.innerHTML = video.muted || video.volume === 0
                        ? '<i class="fa-solid fa-volume-xmark"></i>'
                        : '<i class="fa-solid fa-volume-high"></i>';
                }
            });
            video.addEventListener('play', () => {
                setPlayIcon(true);
                showControlSurface();
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
            });
            video.addEventListener('playing', () => {
                setPlayIcon(true); // Chrome sometimes only fires 'playing' on autostart
                isSourceSwitching = false;
                isUserSeeking = false;
                if (bufferingRecoveryTimer) clearTimeout(bufferingRecoveryTimer);
                hideBufferingOverlaySoon(120);
            });
            video.addEventListener('seeking', () => {
                isUserSeeking = true;
                lastUserSeekAt = Date.now();
                maybeShowSeekBufferingOverlay(240);
                kickHlsLoadNearCurrentTime();
            });
            video.addEventListener('seeked', () => {
                isUserSeeking = false;
                kickHlsLoadNearCurrentTime();
                if (bufferingRecoveryTimer) clearTimeout(bufferingRecoveryTimer);
                bufferingRecoveryTimer = setTimeout(() => hideBufferingOverlaySoon(80), 120);
            });
            video.addEventListener('waiting', () => {
                // iOS Safari fires 'waiting' between HLS segments during normal
                // playback. Only show the spinner if the video is genuinely stuck
                // (not just briefly buffering the next segment during active play).
                if (!hlsInst && IS_IOS) {
                    // On iOS native HLS, delay showing the overlay to filter
                    // out the spurious sub-second 'waiting' events.
                    if (waitingOverlayTimer) clearTimeout(waitingOverlayTimer);
                    waitingOverlayTimer = setTimeout(() => {
                        waitingOverlayTimer = null;
                        if (video && !video.paused && video.readyState < 2) {
                            showBufferingOverlay();
                        }
                    }, 800);
                } else {
                    if (waitingOverlayTimer) clearTimeout(waitingOverlayTimer);
                    showBufferingOverlay();
                    kickHlsLoadNearCurrentTime();
                }
            });
            video.addEventListener('stalled', () => {
                // iOS Safari fires 'stalled' as a false alarm constantly during normal
                // native HLS playback while the browser prefetches. Only treat it as
                // a real stall when HLS.js is in charge (hlsInst exists).
                if (!hlsInst) return;
                showBufferingOverlay();
                kickHlsLoadNearCurrentTime();
            });
            video.addEventListener('canplay', () => {
                hideBufferingOverlaySoon(80);
            });
            video.addEventListener('pause', () => {
                setPlayIcon(false);
                controlSurface.classList.add('visible');
                updateSkipSegmentButton();
                updateNextEpisodeButton(false);
            });
            video.addEventListener('ended', () => {
                updateSkipSegmentButton();
                updateNextEpisodeButton(true);
            });
        }

        function positionMenuAbove(menu, button) {
            if (!menu || !button) return;

            const isControlMenu = menu.classList.contains('control-menu');
            const isOpenPanel = menu.id.includes('-panel');

            menu.style.display = isControlMenu ? 'flex' : (isOpenPanel ? 'flex' : 'block');
            menu.style.visibility = 'hidden';

            if (!button) return;

            const menuWidth = menu.offsetWidth;
            const screenWidth = window.innerWidth;

            let left = rect.left + (rect.width / 2) - (menuWidth / 2);
            // Constraint within screen
            left = Math.max(12, Math.min(left, screenWidth - menuWidth - 12));

            menu.style.left = `${left}px`;
            menu.style.bottom = `${window.innerHeight - rect.top + 12}px`;

            menu.style.display = ''; // Reset display
            menu.style.visibility = '';
        }

        function initMobileSheetDragToClose() {
            const sheets = [sourcePanel, epPanel, audioPanel, qualityMenu, captionsMenu, playbackMenu, preferencesMenu, volumeMenu].filter(Boolean);
            const state = new WeakMap();
            const isSheetOpen = (el) => el.classList.contains('active') || el.classList.contains('open');

            sheets.forEach((sheet) => {
                state.set(sheet, { dragging: false, startY: 0, startAt: 0, dy: 0 });

                const onStart = (e) => {
                    if (!IS_MOBILE_CLIENT || !isSheetOpen(sheet)) return;
                    const touch = e.touches?.[0];
                    if (!touch) return;
                    const rect = sheet.getBoundingClientRect();
                    const yInSheet = touch.clientY - rect.top;
                    // Start drag from top grab area (80px)
                    if (yInSheet > 80) return;
                    const s = state.get(sheet);
                    s.dragging = true;
                    s.startY = touch.clientY;
                    s.startAt = Date.now();
                    s.dy = 0;
                    sheet.classList.add('sheet-dragging');
                };

                const onMove = (e) => {
                    const s = state.get(sheet);
                    if (!s.dragging) return;
                    const touch = e.touches?.[0];
                    if (!touch) return;

                    const deltaY = touch.clientY - s.startY;

                    // Responsive dragging with rubber-band effect
                    if (deltaY < 0) {
                        // Dragging upwards: apply resistance
                        s.dy = deltaY * 0.25;
                    } else {
                        // Dragging downwards: 1:1 movement
                        s.dy = deltaY;
                    }

                    sheet.style.transform = `translateY(${s.dy}px)`;

                    // Adjust opacity based on downward drag distance
                    if (s.dy > 0) {
                        sheet.style.opacity = Math.max(0.6, 1 - (s.dy / sheet.offsetHeight));
                    } else {
                        sheet.style.opacity = "1";
                    }

                    if (e.cancelable) e.preventDefault();
                };

                const onEnd = () => {
                    const s = state.get(sheet);
                    if (!s.dragging) return;
                    s.dragging = false;

                    const elapsed = Date.now() - s.startAt;
                    const velocity = s.dy / (elapsed || 1);

                    // Close if dragged down far enough (120px) or swiped down fast
                    const shouldClose = s.dy > 120 || (velocity > 0.6 && s.dy > 30);

                    sheet.classList.remove('sheet-dragging');

                    if (shouldClose) {
                        animateCloseMenuElement(sheet);
                    } else {
                        // Spring back animation
                        sheet.classList.add('sheet-animating');
                        sheet.style.transform = '';
                        sheet.style.opacity = '';
                        setTimeout(() => sheet.classList.remove('sheet-animating'), 300);
                    }
                };

                sheet.addEventListener('touchstart', onStart, { passive: true });
                sheet.addEventListener('touchmove', onMove, { passive: false });
                sheet.addEventListener('touchend', onEnd, { passive: true });
                sheet.addEventListener('touchcancel', onEnd, { passive: true });
            });
        }

        // Update audio track selector UI
        function updateAudioTracks() {
            if (!audioPanel || !audioBtn) return;

            const hlsTracks = (hlsInst && Array.isArray(hlsInst.audioTracks)) ? hlsInst.audioTracks : [];
            const hasSatoruSources = satoruAudioSources.length > 0;

            // iOS Safari uses native HLS (no HLS.js), so hlsInst is null.
            // Read WebKit's native AudioTrackList from the <video> element instead.
            const iosNativeTracks = (!hlsInst && video && video.audioTracks && video.audioTracks.length > 0)
                ? Array.from(video.audioTracks)
                : [];

            const hasAnyTracks = hlsTracks.length > 0 || hasSatoruSources || iosNativeTracks.length > 0;

            audioBtn.style.display = 'flex';

            if (!hasAnyTracks) {
                audioPanel.innerHTML = `
                    <div class="panel-label">Audio Track</div>
                    <div class="audio-item">No audio tracks available</div>
                `;
                return;
            }

            const currentHlsTrack = hlsInst ? hlsInst.audioTrack : -1;
            const isOnSatoru = currentAudioSource === 'satoru';

            audioPanel.innerHTML = '<div class="panel-label">Audio Track</div>';

            const renderedLabels = new Set();
            const addItem = (label, isActive, onClick) => {
                if (renderedLabels.has(label)) return;
                renderedLabels.add(label);
                const item = document.createElement('div');
                item.className = 'audio-item' + (isActive ? ' active' : '');
                item.innerHTML = `<span class="src-dot"></span>${label}`;
                item.onclick = onClick;
                audioPanel.appendChild(item);
            };

            // Decide whether to show the native/hls tracks menu
            const showPlayerTracks = !isOnSatoru || !hlsInst;

            if (showPlayerTracks) {
                hlsTracks.forEach((track) => {
                    let label = track.name || track.lang || 'Default';
                    if (label === 'Default' || label === 'und') label = 'Japanese';
                    const isActive = track.id === currentHlsTrack;
                    addItem(label, isActive, () => {
                        if (hlsInst) {
                            hlsInst.audioTrack = track.id;
                            rememberAudioPreference(track);
                            updateAudioTracks();
                        }
                    });
                });

                // iOS Safari native AudioTrackList (when HLS.js is not used)
                if (iosNativeTracks.length > 0) {
                    iosNativeTracks.forEach((track) => {
                        let label = track.label || track.language || 'Default';
                        if (!label || label === 'und') label = 'Japanese';
                        const isActive = track.enabled;
                        addItem(label, isActive, () => {
                            // Disable all tracks then enable the picked one
                            iosNativeTracks.forEach(t => { t.enabled = false; });
                            track.enabled = true;
                            if (typeof IS_IOS !== 'undefined' && IS_IOS && typeof video !== 'undefined' && video && video.readyState >= 1) {
                                video.currentTime = video.currentTime + 0.001;
                            }
                            rememberAudioPreference({ lang: track.language, name: track.label });
                            updateAudioTracks();
                        });
                    });
                }
            }
            
            if (isOnSatoru) {
                // Return to original JustAnime track
                addItem('Japanese (Alt Source)', false, () => {
                    const jaSource = allSources.find((s) => s.provider === 'justanime');
                    if (!jaSource) return;
                    const resumeAt = Math.max(0, Number(video?.currentTime || 0));
                    audioSwitchInFlightUntil = Date.now() + 9000;
                    hlsFragErrorBurst = 0;
                    hlsSessionIsFragile = false;
                    pendingJumpTarget = null;
                    currentAudioSource = 'justanime';
                    activeSatoruTrackIndex = -1;
                    rememberProviderPreference('justanime');
                    syncUrlState();
                    if (jaSource.isM3U8 && Hls.isSupported() && typeof hlsInst !== 'undefined' && hlsInst) {
                        svSwitchHlsSourceSilent(jaSource.url, jaSource.referer, () => { }, resumeAt);
                    } else {
                        loadStream(jaSource.url, !!jaSource.isM3U8, !!jaSource.isEmbed, jaSource.referer, currentIdx, resumeAt);
                    }
                });
            }

            // Virtual Satoru tracks
            const showVirtualSatoruTracks = hasSatoruSources && (!isOnSatoru || !!hlsInst);
            if (showVirtualSatoruTracks) {
                satoruAudioSources.forEach((src, idx) => {
                    const isActive = isOnSatoru && activeSatoruTrackIndex === idx;
                    addItem(src.label, isActive, () => {
                        if (isOnSatoru && activeSatoruTrackIndex === idx) return;

                        // Set state immediately for UI 
                        currentAudioSource = 'satoru';
                        activeSatoruTrackIndex = idx;

                        // IMPORTANT: Set preferredAudioToken to the specific track name/label WITHOUT the provider suffix
                        let rawToken = src.hlsTrackName || src.label || '';
                        preferredAudioToken = rawToken.replace(/\s*\(.*?\)\s*/g, '').trim().toLowerCase();

                        if (preferredSourceLabelMatch) preferredSourceLabelMatch = preferredAudioToken;
                        rememberProviderPreference('satoru');
                        syncUrlState();

                        updateAudioTracks(); // Render optimistic UI
                        const resumeAt = Math.max(0, Number(video?.currentTime || 0));
                        audioSwitchInFlightUntil = Date.now() + 9000;
                        hlsFragErrorBurst = 0;
                        hlsSessionIsFragile = false;
                        pendingJumpTarget = null;

                        if (!isOnSatoru) {
                            // Ultra-fast zero-lag audio track switching
                            if (src.isM3U8 && Hls.isSupported() && typeof hlsInst !== 'undefined' && hlsInst) {
                                const currentTime = Math.max(0, Number(video?.currentTime || 0));
                                const wasPlaying = !video?.paused;

                                console.log('Zero-lag audio switch to satoru:', src.label, 'at time:', currentTime);

                                // Use zero-lag switching if available, otherwise fallback
                                if (typeof svZeroLagAudioSwitch === 'function') {
                                    svZeroLagAudioSwitch(src.url, src.referer, currentTime, wasPlaying, () => {
                                        svApplyPreferredAudioToHls(hlsInst);

                                        // Instant playback resumption
                                        if (wasPlaying && video) {
                                            video.play().catch(() => {
                                                video.muted = true;
                                                video.play().catch(() => { });
                                            });
                                        }
                                    });
                                } else if (typeof svUltraSeamlessAudioSwitch === 'function') {
                                    // Fallback to ultra-seamless
                                    svUltraSeamlessAudioSwitch(src.url, src.referer, currentTime, wasPlaying, () => {
                                        svApplyPreferredAudioToHls(hlsInst);

                                        if (wasPlaying && video) {
                                            setTimeout(() => {
                                                video.play().catch(() => {
                                                    video.muted = true;
                                                    video.play().catch(() => { });
                                                });
                                            }, 50);
                                        }
                                    });
                                } else {
                                    // Final fallback to standard switching
                                    svSwitchHlsSourceSilent(src.url, src.referer, () => {
                                        svApplyPreferredAudioToHls(hlsInst);

                                        if (wasPlaying && video) {
                                            setTimeout(() => {
                                                video.play().catch(() => {
                                                    video.muted = true;
                                                    video.play().catch(() => { });
                                                });
                                            }, 100);
                                        }
                                    }, resumeAt);
                                }
                            } else {
                                loadStream(src.url, !!src.isM3U8, !!src.isEmbed, src.referer, currentIdx, resumeAt);
                            }
                        } else {
                            svApplyPreferredAudioToHls(hlsInst);
                            updateAudioTracks();
                        }
                    });
                });
            }
        }

                                // Use level 1 if available (middle quality), fallback to 0
                                const targetLevel = levels.length > 1 ? 1 : 0;
                                window.previewHlsInst.autoLevelCapping = targetLevel;
                                window.previewHlsInst.currentLevel = targetLevel;
                                window.previewHlsInst.nextLevel = targetLevel;
                                window.previewHlsInst.loadLevel = targetLevel;
                                // Only start load if main video is not seeking
                                if (!video?.seeking) {
                                    window.previewHlsInst.startLoad(Math.max(0, target - 0.5));
                                }
                            } catch (_) {
                                window.previewHlsIsUnhealthy = true;
                            }
                        }

                        // Skip seeking the preview video if HLS is too unhealthy (avoid compounding errors)
                        // OR if the main video is actively seeking
                        if ((!window.previewHlsIsUnhealthy || window.previewHlsErrorCount <= 1) && !video?.seeking) {
                            if (typeof previewVideo.fastSeek === 'function') {
                                previewVideo.fastSeek(target);
                            } else {
                                previewVideo.currentTime = target;
                            }
                        }
                    } catch (_) {
                        // Try fallback offset on error
                        if (window.previewTargetTimeAlt !== undefined && window.previewTargetTimeAlt !== target) {
                            target = Math.max(0, Math.min(Number(window.previewTargetTimeAlt), maxTime));
                            try {
                                if (typeof previewVideo.fastSeek === 'function') {
                                    previewVideo.fastSeek(target);
                                } else {
                                    previewVideo.currentTime = target;
                                }
                            } catch (_) { }
                        }
                    } finally {
                        window.previewSeekInFlight = false;
                        // ENHANCED: Cache the frame after successful seek
                        setTimeout(() => {
                            if (!previewVideo.seeking) {
                                const rounded = Math.round(window.previewTargetTime || 0);

                                // Try to capture from preview video first, fallback to main video
                                let frameData = null;

                                // Force main video canvas capture if preview HLS has become unreliable
                                if (!window.previewUseCanvasFallbackOnly) {
                                    try {
                                        if (previewVideo.readyState >= 2) {
                                            const canvas = document.createElement('canvas');
                                            canvas.width = Math.max(previewVideo.videoWidth, 240);
                                            canvas.height = Math.max(previewVideo.videoHeight, 135);
                                            const ctx = canvas.getContext('2d');
                                            if (ctx) {
                                                ctx.drawImage(previewVideo, 0, 0);
                                                frameData = canvas.toDataURL('image/jpeg', 0.75);
                                            }
                                        }
                                    } catch (_) { }
                                }

                                // Fallback to main video if preview frame capture failed or preview is too unhealthy
                                // OR if we've flagged to always use canvas fallback
                                if ((!frameData || window.previewUseCanvasFallbackOnly) && (window.previewUseCanvasFallbackOnly || (window.previewHlsIsUnhealthy && window.previewHlsErrorCount > 3))) {
                                    console.log(`[preview] Using main video canvas at ${rounded}s`);
                                    // Try multiple offsets to avoid capturing the same frame
                                    const offsets = [0, 0.3, 0.6, -0.3];
                                    for (const offset of offsets) {
                                        const offsetTime = Math.max(0, rounded + offset);
                                        frameData = captureFromMainVideo(offsetTime);
                                        if (frameData) break; // Use first successful capture
                                    }
                                }

                                if (frameData) {
                                    cachePreviewFrame(rounded, frameData);
                                }

                                // ENHANCED: Prefetch adjacent frames for smooth scrolling
                                const prefetchNext = rounded + 1;
                                const prefetchPrev = Math.max(0, rounded - 1);
                                if (prefetchNext <= Math.floor(video.duration)) {
                                    setTimeout(() => {
                                        if (!getPreviewFrameFromCache(prefetchNext) && !window.previewSeekInFlight) {
                                            window.previewTargetTime = prefetchNext;
                                            window.performPreviewSeek();
                                        }
                                    }, 300);
                                }
                            }
                        }, 100);
                    }
                }, 35); // ENHANCED: Slightly faster response (was 45ms)
            };

            seekBar.addEventListener('mousemove', handleSeekPreview);
            seekBar.addEventListener('touchstart', handleSeekPreview, { passive: true });
            seekBar.addEventListener('touchmove', handleSeekPreview, { passive: true });

            seekBar.addEventListener('mouseleave', () => {
                seekPreview.classList.remove('visible');
                window.previewLastSecond = -1;
                // Hide cache display
                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo && previewVideo._cacheDisplay) {
                    previewVideo._cacheDisplay.style.display = 'none';
                }
            });
            seekBar.addEventListener('touchend', () => {
                seekPreview.classList.remove('visible');
                window.previewLastSecond = -1;
                // Hide cache display
                const previewVideo = document.getElementById('previewVideo');
                if (previewVideo && previewVideo._cacheDisplay) {
                    previewVideo._cacheDisplay.style.display = 'none';
                }
            });


            document.addEventListener('click', (e) => {
                if (!qualityMenu.contains(e.target) && !qualityBtn.contains(e.target)) qualityMenu.classList.remove('active');
                if (!captionsMenu.contains(e.target) && !captionsBtn.contains(e.target)) captionsMenu.classList.remove('active');
                if (!playbackMenu.contains(e.target) && !playbackBtn.contains(e.target)) playbackMenu.classList.remove('active');
                if (!preferencesMenu.contains(e.target) && !preferencesBtn.contains(e.target)) preferencesMenu.classList.remove('active');
                if (!volumeMenu.contains(e.target) && !muteBtn.contains(e.target)) volumeMenu.classList.remove('active');
            });

            // MOBILE GESTURES & OVERLAYS
            const bOverlay = document.getElementById('brightness-overlay');
            const bBar = document.getElementById('brightness-bar');
            const vOverlay = document.getElementById('volume-overlay');
            const vBar = document.getElementById('volume-bar');

            function updateOverlayIcon(type, level) {
                if (type === 'volume') {
                    const iconEl = vOverlay.querySelector('i');
                    if (!iconEl) return;
                    if (level === 0 || video.muted) iconEl.className = 'fa-solid fa-volume-xmark';
                    else if (level < 0.5) iconEl.className = 'fa-solid fa-volume-low';
                    else iconEl.className = 'fa-solid fa-volume-high';
                } else if (type === 'brightness') {
                    const iconEl = bOverlay.querySelector('i');
                    if (!iconEl) return;
                    if (level < 0.4) iconEl.className = 'fa-solid fa-cloud-sun';
                    else iconEl.className = 'fa-solid fa-sun';
                }
            }
            const vBrightnessOverlay = document.getElementById('video-brightness-overlay');

            let lastTap = 0;
            const tapThreshold = 300;
            let startX = 0, startY = 0, startTime = 0;
            let startVal = 0;
            let isGesturing = false;
            let gestureType = null;
            let bLevel = 1.0;

            let skipAccumulator = 0;
            let skipAccumulatorSide = null;
            let skipAccumulationTimer = null;

            function registerSkipPulse(side, step = 10) {
                if (skipAccumulatorSide !== side) skipAccumulator = 0;
                skipAccumulatorSide = side;
                skipAccumulator += step;
                playRipple(side, skipAccumulator);

                clearTimeout(skipAccumulationTimer);
                skipAccumulationTimer = setTimeout(() => {
                    skipAccumulator = 0;
                    skipAccumulatorSide = null;
                }, tapThreshold + 150);
            }

            controlSurface.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) return;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                isGesturing = false;
                gestureType = null;
            }, { passive: true });

            controlSurface.addEventListener('touchmove', (e) => {
                if (isUiLocked || e.touches.length > 1) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = startY - touch.clientY;

                if (!isGesturing && Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                    isGesturing = true;
                    const third = window.innerWidth / 3;
                    if (startX < third) {
                        gestureType = 'brightness';
                        startVal = bLevel;
                        bOverlay.classList.add('visible');
                    } else if (startX > 2 * third) {
                        gestureType = 'volume';
                        startVal = video.volume;
                        vOverlay.classList.add('visible');
                    }
                }

                if (isGesturing && gestureType) {
                    if (e.cancelable) e.preventDefault();
                    const sensitivity = 200;
                    const change = dy / sensitivity;
                    let newVal = Math.max(0, Math.min(1, startVal + change));

                    if (gestureType === 'brightness') {
                        bLevel = newVal;
                        const vBO = document.getElementById('video-brightness-overlay');
                        if (vBO) vBO.style.opacity = (1 - bLevel) * 0.8;
