<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Watching | StreamVerse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Sora:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="logo.png">
    <!-- PWA manifest — gives iOS the signal to run without browser chrome in standalone mode -->
    <link rel="manifest" href="manifest.json">
    <!-- Standard PWA meta (non-Apple) -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Apple-specific PWA tags. These are required for iOS standalone mode. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StreamVerse">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        :root {
            --primary: #e50914;
            --primary-glow: rgba(229, 9, 20, 0.4);
            --bg: #000;
            --glass: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --muted: #a6a6a6;
            --transition: all .25s cubic-bezier(.4, 0, .2, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide native captions in the browser to avoid double subtitles with custom overlay. */
        /* BUT allow them in native iOS fullscreen by removing this rule's scope via .ios-native-player class. */
        body:not(.ios-native-player) video::-webkit-media-text-track-container {
            display: none !important;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Sora', sans-serif;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        /* LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity .5s ease;
            background-size: cover;
            background-position: center;
        }

        #loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .6), rgba(0, 0, 0, 0.95));
        }

        .loader-inner {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 1rem;
        }

        .loader-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
        }



        .loader-logo span {
            color: var(--primary);
            text-shadow: 0 0 25px var(--primary-glow);
        }

        #loader-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: .4rem;
        }

        #loader-sub {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            letter-spacing: 0.3px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto;
            border: 3px solid rgba(255, 255, 255, .05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite, pulse-glow 2s infinite ease-in-out;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 10px var(--primary-glow);
            }

            50% {
                box-shadow: 0 0 25px var(--primary-glow);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* PROVIDER PROGRESS */
        #provider-progress {
            margin-top: 1.8rem;
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .prov-chip {
            padding: .3rem .9rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            color: var(--muted);
            transition: var(--transition);
        }

        .prov-chip.trying {
            border-color: rgba(255, 180, 0, .5);
            color: #ffb400;
        }

        .prov-chip.success {
            border-color: rgba(50, 200, 100, .5);
            color: #32c864;
        }

        .prov-chip.failed {
            border-color: rgba(229, 9, 20, .3);
            color: #e50914;
            opacity: .6;
        }

        /* HEADER */
        .player-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: calc(1.4rem + var(--safe-top)) calc(1.8rem + var(--safe-right)) 1.4rem calc(1.8rem + var(--safe-left));
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            z-index: 270;
            pointer-events: none;
            transition: var(--transition);
        }

        .player-header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.08);
        }

        .header-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header-info p {
            font-size: .85rem;
            color: var(--muted);
            margin-top: .1rem;
        }

        /* PLAYER */
        .player-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1;
        }

        /* ── iOS Pseudo-Fullscreen ───────────────────────────────────────────
           iOS Safari cannot grant true document fullscreen. When the user taps
           the fullscreen button on iPhone/iPad we instead apply this mode:
           the player-wrap and control-surface are promoted to a very high
           z-index so they sit above all other page chrome, and the body is
           scroll-locked so swipe-to-dismiss can't escape the player.

           We use 100dvh (dynamic viewport height) so the player auto-adjusts
           as the address bar slides in/out during interaction.
        ──────────────────────────────────────────────────────────────────── */
        html.ios-pseudo-fs-active,
        html.ios-pseudo-fs-active body {
            overflow: hidden !important;
            /* Prevent iOS rubber-band scroll from revealing page beneath */
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
            /* Black background so any sliver outside the player is invisible */
            background: #000 !important;
        }

        html.ios-pseudo-fs-active .player-wrap {
            position: fixed !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100dvh !important; /* dynamic viewport — handles address-bar collapse */
            z-index: 99999 !important;
            background: #000 !important;
            overscroll-behavior: none !important; /* Prevent swipe-to-refresh/history navigation */
        }

        html.ios-pseudo-fs-active .control-surface {
            position: fixed !important;
            inset: 0 !important;
            z-index: 100100 !important; /* always above player-wrap */
            pointer-events: auto !important; /* iOS: ensure taps reach buttons */
        }

        /* Force all interactive elements inside the control surface to be tappable */
        html.ios-pseudo-fs-active .control-surface button,
        html.ios-pseudo-fs-active .control-surface input,
        html.ios-pseudo-fs-active .control-surface [role="button"] {
            pointer-events: auto !important;
        }

        /* Plyr wrapper must also fill the promoted container */
        html.ios-pseudo-fs-active .plyr,
        html.ios-pseudo-fs-active .plyr__video-wrapper {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Ensure any panels (server picker, episode list, etc.) remain visible */
        html.ios-pseudo-fs-active [class*="-panel"],
        html.ios-pseudo-fs-active [class*="-drawer"],
        html.ios-pseudo-fs-active .skip-btn-wrap,
        html.ios-pseudo-fs-active #skipIntroBtn,
        html.ios-pseudo-fs-active #skipOutroBtn {
            z-index: 100200 !important;
        }

        /* Orientation hint pill shown briefly when entering landscape pseudo-fs */
        #ios-rotate-hint {
            position: fixed;
            bottom: 14%;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: rgba(0,0,0,.72);
            color: #fff;
            font-size: 13px;
            padding: 7px 18px;
            border-radius: 999px;
            pointer-events: none;
            z-index: 100300;
            opacity: 0;
            transition: opacity .25s ease, transform .25s ease;
            white-space: nowrap;
        }
        #ios-rotate-hint.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── iOS Add to Home Screen banner ────────────────────────────────── */
        #ios-a2hs-banner {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: min(94vw, 420px);
            z-index: 200000;
            transition: transform .35s cubic-bezier(.4,0,.2,1);
            filter: drop-shadow(0 -4px 24px rgba(0,0,0,.55));
        }
        #ios-a2hs-banner.visible {
            transform: translateX(-50%) translateY(0);
        }
        .a2hs-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(18,18,22,.96);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 20px 20px 0 0;
            padding: 14px 16px 20px;
            backdrop-filter: blur(16px);
        }
        .a2hs-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            flex-shrink: 0;
            object-fit: cover;
        }
        .a2hs-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .a2hs-text strong {
            font-size: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }
        .a2hs-text span {
            font-size: 12px;
            color: rgba(255,255,255,.65);
            line-height: 1.4;
        }
        .a2hs-share-icon {
            display: inline-block;
            background: #007AFF;
            color: #fff;
            font-size: 11px;
            padding: 1px 5px;
            border-radius: 5px;
            font-weight: 700;
            vertical-align: middle;
        }
        .a2hs-text em { color: #fff; font-style: normal; font-weight: 600; }
        .a2hs-close {
            background: rgba(255,255,255,.1);
            border: none;
            color: rgba(255,255,255,.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .a2hs-arrow {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 10px solid rgba(18,18,22,.96);
            margin: 0 auto;
        }

        #video-brightness-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.1s linear;
        }

        #player-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: var(--video-fit, contain);
            object-position: center;
        }

        .plyr {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            --plyr-color-main: var(--primary);
        }

        .plyr__video-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .plyr video {
            object-fit: contain;
        }

        /* Custom control surface (from requested player UI) */
        .plyr__controls,
        .plyr__control--overlaid {
            display: none !important;
        }

        :root {
            --video-fit: contain;
        }

        #player-video,
        .plyr video {
            object-fit: var(--video-fit, contain);
            object-position: center;
        }

        .control-surface {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 4vw 2vh;
            pointer-events: auto;
            z-index: 260;
            opacity: 0;
            transition: opacity .22s ease;
            background: rgba(0, 0, 0, 0.001);
            /* Transparent but makes it a reliable touch target on mobile */
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        .control-surface.visible {
            opacity: 1;
        }

        .control-surface:not(.visible) {
            pointer-events: none !important;
        }

        /* Allow lock button and skip buttons to always be clickable */
        .control-surface:not(.visible) #uiLockBtn,
        .control-surface:not(.visible) .ui-lock-btn,
        .control-surface:not(.visible) #skipBackBtn,
        .control-surface:not(.visible) #skipFwdBtn,
        .control-surface:not(.visible) #skipSegmentBtn {
            pointer-events: auto !important;
        }

        .control-surface:not(.visible) button,
        .control-surface:not(.visible) input[type="range"],
        .control-surface:not(.visible) .control-menu,
        .control-surface:not(.visible) .panel,
        .control-surface:not(.visible) [role="button"],
        .control-surface:not(.visible) [role="slider"] {
            pointer-events: none !important;
        }

        .control-center {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: min(80vw, 560px);
            margin: 0 auto;
            flex: 1;
            transform: translateY(4vh);
        }

        .ctrl-btn {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(20, 22, 30, .6);
            color: #fff;
            border-radius: 999px;
            width: 64px;
            height: 64px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .ctrl-btn span {
            font-size: 14px;
            font-weight: 600;
        }

        .ctrl-btn svg {
            width: 44px;
            height: 44px;
        }

        .ctrl-btn:hover {
            background: rgba(20, 22, 30, .6);
            border-color: var(--primary);
        }

        .play-btn {
            width: 84px;
            height: 84px;
            font-size: 26px;
        }

        .control-bottom {
            display: grid;
            grid-template-columns: minmax(88px, auto) 1fr;
            grid-template-areas:
                "seek seek"
                "time actions";
            align-items: center;
            column-gap: 1rem;
            row-gap: .85rem;
            pointer-events: auto;
            padding: 0 .5rem;
            position: relative;
        }

        .time-readout {
            grid-area: time;
            display: flex;
            align-items: baseline;
            gap: .35rem;
            font-size: .9rem;
            color: rgba(255, 255, 255, .8);
            min-width: 90px;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(20, 22, 30, 0.52);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .time-divider {
            color: rgba(255, 255, 255, .55);
        }

        .seek-wrapper {
            grid-area: seek;
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .seek-track-base {
            position: absolute;
            left: 0;
            right: 0;
            height: 5px;
            background: rgba(255, 255, 255, .15);
            border-radius: 999px;
            pointer-events: none;
        }

        #skipMarkerContainer {
            position: absolute;
            left: 0;
            right: 0;
            height: 5px;
            pointer-events: none;
            z-index: 1;
        }

        .skip-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            background: rgba(168, 85, 247, 0.22);
            transition: background 0.2s ease, box-shadow 0.2s ease;
            z-index: 3;
        }

        /* Left edge tick */
        .skip-marker::before {
            content: '';
            position: absolute;
            left: 0;
            top: -2px;
            bottom: -2px;
            width: 2px;
            background: rgba(200, 150, 255, 0.9);
            border-radius: 2px;
        }

        /* Right edge tick */
        .skip-marker::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            bottom: -2px;
            width: 2px;
            background: rgba(200, 150, 255, 0.9);
            border-radius: 2px;
        }

        .skip-marker.active {
            background: rgba(138, 48, 228, 0.82);
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.55);
        }

        .skip-marker.active::before,
        .skip-marker.active::after {
            background: rgba(235, 198, 255, 1);
        }

        .seek-bar {
            width: 100%;
            appearance: none;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(to right, rgba(229, 9, 20, 0.58) 0%, rgba(229, 9, 20, 0.58) var(--seek-percent, 0%), transparent var(--seek-percent, 0%), transparent 100%);
            outline: none;
            cursor: pointer;
            z-index: 2;
            margin: 0;
        }

        .seek-bar::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
        }

        .seek-bar::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
        }

        .seek-preview {
            position: absolute;
            bottom: 72px;
            left: 0;
            display: flex;
            visibility: hidden;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.12s ease-out, transform 0.12s ease-out, visibility 0.12s;
            /* ENHANCED: Faster transitions */
            transform: translateX(-50%) translateY(3px);
            opacity: 0;
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.65));
            /* ENHANCED: Better shadow */
        }

        .seek-preview.visible {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(-1px);
        }

        .seek-preview-thumb {
            width: 240px;
            /* ENHANCED: Larger preview */
            aspect-ratio: 16/9;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
            /* ENHANCED: Better shadow */
            border: 2px solid rgba(229, 9, 20, 0.3);
            /* ENHANCED: Accent border */
            backdrop-filter: blur(2px);
        }

        .seek-preview-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .seek-preview-time {
            width: auto;
            min-width: 70px;
            background: rgba(15, 15, 15, 0.75);
            /* ENHANCED: Better overlay background */
            border: 1.5px solid rgba(229, 9, 20, 0.5);
            /* ENHANCED: Red accent */
            backdrop-filter: blur(12px);
            color: #fff;
            text-align: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .seek-preview-time::after {
            content: "";
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 7px solid rgba(15, 15, 15, 0.75);
        }

        .control-actions {
            grid-area: actions;
            display: flex;
            align-items: center;
            gap: .6rem;
            justify-self: end;
        }

        .ctrl-icon {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(20, 22, 30, .6);
            color: #fff;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .audio-wave-icon {
            width: 18px;
            height: 18px;
            display: block;
        }

        .ctrl-icon:hover {
            background: rgba(20, 22, 30, .6);
            border-color: var(--primary);
        }

        .control-menu {
            position: fixed;
            background: var(--glass);
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            width: 210px;
            /* Default width */
            z-index: 1200;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            max-height: 250px;
            overflow-y: auto;
            /* JS will handle left and bottom */
        }

        .sheet-dragging {
            transition: none !important;
            will-change: transform;
        }

        .sheet-animating {
            will-change: transform, opacity;
        }

        #qualityMenu {
            width: 150px;
        }

        #source-panel,
        #ep-panel,
        #audio-panel {
            position: fixed;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: none;
            flex-direction: column;
            z-index: 1200;
            backdrop-filter: blur(25px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, .8);
            animation: slideUp .25s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 300px;
            overflow-y: auto;
        }

        #source-panel {
            width: 180px;
        }

        #ep-panel {
            width: 260px;
        }

        #audio-panel {
            width: 160px;
        }

        #source-panel.open,
        #ep-panel.open,

        /* ──────────────────────────────────────────────────────────────────
           Subtitle rendering strategy:
           - Our custom overlay (#subtitleOverlay) renders subtitles in the
             web player via JS/cuechange events. We suppress browser's own
             rendering (::cue) so there is no double display.
           - The -webkit-media-text-track-container is NOT suppressed here.
             When iOS native QuickTime player is active (webkitbeginfullscreen),
             our JS sets track.mode = 'showing' and iOS renders the captions
             natively inside that container. On webkitendfullscreen we restore
             track.mode = 'hidden' and our overlay takes back over.
           - body.ios-native-player is toggled by JS to allow native rendering.
        ──────────────────────────────────────────────────────────────────── */

        /* Always hide Plyr's built-in caption UI — we never use it */
        .plyr__captions,
        .plyr__caption,
        .plyr__video-wrapper [class*="captions"],
        .plyr__video-wrapper [class*="caption"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* Suppress browser ::cue rendering in our custom player.
           When mode='showing' is set for iOS native player, the browser
           renders via -webkit-media-text-track-container (not ::cue),
           so this does NOT affect iOS native subtitle display. */
        body:not(.ios-native-player) video::cue,
        body:not(.ios-native-player) #player-video::cue,
        body:not(.ios-native-player) ::cue {
            all: unset !important;
            font-size: 0 !important;
            line-height: 0 !important;
            opacity: 0 !important;
        }

        #subtitleOverlay {
            pointer-events: none;
            transition: opacity 0.2s ease;

            display: none;
            align-items: center;

            color: var(--muted);
            transition: var(--transition);

            align-items: center;
            gap: 10px;

        .audio-item:hover {
            background: rgba(255, 255, 255, .07);
            color: #fff;
        }

        .audio-item.active {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            font-weight: 700;
        }

        /* RIPPLE EFFECTS */
        .ripple-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 50;

        .seek-ripple {
            position: absolute;
            top: 50%;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .seek-ripple i {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .seek-ripple span {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .seek-ripple.left {
            left: 20%;
        }

        .seek-ripple.right {
            left: 80%;
        }

        .seek-ripple.animate {
            animation: ripple-anim 0.7s cubic-bezier(0.2, 0, 0.2, 1);
        }

        @keyframes ripple-anim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            40% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .header-info {
                display: none;
            }

            .player-header {
                padding: calc(1rem + var(--safe-top)) 1rem 1rem;
            }

            #ep-btn,
            #audio-btn {

            .next-episode-btn,

            .play-btn {

                height: 76px;

                background: rgba(255, 255, 255, 0.05) !important;

                color: var(--primary) !important;
            }

            .control-bottom {
                display: flex;
                padding: 1.5rem calc(1rem + var(--safe-left)) calc(1.5rem + var(--safe-bottom));
                flex-wrap: wrap;
                gap: 1rem;
            }

            .seek-bar {
                min-width: 100%;
                order: 3;
                height: 6px;
            }

            .control-actions {
                width: 100%;
                justify-content: space-between;
                gap: 0;
            }

            @media (orientation: portrait) {
                .ctrl-icon:not(#fullscreenBtn):not(#custom-audio-btn) {
                    display: none !important;
                }

                .control-center {
                    transform: translateY(8vh);
                }

                .control-actions {
                    justify-content: flex-end;
                    gap: 1rem;
                }
            }

            /* Bottom Sheet Drawers for Mobile */
            #source-panel,
            #ep-panel,
            #audio-panel,
            .control-menu {
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                max-height: 75vh !important;
                border-radius: 28px 28px 0 0 !important;
                border-bottom: none !important;
                padding: 20px 12px calc(16px + var(--safe-bottom)) !important;
                transform: translateY(100%);
                transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease !important;
                opacity: 0;
                pointer-events: none;
                visibility: hidden;
            }

            #source-panel.open,
            #ep-panel.open,
            #audio-panel.open,
            .control-menu.active {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
                visibility: visible;
            }

            .sheet-dragging {
                transition: none !important;
                animation: none !important;
                will-change: transform, opacity;
                filter: brightness(1.05);
                box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5) !important;
            }

            .sheet-animating {
                transition: transform 0.35s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s ease !important;
            }

            @keyframes slideUpDrawer {
                from {
                    transform: translateY(100%);
                }

                to {
                    transform: translateY(0);
                }
            }

            .panel-label {
                text-align: center;
                margin-bottom: 1.5rem;
                font-size: 1.1rem;
            }

            .panel-label::after {
                content: '';
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 40px;
                height: 4px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 2px;
            }

            #source-panel::before,
            #ep-panel::before,
            #audio-panel::before,
            .control-menu::before {
                content: '';
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 42px;
                height: 5px;

                background: rgba(255, 255, 255, 0.25);

        .ep-item {

        .filler-badge {

            color: #000;

        .filler-badge.canon {
            background: #4CAF50;
            color: #fff;
        }

        .ep-legend {
            display: flex;
            align-items: center;

            flex-wrap: wrap;

            background: rgba(0, 0, 0, 0.2);

        .ep-legend-badge {
            font-size: 0.65rem;

            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.3px;

        .ep-legend-badge.manga {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            border-color: rgba(76, 175, 80, 0.2);
        }

        .ep-legend-badge.mixed {
            background: rgba(255, 193, 7, 0.15);
            color: #FFC107;
            border-color: rgba(255, 193, 7, 0.2);
        }

        .ep-legend-badge.filler {
            background: rgba(244, 67, 54, 0.15);
            color: #F44336;
            border-color: rgba(244, 67, 54, 0.2);
        }

        .ep-legend-note {
            font-size: 0.65rem;
            opacity: 0.4;
            font-style: italic;
            margin-left: auto;
        }

        .transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            background-color: #000;
            transition: opacity 0.3s ease;
            display: none;
        }

        .transition-overlay.active {
            display: flex;
            opacity: 1;
            align-items: center;
            justify-content: center;
        }

        .transition-overlay canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Seek buffering mode: keep video visible, show spinner only */
        .transition-overlay.buffering-lite {
            background-color: transparent !important;
        }

        .transition-overlay.buffering-lite canvas {
            display: none !important;
        }

        /* Spinner shown on top of frozen frame during source switch */
        .transition-spinner {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transition-spinner-ring {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 4px solid rgba(168, 85, 247, 0.15);
            border-top-color: #a855f7;
            animation: tspin 1s linear infinite;
        }

        @keyframes tspin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

        async function fetchJsonWithApiFallback(url, options = {}) {
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const shouldRetryStatus = (status) => status === 404 || status === 429 || status >= 500;
            const hasCallerSignal = !!options?.signal;
            const isRetriableError = (err) => {
                const msg = String(err?.message || err || '').toLowerCase();
                return (
                    msg.includes('failed to fetch') ||
                    msg.includes('networkerror') ||
                    msg.includes('load failed') ||
                    msg.includes('timed out') ||
                    msg.includes('timeout') ||
                    msg.includes('aborted')
                );
            };
            const attemptFetch = async (base, attempts = 2) => {
                let lastErr = null;
                const maxAttempts = hasCallerSignal ? 1 : attempts;
                for (let i = 0; i < maxAttempts; i += 1) {
                    const reqUrl = withApiBase(url, base);
                    try {
                        const res = await fetch(reqUrl, options);
                        if (shouldRetryStatus(res.status) && i < maxAttempts - 1) {
                            await sleep(1000 + i * 1200);
                            continue;
                        }
                        if (res.ok) {
                            activeApiBase = base; // Persist successful base
                        }
                        return { res, usedBase: base };
                    } catch (err) {
                        lastErr = err;
                        if (isRetriableError(err) && i < maxAttempts - 1) {
                            await sleep(1000 + i * 1200);
                            continue;
                        }
                        throw err;
                    }
                }
                throw lastErr || new Error('Request failed');
            };

            let lastErr = null;
            for (const candidate of API_BASE_CANDIDATES) {
                try {
                    const result = await attemptFetch(candidate, 2);
                    // If result is 500/404/etc, and it's NOT the last candidate, keep trying others
                    if (!result.res.ok && candidate !== API_BASE_CANDIDATES[API_BASE_CANDIDATES.length - 1]) {
                        console.warn(`API ${candidate} returned ${result.res.status}, trying next fallback...`);
                        continue;
                    }
                    return result;
                } catch (e) {
                    lastErr = e;
                    console.warn(`API ${candidate} failed completely, trying next fallback...`, e);
                }
            }
            throw lastErr || new Error('All API candidates failed');
        }

        function normalizeAudioToken(v) {
            return String(v || '')

            const langVal = String(track?.lang || track?.language || '').toLowerCase();

            return [langVal, langToken, nameToken].filter(Boolean);

        function syncUrlState() {

                const epNoRaw = Number(epRef?.episode || epRef?.number || epRef?.episodeNum);
                const epNo = Number.isFinite(epNoRaw) && epNoRaw > 0 ? epNoRaw : (curEpisode + 1);
                u.searchParams.set('season', String(seasonNo));
                u.searchParams.set('episode', String(epNo));
                const seasonTitle = String(seasonRef?.name || '').trim();
                if (seasonTitle) u.searchParams.set('seasonTitle', seasonTitle);

        // Network estimation state
        let lastEstimatedBandwidth = 0;
        let bandwidthSampleCount = 0;
        let isBandwidthConstrained = false;

        function estimateNetworkQuality() {
            // Simple heuristic: if bandwidth is consistently low, flag as constrained
            const threshold = IS_MOBILE_CLIENT ? 2000000 : 3500000;
            return lastEstimatedBandwidth > 0 && lastEstimatedBandwidth < threshold;
        }

        function svCreateHlsInstance(startTime, isThumbnail = false) {
            const mobileMain = IS_MOBILE_CLIENT && !isThumbnail;
            const isConstrained = !isThumbnail && estimateNetworkQuality();

            // Dynamic buffer sizing — keep buffers modest to avoid bufferFullError cascades
            // (oversized buffers fill up, HLS.js panics → stall loop)
            const backBufferLength = isThumbnail ? 2 : (mobileMain ? 8 : 12);
            const maxBufferLength = isThumbnail ? 5 : (mobileMain ? 14 : 20);
            const maxMaxBufferLength = isThumbnail ? 10 : (mobileMain ? 28 : 40);
            const maxBufferSize = isThumbnail
                ? 6 * 1024 * 1024
                : (mobileMain ? 16 * 1000 * 1000 : 28 * 1000 * 1000);

            return new Hls({
                startPosition: startTime,
                enableWorker: !isThumbnail,
                // VOD streams — disable low-latency mode (it increases stalling on non-LL streams)
                lowLatencyMode: false,
                backBufferLength: backBufferLength,
                maxBufferLength: maxBufferLength,
                maxMaxBufferLength: maxMaxBufferLength,
                maxBufferSize: maxBufferSize,
                maxBufferHole: isThumbnail ? 0.1 : 0.3,
                // Longer watchdog period prevents false positive stall detections
                highBufferWatchdogPeriod: isThumbnail ? 2 : 4,
                nudgeOffset: isThumbnail ? 0.1 : 0.2,
                // Cap nudge retries — too many nudges cause bufferNudgeOnStall spam→stall loop

                maxFragLookUpTolerance: isThumbnail ? 0.4 : 0.05,
                manifestLoadingTimeOut: isThumbnail ? 4000 : 10000,
                manifestLoadingMaxRetry: 3,
                manifestLoadingRetryDelay: isThumbnail ? 200 : 300,
                levelLoadingTimeOut: isThumbnail ? 3000 : 10000,
                levelLoadingMaxRetry: 2,
                levelLoadingRetryDelay: isThumbnail ? 200 : 300,
                fragLoadingTimeOut: isThumbnail ? 3000 : 14000,
                // Fewer fragment retries — fail fast so we can rebuild in-place instead of stalling
                fragLoadingMaxRetry: isThumbnail ? 2 : 3,
                fragLoadingRetryDelay: isThumbnail ? 200 : 500,
                fragLoadingMaxRetryTimeout: isThumbnail ? 1000 : 6000,
                startLevel: isThumbnail ? 0 : -1,
                abrEwmaDefaultEstimate: mobileMain ? 1000000 : 1500000,
                abrBandWidthFactor: mobileMain ? 0.7 : 0.8,
                abrBandWidthUpFactor: mobileMain ? 0.35 : 0.5,
                abrMaxWithRealBitrate: true,
                ignoreDevicePixelRatio: true,
                capLevelToPlayerSize: true,
                capLevelOnFPSDrop: true,
                appendErrorMaxRetry: 4,
                startFragPrefetch: !isThumbnail,
                testBandwidth: !isThumbnail,
                progressive: true,
                maxStarvationDelay: isThumbnail ? 2 : 4,
                maxLoadingDelay: isThumbnail ? 2 : 4,
                xhrSetup: (xhr, url) => {
                    xhr.timeout = isThumbnail ? 5000 : 18000;
                },
            });
        }

        function showBufferingOverlay() {
            if (isFirstLoad) return;
            if (isSourceSwitching) return;
            const overlay = document.getElementById('transition-overlay');
            if (!overlay) return;
            if (!overlay.classList.contains('active')) {
                // During seek buffering, keep video visible and show spinner only.
                overlay.classList.add('buffering-lite');
                overlay.classList.add('active');
            }

        function hideBufferingOverlaySoon(delay = 180) {
            if (bufferingUiTimer) clearTimeout(bufferingUiTimer);
            if (seekBufferOverlayTimer) {
                clearTimeout(seekBufferOverlayTimer);
                seekBufferOverlayTimer = null;
            }
            bufferingUiTimer = setTimeout(() => {
                if (isSourceSwitching) return;
                if (isUserSeeking) return;
                if (!video) return;
                // On iOS native HLS, readyState is unreliable — the browser
                // reports readyState < 3 even while playing smoothly because
                // it is pre-fetching ahead. Use actual playback progress instead:
                // if the video is not paused and has started playing, hide.
                const isPlayingWell = !video.paused && video.currentTime > 0;
                const readyEnough  = video.readyState >= 3;
                if (isPlayingWell || readyEnough) hideTransitionOverlay();
            }, delay);
        }

        function maybeShowSeekBufferingOverlay(delay = 260) {
            if (seekBufferOverlayTimer) clearTimeout(seekBufferOverlayTimer);

                // Only show overlay if seek is still not ready.

        function kickHlsLoadNearCurrentTime(targetTime = null, aggressive = false) {
            if (!hlsInst || !video) return;
            const now = Date.now();
            if (!aggressive && now - lastHlsKickAt < 550) return;
            lastHlsKickAt = now;
            const anchor = Number.isFinite(targetTime) ? Number(targetTime) : Number(video.currentTime || 0);
            const target = Math.max(0, anchor - (aggressive ? 1.4 : 0.75));
            try {
                if (aggressive) {
                    hlsInst.stopLoad();
                }
                hlsInst.startLoad(target);
            } catch (_) { }
        }

        function tuneHlsForJump(targetTime, jumpDistance = 0, reason = 'seek') {
            if (!hlsInst || !video) return;

            const clampedTarget = Math.max(0, Number(targetTime || 0));
            const isLargeJump = jumpDistance > 15;

            try {
                // For any significant jump, immediately stop old loads and start at target
                hlsInst.stopLoad();
                
                if (Array.isArray(hlsInst.levels) && hlsInst.levels.length > 1) {
                    // Temporarily drop quality to load thumbnails/segments instantly
                    hlsInst.currentLevel = 0;
                    hlsInst.loadLevel = 0;
                    
                    setTimeout(() => {
                        if (hlsInst) hlsInst.loadLevel = -1; // Resume auto
                    }, 1500);
                }
                
                hlsInst.startLoad(clampedTarget);
            } catch (_) { }
        }

        function setTemporaryRecoveryQuality(ms = 4500) {
            if (!hlsInst || !Array.isArray(hlsInst.levels) || hlsInst.levels.length === 0) return;
            try {
                hlsInst.autoLevelCapping = 0;
                hlsInst.loadLevel = 0;
                hlsInst.nextLevel = 0;
            } catch (_) { }

            if (recoveryQualityTimer) clearTimeout(recoveryQualityTimer);
            recoveryQualityTimer = setTimeout(() => {
                if (!hlsInst) return;
                try {
                    hlsInst.nextLevel = -1;
                    hlsInst.autoLevelCapping = -1;
                } catch (_) { }
                recoveryQualityTimer = null;
            }, ms);
        }

        function schedulePendingJump(targetTime, reason = 'seek') {
            const normalizedTarget = Math.max(0, Number(targetTime || 0));
            pendingJumpTarget = { time: normalizedTarget, reason };
            lastRequestedPlaybackTarget = normalizedTarget;
            if (jumpRecoveryTimer) clearTimeout(jumpRecoveryTimer);
            // ENHANCED: Faster scheduling for rapid seeks
            jumpRecoveryTimer = setTimeout(() => {
                if (!pendingJumpTarget || !video) return;
                const next = pendingJumpTarget;
                jumpCooldownUntil = Date.now() + 400; // ENHANCED: Faster repeat seeks
                jumpInFlightUntil = Date.now() + 1000;
                tuneHlsForJump(next.time, Math.abs(next.time - Number(video.currentTime || 0)), next.reason);
                forceVideoSeek(next.time);
                if (!video.paused) {
                    Promise.resolve(video.play()).catch(() => { });
                }
                pendingJumpTarget = null;
            }, 150); // ENHANCED: Slightly faster scheduling
        }

        function applyGuardedJump(targetTime, reason = 'seek') {
            if (!video || !Number.isFinite(targetTime)) return;

            const clampedTarget = Math.max(0, Number(targetTime));
            const now = Date.now();
            const jumpDistance = Math.abs(clampedTarget - Number(video.currentTime || 0));
            pendingJumpTarget = { time: clampedTarget, reason };
            lastRequestedPlaybackTarget = clampedTarget;

            // ENHANCED: Do not arbitrarily trigger full hot-reloads on normal skips,
            // as this can lead to unwarranted full pipeline rebuilds that stall the player.

            // ENHANCED: Faster burst seeking - reduced cooldown
            if (now < jumpCooldownUntil && seekBurstCount >= 8) {
                schedulePendingJump(clampedTarget, reason);
                return;
            }

            jumpCooldownUntil = now + 80; // ENHANCED: Much faster repeat seeking
            jumpInFlightUntil = now + 600; // ENHANCED: Faster flight window
            if (jumpRecoveryTimer) {
                clearTimeout(jumpRecoveryTimer);
                jumpRecoveryTimer = null;
            }

            // ENHANCED: More aggressive HLS tuning for better responsiveness
            if (reason === 'skip' || jumpDistance > 20) {
                tuneHlsForJump(clampedTarget, jumpDistance, reason);
            } else if (jumpDistance > 5) {
                tuneHlsForJump(clampedTarget, jumpDistance, reason);
            }
            forceVideoSeek(clampedTarget);
            pendingJumpTarget = null;
        }

        function performHotReloadJump(targetTime, reason = 'seek') {
            if (!video || !currentStreamUrl || !hlsInst) return false;

            const clampedTarget = Math.max(0, Number(targetTime || 0));
            pendingJumpTarget = { time: clampedTarget, reason };
            lastRequestedPlaybackTarget = clampedTarget;
            jumpCooldownUntil = Date.now() + 1200;
            jumpInFlightUntil = Date.now() + 2200;
            if (reason !== 'skip') showBufferingOverlay();
            setTemporaryRecoveryQuality(reason === 'skip' ? 6500 : 5000);

            svSwitchHlsSourceSilent(currentStreamUrl, currentStreamReferer, () => {
                hlsFragErrorBurst = 0;
                hlsSessionIsFragile = false;
                setTemporaryRecoveryQuality(reason === 'skip' ? 6500 : 5000);
                if (pendingJumpTarget && video) {
                    const next = pendingJumpTarget;
                    pendingJumpTarget = null;
                    forceVideoSeek(next.time);
                    if (!video.paused) {
                        Promise.resolve(video.play()).catch(() => { });
                    }
                }
            }, clampedTarget, true);
            return true;
        }

        function performResponsiveSeek(percent) {
            if (!video || !isFinite(video.duration)) return;
            const clamped = Math.max(0, Math.min(100, Number(percent || 0)));
            const targetTime = (clamped / 100) * video.duration;
            lastUserSeekAt = Date.now();

            maybeShowSeekBufferingOverlay(260);
            applyGuardedJump(targetTime, 'seek');
        }

        function requestSeekToTime(targetTime, keepPlaying = true) {
            if (!video || !isFinite(video.duration)) return;
            const clampedTime = Math.max(0, Math.min(video.duration, Number(targetTime || 0)));
            queuedSeekTime = clampedTime;
            lastRequestedPlaybackTarget = clampedTime;

            if (seekApplyTimer) clearTimeout(seekApplyTimer);
            const now = Date.now();
            if (now - seekBurstWindowStart > 2000) {
                seekBurstWindowStart = now;
                seekBurstCount = 0;
            }
            seekBurstCount += 1;
            if (seekBurstCount >= 6) rapidSeekModeUntil = now + 9000;
            const elapsed = now - lastAppliedSeekAt;
            const minGap = seekBurstCount >= 8 ? 100 : 40;
            const delay = elapsed >= minGap ? 0 : (minGap - elapsed);

            seekApplyTimer = setTimeout(() => {
                if (!video || !isFinite(video.duration) || queuedSeekTime == null) return;
                const wasPaused = video.paused;
                const pct = (queuedSeekTime / Math.max(0.001, video.duration)) * 100;
                performResponsiveSeek(pct);
                lastAppliedSeekAt = Date.now();
                queuedSeekTime = null;
                if (keepPlaying && !wasPaused) {
                    Promise.resolve(video.play()).catch(() => { });
                }
            }, delay);
        }

        // ENHANCED: Flush audio buffer for smooth track switching
        function flushAudioBufferForTrackSwitch(hls) {
            if (!hls || !video) return;
            try {
                // Stop loading momentarily to allow clean buffer flush
                hls.stopLoad();
                const currentTime = video.currentTime;

                // Remove old audio data from buffer
                if (video.buffered.length > 0) {
                    const timeRanges = [];
                    for (let i = 0; i < video.buffered.length; i++) {
                        timeRanges.push({
                            start: video.buffered.start(i),
                            end: video.buffered.end(i)
                        });
                    }

                    // Try to remove source buffer programmatically if available
                    if (hls.media && hls.media.buffered && hls.media.sourceBuffers) {
                        try {
                            for (let i = 0; i < hls.media.sourceBuffers.length; i++) {
                                const sb = hls.media.sourceBuffers[i];
                                if (sb.buffered.length > 0) {
                                    for (let j = 0; j < sb.buffered.length; j++) {
                                        const start = sb.buffered.start(j);
                                        const end = sb.buffered.end(j);
                                        // Only remove old data, keep nearby buffer
                                        if (currentTime - start > 2 || end - currentTime > 2) {
                                            sb.remove(start, end);
                                        }
                                    }
                                }
                            }
                        } catch (_) { }
                    }
                }

                // Resume loading from near current position
                setTimeout(() => {
                    if (hls) {
                        try { hls.startLoad(Math.max(0, currentTime - 0.5)); } catch (_) { }
                    }
                }, 150);
            } catch (_) { }
        }

        function svApplyPreferredAudioToHls(hls) {
            let tracks = [];
            let isNative = false;

            if (hls && Array.isArray(hls.audioTracks) && hls.audioTracks.length > 0) {
                tracks = hls.audioTracks;
            } else if (!hls && video && video.audioTracks && video.audioTracks.length > 0) {
                tracks = Array.from(video.audioTracks);
                isNative = true;
            }

            if (tracks.length === 0) return;

            const activeSourceProvider = String(allSources?.[currentIdx]?.provider || '').toLowerCase();
            const shouldForceOriginalTrack =
                currentAudioSource !== 'satoru' &&
                activeSourceProvider === 'justanime';

            // Normalize our current preference
            let searchToken = (preferredAudioToken || '').toLowerCase();
            // Strip common suffixes that might pollute the token
            searchToken = searchToken.replace(/\s*\(.*?\)\s*/g, '').trim();
            const normPref = normalizeAudioToken(searchToken);

            let targetIdx = -1;

            if (normPref && !shouldForceOriginalTrack) {
                // 1. Try exact normalized match
                targetIdx = tracks.findIndex(t => {
                    return getTrackAudioTokens(t).some(tok => normalizeAudioToken(tok) === normPref);
                });

                // 2. Try substring match (e.g. "hindi" in "Hindi - Multi")
                if (targetIdx === -1) {
                    targetIdx = tracks.findIndex(t => {
                        return getTrackAudioTokens(t).some(tok => {
                            const nt = normalizeAudioToken(tok);
                            return nt.includes(normPref) || normPref.includes(nt);
                        });
                    });
                }
            }

            // 3. Fallback: Japanese (common for anime)
            if (targetIdx === -1) {
                targetIdx = tracks.findIndex(t => {
                    const l = String(t?.lang || t?.language || '').toLowerCase();
                    const n = String(t?.name || t?.label || '').toLowerCase();
                    return l === 'ja' || l === 'jpn' || n.includes('japanese') || n.includes('nihongo') || n.includes('jp');
                });
            }

            // 4. Fallback: Default or first track
            if (targetIdx === -1) {
                const def = tracks.findIndex(t => isNative ? t.enabled : t.default);
                targetIdx = def !== -1 ? def : 0;
            }

            if (targetIdx !== -1) {
                try {
                    if (isNative) {
                        if (!tracks[targetIdx].enabled) {
                            tracks.forEach((t, i) => { t.enabled = (i === targetIdx); });
                            
                            // Safari iOS hack: force native audio track to apply
                            if (typeof IS_IOS !== 'undefined' && IS_IOS && typeof video !== 'undefined' && video && video.readyState >= 1) {
                                video.currentTime = video.currentTime + 0.0001;
                            }
                            
                            const sel = tracks[targetIdx];
                            console.log(`[native-audio] Successfully auto-switched to index ${targetIdx} (${sel.label || sel.language})`);
                        }
                    } else if (hls.audioTrack !== targetIdx) {
                        // ENHANCED: Smooth buffer flushing before track switch
                        flushAudioBufferForTrackSwitch(hls);
                        hls.audioTrack = targetIdx;
                        const sel = tracks[targetIdx];
                        console.log(`[hls-audio] Successfully auto-switched to index ${targetIdx} (${sel.name || sel.lang})`);
                    }
                } catch (e) {
                    console.warn('[audio-switch] Failed to switch track:', e);
                }
            }
        }

        function svAttachHlsListeners(hls, startTime, onParsedAction, onErrorFallback) {
            let fatalRecoveryTimer = null;
            let fragParseBurstCount = 0;
            let fragParseBurstStartAt = 0;
            let lastFragBypassAt = 0;
            const clearFatalRecoveryTimer = () => {
                if (fatalRecoveryTimer) {
                    clearTimeout(fatalRecoveryTimer);
                    fatalRecoveryTimer = null;
                }
            };
            const armFatalRecoveryTimer = () => {
                clearFatalRecoveryTimer();
                const t0 = Number(video?.currentTime || 0);
                fatalRecoveryTimer = setTimeout(() => {
                    if (!video) return;
                    // If playback time is not progressing after recovery attempts, force fallback.
                    const t1 = Number(video.currentTime || 0);
                    const progressed = Math.abs(t1 - t0) > 0.25;
                    if (!progressed && video.readyState < 3) {

                console.log('MANIFEST_PARSED - audio tracks:', hls.audioTracks?.length || 0);

                hlsSessionIsFragile = false;
                if (startTime > 0 && video) video.currentTime = startTime;
                svApplyPreferredAudioToHls(hls);
                if (onParsedAction) onParsedAction();

                hideBufferingOverlaySoon(40); // ENHANCED: Faster hiding
                clearFatalRecoveryTimer();
            });

            hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, () => {

            });

                try {

                        hls.subtitleTrack = (preferred || tracks[0]).id;
                    }
                    setTimeout(() => {
                        updateCaptionsButtonVisibility();
                        buildCaptionsMenu();
                    }, 100);
                } catch (_) { }
            });

            // ENHANCED: Track bandwidth for adaptive quality
            hls.on(Hls.Events.fpsDropLevelCapping, () => {
                if (hls && hls.levels && hls.firstLevel !== -1) {
                    console.log('[hls] Quality reduced due to FPS drop');

            let mediaErrorCount = 0;

                if (isBufferFull && !d.fatal) {

                                hls.nextLevel = 0;
                                hls.loadLevel = 0;

                }

                if (isFragParsing && !d.fatal) {

                        fragParseBurstCount = 1;
                    }

                    if (fragParseBurstCount > 8) {

                        if (video && video.paused && !isSourceSwitching) {
                            video.play().catch(() => {
                                video.muted = true;
                                video.play().catch(() => { });
                            });
                        }
                    }, 80);
                }

                if (!d.fatal) {
                    if (inRapidSeekMode && (isFragParsing || isBufferAppend)) {

                        if (!isFragParsing) {
                            showBufferingOverlay();
                            try {
                                const jump = 0.6;
                                const near = Math.max(0, Math.min((video.duration || Infinity) - 0.2, (video.currentTime || 0) + jump));
                                if (isFinite(near) && near > 0) video.currentTime = near;

                        d.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR ||

                                    showBufferingOverlay();
                                    video.currentTime = Math.min(
                                        (video.duration || Infinity) - 0.05,
                                        (video.currentTime || 0) + (IS_MOBILE_CLIENT ? 0.1 : 0.2),
                                    );
                                    kickHlsLoadNearCurrentTime(video.currentTime, true);
                                    Promise.resolve(video.play()).catch(() => { });
                                } catch (_) { }
                            }

                            consecutiveBufferErrors++;
                            if (consecutiveBufferErrors > 2) {

                            }

                            consecutiveBufferErrors = 0;
                        }

                // (This is the main cause of black-screen — proxy refused = fatal frag load)
                if (d.fatal && (isFragLoad || isLevelLoad)) {
                    consecutiveFragErrors++;

                }

                        }

                            if (isFragParsing && typeof onErrorFallback === 'function') {
                                pendingJumpTarget = { time: durableRecoveryTarget, reason: pendingJumpTarget?.reason || 'seek' };
                                setTemporaryRecoveryQuality(6000);
                                onErrorFallback('fatal_frag_parse_jump');
                                return;
                            }
                            setTemporaryRecoveryQuality(5500);
                            if (video) {
                                showBufferingOverlay();
                                try {
                                    const jump = isFragParsing ? 1.5 : 0.6;
                                    const near = Math.max(0, Math.min((video.duration || Infinity) - 0.2, (video.currentTime || 0) + jump));
                                    if (isFinite(near) && near > 0) video.currentTime = near;
                                    tuneHlsForJump(near, jump, 'seek');
                                    if (isBufferAppend || d.fatal) hls.recoverMediaError();
                                } catch (_) { }
                            }
                            return;
                        }

                        if (recentlySeeked && mediaErrorCount <= 2) {
                            console.warn('[hls] Fatal media error after rapid seek, reloading near current time...');
                            showBufferingOverlay();
                            try {
                                let near = Math.max(0, Number(video?.currentTime || 0) - 0.5);
                                if (isFragParsing && video) near = Math.max(0, Number(video.currentTime || 0) + 1.0);
                                if (isFragParsing && typeof onErrorFallback === 'function') {
                                    pendingJumpTarget = pendingJumpTarget || { time: (durableRecoveryTarget || near), reason: 'seek' };

                                hls.startLoad(near);
                                hls.recoverMediaError();

                            return;

                            if ((isFragParsing || hlsSessionIsFragile) && typeof onErrorFallback === 'function') {
                                pendingJumpTarget = { time: durableRecoveryTarget, reason: pendingJumpTarget?.reason || 'seek' };

                                console.warn('[hls] Fatal frag parse detected, rebuilding at target.');
                                clearFatalRecoveryTimer();
                                onErrorFallback('fatal_frag_parse_jump');
                                return;
                            }
                            console.warn('[hls] Fatal media error, attempting recoverMediaError...');
                            showBufferingOverlay();
                            hls.recoverMediaError();
                            armFatalRecoveryTimer();
                        } else if (mediaErrorCount === 2) {
                            console.warn('[hls] Second media error, swapping codec...');
                            hls.swapAudioCodec();
                            hls.recoverMediaError();
                            armFatalRecoveryTimer();
                        } else {
                            console.warn('[hls] Unrecoverable media error, requesting same-source recovery...');
                            clearFatalRecoveryTimer();
                            if (typeof onErrorFallback === 'function') onErrorFallback('fatal_media_error');
                        }
                    } else {
                        if (typeof onErrorFallback === 'function') onErrorFallback('fatal_unknown');
                    }
                }
            });

            // Stall watchdog — checks every 2.5s, escalates after 3 consecutive stalls (~7.5s total)
            let lastWatchdogTime = -1;
            let watchdogStallCount = 0;
            const watchdogInterval = setInterval(function () {
                if (!video || video.paused || video.ended || video.readyState === 0) {
                    watchdogStallCount = 0;
                    lastWatchdogTime = video ? video.currentTime : -1;
                    return;
                }
                if (Date.now() < audioSwitchInFlightUntil || Date.now() < jumpInFlightUntil) {
                    watchdogStallCount = 0;
                    lastWatchdogTime = video ? video.currentTime : -1;
                    return;
                }
                const now = video.currentTime;
                if (Math.abs(now - lastWatchdogTime) < 0.05) {
                    watchdogStallCount++;
                    if (watchdogStallCount === 1) {
                        console.warn('[hls-watchdog] Stall detected, nudging startLoad...');
                        try { hls.stopLoad(); hls.startLoad(Math.max(0, (video.currentTime || 0) - 0.5)); } catch (_) { }
                    } else if (watchdogStallCount === 2) {
                        // Second check: try quality drop + reload
                        console.warn('[hls-watchdog] Stall persists, dropping quality...');
                        try {
                            if (hls.levels && hls.levels.length > 1) {
                                hls.autoLevelCapping = 0; hls.nextLevel = 0;
                                setTimeout(() => { try { hls.autoLevelCapping = -1; hls.nextLevel = -1; } catch (_) { } }, 4000);
                            }
                            hls.stopLoad();
                            hls.startLoad(Math.max(0, (video.currentTime || 0) - 0.5));
                        } catch (_) { }
                    } else if (watchdogStallCount >= 3) {
                        console.warn('[hls-watchdog] Persistent stall, attempting same-source recovery...');
                        watchdogStallCount = 0;
                        if (typeof onErrorFallback === 'function') onErrorFallback('watchdog_stall');
                    }
                } else {
                    watchdogStallCount = 0;
                }
                lastWatchdogTime = now;
            }, 2500);

            // Clean up watchdog when hls is destroyed
            hls.on(Hls.Events.DESTROYING, () => {
                clearInterval(watchdogInterval);
                clearFatalRecoveryTimer();
            });
        }

        function svSwitchHlsSourceSilent(url, referer, onReady, explicitTargetTime = null, forceRebuild = false) {
            if (!video) return;
            const savedTime = video.currentTime;
            const targetTime = Math.max(0, Number(
                explicitTargetTime ?? pendingJumpTarget?.time ?? lastRequestedPlaybackTarget ?? savedTime ?? 0
            ));
            const wasPlaying = !video.paused;
            let escalatedToHardReload = false;

            const forceRecoveredPlay = () => {
                if (!video) return;
                isSourceSwitching = false;
                setPlayIcon(true);
                Promise.resolve(video.play()).catch(() => { });
            };

            captureVideoFrameToOverlay();

            // ENHANCED: Check if we're switching to the same provider for audio track switching
            // Do not reuse if we are forcing a full rebuild (e.g., recovering from fatal pipeline crash)
            const isAudioTrackSwitch = !forceRebuild && url === currentStreamUrl && referer === currentStreamReferer;

            if (hlsInst && !isAudioTrackSwitch) {
                try {
                    hlsInst.stopLoad();
                    hlsInst.detachMedia();
                    hlsInst.destroy();
                } catch (_) { }
                hlsInst = null;
            }

            // ENHANCED: For audio track switching, reuse HLS instance if possible
            if (isAudioTrackSwitch && hlsInst) {
                console.log('Seamless audio track switch detected, reusing HLS instance');
                hlsInst.loadSource(proxiedStreamUrl(url, referer));
                try {
                    hlsInst.startLoad(Math.max(0, targetTime - 0.8));
                } catch (_) { }
            } else {
                hlsInst = svCreateHlsInstance(targetTime);
                svAttachHlsListeners(hlsInst, targetTime, onReady);
                hlsInst.loadSource(proxiedStreamUrl(url, referer));
                hlsInst.attachMedia(video);
                try {
                    hlsInst.startLoad(Math.max(0, targetTime - 0.8));
                } catch (_) { }
            }

            let lastTime = -1;
            const cleanup = () => {
                if (video && video.currentTime !== lastTime && video.currentTime > 0) {
                    isSourceSwitching = false;
                    hideTransitionOverlay();
                    video.removeEventListener('timeupdate', cleanup);
                    video.removeEventListener('playing', cleanup);
                }
                if (video) lastTime = video.currentTime;
            };
            const resumeRecoveredPlayback = () => {
                if (!video) return;
                isSourceSwitching = false;
                forceVideoSeek(targetTime);
                hideBufferingOverlaySoon(60);
                if (wasPlaying || video.paused) {
                    forceRecoveredPlay();
                }
                video.removeEventListener('canplay', resumeRecoveredPlayback);
                video.removeEventListener('playing', resumeRecoveredPlayback);
            };
            video.addEventListener('canplay', resumeRecoveredPlayback);
            video.addEventListener('playing', resumeRecoveredPlayback);
            video.addEventListener('playing', cleanup);
            video.addEventListener('timeupdate', cleanup);
            setTimeout(() => {
                if (!video) return;
                if (Math.abs((video.currentTime || 0) - targetTime) > 1.0 || video.readyState < 2) {
                    resumeRecoveredPlayback();
                    try {
                        hlsInst && hlsInst.startLoad(Math.max(0, targetTime - 0.8));
                    } catch (_) { }
                }
            }, 900);
            setTimeout(() => {
                if (!video) return;
                if (video.paused || video.readyState < 3) {
                    forceVideoSeek(targetTime);
                    forceRecoveredPlay();
                    hideBufferingOverlaySoon(40);
                }
            }, 1400);
            setTimeout(() => {
                if (!video || escalatedToHardReload) return;
                if (Date.now() < audioSwitchInFlightUntil) return;
                const stillBroken = !isFinite(video.duration) || video.duration <= 0 || (video.readyState < 2 && Math.abs(video.currentTime || 0) < 0.5);
                if (stillBroken) {
                    escalatedToHardReload = true;
                    console.warn('[hls] Silent recovery still unhealthy, escalating to hard reload at target time.');
                    pendingJumpTarget = { time: targetTime, reason: pendingJumpTarget?.reason || 'seek' };
                    loadStream(url, true, false, referer, currentIdx, targetTime);
                }
            }, 2200);
            setTimeout(hideTransitionOverlay, 8000);

            if (wasPlaying) {
                forceRecoveredPlay();
            }
        }

        function getInitialTvPositionFromUrl(seasons) {
            const safeSeasons = Array.isArray(seasons) ? seasons : [];

                );
                if (bySeasonKey >= 0) {

                }
            }
            if (URL_SEASON_TITLE) {
                const wantedSeasonTitle = normalizeSeasonSearchLabel(URL_SEASON_TITLE).toLowerCase();
                const bySeasonTitle = safeSeasons.findIndex((s) =>

                );
                if (bySeasonTitle >= 0) {

                }
            }
            if (Number.isFinite(URL_SEASON) && URL_SEASON > 0 && !matchedExplicitSeasonRef) {
                const bySeasonNo = safeSeasons.findIndex((s) => {
                    return Number(s?.seasonNo || 0) === URL_SEASON;
                });
                if (bySeasonNo >= 0) {
                    si = bySeasonNo;
                } else {
                    si = Math.max(0, Math.min(safeSeasons.length - 1, URL_SEASON - 1));
                }
            }
            const eps = safeSeasons[si]?.episodes || [];
            if (Number.isFinite(URL_EPISODE) && URL_EPISODE > 0) {
                const byEpisodeNo = eps.findIndex((ep) => {

                });
                if (byEpisodeNo >= 0) {
                    ei = byEpisodeNo;
                } else {
                    ei = Math.max(0, Math.min(eps.length - 1, URL_EPISODE - 1));
                }
            }
            return { seasonIndex: si, episodeIndex: ei };
