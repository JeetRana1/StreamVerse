<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse Manga</title>
    <meta name="description" content="Browse manga from multiple providers and read chapters online.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.png">
    <style>
        .manga-page {
            padding-top: 100px;
        }

        .manga-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
            align-items: center;
        }

        .manga-provider-btn {
            border: 1px solid rgba(255, 255, 255, .16);
            background: rgba(255, 255, 255, .06);
            color: #fff;
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: .85rem;
        }

        .manga-provider-btn.active {
            background: #e50914;
            border-color: #e50914;
        }

        .manga-search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .manga-search-row input {
            flex: 1;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .16);
            background: rgba(255, 255, 255, .06);
            color: #fff;
            padding: 12px 14px;
        }

        .manga-search-row button {
            border: 1px solid #e50914;
            background: #e50914;
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
        }

        .manga-card-meta {
            color: var(--text-muted);
            font-size: .8rem;
            margin-top: 2px;
        }

        .manga-error {
            color: #ff9f9f;
            margin: 14px 0;
        }

        #manga-modal .modal-content {
            width: min(1060px, 96vw);
            height: min(92vh, 900px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #manga-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 56px 18px 18px;
        }

        #manga-modal-body .modal-details {
            padding: 0;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 12px;
            min-height: 100%;
        }

        .modal-fs-btn {
            position: absolute;
            top: 12px;
            right: 72px;
            z-index: 12;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .22);
            background: rgba(0, 0, 0, .45);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            display: grid;
            place-items: center;
        }

        .modal-fs-btn:hover {
            background: rgba(229, 9, 20, .26);
            border-color: rgba(229, 9, 20, .5);
        }

        .modal-fs-btn i {
            font-size: .95rem;
        }

        .manga-info-top {
            display: grid;
            grid-template-columns: 190px 1fr;
            gap: 1.1rem;
            align-items: start;
        }

        .manga-poster {
            width: 190px;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: #12162a;
        }

        .manga-info-text h2 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 8px;
            font-size: 1.9rem;
            line-height: 1.05;
        }

        .manga-provider-pill {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, .24);
            border-radius: 999px;
            padding: 5px 10px;
            font-size: .78rem;
            color: #ddd;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, .05);
        }

        .manga-desc {
            line-height: 1.72;
            color: #d5d8e4;
            max-height: 210px;
            overflow: auto;
            padding-right: 6px;
        }

        .reader-modal {
            overflow-y: auto !important;
        }

        .reader-modal .modal-content {
            width: min(1200px, 98vw);
            height: min(96vh, 980px);
            margin: 2vh auto;
            border-radius: 18px;
        }

        #reader-body {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 58px 14px 14px;
            gap: 10px;
        }

        .reader-shell {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, .34);
            border-radius: 30px;
            padding: 14px;
            background:
                radial-gradient(circle at 50% -40%, rgba(255, 255, 255, .08), rgba(255, 255, 255, 0) 52%),
                linear-gradient(180deg, rgba(5, 6, 10, .95) 0%, rgba(2, 3, 6, .98) 100%);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, .14),
                0 26px 70px rgba(0, 0, 0, .56);
            backdrop-filter: blur(12px);
        }

        .reader-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 4px;
        }

        .reader-head h3 {
            font-size: 1.12rem;
            letter-spacing: -.2px;
        }

        .reader-meta {
            color: #bcc2d7;
            font-size: .95rem;
            max-width: 46%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: right;
        }

        .reader-footer {
            display: grid;
            gap: 8px;
            justify-items: center;
            padding-bottom: 2px;
        }

        .reader-dots {
            display: flex;
            gap: 6px;
        }

        .reader-dot {
            width: 14px;
            height: 6px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .7);
            background: transparent;
        }

        .reader-dot.active {
            background: #f2f2f2;
        }

        .reader-controls {
            display: grid;
            gap: 8px;
            justify-items: center;
            width: 100%;
        }

        .reader-nav-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .reader-mode-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .reader-page-input {
            width: 94px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .35);
            background: linear-gradient(180deg, rgba(255, 255, 255, .1), rgba(255, 255, 255, .05));
            color: #fff;
            padding: 7px 8px;
            text-align: center;
            outline: none;
            transition: .2s ease;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, .1);
        }

        .reader-page-input:focus {
            border-color: rgba(255, 95, 120, .75);
            box-shadow: 0 0 0 2px rgba(229, 9, 20, .2);
        }

        .reader-fit-btn.active {
            background: linear-gradient(135deg, #ff2d48, #d8061d);
            border-color: rgba(255, 130, 150, .75);
            color: #fff;
        }

        .reader-pill {
            border: 1px solid rgba(255, 255, 255, .34);
            border-radius: 12px;
            padding: 7px 11px;
            color: #f4f4f4;
            background: linear-gradient(180deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .06));
            font-weight: 600;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, .1), 0 8px 18px rgba(0, 0, 0, .22);
            transition: .2s ease;
        }

        .reader-pill:hover,
        .reader-controls .manga-provider-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, .56);
            background: linear-gradient(180deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .08));
        }

        .reader-pill:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(.25);
        }

        .reader-controls .manga-provider-btn {
            border-radius: 12px;
            padding: 7px 11px;
            border: 1px solid rgba(255, 255, 255, .34);
            background: linear-gradient(180deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .06));
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, .1), 0 8px 18px rgba(0, 0, 0, .22);
        }

        .reader-stage {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .16);
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, .07), rgba(255, 255, 255, 0) 34%),
                linear-gradient(90deg, rgba(10, 10, 14, .94) 0%, rgba(4, 5, 8, .9) 24%, rgba(4, 5, 8, .9) 76%, rgba(10, 10, 14, .94) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .reader-stage img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .45);
        }

        .reader-stage.book-mode {
            padding: 12px;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, .06) 0%, rgba(255, 255, 255, 0) 10%, rgba(255, 255, 255, 0) 90%, rgba(255, 255, 255, .06) 100%),
                radial-gradient(circle at 50% 12%, rgba(255, 255, 255, .07), rgba(255, 255, 255, .01) 44%),
                linear-gradient(180deg, #07080c 0%, #040507 100%);
        }

        .reader-stage.book-mode img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 10px solid #f4f0e7;
            border-radius: 8px;
            box-shadow:
                0 28px 55px rgba(0, 0, 0, .62),
                inset 0 0 0 1px rgba(0, 0, 0, .08),
                0 0 0 1px rgba(255, 255, 255, .28);
            background: #f4f0e7;
        }

        .reader-stage.fit-width {
            overflow-y: auto;
            align-items: flex-start;
            padding: 0;
        }

        .reader-stage.fit-width img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 0;
            border: 0;
            background: transparent;
            box-shadow: none;
        }

        .reader-exit-fs {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 20;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .24);
            background: rgba(0, 0, 0, .55);
            color: #fff;
            cursor: pointer;
        }

        .reader-exit-fs:hover {
            background: rgba(255, 70, 90, .28);
            border-color: rgba(255, 95, 120, .56);
        }

        .reader-nav-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 14%;
            background: transparent;
            border: 0;
            cursor: pointer;
            z-index: 2;
        }

        .reader-nav-zone.left {
            left: 0;
        }

        .reader-nav-zone.right {
            right: 0;
        }

        .reader-nav-zone:hover {
            background: rgba(255, 255, 255, .04);
        }

        .reader-nav-zone::before {
            content: '';
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            border-top: 2px solid #e50914;
            border-right: 2px solid #e50914;
            opacity: .65;
            transform: translateY(-50%) rotate(45deg);
            transition: .2s ease;
        }

        .reader-nav-zone.left::before {
            left: 14px;
            transform: translateY(-50%) rotate(-135deg);
        }

        .reader-nav-zone.right::before {
            right: 14px;
            transform: translateY(-50%) rotate(45deg);
        }

        .reader-nav-zone:hover::before {
            opacity: 1;
            border-color: #ff3344;
            filter: drop-shadow(0 0 6px rgba(229, 9, 20, .4));
        }

        .reader-nav-zone:disabled::before {
            opacity: .2;
        }

        .reader-modal .close-modal {
            top: 12px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .22);
            background: rgba(0, 0, 0, .48);
            display: grid;
            place-items: center;
            font-size: 1.4rem;
        }

        .reader-modal .close-modal:hover {
            background: rgba(255, 70, 90, .28);
            border-color: rgba(255, 95, 120, .56);
        }

        .page-combo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, .34);
            border-radius: 12px;
            padding: 7px 10px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .06));
            color: #f4f4f4;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, .1), 0 8px 18px rgba(0, 0, 0, .22);
        }

        .page-combo span {
            color: #d7dced;
            font-size: .9rem;
        }

        .page-combo .reader-page-input {
            width: 64px;
            margin: 0;
            padding: 5px 6px;
            border-radius: 8px;
            border-color: rgba(255, 255, 255, .26);
            box-shadow: none;
        }

        /* Fullscreen reader: manga-first layout with bottom overlay controls */
        .reader-modal .modal-content:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            margin: 0;
            border-radius: 0;
            border: 0;
            background: #020204;
            box-shadow: none;
        }

        .reader-modal .modal-content:fullscreen .close-modal,
        .reader-modal .modal-content:fullscreen .modal-fs-btn,
        .reader-modal .modal-content:fullscreen .reader-head,
        .reader-modal .modal-content:fullscreen .reader-dots,
        .reader-modal .modal-content:fullscreen .reader-mode-row {
            display: none !important;
        }

        .reader-modal .modal-content:fullscreen #reader-body {
            padding: 0;
            gap: 0;
        }

        .reader-modal .modal-content:fullscreen .reader-shell {
            border: 0;
            border-radius: 0;
            padding: 0;
            gap: 0;
            background: #020204;
            box-shadow: none;
            backdrop-filter: none;
            grid-template-rows: 1fr;
            position: relative;
        }

        .reader-modal .modal-content:fullscreen .reader-footer {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 10px;
            gap: 0;
            justify-items: center;
            background: linear-gradient(180deg, rgba(0, 0, 0, .66), rgba(0, 0, 0, .4));
            border: 1px solid rgba(255, 255, 255, .16);
            border-radius: 14px;
            backdrop-filter: blur(8px);
            z-index: 12;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
        }

        .reader-modal .modal-content:fullscreen.fs-controls-visible .reader-footer {
            opacity: 1;
            pointer-events: auto;
        }

        .reader-modal .modal-content:fullscreen .reader-controls {
            width: auto;
        }

        .reader-modal .modal-content:fullscreen .reader-nav-main {
            gap: 10px;
        }

        .reader-modal .modal-content:fullscreen #reader-prev,
        .reader-modal .modal-content:fullscreen #reader-next {
            display: none !important;
        }

        .reader-modal .modal-content:fullscreen .reader-stage {
            border: 0;
            border-radius: 0;
            background: #020204;
        }

        .reader-modal .modal-content:fullscreen .reader-exit-fs {
            display: grid;
            place-items: center;
        }

        .reader-modal .modal-content:fullscreen .reader-stage.book-mode {
            padding: 10px;
            background: #020204;
        }

        .reader-modal .modal-content:fullscreen .reader-stage.book-mode img {
            max-width: 100%;
            max-height: calc(100vh - 20px);
            border-width: 6px;
        }

        .reader-modal .modal-content:fullscreen .reader-stage.fit-width img {
            max-height: none;
            border: 0;
        }

        @media (max-width: 800px) {
            .manga-info-top {
                grid-template-columns: 1fr;
            }

            .manga-poster {
                width: 150px;
            }

            .reader-modal .modal-content {
                width: 99vw;
                height: 97vh;
                margin: 1.5vh auto;
            }

            #reader-body {
                padding: 52px 10px 10px;
                gap: 8px;
            }

            .reader-head {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            .reader-meta {
                max-width: 100%;
                text-align: left;
            }

            .reader-nav-zone {
                width: 18%;
            }

            .reader-shell {
                border-radius: 18px;
                padding: 10px;
            }

            .modal-fs-btn {
                right: 66px;
                width: 36px;
                height: 36px;
            }

            .reader-modal .close-modal {
                width: 36px;
                height: 36px;
                right: 16px;
            }

            .reader-exit-fs {
                width: 36px;
                height: 36px;
                top: 10px;
                right: 10px;
            }
        }

        .chapter-list {
            min-height: 220px;
            max-height: min(46vh, 460px);
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, .16);
            border-radius: 12px;
            padding: 8px;
            background: rgba(5, 8, 16, .55);
        }

        .chapter-item {
            border: 1px solid rgba(255, 255, 255, .08);
            width: 100%;
            text-align: left;
            background: rgba(255, 255, 255, .04);
            color: #fff;
            border-radius: 10px;
            padding: 10px 12px;
            margin: 6px 0;
            cursor: pointer;
        }

        .chapter-item:hover {
            background: rgba(229, 9, 20, .18);
            border-color: rgba(229, 9, 20, .3);
        }

        /* Modern dark scrollbars */
        #manga-modal-body,
        .manga-desc,
        .chapter-list,
        .reader-stage.fit-width {
            scrollbar-width: thin;
            scrollbar-color: rgba(235, 240, 255, .34) rgba(255, 255, 255, .08);
        }

        #manga-modal-body::-webkit-scrollbar,
        .manga-desc::-webkit-scrollbar,
        .chapter-list::-webkit-scrollbar,
        .reader-stage.fit-width::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        #manga-modal-body::-webkit-scrollbar-track,
        .manga-desc::-webkit-scrollbar-track,
        .chapter-list::-webkit-scrollbar-track,
        .reader-stage.fit-width::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, .06);
            border-radius: 999px;
        }

        #manga-modal-body::-webkit-scrollbar-thumb,
        .manga-desc::-webkit-scrollbar-thumb,
        .chapter-list::-webkit-scrollbar-thumb,
        .reader-stage.fit-width::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(255, 255, 255, .42), rgba(180, 190, 230, .22));
            border-radius: 999px;
            border: 2px solid rgba(10, 14, 28, .72);
        }

        #manga-modal-body::-webkit-scrollbar-thumb:hover,
        .manga-desc::-webkit-scrollbar-thumb:hover,
        .chapter-list::-webkit-scrollbar-thumb:hover,
        .reader-stage.fit-width::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, .58), rgba(210, 220, 255, .3));
        }
    </style>
</head>

<body>
    <header id="main-header">
        <div class="container container-header">
            <div class="logo"><a href="index.html"><span class="logo-accent">Stream</span>Verse</a></div>
            <nav class="desktop-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="manga.html" class="active">Manga</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="manga-page">
        <div class="container">
            <section class="row-section">
                <h2 class="section-title">Manga</h2>
                <div class="manga-toolbar" id="provider-toolbar"></div>
                <div class="manga-search-row">
                    <input id="manga-search" type="text" placeholder="Search manga...">
                    <button id="manga-search-btn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
                </div>
                <div id="manga-status" class="manga-card-meta"></div>
                <div id="manga-error" class="manga-error" style="display:none;"></div>
                <div id="manga-grid" class="movie-grid"></div>
            </section>
        </div>
    </main>

    <div id="manga-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="manga-modal-close">&times;</span>
            <div id="manga-modal-body"></div>
        </div>
    </div>

    <div id="reader-modal" class="modal reader-modal">
        <div class="modal-content">
            <button class="modal-fs-btn" id="reader-modal-fs" type="button" title="Fullscreen"><i
                    class="fa-solid fa-expand"></i></button>
            <span class="close-modal" id="reader-modal-close">&times;</span>
            <div id="reader-body"></div>
        </div>
    </div>

    <script src="/config.js"></script>
    <script src="manga.js"></script>
</body>

</html>
